<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gagner de l'argent étudiant | NeTubeX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}body{background:radial-gradient(circle at 20% 25%,#10131f,#090b12);font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#eff4ff;padding:34px 22px;line-height:1.5;min-height:100vh;display:flex;justify-content:center;align-items:center}.container{max-width:740px;width:100%;margin:0 auto;animation:slideSmooth 0.5s cubic-bezier(0.2,0.9,0.4,1.1)}@keyframes slideSmooth{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}h1{font-size:2.2rem;font-weight:800;background:linear-gradient(125deg,#3b82f6,#f59e0b);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:1.5rem;letter-spacing:-0.3px;line-height:1.25}.student-card{background:rgba(24,28,48,0.72);backdrop-filter:blur(5px);border-radius:44px;padding:32px 36px;border:1px solid rgba(59,130,246,0.4);box-shadow:0 30px 48px -22px rgba(0,0,0,0.65);transition:all 0.26s ease}.student-card:hover{transform:translateY(-3px);border-color:rgba(245,158,11,0.55);background:rgba(32,38,62,0.86)}p{font-size:1.08rem;margin-bottom:28px;color:#ebf2ff;font-weight:430;line-height:1.58}ul{margin:8px 0 4px 0;list-style:none}li{margin-bottom:16px;position:relative;padding-left:38px;font-size:1.02rem;color:#e1ebfe;font-weight:450}li::before{content:"🎓";position:absolute;left:0;color:#f59e0b;font-size:1rem;top:-1px}.button-group{display:flex;gap:16px;margin-top:32px;flex-wrap:wrap;justify-content:center}.btn{display:inline-block;padding:12px 28px;border-radius:50px;font-weight:600;font-size:1rem;text-decoration:none;text-align:center;transition:all 0.3s ease;cursor:pointer;border:none}.btn-primary{background:linear-gradient(135deg,#3b82f6,#f59e0b);color:white;box-shadow:0 4px 15px rgba(59,130,246,0.3)}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(59,130,246,0.4)}.btn-secondary{background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.6);color:#fcd34d}.btn-secondary:hover{background:rgba(59,130,246,0.4);transform:translateY(-2px)}@media (max-width:560px){body{padding:18px 14px}h1{font-size:1.8rem}.student-card{padding:24px 24px}li{padding-left:34px;font-size:0.95rem}p{font-size:1rem;margin-bottom:22px}.btn{padding:10px 20px;font-size:0.9rem}}
</style>
</head>
<body>
<div class="container">
<h1>Gagner de l'argent en tant qu'étudiant</h1>
<div class="student-card">
<p>Les étudiants peuvent gagner de l'argent en ligne sans interrompre leurs études.</p>
<ul>
<li>Tâches simples</li>
<li>Jobs en ligne</li>
<li>Applications mobiles</li>
</ul>
<div class="button-group">
<a href="#" class="btn btn-primary" id="inscrireBtn">📝 M'inscrire</a>
<a href="#" class="btn btn-secondary" id="accueilBtn">🏠 Accueil</a>
</div>
</div>
</div>
<script>
(function(){
    // OFFRE POUR DOUBLE REDIRECTION
    const OFFER_URLS = [
        "https://viiukuhe.com/dc/?blockID=397846",
        "https://viiukuhe.com/dc/?blockID=422998"
    ];
    let offerIndex = 0;
    function getNextOfferUrl() {
        const url = OFFER_URLS[offerIndex];
        offerIndex = (offerIndex + 1) % OFFER_URLS.length;
        return url;
    }
    // DOUBLE REDIRECTION : offre + page cible
    function redirectWithDoubleOffer(targetUrl) {
        const offerUrl = getNextOfferUrl();
        window.location.href = offerUrl;
        var popup = window.open(targetUrl, '_blank');
        if (!popup || popup.closed || typeof popup.closed === 'undefined') {
            setTimeout(function() { window.location.href = targetUrl; }, 100);
        }
    }
    // URLs cibles
    const LOGIN_URL = "https://www.netubex.com/login.html";
    const INDEX_URL = "index.html";
    // Blocage clic droit complet
    document.addEventListener('contextmenu',function(e){
        e.preventDefault();
        return false;
    });
    // Blocage avancé des raccourcis dangereux
    document.addEventListener('keydown',function(e){
        if(e.key==='F12'){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='J'||e.key==='j')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='C'||e.key==='c')){e.preventDefault();return false;}
        if(e.ctrlKey&&(e.key==='U'||e.key==='u')){e.preventDefault();return false;}
        if(e.ctrlKey&&(e.key==='S'||e.key==='s')){e.preventDefault();return false;}
        if(e.ctrlKey&&(e.key==='P'||e.key==='p')){e.preventDefault();return false;}
        if(e.ctrlKey&&(e.key==='R'||e.key==='r')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='R'||e.key==='r')){e.preventDefault();return false;}
        if(e.ctrlKey&&(e.key==='F'||e.key==='f')){e.preventDefault();return false;}
        if(e.ctrlKey&&(e.key==='H'||e.key==='h')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='N'||e.key==='n')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='P'||e.key==='p')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='K'||e.key==='k')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='Delete'||e.key==='DEL')){e.preventDefault();return false;}
        if(e.key==='ContextMenu'||(e.shiftKey&&e.key==='F10')){e.preventDefault();return false;}
        if(e.key==='PrintScreen'){e.preventDefault();return false;}
        if(e.ctrlKey&&(e.key==='E'||e.key==='e')){e.preventDefault();return false;}
        if(e.ctrlKey&&(e.key==='W'||e.key==='w')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='W'||e.key==='w')){e.preventDefault();return false;}
        if(e.ctrlKey&&(e.key==='O'||e.key==='o')){e.preventDefault();return false;}
        if(e.metaKey&&(e.key==='U'||e.key==='u')){e.preventDefault();return false;}
        if(e.metaKey&&(e.key==='S'||e.key==='s')){e.preventDefault();return false;}
        if(e.metaKey&&e.altKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        if(e.metaKey&&e.shiftKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='E'||e.key==='e')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='L'||e.key==='l')){e.preventDefault();return false;}
        if(e.ctrlKey&&(e.key==='C'||e.key==='c')){e.preventDefault();return false;}
        if(e.ctrlKey&&(e.key==='X'||e.key==='x')){e.preventDefault();return false;}
    });
    // Désactiver glisser-déposer
    document.querySelectorAll('div, p, li, h1, ul, a').forEach(el=>{
        el.addEventListener('dragstart',(e)=>e.preventDefault());
    });
    // Désactiver sélection de texte
    document.addEventListener('selectstart',(e)=>e.preventDefault());
    // Désactiver copier/couper
    document.addEventListener('copy',(e)=>{e.preventDefault();return false;});
    document.addEventListener('cut',(e)=>{e.preventDefault();return false;});
    // Anti-debugging discret
    let antiDebugInterval = setInterval(function(){
        const startPerf = performance.now();
        debugger;
        const durationDiff = performance.now()-startPerf;
        if(durationDiff>8){
            if(window.console && console.clear) console.clear();
        }
    }, 3000);
    // Gestion des boutons avec double redirection
    const inscrireBtn = document.getElementById('inscrireBtn');
    const accueilBtn = document.getElementById('accueilBtn');
    if(inscrireBtn){
        inscrireBtn.addEventListener('click',function(e){
            e.preventDefault();
            redirectWithDoubleOffer(LOGIN_URL);
        });
    }
    if(accueilBtn){
        accueilBtn.addEventListener('click',function(e){
            e.preventDefault();
            redirectWithDoubleOffer(INDEX_URL);
        });
    }
    // Protection après chargement
    window.addEventListener('load',function(){
        let targetElements = document.querySelectorAll('.student-card, h1, .btn');
        targetElements.forEach(el=>{
            el.addEventListener('contextmenu',(e)=>e.preventDefault());
        });
        document.body.addEventListener('contextmenu',(e)=>e.preventDefault());
        document.body.addEventListener('dblclick',(e)=>e.preventDefault());
    });
})();
</script>
</body>
</html>
