<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1f2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .box {
            background: #2a2f3e;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
        }
        h2 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #4a4f5e;
            border-radius: 6px;
            background: #1a1f2e;
            color: white;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #b91c1c;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        .success {
            background: #10b981;
            color: white;
            display: block;
        }
        .error {
            background: #dc2626;
            color: white;
            display: block;
        }
        a {
            color: #38bdf8;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>➕ Ajouter un Admin</h2>
        <input type="email" id="email" placeholder="Email de l'admin">
        <input type="password" id="password" placeholder="Mot de passe">
        <button id="addBtn">Créer l'admin</button>
        <div id="message" class="message"></div>
        <a href="login.html">← Retour</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
            authDomain: "netubexmoney.firebaseapp.com",
            projectId: "netubexmoney",
            storageBucket: "netubexmoney.firebasestorage.app",
            messagingSenderId: "856592608176",
            appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const addBtn = document.getElementById("addBtn");
        const messageDiv = document.getElementById("message");

        addBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                messageDiv.textContent = "❌ Email et mot de passe requis";
                messageDiv.className = "message error";
                return;
            }

            addBtn.disabled = true;
            addBtn.textContent = "Création...";

            try {
                // Créer l'utilisateur dans Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCredential.user.uid;

                // Ajouter le rôle admin dans Firestore
                await setDoc(doc(db, "users", uid), {
                    role: "admin",
                    email: email
                });

                messageDiv.textContent = "✅ Admin créé avec succès !";
                messageDiv.className = "message success";
                emailInput.value = "";
                passwordInput.value = "";

            } catch (error) {
                let msg = "Erreur : ";
                if (error.code === "auth/email-already-in-use") {
                    msg = "❌ Cet email est déjà utilisé";
                } else if (error.code === "auth/weak-password") {
                    msg = "❌ Mot de passe trop faible (6 caractères min)";
                } else {
                    msg = "❌ " + error.message;
                }
                messageDiv.textContent = msg;
                messageDiv.className = "message error";
            }

            addBtn.disabled = false;
            addBtn.textContent = "Créer l'admin";
        });
    </script>
</body>
</html>
