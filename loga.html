<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1f2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .box {
            background: #2a2f3e;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        h2 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #4a4f5e;
            border-radius: 6px;
            background: #1a1f2e;
            color: white;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #10b981;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #059669;
        }
        button:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        .success {
            background: #10b981;
            color: white;
            display: block;
        }
        .error {
            background: #dc2626;
            color: white;
            display: block;
        }
        a {
            color: #38bdf8;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        a:hover {
            text-decoration: underline;
        }
        .info {
            background: #3b82f6;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>➕ Ajouter un Admin</h2>
        <div class="info">
            ⚡ Compte automatiquement activé (isActive = true)
        </div>
        <input type="email" id="email" placeholder="Email de l'admin" autocomplete="off">
        <input type="password" id="password" placeholder="Mot de passe (6 caractères min)">
        <button id="addBtn">Créer l'admin</button>
        <div id="message" class="message"></div>
        <a href="login.html">← Retour à la connexion</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
            authDomain: "netubexmoney.firebaseapp.com",
            projectId: "netubexmoney",
            storageBucket: "netubexmoney.firebasestorage.app",
            messagingSenderId: "856592608176",
            appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const addBtn = document.getElementById("addBtn");
        const messageDiv = document.getElementById("message");

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                if (messageDiv.className.includes(type)) {
                    messageDiv.style.display = 'none';
                    messageDiv.className = 'message';
                }
            }, 5000);
            messageDiv.style.display = 'block';
        }

        addBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage("❌ Email et mot de passe requis", "error");
                return;
            }

            if (password.length < 6) {
                showMessage("❌ Le mot de passe doit contenir au moins 6 caractères", "error");
                return;
            }

            addBtn.disabled = true;
            addBtn.textContent = "⏳ Création en cours...";

            try {
                // 1. Créer l'utilisateur dans Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCredential.user.uid;

                // 2. Ajouter le document dans Firestore avec isActive = true et isBlocked = false
                await setDoc(doc(db, "users", uid), {
                    role: "admin",
                    email: email,
                    isActive: true,        // ✅ Compte activé immédiatement
                    isBlocked: false,      // ✅ Non bloqué
                    dateCreation: new Date().toISOString(),
                    dateActivation: new Date().toISOString()
                });

                showMessage("✅ Admin créé avec succès ! Compte activé immédiatement.", "success");
                emailInput.value = "";
                passwordInput.value = "";

                // Redirection optionnelle après 2 secondes
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2000);

            } catch (error) {
                let msg = "";
                switch(error.code) {
                    case "auth/email-already-in-use":
                        msg = "❌ Cet email est déjà utilisé";
                        break;
                    case "auth/weak-password":
                        msg = "❌ Mot de passe trop faible (6 caractères min)";
                        break;
                    case "auth/invalid-email":
                        msg = "❌ Email invalide";
                        break;
                    default:
                        msg = "❌ Erreur : " + error.message;
                }
                showMessage(msg, "error");
            }

            addBtn.disabled = false;
            addBtn.textContent = "Créer l'admin";
        });

        // Permettre la validation avec la touche Entrée
        passwordInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                addBtn.click();
            }
        });
    </script>
</body>
</html>
