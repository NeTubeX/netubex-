<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Offerwall</title>
</head>
<body>

<h2>Gagne de l'argent 💰</h2>

<div id="offerwall"></div>

<script>
  // Génère ou récupère un USER_ID unique
  let userId = localStorage.getItem("user_id");

  if (!userId) {
    userId = Math.floor(Math.random() * 1000000000);
    localStorage.setItem("user_id", userId);
  }

  const placementId = "69f304688bb8875fc339fe24";

  // Injecte l'iframe
  document.getElementById("offerwall").innerHTML = `
    <iframe
      src="https://gemiwall.com/${placementId}/${userId}"
      width="100%"
      height="600px"
      frameborder="0"
      style="border: none; border-radius: 8px;"
    ></iframe>
  `;
</script>

</body>
</html>
