<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>NeTubeX · Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
}
body{
    background:#0a0f1a;
    font-family:'Inter',system-ui,sans-serif;
    color:#e2e8f0;
    min-height:100vh;
    overflow-x:hidden;
}
.rainbow-line{
    height:3px;
    width:100%;
    background:linear-gradient(90deg,#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);
    background-size:200% 100%;
    animation:rainbowMove 3s linear infinite;
}
@keyframes rainbowMove{
    0%{background-position:0% 50%;}
    100%{background-position:200% 50%;}
}

.header{
    background:#0f1420;
    border-bottom:1px solid #1e293b;
    padding:0.5rem 2rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:100;
}
.logo{
    display:flex;
    align-items:center;
    gap:8px;
    cursor:default;
}
.logo img{
    height:32px;
    width:auto;
}
.logo h1{
    font-size:1.3rem;
    font-weight:700;
    background:linear-gradient(135deg,#e2e8f0,#f59e0b);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
}
.logo h1 span{
    color:#f59e0b;
}
.online-status{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(16,185,129,0.15);
    padding:8px 16px;
    border-radius:40px;
    font-size:0.85rem;
    font-weight:500;
    color:#10b981;
}
.blinking-dot{
    width:10px;
    height:10px;
    background-color:#10b981;
    border-radius:50%;
    animation:blink 1.2s ease-in-out infinite;
    box-shadow:0 0 5px #10b981;
}
@keyframes blink{
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:0.3;transform:scale(0.8);}
}

.floating-group{
    position:fixed;
    bottom:30px;
    right:25px;
    display:flex;
    flex-direction:column;
    gap:12px;
    z-index:200;
}
.float-item{
    background:#0f1420;
    width:52px;
    height:52px;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.2rem;
    cursor:pointer;
    color:#94a3b8;
    border:1px solid #1e293b;
    transition:all 0.2s;
}
.float-item:hover{
    background:#1a2332;
    color:#38bdf8;
    transform:scale(1.05);
}
.float-item.gold{
    background:linear-gradient(145deg,#f59e0b,#d97706);
    border:none;
    color:#fff;
}
.float-item.balance{
    background:linear-gradient(145deg,#10b981,#059669);
    border:none;
    color:#fff;
}

.menu-floating{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.95);
    width:280px;
    background:#0f1420;
    border-radius:24px;
    border:1px solid #1e293b;
    z-index:1001;
    display:none;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
    opacity:0;
    transition:opacity 0.4s ease, transform 0.4s ease;
}
.menu-floating.active{
    display:block;
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
}
.menu-header{
    padding:15px;
    border-bottom:1px solid #1e293b;
    background:#1a2332;
    border-radius:24px 24px 0 0;
    color:#fff;
}
.menu-item{
    padding:12px 20px;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
    border-bottom:1px solid #1e293b;
    color:#e2e8f0;
    transition:0.2s;
}
.menu-item:hover{
    background:#1a2332;
}
.menu-item i{
    width:24px;
    color:#f59e0b;
}
.menu-item.danger{
    color:#ef4444;
}
.menu-item.danger i{
    color:#ef4444;
}

.promo-scroll{
    width:100%;
    overflow-x:auto;
    overflow-y:hidden;
    white-space:nowrap;
    padding:1rem 2rem;
    scrollbar-width:thin;
    scrollbar-color:#f59e0b #1e293b;
}
.promo-cards-wrapper{
    display:inline-flex;
    gap:16px;
}
.promo-card{
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:180px;
    height:150px;
    background:linear-gradient(145deg,#1a1f2e,#151d2e);
    border-radius:20px;
    border:1px solid rgba(245,158,11,0.3);
    cursor:pointer;
    transition:all 0.2s ease;
    text-align:center;
    gap:8px;
    position:relative;
}
.promo-card:hover{
    transform:translateY(-5px);
    border-color:#f59e0b;
    background:linear-gradient(145deg,#1f2538,#1a2235);
}
.promo-card img{
    width:60px;
    height:60px;
    object-fit:contain;
    border-radius:12px;
    pointer-events:none;
}
.promo-card .timer{
    font-size:0.7rem;
    font-weight:700;
    color:#f59e0b;
    background:rgba(245,158,11,0.2);
    padding:4px 8px;
    border-radius:20px;
}
.promo-card.disabled{
    opacity:0.5;
    cursor:not-allowed;
    pointer-events:none;
}
.promo-card.disabled::after{
    content:'🔒';
    position:absolute;
    top:8px;
    right:8px;
    font-size:14px;
}

.feed-container{
    width:100%;
    padding:1.5rem 0;
}
.games-list{
    display:flex;
    flex-direction:column;
    gap:1px;
    width:100%;
    background:#0a0f1a;
}
.post-card{
    background:#0f1420;
    overflow:hidden;
    width:100%;
    border-bottom:1px solid #1e293b;
    transition:0.3s;
}
.post-card:hover{
    background:#131a2a;
}
.post-header{
    display:flex;
    align-items:center;
    gap:14px;
    padding:1rem 2rem;
    border-bottom:1px solid #1e293b;
}
.avatar{
    width:52px;
    height:52px;
    background:linear-gradient(135deg,#1e293b,#0f1420);
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.6rem;
}
.post-meta h4{
    font-size:1.1rem;
    font-weight:800;
    margin-bottom:4px;
}
.post-meta span{
    font-size:0.7rem;
    color:#64748b;
}
.post-image{
    width:100%;
    height:auto;
    min-height:200px;
    object-fit:cover;
    display:block;
    pointer-events:none;
}
.gain-btn{
    background:linear-gradient(145deg,#2563eb,#1a4db8);
    border:none;
    padding:14px;
    font-weight:700;
    color:#fff;
    cursor:pointer;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    transition:0.2s;
    font-size:1rem;
}
.gain-btn:hover{
    background:linear-gradient(145deg,#3b82f6,#2563eb);
}

.toast-notification{
    position:fixed;
    bottom:30px;
    left:30px;
    background:#0f1420;
    border-left:4px solid #10b981;
    color:#fff;
    padding:12px 24px;
    border-radius:12px;
    font-size:0.8rem;
    z-index:10000;
    animation:slideUpLeft 0.3s;
}
.toast-error{
    border-left-color:#ef4444;
}
@keyframes slideUpLeft{
    from{opacity:0;transform:translateX(-20px) translateY(20px);}
    to{opacity:1;transform:translateX(0) translateY(0);}
}

.balance-toast{
    position:fixed;
    bottom:30px;
    left:30px;
    background:#0f1420;
    border-left:4px solid #f59e0b;
    border-radius:12px;
    padding:12px 20px;
    z-index:10000;
    display:flex;
    align-items:center;
    gap:12px;
    animation:slideUpLeft 0.3s;
}
.balance-toast i{
    font-size:1.3rem;
    color:#f59e0b;
}
.balance-value{
    font-size:1.1rem;
    font-weight:800;
    color:#f59e0b;
}

.modal-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    backdrop-filter:blur(8px);
    z-index:3000;
    display:flex;
    align-items:center;
    justify-content:center;
    visibility:hidden;
    opacity:0;
    transition:all 0.3s ease;
}
.modal-overlay.active{
    visibility:visible;
    opacity:1;
}
.modal-container{
    background:#0f1420;
    border-radius:24px;
    max-width:500px;
    width:90%;
    border:1px solid #1e293b;
    overflow:hidden;
    transform:scale(0.9);
    transition:transform 0.3s ease;
    max-height:90vh;
    overflow-y:auto;
}
.modal-overlay.active .modal-container{
    transform:scale(1);
}
.modal-header{
    padding:18px 22px;
    border-bottom:1px solid #1e293b;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.modal-header h3{
    font-size:1.1rem;
    color:#f59e0b;
    display:flex;
    align-items:center;
    gap:8px;
}
.modal-close{
    background:#1e293b;
    border:none;
    width:30px;
    height:30px;
    border-radius:50%;
    color:#fff;
    cursor:pointer;
}
.modal-close:hover{
    background:#ef4444;
}
.modal-body{
    padding:22px;
}
.modal-footer{
    padding:15px 22px;
    border-top:1px solid #1e293b;
    display:flex;
    justify-content:flex-end;
    gap:12px;
}
.modal-footer button{
    padding:10px 22px;
    border-radius:40px;
    border:none;
    cursor:pointer;
    font-weight:600;
}
.btn-confirm{
    background:#10b981;
    color:#fff;
}
.btn-confirm:hover{
    background:#059669;
}
.btn-cancel{
    background:#1e293b;
    color:#fff;
}
.btn-cancel:hover{
    background:#334155;
}
.input-group{
    margin-bottom:15px;
}
.input-group label{
    display:block;
    color:#94a3b8;
    font-size:0.75rem;
    margin-bottom:5px;
}
.input-group input, .input-group select{
    width:100%;
    padding:12px;
    background:#1a2332;
    border:1px solid #1e293b;
    border-radius:12px;
    color:#fff;
    outline:none;
}
.input-group input:focus, .input-group select:focus{
    border-color:#f59e0b;
}
.method-option{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:8px;
    transition:0.2s;
}
.method-option i{
    font-size:1.2rem;
}
.method-option.selected-airtel{
    background:rgba(226,0,0,0.25);
    border:2px solid #E20000;
}
.method-option.selected-orange{
    background:rgba(255,121,0,0.25);
    border:2px solid #FF7900;
}
.method-option.selected-paypal{
    background:rgba(0,112,186,0.25);
    border:2px solid #0070BA;
}
.amount-error{
    color:#ef4444;
    font-size:0.7rem;
    margin-top:5px;
    display:none;
}
.typewriter-text{
    font-family:'Courier New',monospace;
    font-size:0.85rem;
    color:#10b981;
    background:rgba(16,185,129,0.1);
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    text-align:center;
    border-left:3px solid #10b981;
    white-space:normal;
    overflow:hidden;
}

.fullscreen-iframe{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0a0f1a;
    z-index:4000;
    display:flex;
    flex-direction:column;
    visibility:hidden;
    opacity:0;
    transition:opacity 0.25s;
}
.fullscreen-iframe.active{
    visibility:visible;
    opacity:1;
}
.iframe-close{
    position:absolute;
    top:20px;
    right:20px;
    width:44px;
    height:44px;
    background:#ef4444;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:4001;
    border:none;
    color:#fff;
    font-size:1.2rem;
}
.fullscreen-iframe iframe{
    width:100%;
    height:100%;
    border:none;
    background:#fff;
}

.footer{
    background:#0f1420;
    border-top:1px solid #1e293b;
    padding:1rem;
    text-align:center;
    margin-top:1rem;
}
.footer p{
    color:#64748b;
    font-size:0.7rem;
}
</style>
</head>
<body>

<div class="rainbow-line"></div>

<header class="header">
    <div class="logo">
        <img src="https://i.postimg.cc/hvcGVK42/IMG-3585-Photoroom.png" alt="NeTubeX Logo">
        <h1>Ne<span>TubeX</span></h1>
    </div>
    <div class="online-status">
        <span class="blinking-dot"></span>
        <span>En ligne</span>
    </div>
</header>

<div class="promo-scroll">
    <div class="promo-cards-wrapper" id="promoCardsWrapper"></div>
</div>

<div class="feed-container">
    <div class="games-list" id="gamesContainer"></div>
</div>

<div class="floating-group">
    <div class="float-item balance" id="balanceFloatBtn"><i class="fas fa-coins"></i></div>
    <div class="float-item gold" id="portalFloatBtn"><i class="fas fa-rocket"></i></div>
    <div class="float-item" id="menuFloatBtn"><i class="fas fa-bars"></i></div>
</div>

<div id="menuFloating" class="menu-floating">
    <div class="menu-header"><strong><i class="fas fa-bars"></i> Menu</strong></div>
    <div class="menu-item" id="menuCapBtn"><i class="fas fa-chart-line"></i> CAP du jour</div>
    <div class="menu-item" id="menuWithdrawBtn"><i class="fas fa-money-bill-wave"></i> Retirer</div>
    <div class="menu-item danger" id="menuLogoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</div>
</div>

<footer class="footer"><p><i class="fas fa-copyright"></i> NeTubeX 2026</p></footer>

<!-- Popup CAP -->
<div id="capModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header"><h3><i class="fas fa-chart-line"></i> CAP du jour</h3><button class="modal-close" id="closeCapModal"><i class="fas fa-times"></i></button></div>
        <div class="modal-body"><p id="capMessage" style="color:#e2e8f0;line-height:1.5;">Chargement...</p></div>
        <div class="modal-footer"><button class="btn-cancel" id="closeCapFooterBtn">Fermer</button></div>
    </div>
</div>

<!-- Popup Retrait -->
<div id="withdrawModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header"><h3><i class="fas fa-money-bill-wave"></i> Effectuer un retrait</h3><button class="modal-close" id="closeWithdrawModal"><i class="fas fa-times"></i></button></div>
        <div class="modal-body">
            <div style="background:#1a2332;padding:12px;border-radius:12px;margin-bottom:15px;text-align:center;">
                <span style="color:#94a3b8;">Solde actuel :</span> 
                <strong id="currentBalanceDisplay" style="color:#f59e0b;font-size:1.2rem;">0.0000 $</strong>
            </div>
            
            <div class="input-group">
                <label>Montant (min 3$)</label>
                <input type="number" id="withdrawAmount" step="0.01" min="3" placeholder="Ex: 3.00">
                <div id="amountError" class="amount-error">Le montant minimum est de 3$</div>
            </div>
            
            <div class="input-group">
                <label>Méthode de retrait</label>
                <div class="method-option" data-method="airtel_money"><i class="fas fa-phone-alt"></i> Airtel Money</div>
                <div class="method-option" data-method="orange_money"><i class="fas fa-phone-alt"></i> Orange Money</div>
                <div class="method-option" data-method="paypal"><i class="fab fa-paypal"></i> PayPal</div>
            </div>
            
            <div class="input-group" id="countryGroup" style="display:none;">
                <label>Pays</label>
                <select id="countrySelect">
                    <option value="">-- Sélectionnez votre pays --</option>
                    <option value="Algérie">🇩🇿 Algérie</option>
                    <option value="Angola">🇦🇴 Angola</option>
                    <option value="Bénin">🇧🇯 Bénin</option>
                    <option value="Botswana">🇧🇼 Botswana</option>
                    <option value="Burkina Faso">🇧🇫 Burkina Faso</option>
                    <option value="Burundi">🇧🇮 Burundi</option>
                    <option value="Cabo Verde">🇨🇻 Cabo Verde</option>
                    <option value="Cameroun">🇨🇲 Cameroun</option>
                    <option value="République centrafricaine">🇨🇫 République centrafricaine</option>
                    <option value="Tchad">🇹🇩 Tchad</option>
                    <option value="Comores">🇰🇲 Comores</option>
                    <option value="Congo">🇨🇬 Congo</option>
                    <option value="RDC">🇨🇩 RDC</option>
                    <option value="Côte d'Ivoire">🇨🇮 Côte d'Ivoire</option>
                    <option value="Djibouti">🇩🇯 Djibouti</option>
                    <option value="Égypte">🇪🇬 Égypte</option>
                    <option value="Guinée équatoriale">🇬🇶 Guinée équatoriale</option>
                    <option value="Érythrée">🇪🇷 Érythrée</option>
                    <option value="Eswatini">🇸🇿 Eswatini</option>
                    <option value="Éthiopie">🇪🇹 Éthiopie</option>
                    <option value="Gabon">🇬🇦 Gabon</option>
                    <option value="Gambie">🇬🇲 Gambie</option>
                    <option value="Ghana">🇬🇭 Ghana</option>
                    <option value="Guinée">🇬🇳 Guinée</option>
                    <option value="Guinée-Bissau">🇬🇼 Guinée-Bissau</option>
                    <option value="Kenya">🇰🇪 Kenya</option>
                    <option value="Lesotho">🇱🇸 Lesotho</option>
                    <option value="Liberia">🇱🇷 Liberia</option>
                    <option value="Libye">🇱🇾 Libye</option>
                    <option value="Madagascar">🇲🇬 Madagascar</option>
                    <option value="Malawi">🇲🇼 Malawi</option>
                    <option value="Mali">🇲🇱 Mali</option>
                    <option value="Mauritanie">🇲🇷 Mauritanie</option>
                    <option value="Maurice">🇲🇺 Maurice</option>
                    <option value="Maroc">🇲🇦 Maroc</option>
                    <option value="Mozambique">🇲🇿 Mozambique</option>
                    <option value="Namibie">🇳🇦 Namibie</option>
                    <option value="Niger">🇳🇪 Niger</option>
                    <option value="Nigéria">🇳🇬 Nigéria</option>
                    <option value="Ouganda">🇺🇬 Ouganda</option>
                    <option value="Rwanda">🇷🇼 Rwanda</option>
                    <option value="Sao Tomé-et-Principe">🇸🇹 Sao Tomé-et-Principe</option>
                    <option value="Sénégal">🇸🇳 Sénégal</option>
                    <option value="Seychelles">🇸🇨 Seychelles</option>
                    <option value="Sierra Leone">🇸🇱 Sierra Leone</option>
                    <option value="Somalie">🇸🇴 Somalie</option>
                    <option value="Afrique du Sud">🇿🇦 Afrique du Sud</option>
                    <option value="Soudan du Sud">🇸🇸 Soudan du Sud</option>
                    <option value="Soudan">🇸🇩 Soudan</option>
                    <option value="Tanzanie">🇹🇿 Tanzanie</option>
                    <option value="Togo">🇹🇬 Togo</option>
                    <option value="Tunisie">🇹🇳 Tunisie</option>
                    <option value="Zambie">🇿🇲 Zambie</option>
                    <option value="Zimbabwe">🇿🇼 Zimbabwe</option>
                </select>
            </div>
            
            <div class="input-group" id="walletInputGroup">
                <label id="walletLabel">Numéro de téléphone</label>
                <input type="text" id="walletAddress" placeholder="+243 9X XXX XXXX">
                <div id="methodHint" class="typewriter-text"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-confirm" id="submitWithdrawBtn">Valider</button>
            <button class="btn-cancel" id="cancelWithdrawBtn">Annuler</button>
        </div>
    </div>
</div>

<!-- Popup Confirmation redirection jeux (texte machine à écrire) -->
<div id="gameRedirectModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header"><h3><i class="fas fa-info-circle"></i> Redirection</h3><button class="modal-close" id="closeGameRedirectModal"><i class="fas fa-times"></i></button></div>
        <div class="modal-body">
            <p id="typewriterMessage" style="color:#e2e8f0;line-height:1.5;font-family:'Courier New',monospace;"></p>
        </div>
        <div class="modal-footer">
            <button class="btn-confirm" id="confirmGameRedirectBtn">OK</button>
            <button class="btn-cancel" id="cancelGameRedirectBtn">Annuler</button>
        </div>
    </div>
</div>

<!-- Popup Déconnexion -->
<div id="confirmLogoutModal" class="modal-overlay">

// ========== ANIMATION SOLDE (0 → montant réel) ==========
async function animateBalance(from, to, duration = 800) {
    const startTime = performance.now();
    
    return new Promise((resolve) => {
        const animate = (currentTime) => {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const currentValue = from + (to - from) * progress;
            
            const balanceToast = document.querySelector('.balance-toast');
            if(balanceToast) {
                const valueSpan = balanceToast.querySelector('.balance-value');
                if(valueSpan) valueSpan.innerText = `${currentValue.toFixed(4)} $`;
            }
            
            if(progress < 1) {
                requestAnimationFrame(animate);
            } else {
                resolve();
            }
        };
        
        requestAnimationFrame(animate);
    });
}

async function showBalance() {
    const currentBalance = await getBalanceValue();
    
    let toast = document.querySelector('.balance-toast');
    if(!toast) {
        toast = document.createElement('div');
        toast.className = 'balance-toast';
        toast.innerHTML = `<i class="fas fa-coins"></i><div><div style="font-size:0.7rem;color:#94a3b8;">Votre solde</div><div class="balance-value">0.0000 $</div></div>`;
        document.body.appendChild(toast);
    } else {
        const valueSpan = toast.querySelector('.balance-value');
        if(valueSpan) valueSpan.innerText = '0.0000 $';
    }
    
    await animateBalance(0, currentBalance, 800);
    
    setTimeout(() => {
        if(toast && toast.parentNode) toast.remove();
    }, 5000);
}

async function getBalanceValue() {
    if(!userDocRef) return 0;
    const snap = await getDoc(userDocRef);
    return snap.exists() ? (snap.data().balance || 0) : 0;
}

// ========== GESTION DES CARTES (verrouillage) ==========
function getDefaultLockedCards() {
    return { card0: { locked: false, lockedUntil: null }, card1: { locked: false, lockedUntil: null }, card2: { locked: false, lockedUntil: null }, card3: { locked: false, lockedUntil: null }, card4: { locked: false, lockedUntil: null } };
}

async function getLockedCards() {
    if(!userDocRef) return getDefaultLockedCards();
    const snap = await getDoc(userDocRef);
    if(snap.exists() && snap.data().lockedCards) return snap.data().lockedCards;
    return getDefaultLockedCards();
}

async function saveLockedCards(lockedCards) {
    if(!userDocRef) return;
    await updateDoc(userDocRef, { lockedCards: lockedCards });
}

async function updateExpiredLocks(lockedCards) {
    const now = Date.now();
    let updated = false;
    for(let i = 0; i < 5; i++) {
        const cardKey = `card${i}`;
        if(lockedCards[cardKey]?.locked && lockedCards[cardKey]?.lockedUntil && now >= lockedCards[cardKey].lockedUntil) {
            lockedCards[cardKey] = { locked: false, lockedUntil: null };
            updated = true;
        }
    }
    if(updated) await saveLockedCards(lockedCards);
    return lockedCards;
}

function getRemainingMs(lockedUntil) {
    if(!lockedUntil) return 0;
    const remaining = lockedUntil - Date.now();
    return remaining > 0 ? remaining : 0;
}

function formatTime(ms) {
    if(ms <= 0) return "0h 0min";
    const hours = Math.floor(ms / (60 * 60 * 1000));
    const minutes = Math.floor((ms % (60 * 60 * 1000)) / (60 * 1000));
    return `${hours}h ${minutes}min`;
}

async function addGain(cardId) {
    if(!userDocRef) return false;
    try {
        const gain = 0.0001;
        await updateDoc(userDocRef, { balance: increment(gain) });
        const newBalance = await getBalanceValue();
        showToast(`✨ +${gain.toFixed(4)} $ ajoutés à votre balance !`);
        
        const lockedCards = await getLockedCards();
        const cardKey = `card${cardId}`;
        lockedCards[cardKey] = { locked: true, lockedUntil: Date.now() + LOCK_DURATION };
        await saveLockedCards(lockedCards);
        await renderPromoCards();
        return true;
    } catch(error) { console.error(error); return false; }
}

function checkReturnFromAd() {
    const urlParams = new URLSearchParams(window.location.search);
    const fromAd = urlParams.get('fromAd');
    const cardId = urlParams.get('cardId');
    if(fromAd === 'true' && cardId !== null) {
        window.history.replaceState({}, document.title, window.location.pathname);
        addGain(parseInt(cardId));
    }
}

async function renderPromoCards() {
    const container = document.getElementById('promoCardsWrapper');
    if(!container) return;
    let lockedCards = await getLockedCards();
    lockedCards = await updateExpiredLocks(lockedCards);
    container.innerHTML = '';
    for(let i = 0; i < 5; i++) {
        const cardKey = `card${i}`;
        const isLocked = lockedCards[cardKey]?.locked || false;
        const lockedUntil = lockedCards[cardKey]?.lockedUntil;
        const remainingMs = getRemainingMs(lockedUntil);
        const card = document.createElement('div');
        card.className = `promo-card${isLocked ? ' disabled' : ''}`;
        card.innerHTML = `<img src="${CARD_IMAGES[i]}"><div class="card-title">1 seconde</div><div class="card-subtitle">💰 +0.0001 $</div><div class="timer">${isLocked ? `⏱️ ${formatTime(remainingMs)}` : '✅ Disponible'}</div>`;
        if(!isLocked) {
            card.addEventListener('click', () => {
                const dashboardWithParams = `${DASHBOARD_URL}?fromAd=true&cardId=${i}`;
                window.open(dashboardWithParams, '_blank');
                window.location.href = AD_URLS[i];
            });
        }
        container.appendChild(card);
    }
}

function startTimersUpdate() {
    if(timersInterval) clearInterval(timersInterval);
    timersInterval = setInterval(async () => {
        if(userDocRef) {
            const lockedCards = await getLockedCards();
            let anyChange = false;
            for(let i = 0; i < 5; i++) {
                const cardKey = `card${i}`;
                const card = lockedCards[cardKey];
                if(card?.locked && card?.lockedUntil && card.lockedUntil <= Date.now()) anyChange = true;
            }
            if(anyChange) await renderPromoCards();
            else {
                const cards = document.querySelectorAll('.promo-card .timer');
                for(let i = 0; i < 5 && i < cards.length; i++) {
                    const cardKey = `card${i}`;
                    const card = lockedCards[cardKey];
                    if(card?.locked && card?.lockedUntil) {
                        const remainingMs = getRemainingMs(card.lockedUntil);
                        cards[i].innerText = `⏱️ ${formatTime(remainingMs)}`;
                    }
                }
            }
        }
    }, 1000);
}

const typewriterText = "Vous allez être redirigé vers des offres adaptées à votre profil et à votre localisation. Une fois que vous aurez atteint 500 points, veuillez cliquer sur le bouton « Retirer » afin de convertir vos points en argent retirable sur votre dashboard.";

function typeWriter(element, text, speed = 30, callback) {
    let i = 0;
    element.innerHTML = '';
    function typing() {
        if(i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        } else if(callback) {
            callback();
        }
    }
    typing();
}

        messageElement.innerHTML = '';
        confirmBtn.removeEventListener('click', handler);

        closeBtn.removeEventListener('click', cancelHandler);

    const cancelHandler = () => {
        modal.classList.remove('active');

async function loadWithdrawBalance() {

function validatePhoneNumber(number) {
    const cleanNumber = number.replace(/[^0-9]/g, '');
    if(cleanNumber.length > 11) return false;
    const startsWith9 = cleanNumber.startsWith('9');
    const startsWith8 = cleanNumber.startsWith('8');
    return (startsWith9 || startsWith8);
}

async function submitWithdraw() {
    const amount = parseFloat(document.getElementById('withdrawAmount').value);
    let walletAddress = document.getElementById('walletAddress').value.trim();
    const country = document.getElementById('countrySelect')?.value || '';
    
    if(!selectedMethod) { showToast("Veuillez sélectionner une méthode de retrait", true); return; }
    if(isNaN(amount) || amount < WITHDRAWAL_MIN) { showToast(`Le montant minimum est de ${WITHDRAWAL_MIN}$`, true); return; }
    if(!walletAddress) { showToast("Veuillez entrer vos coordonnées", true); return; }
    
    // Validation selon méthode
    if(selectedMethod === 'orange_money' || selectedMethod === 'airtel_money') {
        if(!validatePhoneNumber(walletAddress)) {
            showToast("Numéro invalide. Doit commencer par 8 ou 9 et maximum 11 chiffres", true);
            return;
        }
        if(!walletAddress.startsWith('+243')) {
            walletAddress = '+243' + walletAddress.replace(/[^0-9]/g, '');
            document.getElementById('walletAddress').value = walletAddress;
        }
        if(!country) {
            showToast("Veuillez sélectionner votre pays", true);
            return;
        }
    } else if(selectedMethod === 'paypal') {
        if(!walletAddress.includes('@') || !walletAddress.includes('.')) {
            showToast("Veuillez entrer une adresse email PayPal valide", true);
            return;
        }
    }
    
    const currentBalance = await getBalanceValue();
    if(amount > currentBalance) { showToast("Solde insuffisant", true); return; }
    
    // Vérifier si une demande en attente existe
    const q = query(collection(db, "withdraw"), where("userId", "==", currentUser.uid), where("status", "==", "pending"));
    const querySnapshot = await getDocs(q);
    if(!querySnapshot.empty) { 
        showMessageModal("❌ Vous avez déjà une demande de retrait en cours de traitement. Veuillez patienter.");
        return; 
    }
    
    try {
        const withdrawData = {
            userId: currentUser.uid,
            userEmail: currentUser.email,
            amount: amount,
            method: selectedMethod,
            walletAddress: walletAddress,
            status: "pending",
            requestedAt: new Date().toISOString()
        };
        if(country) withdrawData.country = country;
        
        await addDoc(collection(db, "withdraw"), withdrawData);
        showToast("✅ Votre demande de retrait a été envoyée avec succès ! Traitement sous 24h");
        document.getElementById('withdrawModal').classList.remove('active');
        document.getElementById('withdrawAmount').value = '';
        document.getElementById('walletAddress').value = '';
        document.getElementById('countrySelect').value = '';
        selectedMethod = null;
        document.querySelectorAll('.method-option').forEach(opt => {
            opt.classList.remove('selected-airtel', 'selected-orange', 'selected-paypal');
        });
    } catch(error) { 
        console.error(error);
        showToast("Une erreur est survenue, veuillez réessayer", true); 
    }
}

async function initUser(user) {
    if(!user) return;
    currentUser = user;
    userDocRef = doc(db, "users", user.uid);
    const snap = await getDoc(userDocRef);
    if(!snap.exists()) {
        await setDoc(userDocRef, { 
            email: user.email || "", 
            balance: 0, 
            lockedCards: getDefaultLockedCards(), 
            createdAt: new Date().toISOString(), 
            lastLogin: new Date().toISOString(),
            capDuJour: "📊 Bienvenue sur NeTubeX !\n\n📌 Objectif du jour : Découvrir les jeux\n🎯 Challenge : Jouer à 2 jeux\n⭐ Bonus : +10 points de bienvenue"
        });
    } else {
        await updateDoc(userDocRef, { lastLogin: new Date().toISOString() });
    }
    await renderPromoCards();
    renderGames();
    startTimersUpdate();
    checkReturnFromAd();
}
