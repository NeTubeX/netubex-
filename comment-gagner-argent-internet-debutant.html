<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Comment gagner de l'argent sur internet débutant | NeTubeX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}body{background:linear-gradient(125deg,#10121c,#090b11);font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#edf2fc;padding:34px 22px;line-height:1.5;min-height:100vh;display:flex;justify-content:center;align-items:center}.container{max-width:740px;width:100%;margin:0 auto;animation:softRise 0.52s ease-out}@keyframes softRise{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}h1{font-size:2.2rem;font-weight:800;background:linear-gradient(130deg,#3b82f6,#10b981);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:1.4rem;letter-spacing:-0.3px;line-height:1.25}.premium-card{background:rgba(26,30,48,0.7);backdrop-filter:blur(5px);border-radius:44px;padding:32px 36px;border:1px solid rgba(59,130,246,0.4);box-shadow:0 28px 46px -20px rgba(0,0,0,0.7);transition:all 0.26s ease}.premium-card:hover{transform:translateY(-3px);border-color:rgba(16,185,129,0.55);background:rgba(34,40,62,0.85)}p{font-size:1.08rem;margin-bottom:28px;color:#ecf3ff;font-weight:430;line-height:1.58}ul{margin:8px 0 4px 0;list-style:none}li{margin-bottom:16px;position:relative;padding-left:38px;font-size:1.02rem;color:#e2ecfe;font-weight:450}li::before{content:"🚀";position:absolute;left:0;color:#10b981;font-size:1rem;top:-1px}.badge-debutant{background:rgba(59,130,246,0.18);border-radius:40px;padding:4px 16px;font-size:0.72rem;display:inline-block;margin-bottom:20px;color:#a7f3d0;letter-spacing:0.35px}@media (max-width:560px){body{padding:18px 14px}h1{font-size:1.8rem}.premium-card{padding:24px 24px}li{padding-left:34px;font-size:0.95rem}p{font-size:1rem;margin-bottom:22px}}
</style>
</head>
<body>
<div class="container">
<h1>Gagner de l'argent sur internet (débutant)</h1>
<div class="premium-card">
<p>Pour débuter, il suffit d'un smartphone et d'une connexion internet.</p>
<ul>
<li>Micro-tâches</li>
<li>Applications rémunérées</li>
<li>Sites de récompenses</li>
</ul>
</div>
</div>
<script>
(function(){
    // Blocage clic droit complet
    document.addEventListener('contextmenu',function(e){
        e.preventDefault();
        return false;
    });
    // Blocage avancé des raccourcis dangereux (devtools, source, sauvegarde, impression, etc.)
    document.addEventListener('keydown',function(e){
        // F12
        if(e.key==='F12'){e.preventDefault();return false;}
        // Ctrl+Shift+I / J / C (inspecteur/console)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='J'||e.key==='j')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='C'||e.key==='c')){e.preventDefault();return false;}
        // Ctrl+U (afficher source)
        if(e.ctrlKey&&(e.key==='U'||e.key==='u')){e.preventDefault();return false;}
        // Ctrl+S (sauvegarder)
        if(e.ctrlKey&&(e.key==='S'||e.key==='s')){e.preventDefault();return false;}
        // Ctrl+P (imprimer)
        if(e.ctrlKey&&(e.key==='P'||e.key==='p')){e.preventDefault();return false;}
        // Ctrl+R / Ctrl+Shift+R (rechargement)
        if(e.ctrlKey&&(e.key==='R'||e.key==='r')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='R'||e.key==='r')){e.preventDefault();return false;}
        // Ctrl+F (recherche dans page)
        if(e.ctrlKey&&(e.key==='F'||e.key==='f')){e.preventDefault();return false;}
        // Ctrl+H (historique)
        if(e.ctrlKey&&(e.key==='H'||e.key==='h')){e.preventDefault();return false;}
        // Ctrl+Shift+N (fenêtre privée Chrome/Edge)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='N'||e.key==='n')){e.preventDefault();return false;}
        // Ctrl+Shift+P (fenêtre privée Firefox)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='P'||e.key==='p')){e.preventDefault();return false;}
        // Ctrl+Shift+K (console Firefox)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='K'||e.key==='k')){e.preventDefault();return false;}
        // Ctrl+Shift+Delete (effacer données navigation)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='Delete'||e.key==='DEL')){e.preventDefault();return false;}
        // Touche Menu contextuel (clavier)
        if(e.key==='ContextMenu'||(e.shiftKey&&e.key==='F10')){e.preventDefault();return false;}
        // PrintScreen (impr écran)
        if(e.key==='PrintScreen'){e.preventDefault();return false;}
        // Ctrl+E (recherche barre)
        if(e.ctrlKey&&(e.key==='E'||e.key==='e')){e.preventDefault();return false;}
        // Ctrl+W / Ctrl+Shift+W (fermer onglet)
        if(e.ctrlKey&&(e.key==='W'||e.key==='w')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='W'||e.key==='w')){e.preventDefault();return false;}
        // Ctrl+O (ouvrir fichier)
        if(e.ctrlKey&&(e.key==='O'||e.key==='o')){e.preventDefault();return false;}
        // Protection Mac
        if(e.metaKey&&(e.key==='U'||e.key==='u')){e.preventDefault();return false;}
        if(e.metaKey&&(e.key==='S'||e.key==='s')){e.preventDefault();return false;}
        if(e.metaKey&&e.altKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        if(e.metaKey&&e.shiftKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        // Ctrl+Shift+E / L (sécurité)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='E'||e.key==='e')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='L'||e.key==='l')){e.preventDefault();return false;}
        // Empêcher la copie et couper via Ctrl+C / Ctrl+X
        if(e.ctrlKey&&(e.key==='C'||e.key==='c')){e.preventDefault();return false;}
        if(e.ctrlKey&&(e.key==='X'||e.key==='x')){e.preventDefault();return false;}
    });
    // Désactiver glisser-déposer
    document.querySelectorAll('div, p, li, h1, ul').forEach(el=>{
        el.addEventListener('dragstart',(e)=>e.preventDefault());
    });
    // Désactiver sélection de texte (renfort JS)
    document.addEventListener('selectstart',(e)=>e.preventDefault());
    // Désactiver copier / couper (double protection)
    document.addEventListener('copy',(e)=>{e.preventDefault();return false;});
    document.addEventListener('cut',(e)=>{e.preventDefault();return false;});
    // Anti-debugging discret (détection console ouverte)
    let antiDebugInterval = setInterval(function(){
        const startPerf = performance.now();
        debugger;
        const durationDiff = performance.now()-startPerf;
        if(durationDiff>8){
            if(window.console && console.clear) console.clear();
        }
    }, 3000);
    // Protection après chargement
    window.addEventListener('load',function(){
        let elements = document.querySelectorAll('.premium-card, h1');
        elements.forEach(el=>{
            el.addEventListener('contextmenu',(e)=>e.preventDefault());
        });
        document.body.addEventListener('contextmenu',(e)=>e.preventDefault());
        // Désactiver double-clic pour éviter sélection
        document.body.addEventListener('dblclick',(e)=>e.preventDefault());
    });
})();
</script>
</body>
</html>
