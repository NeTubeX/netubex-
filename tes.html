<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>NeTubeX | Bilan Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter','Courier New',monospace;background:linear-gradient(135deg,#0a1a2f,#0e2a3a);min-height:100vh;padding:20px;}
.login-container,.bilan-container{max-width:800px;margin:0 auto;}
.login-card,.bilan-card{background:linear-gradient(145deg,#0f2d45,#0a2538);border-radius:32px;padding:30px;border-top:5px solid #facc15;}
.logo{text-align:center;margin-bottom:30px;}
.logo h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#facc15,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.input-group{margin-bottom:20px;}
.input-group input{width:100%;padding:14px 16px;border-radius:60px;border:1px solid #2d4e73;background:#0a1a2f;color:#fff;font-size:1rem;}
.input-group input:focus{outline:none;border-color:#facc15;}
.login-btn,.refresh-btn,.logout-btn{background:linear-gradient(145deg,#facc15,#e5b800);border:none;padding:12px 24px;border-radius:60px;font-weight:700;cursor:pointer;}
.login-btn{width:100%;}
.logout-btn{background:#dc2626;color:#fff;}
.bilan-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.bilan-period{color:#7dd3fc;font-size:0.8rem;}
.bilan-section{margin-bottom:32px;background:rgba(255,255,255,0.03);border-radius:20px;padding:20px;}
.bilan-section h3{color:#facc15;margin-bottom:16px;border-left:4px solid #facc15;padding-left:12px;}
.facture-item{background:rgba(255,255,255,0.05);border-radius:16px;padding:16px;margin-bottom:12px;border-left:3px solid #facc15;}
.facture-header{font-weight:800;margin-bottom:10px;}
.facture-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;font-size:0.85rem;}
.classement-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(255,255,255,0.05);border-radius:12px;margin-bottom:8px;}
.classement-rank{font-weight:800;width:40px;color:#facc15;}
.classement-points{font-weight:800;color:#facc15;}
.top-1{background:linear-gradient(145deg,#facc1533,#facc1522);border-left:3px solid #facc15;}
.top-2{background:linear-gradient(145deg,#c0c0c033,#c0c0c022);border-left:3px solid #c0c0c0;}
.top-3{background:linear-gradient(145deg,#cd7f3233,#cd7f3222);border-left:3px solid #cd7f32;}
.alerte-item{padding:12px 16px;border-radius:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.alerte-item.warning{background:#facc1522;border-left:3px solid #facc15;}
.alerte-item.danger{background:#dc262622;border-left:3px solid #dc2626;}
.error-message{color:#ef4444;text-align:center;margin-top:12px;font-size:0.8rem;}
.hidden{display:none;}
.loading{text-align:center;padding:40px;color:#7dd3fc;}
</style>
</head>
<body>
<div class="login-container" id="loginSection">
    <div class="login-card">
        <div class="logo"><h1>📊 NeTubeX</h1><p>Bilan Admin</p></div>
        <div class="input-group"><input type="email" id="loginEmail" placeholder="Email"></div>
        <div class="input-group"><input type="password" id="loginPassword" placeholder="Mot de passe"></div>
        <button class="login-btn" id="loginBtn">🔐 Se connecter</button>
        <div id="loginError" class="error-message"></div>
    </div>
</div>
<div class="bilan-container hidden" id="bilanSection">
    <div class="bilan-card">
        <div class="bilan-header">
            <h2>📊 BILAN ADMIN</h2>
            <div><button class="logout-btn" id="logoutBtn">🚪 Déconnexion</button></div>
        </div>
        <div class="bilan-header"><span class="bilan-period" id="bilanPeriod">Chargement...</span><button class="refresh-btn" id="refreshBtn">🔄 Actualiser</button></div>
        <div class="bilan-section"><h3>🧾 FACTURES (cumul mensuel)</h3><div id="facturesList" class="factures-list"><div class="loading">Chargement...</div></div></div>
        <div class="bilan-section"><h3>🏆 CLASSEMENT (Top Netubers)</h3><div id="classementList" class="classement-list"><div class="loading">Chargement...</div></div></div>
        <div class="bilan-section"><h3>⚠️ ALERTES</h3><div id="alertesList" class="alertes-list"><div class="loading">Chargement...</div></div></div>
    </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getFirestore,collection,getDocs,query,where}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import{getAuth,signInWithEmailAndPassword,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
const firebaseConfig={apiKey:"AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",authDomain:"netubexmoney.firebaseapp.com",projectId:"netubexmoney",storageBucket:"netubexmoney.firebasestorage.app",messagingSenderId:"856592608176",appId:"1:856592608176:web:69f9df9cfd4f8c28630475"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const loginSection=document.getElementById('loginSection');
const bilanSection=document.getElementById('bilanSection');
const loginEmail=document.getElementById('loginEmail');
const loginPassword=document.getElementById('loginPassword');
const loginBtn=document.getElementById('loginBtn');
const loginError=document.getElementById('loginError');
const logoutBtn=document.getElementById('logoutBtn');
const refreshBtn=document.getElementById('refreshBtn');
const bilanPeriod=document.getElementById('bilanPeriod');
const facturesList=document.getElementById('facturesList');
const classementList=document.getElementById('classementList');
const alertesList=document.getElementById('alertesList');
const TAUX={points:1000,montant:0.08};
function minutesToHours(m){const h=Math.floor(m/60);const r=m%60;return`${h}h ${r.toString().padStart(2,'0')}min`;}
function calculerGain(p){return(p/TAUX.points)*TAUX.montant;}
async function genererBilan(){
const mtn=new Date();
const annee=mtn.getFullYear();
const mois=mtn.getMonth();
const moisNoms=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
bilanPeriod.innerHTML=`📅 ${moisNoms[mois]} ${annee} (cumul progressif)`;
const debutMois=new Date(annee,mois,1);
const finMois=new Date(annee,mois+1,1);
try{
const q=query(collection(db,"reports"),where("createdAt",">=",debutMois.toISOString()),where("createdAt","<",finMois.toISOString()));
const snap=await getDocs(q);
const cumul={};
snap.forEach(d=>{
const r=d.data();
if(r.netubers&&Array.isArray(r.netubers)){
r.netubers.forEach(n=>{
if(!cumul[n.code])cumul[n.code]={points:0,temps:0,lastDate:null};
cumul[n.code].points+=n.pointsJour||0;
cumul[n.code].temps+=n.tempsJour||0;
const dDate=r.createdAt?new Date(r.createdAt):null;
if(dDate&&(!cumul[n.code].lastDate||dDate>cumul[n.code].lastDate))cumul[n.code].lastDate=dDate;
});
}
});
let htmlFactures='',htmlClassement='',htmlAlertes='';
const classementArr=[];
for(const[code,data]of Object.entries(cumul)){
if(data.points>0||data.temps>0){
const gain=calculerGain(data.points);
classementArr.push({code,points:data.points,gain,temps:data.temps,lastDate:data.lastDate});
htmlFactures+=`<div class="facture-item"><div class="facture-header">📄 ${code}</div><div class="facture-details"><span>📅 Mois: ${moisNoms[mois]} ${annee}</span><span>⭐ Points: ${data.points.toLocaleString()} pts</span><span>⏱️ Temps: ${minutesToHours(data.temps)}</span><span>💰 Gain: ${gain.toFixed(2)} $</span><span>📊 Taux: ${TAUX.points}pts → ${TAUX.montant}$</span>${data.lastDate?`<span>📅 Dernier rapport: ${data.lastDate.toLocaleDateString('fr-FR')}</span>`:''}</div></div>`;
}}
classementArr.sort((a,b)=>b.points-a.points);
classementArr.slice(0,10).forEach((item,idx)=>{
const rank=idx+1;
let rankClass='';
if(rank===1)rankClass='top-1';
else if(rank===2)rankClass='top-2';
else if(rank===3)rankClass='top-3';
htmlClassement+=`<div class="classement-item ${rankClass}"><div class="classement-rank">#${rank}</div><div class="classement-name">${item.code}</div><div class="classement-points">${item.points.toLocaleString()} pts</div><div class="classement-gain">${item.gain.toFixed(2)} $</div></div>`;
});
let alertCount=0;
for(const item of classementArr){
if(item.points>0&&item.temps===0){htmlAlertes+=`<div class="alerte-item warning"><span class="alerte-icon">⚠️</span><span class="alerte-text">${item.code} : ${item.points} pts mais 0 minute cumulée</span></div>`;alertCount++;}
if(item.points<500&&item.points>0){htmlAlertes+=`<div class="alerte-item danger"><span class="alerte-icon">📉</span><span class="alerte-text">${item.code} : gain mensuel &lt; 0.04$ (${item.points} pts)</span></div>`;alertCount++;}
const today=new Date();
if(item.lastDate){
const joursDiff=Math.floor((today-item.lastDate)/(1000*60*60*24));
if(joursDiff>=3&&item.points>0){htmlAlertes+=`<div class="alerte-item warning"><span class="alerte-icon">⏰</span><span class="alerte-text">${item.code} : dernier rapport il y a ${joursDiff} jours</span></div>`;alertCount++;}
}}
if(alertCount===0)htmlAlertes='<div class="loading">✅ Aucune alerte</div>';
if(classementArr.length===0){htmlFactures='<div class="loading">📭 Aucun rapport pour ce mois</div>';htmlClassement='<div class="loading">📭 Aucune donnée</div>';}
facturesList.innerHTML=htmlFactures;
classementList.innerHTML=htmlClassement;
alertesList.innerHTML=htmlAlertes;
}catch(e){facturesList.innerHTML='<div class="loading">❌ Erreur chargement</div>';}
}
loginBtn.onclick=async()=>{
loginError.textContent='';
try{await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);}
catch(e){loginError.textContent='Email ou mot de passe incorrect';}
};
logoutBtn.onclick=async()=>{await signOut(auth);};
refreshBtn.onclick=()=>{if(bilanSection.classList.contains('hidden')===false)genererBilan();};
onAuthStateChanged(auth,(user)=>{
if(user){
loginSection.classList.add('hidden');
bilanSection.classList.remove('hidden');
genererBilan();
}else{
loginSection.classList.remove('hidden');
bilanSection.classList.add('hidden');
loginEmail.value='';
loginPassword.value='';
loginError.textContent='';
}
});
</script>
</body>
</html>
