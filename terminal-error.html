<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>NeTubeX · Accès refusé</title>
<link rel="icon" type="image/png" href="favicon.png.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a0a0a,#1a1a2e);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.fullscreen-popup{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;align-items:center;justify-content:center;z-index:10000;backdrop-filter:blur(20px);}
.popup-card{background:linear-gradient(145deg,#2d1a1a,#1a0f0f);border-radius:32px;padding:48px 32px;max-width:500px;width:90%;text-align:center;border:1px solid rgba(239,68,68,0.4);box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);animation:fadeInScale 0.4s cubic-bezier(0.34,1.2,0.64,1);}
.popup-icon{width:80px;height:80px;background:linear-gradient(145deg,#ef4444,#dc2626);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 8px 20px rgba(239,68,68,0.3);}
.popup-icon i{font-size:3rem;color:#fff;}
.popup-title{font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:16px;}
.popup-message{font-size:0.95rem;color:#e0e0e0;line-height:1.6;margin-bottom:32px;white-space:pre-line;}
.popup-btn{background:linear-gradient(145deg,#ef4444,#dc2626);border:none;padding:14px 32px;border-radius:60px;font-weight:700;font-size:0.9rem;color:#fff;cursor:pointer;width:100%;max-width:200px;margin:0 auto;}
.popup-btn:active{transform:scale(0.96);}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.9) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
</style>
</head>
<body>
<div class="fullscreen-popup">
<div class="popup-card">
<div class="popup-icon"><i class="fas fa-exclamation-triangle"></i></div>
<div class="popup-title">ACCÈS REFUSÉ</div>
<div class="popup-message">Ces identifiants n'appartiennent pas à ce terminal.<br><br>Ils sont associés à un autre terminal.<br><br>Contacter le pôle technique pour plus d'informations.</div>
<button class="popup-btn" onclick="window.location.href='login.html'">Déconnexion</button>
</div>
</div>
</body>
</html>
