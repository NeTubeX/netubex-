<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=no">
<title>NeTubeX · Dashboard Netuber</title>
<link rel="icon" type="image/png" href="favicon.png.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*:not(input):not(textarea){-webkit-user-select:none!important;-moz-user-select:none!important;-ms-user-select:none!important;user-select:none!important;-webkit-touch-callout:none!important;-webkit-tap-highlight-color:transparent!important;}
input,textarea{-webkit-user-select:text!important;user-select:text!important;}
*{margin:0;padding:0;box-sizing:border-box;touch-action:pan-y;}
html,body{height:100%;touch-action:pan-y;background:#18191A;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#e4e6eb;padding-top:70px;overflow-x:hidden;}
.rainbow-line{height:3px;background:linear-gradient(90deg,#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);background-size:200% 100%;animation:rainbow 3s linear infinite;position:fixed;top:0;left:0;right:0;z-index:101;}
@keyframes rainbow{0%{background-position:0%;}100%{background-position:200%;}}
.header{position:fixed;top:3px;left:0;right:0;background:#242526;border-bottom:1px solid #3e4042;padding:0.5rem 1rem;display:flex;justify-content:space-between;align-items:center;z-index:100;transition:transform 0.25s;}
.header.hide{transform:translateY(-100%);}
.logo{display:flex;align-items:center;gap:8px;}
.logo img{height:36px;width:auto;}
.logo h1{font-size:1.3rem;font-weight:800;color:#e4e6eb;white-space:nowrap;}
.logo h1 span{color:#f59e0b;font-size:1.3rem;}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.user-info{background:#3a3b3c;padding:4px 12px;border-radius:20px;font-size:0.7rem;display:flex;align-items:center;gap:6px;font-weight:600;}
.online-status{display:flex;align-items:center;gap:5px;background:rgba(16,185,129,0.15);padding:2px 8px;border-radius:20px;font-size:0.65rem;color:#10b981;}
.blinking-dot{width:8px;height:8px;background:#10b981;border-radius:50%;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* Bouton rendement - Icône lampe */
.score-floating {
    position: fixed;
    left: 20px;
    bottom: 100px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(145deg, #f59e0b, #d97706);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 150;
    border: 1px solid rgba(250,204,21,0.5);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 4px 8px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    overflow: hidden;
}

.score-icon-only {
    font-size: 1.6rem;
    font-weight: 400;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
}

.score-details {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s, visibility 0.3s;
    white-space: nowrap;
}

/* Version expansée - carte qui s'affiche */
.score-floating.expanded {
    width: auto;
    min-width: 160px;
    height: auto;
    border-radius: 24px;
    padding: 12px 18px;
    background: linear-gradient(145deg, #1e3a5f, #0f2d45);
    box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 0 1px rgba(250,204,21,0.3);
}

.score-floating.expanded .score-icon-only {
    display: none;
}

.score-floating.expanded .score-details {
    position: relative;
    opacity: 1;
    visibility: visible;
}

.score-label {
    font-size: 0.65rem;
    color: #b0b3b8;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
}

.score-value {
    font-size: 1.6rem;
    font-weight: 800;
    color: #facc15;
    line-height: 1.2;
}

.score-emoji {
    font-size: 0.9rem;
    margin-top: 4px;
}

.score-date {
    font-size: 0.55rem;
    color: #7dd3fc;
    margin-top: 5px;
    opacity: 0.8;
}

/* Animation lampe qui pulse */
@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.9; text-shadow: 0 0 5px rgba(250,204,21,0.8); }
    100% { transform: scale(1); opacity: 1; }
}

.score-floating .fa-lightbulb {
    transition: all 0.2s;
}
