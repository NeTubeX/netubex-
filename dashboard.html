<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeTubeX · Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0f1a;font-family:'Inter',sans-serif;color:#e2e8f0;min-height:100vh;}
.rainbow-line{height:3px;background:linear-gradient(90deg,#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);background-size:200%100%;animation:rainbow 3s linear infinite;}
@keyframes rainbow{0%{background-position:0%50%;}100%{background-position:200%50%;}}
.header{background:#0f1420;border-bottom:1px solid #1e293b;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;}
.logo h1{font-size:1.4rem;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;background-clip:text;color:transparent;}
.user-info{background:linear-gradient(135deg,#f59e0b,#d97706);padding:6px 20px;border-radius:40px;font-weight:700;display:flex;align-items:center;gap:10px;}
.floating-group{position:fixed;bottom:30px;right:25px;display:flex;flex-direction:column;gap:12px;z-index:200;}
.float-item{background:#0f1420;width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid #1e293b;transition:all 0.2s;}
.float-item:hover{background:#1a2332;transform:scale(1.05);}
.float-item.gold{background:linear-gradient(135deg,#f59e0b,#d97706);animation:floatGold 2s ease-in-out infinite;}
@keyframes floatGold{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.float-item.logout{background:#dc2626;}
.float-item.logout:hover{background:#ef4444;}
.fullscreen-iframe{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0f1a;z-index:1000;visibility:hidden;opacity:0;transition:opacity 0.25s;}
.fullscreen-iframe.active{visibility:visible;opacity:1;}
.iframe-close{position:absolute;top:20px;right:20px;width:48px;height:48px;background:#ef4444;border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff;font-size:1.3rem;}
.fullscreen-iframe iframe{width:100%;height:100%;border:none;}
.games-list{display:flex;flex-direction:column;gap:1px;padding:1.5rem 0;}
.post-card{background:#0f1420;border-bottom:1px solid #1e293b;}
.post-header{display:flex;align-items:center;gap:14px;padding:1rem 2rem;}
.avatar{width:52px;height:52px;background:linear-gradient(135deg,#1e293b,#0f1420);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;}
.post-meta h4{font-size:1.1rem;font-weight:800;color:#f1f5f9;}
.post-meta span{font-size:0.7rem;color:#64748b;}
.post-image{width:100%;height:auto;display:block;}
.gain-btn{background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;padding:14px;font-weight:700;color:#fff;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;}
.gain-btn:hover{background:linear-gradient(135deg,#3b82f6,#2563eb);}
.footer{background:#0f1420;border-top:1px solid #1e293b;padding:1.5rem;text-align:center;color:#64748b;font-size:0.8rem;}
</style>
</head>
<body>
<div class="rainbow-line"></div>
<header class="header">
<div class="logo"><h1><i class="fas fa-chart-line"></i> NeTubeX</h1></div>
<div class="user-info"><i class="fas fa-code"></i> <span id="userCodeDisplay">Chargement...</span></div>
</header>
<div class="games-list" id="gamesContainer"></div>
<div class="floating-group">
<div class="float-item gold" id="portalBtn"><i class="fas fa-rocket"></i></div>
<div class="float-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></div>
</div>
<div id="fullscreenIframe" class="fullscreen-iframe">
<button class="iframe-close" id="closeIframeBtn">✕</button>
<iframe id="portalIframe" src="about:blank"></iframe>
</div>
<footer class="footer"><p><i class="fas fa-copyright"></i> NeTubeX 2026 — Tous droits réservés</p></footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
  authDomain: "netubexmoney.firebaseapp.com",
  projectId: "netubexmoney",
  storageBucket: "netubexmoney.firebasestorage.app",
  messagingSenderId: "856592608176",
  appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const games = [
  {id:1, name:"Dragon Down", avatar:"🐉", img:"https://i.postimg.cc/T2JyHT7x/IMG-3466.jpg", duration:"7 jours", totalPoints:14048},
  {id:2, name:"Love Water", avatar:"💧", img:"https://i.postimg.cc/767x8LPg/IMG-3461.gif", duration:"30 jours", totalPoints:173140},
  {id:3, name:"Sky Plunger", avatar:"🪂", img:"https://i.postimg.cc/y8Y0TD7C/IMG-3468.png", duration:"30 jours", totalPoints:646010},
  {id:4, name:"Zombie Waves", avatar:"🧟", img:"https://i.postimg.cc/Vv9m5sTP/IMG-3470.jpg", duration:"30 jours", totalPoints:842060},
  {id:5, name:"Grab A Toy", avatar:"🧸", img:"https://i.postimg.cc/J05BNLgH/IMG-3465.jpg", duration:"30 jours", totalPoints:843430},
  {id:6, name:"Goblin Heist", avatar:"👺", img:"https://i.postimg.cc/KvQM4mty/IMG-3467.jpg", duration:"60 jours", totalPoints:1790272},
  {id:7, name:"Wild Fish Explorer", avatar:"🐟", img:"https://i.postimg.cc/637k468j/IMG-3469.png", duration:"30 jours", totalPoints:1778460}
];

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);
    let userCode = docSnap.exists() ? (docSnap.data().code || "NETUBER") : "NETUBER";
    document.getElementById("userCodeDisplay").textContent = userCode;
    sessionStorage.setItem('firebaseUserId', user.uid);
    renderGames();
  } else {
    window.location.href = "login.html";
  }
});

function renderGames() {
  const container = document.getElementById('gamesContainer');
  container.innerHTML = '';
  games.forEach(game => {
    const card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML = `
      <div class="post-header">
        <div class="avatar">${game.avatar}</div>
        <div class="post-meta"><h4>${game.name}</h4><span>${game.duration} • ${game.totalPoints.toLocaleString()} points</span></div>
      </div>
      <img class="post-image" src="${game.img}" alt="${game.name}">
      <button class="gain-btn"><i class="fas fa-crown"></i> Gagner ${game.totalPoints.toLocaleString()} points</button>
    `;
    container.appendChild(card);
  });
}

document.getElementById('portalBtn')?.addEventListener('click', () => {
  const user = auth.currentUser;
  if (!user) { alert("Non connecté"); return; }
  const oid = "e9bb1fdfd1ed93a0";
  const uid = user.uid;
  const iframe = document.getElementById('portalIframe');
  iframe.src = `https://timewall.io/users/login?oid=${oid}&uid=${uid}`;
  document.getElementById('fullscreenIframe')?.classList.add('active');
});

document.getElementById('closeIframeBtn')?.addEventListener('click', () => {
  document.getElementById('portalIframe').src = 'about:blank';
  document.getElementById('fullscreenIframe')?.classList.remove('active');
});

document.getElementById('logoutBtn')?.addEventListener('click', async () => {
  await signOut(auth);
  sessionStorage.removeItem('firebaseUserId');
  window.location.href = "login.html";
});
</script>
</body>
</html>
