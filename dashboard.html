<title>NeTubeX · Dashboard Netuber</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;touch-action:pan-y pinch-zoom;}
html,body{height:100%;}
body{background:#18191A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#e4e6eb;min-height:100vh;overflow-x:hidden;padding-top:60px;}

/* Rainbow line */
.rainbow-line{height:3px;width:100%;background:linear-gradient(90deg,#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);background-size:200% 100%;animation:rainbowMove 3s linear infinite;position:fixed;top:0;left:0;right:0;z-index:101;}
@keyframes rainbowMove{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}

/* Header */
.header{position:fixed;top:3px;left:0;right:0;background:#242526;border-bottom:1px solid #3e4042;padding:0.5rem 1rem;display:flex;justify-content:space-between;align-items:center;z-index:100;transform:translateY(0);transition:transform 0.25s ease;}
.header.hide{transform:translateY(-100%);}
.logo{display:flex;align-items:center;gap:10px;cursor:default;}
.logo img{height:34px;width:auto;object-fit:contain;}
.logo h1{font-size:1.5rem;font-weight:700;color:#e4e6eb;}
.logo h1 span{color:#f59e0b;}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.user-info{background:#3a3b3c;padding:4px 14px;border-radius:20px;font-size:0.7rem;color:#e4e6eb;display:flex;align-items:center;gap:8px;font-weight:600;}
.online-status{display:flex;align-items:center;gap:6px;background:rgba(16,185,129,0.15);padding:3px 10px;border-radius:20px;font-size:0.65rem;font-weight:500;color:#10b981;width:fit-content;}
.blinking-dot{width:7px;height:7px;background-color:#10b981;border-radius:50%;animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.8);}}

/* Feed */
.feed-container{max-width:680px;margin:0 auto;padding:0 0 1rem 0;}
.games-list{display:flex;flex-direction:column;gap:8px;width:100%;}

/* Carte post */
.post-card{background:#242526;border-radius:8px;overflow:hidden;transition:background-color 0.2s ease;position:relative;}
.post-card:hover{background:#3a3b3c;}
.post-card:active{background:#4e4f50;transition:0.05s;}

/* Badge NOUVEAU */
.badge-new{position:absolute;top:12px;right:12px;background:#f59e0b;color:#0f172a;font-size:0.65rem;font-weight:700;padding:4px 10px;border-radius:20px;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,0.2);}

/* Post header */
.post-header{padding:12px 16px;display:flex;gap:12px;cursor:pointer;}
.avatar{position:relative;width:40px;height:40px;background:#3a3b3c;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.avatar::after{content:'';position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;background-color:#3b82f6;border-radius:50%;border:2px solid #242526;z-index:1;}
.post-meta{flex:1;}
.post-meta h4{font-size:0.9375rem;font-weight:600;color:#e4e6eb;margin-bottom:2px;}
.post-meta .game-description{font-size:0.875rem;color:#cacfd8;line-height:1.333;margin-bottom:4px;}

/* Separator */
.post-separator{height:1px;background:#3e4042;margin:0 12px;}

/* Image wrapper */
.image-wrapper{width:100%;display:block;line-height:0;background:#18191A;cursor:pointer;position:relative;}
.post-image{width:100%;height:auto;min-height:200px;object-fit:cover;display:block;transition:opacity 0.2s ease;}
.image-wrapper:hover .post-image{opacity:0.95;}

/* Stats footer */
.post-stats{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #3e4042;}
.post-stats .duration{font-size:0.75rem;color:#a8aaaf;display:flex;align-items:center;gap:4px;}
.post-stats .earning{font-size:0.85rem;font-weight:600;color:#f59e0b;display:flex;align-items:center;gap:5px;}

/* Iframe plein écran */
.fullscreen-iframe{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:10000;display:flex;flex-direction:column;visibility:hidden;opacity:0;transition:opacity 0.25s;z-index:9999;}
.fullscreen-iframe.active{visibility:visible;opacity:1;}
.fullscreen-iframe iframe{width:100%;height:100%;border:none;}
.iframe-close{position:absolute;top:20px;right:20px;width:44px;height:44px;background:#dc2626;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10001;border:none;color:#fff;font-size:1.2rem;}

/* Boutons flottants */
.floating-group{position:fixed;bottom:30px;right:25px;display:flex;flex-direction:column;gap:12px;z-index:200;}
.float-item{background:#242526;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all 0.2s;color:#b0b3b8;border:1px solid #3e4042;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.float-item:hover{background:#3a3b3c;transform:scale(1.05);color:#e4e6eb;}
.float-item.logout{background:#dc2626;border:none;color:#fff;}
.float-item.logout:hover{background:#ef4444;}
.float-item.gold{background:linear-gradient(145deg,#f59e0b,#d97706);border:none;color:#fff;animation:floatGold 2s ease-in-out infinite;}
.float-item.menu-btn{background:linear-gradient(145deg,#3b82f6,#2563eb);border:none;color:#fff;}
@keyframes floatGold{0%,100%{transform:translateY(0px);}50%{transform:translateY(-6px);}}

/* Popup */
.slide-popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);backdrop-filter:blur(10px);z-index:2000;display:flex;align-items:flex-end;justify-content:center;visibility:hidden;transition:visibility 0s linear 0.25s;}
.slide-popup.active{visibility:visible;transition:visibility 0s linear 0s;}
.popup-left{background:#242526;max-width:600px;width:90%;border-radius:28px 28px 0 0;padding:1.5rem;text-align:center;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.2,0.9,0.4,1.1);max-height:85vh;overflow-y:auto;}
.slide-popup.active .popup-left{transform:translateY(0);}
.slide-popup.closing .popup-left{transform:translateY(100%);}
.popup-left h3{color:#e4e6eb;margin:0.5rem 0 0.3rem;font-size:1.3rem;font-weight:700;}
.close-popup-btn{background:#3a3b3c;border:1px solid #3e4042;padding:10px 20px;border-radius:50px;color:#e4e6eb;cursor:pointer;margin-top:8px;font-weight:600;}
.game-stats{background:#18191A;border-radius:16px;padding:0.8rem;margin:1rem 0;text-align:left;max-height:280px;overflow-y:auto;}
.game-stats p{margin:4px 0;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;padding:8px 8px;border-bottom:1px solid #3e4042;}
.game-stats p:hover{background:#3a3b3c;border-radius:10px;}
.game-stats .label{color:#b0b3b8;}
.game-stats .value{color:#f59e0b;font-weight:800;}

/* Autres popups */
.menu-floating{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;background:#242526;border-radius:16px;border:1px solid #3e4042;z-index:1001;display:none;box-shadow:0 12px 28px rgba(0,0,0,0.5);}
.menu-floating.active{display:block;}
.menu-header{padding:15px;border-bottom:1px solid #3e4042;color:#e4e6eb;}
.menu-item{padding:12px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid #3e4042;color:#e4e6eb;}
.menu-item:hover{background:#3a3b3c;}
.menu-item i{width:24px;color:#f59e0b;}
.menu-item.danger{color:#ef4444;}
.footer{background:#242526;border-top:1px solid #3e4042;padding:1rem;text-align:center;margin-top:1rem;}
.footer p{color:#b0b3b8;font-size:0.7rem;}
.toast-notification{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:40px;font-size:0.8rem;z-index:10000;}
@media (max-width:640px){.post-image{min-height:180px;}.feed-container{max-width:100%;}.logo h1{font-size:1.2rem;}body{padding-top:56px;}}
</style>

<script>
// Header cachable
(function(){
    let lastScrollTop = 0;
    const header = document.getElementById('mainHeader');
    let ticking = false;
    window.addEventListener('scroll', function() {
        if (!ticking) {
            requestAnimationFrame(function() {
                let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                if (scrollTop > lastScrollTop && scrollTop > 60) {
                    header.classList.add('hide');
                } else if (scrollTop < lastScrollTop) {
                    header.classList.remove('hide');
                }
                lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
                ticking = false;
            });
            ticking = true;
        }
    });
})();

// Protections
(function(){
    document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
    document.querySelectorAll('img').forEach(img=>{
        img.addEventListener('contextmenu',function(e){e.preventDefault();e.stopPropagation();return false;});
        img.addEventListener('dragstart',function(e){e.preventDefault();return false;});
    });
    document.addEventListener('keydown',function(e){
        if(e.key==='F12'){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.key==='u'){e.preventDefault();return false;}
        if(e.ctrlKey&&e.key==='s'){e.preventDefault();return false;}
        if(e.ctrlKey&&e.key==='p'){e.preventDefault();return false;}
        if(e.ctrlKey&&e.key==='r'){e.preventDefault();return false;}
        if(e.key==='F5'){e.preventDefault();return false;}
        if(e.ctrlKey&&e.key==='F5'){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&e.key==='F5'){e.preventDefault();return false;}
    });
})();
</script>

function showGameDetails(game){
    document.getElementById('gamePopupTitle').innerHTML=`${game.avatar} ${game.name}`;
    const statsHtml=`<p><span class="label">💰 Gain total :</span><span class="value">${game.totalEarning}$</span></p><p style="font-weight:700;margin-top:8px;">🎯 Objectifs :</p>${game.objectives.map(obj=>`<p><span class="label">➜ ${obj.name}</span><span class="value">+${obj.gains}$</span></p>`).join('')}`;
    document.getElementById('gamePopupStats').innerHTML=statsHtml;
    document.getElementById('gamePopup').classList.add('active');
}

function renderGames(){
    const container=document.getElementById('gamesContainer');
    if(!container) return;
    container.innerHTML='';
    games.forEach(g=>{
        const card=document.createElement('div');
        card.className='post-card';
        let badgeHtml = g.isNew ? '<span class="badge-new">NOUVEAU</span>' : '';
        card.innerHTML=`
            ${badgeHtml}
            <div class="post-header">
                <div class="avatar">${g.avatar}</div>
                <div class="post-meta">
                    <h4>${g.name}</h4>
                    <div class="game-description">${g.description}</div>
                </div>
            </div>
            <div class="post-separator"></div>
            <div class="image-wrapper">
                <img class="post-image" src="${g.img}" alt="${g.name}" loading="lazy">
            </div>
            <div class="post-stats">
                <span class="duration"><i class="fas fa-calendar-alt"></i> ${g.duration}</span>
                <span class="earning"><i class="fas fa-coins"></i> ${g.totalEarning}$</span>
            </div>
        `;
        container.appendChild(card);
        card.querySelector('.image-wrapper').addEventListener('click', () => showGameDetails(g));
    });
}

function closePopup(id){ const p=document.getElementById(id); if(p) p.classList.remove('active'); }
function showToast(msg){ const t=document.createElement('div'); t.className='toast-notification'; t.innerHTML=`<i class="fas fa-check-circle"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }

document.getElementById('closeGamePopupBtn')?.addEventListener('click',()=>closePopup('gamePopup'));
document.getElementById('closeIframeBtn')?.addEventListener('click',()=>{ document.getElementById('portalIframe').src='about:blank'; document.getElementById('fullscreenIframe').classList.remove('active'); });
document.getElementById('portalBtn')?.addEventListener('click', async () => { const uid=await getUserUniqueId(); if(uid){ openTimewallInIframe(uid); } else { showToast("ID unique non trouvé"); } });
document.getElementById('menuFloatBtn')?.addEventListener('click',()=>document.getElementById('menuFloating').classList.toggle('active'));
document.getElementById('menuLogoutBtn')?.addEventListener('click',()=>document.getElementById('confirmPopup').classList.add('active'));
document.getElementById('confirmYes')?.addEventListener('click',async()=>{ await signOut(auth); window.location.href="login.html"; });
document.getElementById('confirmNo')?.addEventListener('click',()=>closePopup('confirmPopup'));
document.getElementById('closeTicketsPopupBtn')?.addEventListener('click',()=>closePopup('ticketsListPopup'));
document.getElementById('closeTicketFormBtn')?.addEventListener('click',()=>closePopup('ticketFormPopup'));
document.getElementById('closeSettingsBtn')?.addEventListener('click',()=>closePopup('settingsPopup'));
document.getElementById('closeCapBtn')?.addEventListener('click',()=>closePopup('capPopup'));
document.getElementById('settingsFloatBtn')?.addEventListener('click',()=>document.getElementById('settingsPopup').classList.add('active'));
document.getElementById('menuTicketsBtn')?.addEventListener('click',()=>{ document.getElementById('menuFloating').classList.remove('active'); document.getElementById('ticketsListPopup').classList.add('active'); });
document.getElementById('menuNewTicketBtn')?.addEventListener('click',()=>{ document.getElementById('menuFloating').classList.remove('active'); document.getElementById('ticketFormPopup').classList.add('active'); });
document.getElementById('menuCapBtn')?.addEventListener('click',()=>{ document.getElementById('menuFloating').classList.remove('active'); document.getElementById('capContent').innerHTML='📊 CAP du jour : Atteindre 10$ aujourd'hui'; document.getElementById('capPopup').classList.add('active'); });
document.getElementById('loginPilotBtn')?.addEventListener('click',()=>{ const pwd=document.getElementById('pilotPassword')?.value; if(pwd==="PiloteAB"){ window.open('https://gain.gg/r/111117266020005347836','_blank'); closePopup('settingsPopup'); } else{ alert('Code invalide'); } });
document.getElementById('submitTicketBtn')?.addEventListener('click',()=>{ showToast("✅ Ticket envoyé !"); closePopup('ticketFormPopup'); });
document.querySelectorAll('.tickets-tab').forEach(tab=>{ tab.addEventListener('click',()=>{ document.querySelectorAll('.tickets-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); const container=document.getElementById('ticketsListContainer'); if(tab.dataset.tab==='encours') container.innerHTML='<p style="text-align:center;color:#b0b3b8;">Aucun ticket en cours</p>'; else container.innerHTML='<p style="text-align:center;color:#b0b3b8;">Aucun ticket résolu</p>'; }); });

async function initUser(user){
    if(!user) return;
    userDocRef=doc(db,"users",user.uid);
    const snap=await getDoc(userDocRef);
    if(!snap.exists()){
        await setDoc(userDocRef,{ email:user.email, code:user.email.split('@')[0].substring(0,8).toUpperCase(), role:"netuber", isActive:true });
    }
    const codeDisplay=document.getElementById('userCodeDisplay');
    if(codeDisplay) codeDisplay.textContent=(await getDoc(userDocRef)).data().code||"NETUBER";
    renderGames();
}

onAuthStateChanged(auth,async(user)=>{ if(user){ await initUser(user); }else{ window.location.href="login.html"; } });
</script>
