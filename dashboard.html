<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>NeTubeX · TimeWall Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0c12;
  font-family: 'Inter', system-ui, sans-serif;
  color: #eef2ff;
  min-height: 100vh;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 12, 18, 0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0, 230, 138, 0.25);
  padding: 0.75rem 1.25rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo h1 {
  font-size: 1.6rem;
  font-weight: 800;
  background: linear-gradient(135deg, #e0f2fe, #2dd4bf, #00e68a);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo h1 i {
  background: none;
  -webkit-background-clip: unset;
  color: #2dd4bf;
}

.user-code {
  background: rgba(19, 22, 31, 0.9);
  padding: 8px 18px;
  border-radius: 60px;
  border: 0.5px solid rgba(0, 230, 138, 0.4);
  font-size: 0.75rem;
  font-weight: 600;
  font-family: monospace;
}

.user-code i {
  color: #00e68a;
  margin-right: 6px;
}

.icon-btn {
  background: rgba(19, 22, 31, 0.9);
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.2s;
  border: 0.5px solid rgba(0, 230, 138, 0.3);
}

.icon-btn:hover {
  background: #1e2538;
  transform: scale(1.05);
}

/* Dashboard container */
.feed-container {
  max-width: 720px;
  margin: 1.5rem auto 100px auto;
  padding: 0 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.section-title {
  font-size: 1.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, #f0f9ff, #2dd4bf, #a3e635);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

/* Cartes jeu */
.post-card {
  background: rgba(17, 20, 29, 0.8);
  backdrop-filter: blur(4px);
  border-radius: 32px;
  overflow: hidden;
  border: 0.5px solid rgba(45, 212, 191, 0.2);
  transition: all 0.25s ease;
}

.post-card:hover {
  border-color: rgba(0, 230, 138, 0.4);
  transform: translateY(-3px);
}

.post-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
}

.avatar {
  width: 52px;
  height: 52px;
  background: linear-gradient(145deg, #1f3d3a, #0c2b24);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  box-shadow: 0 0 0 1.5px rgba(0, 230, 138, 0.4);
}

.post-meta h4 {
  font-size: 1.2rem;
  font-weight: 700;
}

.post-meta span {
  font-size: 0.75rem;
  color: #9ca3bf;
}

.post-image {
  width: 100%;
  height: 210px;
  object-fit: cover;
  background: #11141d;
}

.gain-btn {
  margin: 16px 18px 20px 18px;
  background: linear-gradient(95deg, #00a884, #008b6b);
  border: none;
  padding: 14px;
  border-radius: 60px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  width: calc(100% - 36px);
  transition: 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.gain-btn:hover {
  background: linear-gradient(95deg, #00e68a, #00a884);
  transform: scale(1.01);
  color: #0a0c12;
}

/* Carte TimeWall spéciale */
.timewall-card {
  background: linear-gradient(135deg, rgba(0, 40, 35, 0.8), rgba(0, 20, 25, 0.95));
  border: 1px solid rgba(255, 193, 7, 0.5);
}

.timewall-btn-special {
  background: radial-gradient(circle at 30% 10%, #fbbf24, #d97706);
  color: #0a0c12;
  font-weight: 800;
}

.timewall-btn-special i {
  color: #0a0c12;
}

.timewall-btn-special:hover {
  background: radial-gradient(circle at 30% 10%, #ffd966, #f59e0b);
}

/* Floating elements */
.floating-group {
  position: fixed;
  bottom: 24px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  z-index: 200;
}

.float-item {
  background: rgba(19, 22, 31, 0.9);
  backdrop-filter: blur(12px);
  width: 56px;
  height: 56px;
  border-radius: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(0, 0, 0, 0.5);
  border: 0.5px solid #2e3548;
  transition: 0.2s;
}

.float-item:hover {
  background: #1e2538;
  transform: scale(1.07);
}

.float-item.x-button {
  background: linear-gradient(145deg, #b8860b, #e6b422);
  border: none;
}

.float-item.x-button i {
  color: #0a0c12;
}

/* Popups */
.slide-popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(14px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  visibility: hidden;
  opacity: 0;
  transition: visibility 0.2s, opacity 0.2s;
}

.slide-popup.active {
  visibility: visible;
  opacity: 1;
}

.popup-left {
  background: #11141d;
  max-width: 360px;
  width: 85%;
  border-radius: 48px;
  padding: 32px 24px;
  text-align: center;
  border: 0.5px solid rgba(0, 230, 138, 0.3);
  transform: translateX(-30px);
  transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.slide-popup.active .popup-left {
  transform: translateX(0);
}

.popup-btn {
  background: #00a884;
  border: none;
  padding: 12px 28px;
  border-radius: 60px;
  font-weight: bold;
  margin-top: 20px;
  cursor: pointer;
}

.close-popup-btn {
  background: #1f2a3a;
  margin-top: 12px;
  border: none;
  padding: 10px 24px;
  border-radius: 60px;
  color: white;
  cursor: pointer;
}

.input-group input {
  width: 100%;
  padding: 14px 18px;
  border-radius: 60px;
  border: none;
  background: #1a1e2c;
  color: white;
  margin: 12px 0;
  outline: none;
  text-align: center;
}

.game-stats {
  background: #0f111b;
  border-radius: 28px;
  padding: 18px;
  margin: 18px 0;
  text-align: left;
  max-height: 280px;
  overflow-y: auto;
}

.game-stats p {
  margin: 10px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.game-stats .value {
  color: #00e68a;
  font-weight: 700;
}

.fullscreen-iframe {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0a0c12;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  visibility: hidden;
  opacity: 0;
  transition: 0.2s;
}

.fullscreen-iframe.active {
  visibility: visible;
  opacity: 1;
}

.iframe-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 48px;
  height: 48px;
  background: #ffd700;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2001;
  border: none;
  font-size: 1.6rem;
  font-weight: bold;
  color: #0a0c12;
}

.fullscreen-iframe iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Overlay de connexion SIMPLE et FONCTIONNEL */
.login-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #0a0c12 0%, #111827 100%);
  z-index: 3000;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
}

.login-overlay.hidden {
  display: none;
}

.login-card {
  background: rgba(17, 20, 29, 0.95);
  backdrop-filter: blur(8px);
  border-radius: 56px;
  padding: 48px 36px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  border: 1px solid rgba(0, 230, 138, 0.3);
  box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
}

.login-logo {
  font-size: 3.5rem;
  margin-bottom: 12px;
}

.login-logo i {
  background: linear-gradient(135deg, #2dd4bf, #00e68a);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.login-card h2 {
  font-size: 1.8rem;
  background: linear-gradient(135deg, #e0f2fe, #00e68a);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 28px;
}

.login-card input {
  width: 100%;
  padding: 16px 20px;
  margin: 10px 0;
  background: #1a1e2c;
  border: 1px solid #2a3042;
  border-radius: 48px;
  color: white;
  font-size: 0.95rem;
  outline: none;
  transition: 0.2s;
}

.login-card input:focus {
  border-color: #00e68a;
  box-shadow: 0 0 0 2px rgba(0, 230, 138, 0.2);
}

.login-btn {
  background: linear-gradient(95deg, #00a884, #1e6b5e);
  width: 100%;
  padding: 14px;
  border-radius: 60px;
  font-weight: 700;
  font-size: 1rem;
  border: none;
  color: white;
  margin-top: 20px;
  cursor: pointer;
  transition: 0.2s;
}

.login-btn:hover {
  background: linear-gradient(95deg, #00e68a, #00a884);
  color: #0a0c12;
}

.login-error {
  color: #f87171;
  margin-top: 16px;
  font-size: 0.8rem;
}

.dashboard-wrapper {
  display: none;
}

.logout-text {
  cursor: pointer;
  transition: 0.2s;
}

.logout-text:hover {
  color: #f97316;
}
</style>
</head>
<body>

<!-- OVERLAY DE CONNEXION FONCTIONNEL -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <i class="fas fa-crown"></i>
    </div>
    <h2>NeTubeX <span style="font-size: 1rem;">| TimeWall</span></h2>
    <input type="email" id="loginEmail" placeholder="Email Firebase" autocomplete="email">
    <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="current-password">
    <button id="doLoginBtn" class="login-btn"><i class="fas fa-arrow-right-to-bracket"></i> Se connecter</button>
    <div id="loginErrorMsg" class="login-error"></div>
    <p style="margin-top: 20px; font-size: 0.7rem; color: #5f6c8a;">Accès sécurisé · UID dynamique TimeWall</p>
  </div>
</div>

<!-- DASHBOARD (caché jusqu'à connexion) -->
<div id="dashboardWrapper" class="dashboard-wrapper">
  <header class="header">
    <div class="logo"><h1><i class="fas fa-bolt"></i> NeTubeX</h1></div>
    <div class="user-code" id="userDisplay"><i class="fas fa-id-card"></i> Chargement...</div>
    <div class="icon-btn" id="settingsBtn"><i class="fas fa-cog"></i></div>
  </header>

  <div class="feed-container">
    <div class="section-title">🎮 Jeux Rémunérateurs</div>
    <div id="gamesContainer"></div>

    <!-- CARTE TIMEWALL - BOUTON LANCER TIMEWALL -->
    <div class="post-card timewall-card">
      <div class="post-header">
        <div class="avatar" style="background: linear-gradient(145deg,#b45309,#f59e0b);"><i class="fas fa-hourglass-half" style="color:#ffd966;"></i></div>
        <div class="post-meta">
          <h4>TimeWall <span style="color:#fbbf24;">● Premium Access</span></h4>
          <span>Portail rémunérateur · injection UID automatique</span>
        </div>
      </div>
      <img class="post-image" src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=600&auto=format" alt="TimeWall" style="opacity:0.9;">
      <button id="launchTimewallButton" class="gain-btn timewall-btn-special">
        <i class="fas fa-rocket"></i> Lancer TimeWall <i class="fas fa-external-link-alt"></i>
      </button>
    </div>
  </div>

  <div class="floating-group">
    <div class="float-item x-button" id="xButton"><i class="fas fa-times"></i> X</div>
  </div>

  <!-- Popup paramètres gain.gg -->
  <div id="settingsPopup" class="slide-popup">
    <div class="popup-left">
      <i class="fas fa-user-astronaut" style="font-size:2.5rem;color:#00e68a;"></i>
      <h3 style="margin:12px 0;">Connexion Pilote</h3>
      <div class="input-group"><input type="password" id="pilotPassword" placeholder="Mot de passe" autocomplete="off"></div>
      <button class="popup-btn" id="loginGainBtn">Se connecter</button>
      <button class="close-popup-btn" id="closeSettingsBtn">Fermer</button>
    </div>
  </div>

  <!-- Popup détails jeu -->
  <div id="gamePopup" class="slide-popup">
    <div class="popup-left">
      <i class="fas fa-fish" style="font-size:2.5rem;color:#00e68a;"></i>
      <h3 style="margin:12px 0;" id="gamePopupTitle">Wild Fish</h3>
      <div class="game-stats" id="gamePopupStats"></div>
      <button class="popup-btn" id="closeGamePopup">Fermer</button>
    </div>
  </div>

  <!-- Iframe fullscreen -->
  <div id="fullscreenIframe" class="fullscreen-iframe">
    <button class="iframe-close" id="closeIframeBtn">✕</button>
    <iframe src="https://fr.wikipedia.org/wiki/Wikip%C3%A9dia:Accueil_principal" title="Wikipedia"></iframe>
  </div>
</div>

<script>
  // ---------- CONFIGURATION FIREBASE ----------
  const firebaseConfig = {
    apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
    storageBucket: "netubexmoney.firebasestorage.app",
    messagingSenderId: "856592608176",
    appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // DOM elements
  const loginOverlay = document.getElementById('loginOverlay');
  const dashboardWrapper = document.getElementById('dashboardWrapper');
  const loginEmail = document.getElementById('loginEmail');
  const loginPassword = document.getElementById('loginPassword');
  const doLoginBtn = document.getElementById('doLoginBtn');
  const loginErrorMsg = document.getElementById('loginErrorMsg');
  const userDisplaySpan = document.getElementById('userDisplay');
  const launchTimewallBtn = document.getElementById('launchTimewallButton');

  let currentUserUid = null;
  let timewallUrl = "#";

  // ----- DONNÉES JEUX (inchangées) -----
  const games = [
    {id:1,name:"Wild Fish",avatar:"🐟",img:"https://i.postimg.cc/CLL76wDt/IMG-3445.jpg",totalPoints:177846,objectives:[{name:"Reach 100 meter",points:10},{name:"Reach 200 meter",points:34},{name:"Reach 400 meter",points:473},{name:"Reach 700 meter",points:2644},{name:"Reach 1200 meter",points:9443},{name:"Reach 2000 meter",points:47212},{name:"Reach 5000 meter",points:118030}]},
    {id:2,name:"Cyber Rush",avatar:"🎮",img:"https://images.unsplash.com/photo-1542751371-adc38448a05e?w=600&auto=format",totalPoints:1000000,objectives:[{name:"Niveau 1",points:125000},{name:"Niveau 2",points:125000},{name:"Niveau 3",points:125000},{name:"Niveau 4",points:125000},{name:"Niveau 5",points:125000},{name:"Niveau 6",points:125000},{name:"Niveau 7",points:125000},{name:"Niveau 8",points:125000}]},
    {id:3,name:"Neon Drifter",avatar:"🏎️",img:"https://images.unsplash.com/photo-1611996575748-3f697d1b7a0e?w=600&auto=format",totalPoints:1000000,objectives:[{name:"Circuit 1",points:200000},{name:"Circuit 2",points:200000},{name:"Circuit 3",points:200000},{name:"Circuit 4",points:200000},{name:"Circuit 5",points:200000}]},
    {id:4,name:"Pixel Arena",avatar:"🎯",img:"https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=600&auto=format",totalPoints:1000000,objectives:[{name:"Zone 1",points:250000},{name:"Zone 2",points:250000},{name:"Zone 3",points:250000},{name:"Zone 4",points:250000}]},
    {id:5,name:"Mystic Kingdom",avatar:"🧙",img:"https://images.unsplash.com/photo-1614294148960-4aa973632f5d?w=600&auto=format",totalPoints:1000000,objectives:[{name:"Quête 1",points:333334},{name:"Quête 2",points:333333},{name:"Quête 3",points:333333}]}
  ];

  function renderGames() {
    const container = document.getElementById('gamesContainer');
    if (!container) return;
    container.innerHTML = '';
    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.innerHTML = `
        <div class="post-header">
          <div class="avatar">${game.avatar}</div>
          <div class="post-meta">
            <h4>${game.name} <span style="color:#00e68a;">• ${game.totalPoints.toLocaleString()} points</span></h4>
            <span>${game.objectives.length} objectifs</span>
          </div>
        </div>
        <img class="post-image" src="${game.img}" alt="${game.name}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1511512578047-dfb367046420?w=600&auto=format'">
        <button class="gain-btn" data-id="${game.id}">🎮 Gagner ${game.totalPoints.toLocaleString()} points</button>
      `;
      container.appendChild(card);
      const btn = card.querySelector('.gain-btn');
      btn.addEventListener('click', () => showGamePopup(game));
    });
  }

  function showGamePopup(game) {
    const statsContainer = document.getElementById('gamePopupStats');
    statsContainer.innerHTML = '';
    game.objectives.forEach(obj => {
      const p = document.createElement('p');
      p.innerHTML = `<span style="color:#9aa3c2;">🎯 ${obj.name}</span><span class="value">${obj.points.toLocaleString()} pts</span>`;
      statsContainer.appendChild(p);
    });
    document.getElementById('gamePopupTitle').innerText = game.name;
    openPopup('gamePopup');
  }

  function openPopup(popupId) {
    document.getElementById(popupId).classList.add('active');
  }
  function closePopup(popupId) {
    document.getElementById(popupId).classList.remove('active');
  }

  // Gestion de l'état de connexion Firebase
  auth.onAuthStateChanged((user) => {
    if (user && user.uid) {
      currentUserUid = user.uid;
      // Afficher UID dans le header
      const shortUid = currentUserUid.substring(0, 12) + "…";
      userDisplaySpan.innerHTML = `<i class="fas fa-code"></i> UID: ${shortUid}`;
      
      // Cacher login, afficher dashboard
      loginOverlay.classList.add('hidden');
      dashboardWrapper.style.display = 'block';
      
      // Générer l'URL TimeWall avec UID
      timewallUrl = `https://timewall.io/users/login?oid=e9bb1fdfd1ed93a0&uid=${currentUserUid}`;
      
      // Configurer le bouton TimeWall
      if (launchTimewallBtn) {
        launchTimewallBtn.onclick = (e) => {
          e.preventDefault();
          if (timewallUrl && timewallUrl !== "#") {
            window.open(timewallUrl, '_blank', 'noopener,noreferrer');
          } else {
            alert("URL TimeWall non disponible");
          }
        };
      }
      
      // Afficher les jeux
      renderGames();
    } else {
      // Aucun utilisateur -> afficher login
      loginOverlay.classList.remove('hidden');
      dashboardWrapper.style.display = 'none';
      currentUserUid = null;
      if (launchTimewallBtn) launchTimewallBtn.onclick = null;
    }
  });

  // Connexion Firebase
  doLoginBtn.onclick = async () => {
    const email = loginEmail.value.trim();
    const password = loginPassword.value;
    
    if (!email || !password) {
      loginErrorMsg.innerText = "Veuillez entrer email et mot de passe";
      return;
    }
    
    loginErrorMsg.innerText = "Connexion en cours...";
    loginErrorMsg.style.color = "#60a5fa";
    doLoginBtn.disabled = true;
    
    try {
      await auth.signInWithEmailAndPassword(email, password);
      loginErrorMsg.innerText = "";
    } catch (error) {
      console.error(error);
      let errorText = "";
      if (error.code === 'auth/invalid-credential') {
        errorText = "Email ou mot de passe incorrect";
      } else if (error.code === 'auth/unauthorized-domain') {
        errorText = "Domaine non autorisé. Ajoutez ce domaine dans Firebase Console → Authentication → Authorized domains";
      } else if (error.code === 'auth/user-not-found') {
        errorText = "Aucun compte associé à cet email";
      } else {
        errorText = error.message;
      }
      loginErrorMsg.innerText = "❌ " + errorText;
      loginErrorMsg.style.color = "#f87171";
    } finally {
      doLoginBtn.disabled = false;
    }
  };

  // Gestion des popups et éléments existants (inchangés)
  document.getElementById('closeGamePopup')?.addEventListener('click', () => closePopup('gamePopup'));
  document.getElementById('settingsBtn')?.addEventListener('click', () => {
    const pwdInput = document.getElementById('pilotPassword');
    if (pwdInput) pwdInput.value = '';
    openPopup('settingsPopup');
  });
  document.getElementById('closeSettingsBtn')?.addEventListener('click', () => closePopup('settingsPopup'));
  document.getElementById('loginGainBtn')?.addEventListener('click', () => {
    const password = document.getElementById('pilotPassword')?.value || '';
    if (password === "Chancelle12") {
      window.open('https://gain.gg/earn', '_blank');
