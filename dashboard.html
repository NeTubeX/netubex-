<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>NeTubeX · Dashboard Netuber</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0f1a;font-family:'Inter',system-ui,sans-serif;color:#e2e8f0;min-height:100vh;overflow-x:hidden;}
.rainbow-line{height:3px;width:100%;background:linear-gradient(90deg,#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);background-size:200% 100%;animation:rainbowMove 3s linear infinite;}
@keyframes rainbowMove{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}
.header{background:#0f1420;border-bottom:1px solid #1e293b;padding:0.5rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px;}
.logo{display:flex;align-items:center;gap:8px;}
.logo img{height:32px;width:auto;object-fit:contain;}
.logo h1{font-size:1.1rem;font-weight:600;color:#e2e8f0;margin:0;}
.user-info{background:linear-gradient(135deg,#f59e0b,#d97706);padding:4px 16px;border-radius:40px;font-size:0.75rem;font-family:monospace;color:#fff;display:flex;align-items:center;gap:8px;font-weight:700;}
.support-trigger{background:linear-gradient(135deg,#3b82f6,#1d4ed8);padding:6px 16px;border-radius:40px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all 0.3s ease;}
.support-trigger:hover{transform:scale(1.05);background:linear-gradient(135deg,#2563eb,#1e40af);}
.support-trigger i{font-size:0.9rem;}
.support-trigger span{font-size:0.75rem;font-weight:600;}
.feed-container{width:100%;padding:1.5rem 0;}
.games-list{display:flex;flex-direction:column;gap:1px;width:100%;background:#0a0f1a;}
.post-card{background:#0f1420;overflow:hidden;width:100%;border-bottom:1px solid #1e293b;transition:all 0.3s ease;}
.post-card:hover{background:#131a2a;}
.post-header{display:flex;align-items:center;gap:14px;padding:1rem 2rem;background:linear-gradient(135deg,#0f1420,#131a2a);border-bottom:1px solid #1e293b;position:relative;}
.post-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#38bdf8,#818cf8,#c084fc);opacity:0.6;}
.avatar{width:52px;height:52px;background:linear-gradient(135deg,#1e293b,#0f1420);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;border:1px solid rgba(56,189,248,0.2);}
.post-meta h4{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#f1f5f9,#cbd5e1);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:4px;}
.post-meta span{font-size:0.7rem;color:#64748b;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.image-wrapper{width:100%;display:block;line-height:0;background:#0a0f1a;}
.post-image{width:100%;height:auto;min-height:200px;object-fit:cover;display:block;transition:transform 0.4s ease;}
.post-card:hover .post-image{transform:scale(1.02);}
.gain-btn{background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;padding:14px;font-weight:700;font-size:0.85rem;color:#fff;cursor:pointer;width:100%;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px;border-top:1px solid #1e293b;}
.gain-btn:hover{background:linear-gradient(135deg,#3b82f6,#2563eb);}
.floating-group{position:fixed;bottom:30px;right:25px;display:flex;flex-direction:column;gap:12px;z-index:200;}
.float-item{background:#0f1420;width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all 0.2s;color:#94a3b8;border:1px solid #1e293b;}
.float-item:hover{background:#1a2332;transform:scale(1.05);color:#38bdf8;}
.float-item.logout{background:#dc2626;border:none;color:#fff;}
.float-item.logout:hover{background:#ef4444;}
.float-item.gold{background:linear-gradient(135deg,#f59e0b,#d97706);border:none;color:#fff;animation:floatGold 2s ease-in-out infinite;}
@keyframes floatGold{0%,100%{transform:translateY(0px);}50%{transform:translateY(-6px);}}
.slide-popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:flex-end;justify-content:center;visibility:hidden;transition:visibility 0s linear 0.25s;}
.slide-popup.active{visibility:visible;transition:visibility 0s linear 0s;}
.popup-left{background:#f1f5f9;max-width:520px;width:90%;border-radius:32px 32px 0 0;padding:2rem 1.8rem;text-align:center;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.2,0.9,0.4,1.1);box-shadow:0 -12px 40px rgba(0,0,0,0.4);position:relative;}
.popup-left::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);background-size:200% 100%;animation:rainbowMove 2s linear infinite;}
.slide-popup.active .popup-left{transform:translateY(0);}
.slide-popup.closing .popup-left{transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.6,1);}
.popup-left h3{color:#0f172a;margin:1rem 0 0.5rem;font-size:1.3rem;font-weight:800;}
.popup-left p{color:#475569;font-size:0.85rem;margin-bottom:1.5rem;}
.popup-btn{background:linear-gradient(135deg,#3b82f6,#2563eb);border:none;padding:12px 24px;border-radius:50px;font-weight:700;cursor:pointer;color:#fff;margin-top:12px;font-size:0.9rem;}
.close-popup-btn{background:#e2e8f0;border:1px solid #cbd5e1;padding:10px 24px;border-radius:50px;color:#1e293b;cursor:pointer;margin-top:10px;font-weight:600;}
.input-group select,.input-group input,.input-group textarea{width:100%;padding:12px 16px;border-radius:50px;border:1px solid #cbd5e1;background:#fff;color:#0f172a;margin:8px 0;font-size:0.9rem;outline:none;font-family:inherit;}
.input-group textarea{border-radius:20px;resize:vertical;}
.game-stats{background:#fff;border-radius:20px;padding:1rem;margin:1.5rem 0;text-align:left;max-height:350px;overflow-y:auto;}
.game-stats p{margin:8px 0;display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #e2e8f0;}
.game-stats .label{color:#334155;font-weight:500;}
.game-stats .value{color:#2563eb;font-weight:800;}
.fullscreen-iframe{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0f1a;z-index:2000;display:flex;flex-direction:column;visibility:hidden;opacity:0;transition:opacity 0.25s;}
.fullscreen-iframe.active{visibility:visible;opacity:1;}
.iframe-close{position:absolute;top:20px;right:20px;width:48px;height:48px;background:#ef4444;border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2001;border:none;font-size:1.3rem;color:#fff;}
.fullscreen-iframe iframe{width:100%;height:100%;border:none;background:#fff;}
.confirm-buttons{display:flex;gap:15px;justify-content:center;margin-top:1.5rem;}
.confirm-yes{background:#ef4444;border:none;padding:12px 28px;border-radius:50px;color:#fff;font-weight:700;cursor:pointer;}
.confirm-no{background:#e2e8f0;border:1px solid #cbd5e1;padding:12px 28px;border-radius:50px;color:#1e293b;font-weight:600;cursor:pointer;}
.footer{background:#0f1420;border-top:1px solid #1e293b;padding:1.5rem;text-align:center;margin-top:2rem;}
.footer p{color:#64748b;font-size:0.75rem;}
.toast-notification{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:12px 24px;border-radius:50px;font-size:0.85rem;z-index:10000;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.tickets-section{background:#0f1420;margin:20px;border-radius:20px;padding:20px;}
.tickets-section h3{color:#fff;margin-bottom:15px;}
.ticket-card{background:rgba(255,255,255,0.05);border-radius:16px;padding:15px;margin-bottom:12px;border-left:4px solid #3b82f6;}
.ticket-card.priority-haute{border-left-color:#ef4444;}
.ticket-card.priority-moyenne{border-left-color:#f59e0b;}
.ticket-header{display:flex;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;}
.ticket-subject{font-weight:700;color:#fff;}
.ticket-date{font-size:0.7rem;color:#64748b;}
.ticket-message{font-size:0.8rem;color:#cbd5e1;margin-bottom:10px;}
.ticket-status{padding:2px 10px;border-radius:20px;font-size:0.65rem;font-weight:600;display:inline-block;}
.status-ouvert{background:rgba(59,130,246,0.2);color:#3b82f6;}
.status-en-cours{background:rgba(245,158,11,0.2);color:#f59e0b;}
.status-resolu{background:rgba(16,185,129,0.2);color:#10b981;}
@media (max-width:640px){.post-image{min-height:180px;}.header{padding:0.5rem 1rem;}.support-trigger span{display:none;}.support-trigger{padding:8px 12px;}}
</style>
</head>
<body>
<div class="rainbow-line"></div>
<header class="header">
<div class="logo"><img src="https://i.postimg.cc/hvcGVK42/IMG-3585-Photoroom.png" alt="NeTubeX Logo"><h1>NeTubeX</h1></div>
<div style="display:flex; align-items:center; gap:12px;">
<div class="support-trigger" id="supportTicketBtn"><i class="fas fa-ticket-alt"></i><span>Ouvrir un ticket</span></div>

</header>

<div id="ticketPopup" class="slide-popup"><div class="popup-left"><i class="fas fa-ticket-alt" style="font-size:2.2rem;color:#3b82f6;"></i><h3>Ouvrir un ticket</h3><p>Décrivez précisément votre problème</p>
<select id="ticketCategory" class="input-group"><option value="">-- Type de problème --</option><option value="🔌 Problème de connexion">🔌 Problème de connexion</option><option value="🔋 Problème de batterie">🔋 Problème de batterie</option><option value="🌡️ Surchauffe">🌡️ Surchauffe du terminal</option><option value="🐢 Terminal lent">🐢 Terminal lent</option><option value="📡 Hors signal">📡 Terminal hors signal</option><option value="💥 Terminal tombé">💥 Terminal tombé</option><option value="🔨 Terminal cassé">🔨 Terminal cassé</option><option value="⚠️ Dysfonctionnement">⚠️ Dysfonctionnement du terminal</option><option value="🎮 Jeux inaccessibles">🎮 Jeux rémunérateurs inaccessibles</option><option value="🚫 Jeux bloqués">🚫 Jeux rémunérateurs bloqués</option><option value="💰 Gains non attribués">💰 Gains non attribués</option></select>

<textarea id="ticketMessage" rows="3" placeholder="Description détaillée du problème..." class="input-group"></textarea>
<select id="ticketPriority" class="input-group"><option value="basse">🟢 Basse - Question simple</option><option value="moyenne" selected>🟠 Moyenne - Gêne modérée</option><option value="haute">🔴 Haute - Bloquant / Urgent</option></select>
<div class="confirm-buttons"><button class="popup-btn" id="submitTicketBtn"><i class="fas fa-paper-plane"></i> Envoyer</button><button class="close-popup-btn" id="closeTicketBtn">Annuler</button></div></div></div>
<div id="confirmPopup" class="slide-popup"><div class="popup-left"><i class="fas fa-sign-out-alt" style="font-size:2.2rem;color:#ef4444;"></i><h3>Déconnexion</h3><p>Êtes-vous sûr de vouloir quitter ?</p><div class="confirm-buttons"><button class="confirm-yes" id="confirmYes">Oui</button><button class="confirm-no" id="confirmNo">Non</button></div></div></div>
<div id="fullscreenIframe" class="fullscreen-iframe"><button class="iframe-close" id="closeIframeBtn">✕</button><iframe id="portalIframe" src="about:blank"></iframe></div>
<footer class="footer"><p><i class="fas fa-copyright"></i> NeTubeX 2026 — Tous droits réservés</p></footer>
<div id="ticketsSection" class="tickets-section" style="display:none;"><h3><i class="fas fa-ticket-alt"></i> Mes tickets</h3><div id="ticketsListContainer"></div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA", authDomain: "netubexmoney.firebaseapp.com", projectId: "netubexmoney", storageBucket: "netubexmoney.firebasestorage.app", messagingSenderId: "856592608176", appId: "1:856592608176:web:69f9df9cfd4f8c28630475" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userDocRef = null;
let startTime = Date.now();
let lastActivity = Date.now();
let batteryListenerActive = false;

const games = [{id:1,name:"Dragon Down",avatar:"🐉",img:"https://i.postimg.cc/T2JyHT7x/IMG-3466.jpg",duration:"7 jours",totalPoints:14048,objectives:[{name:"Open and play",points:9},{name:"Collect 150 gems",points:17},{name:"Collect 1000 gems",points:123},{name:"Collect 4000 gems",points:436},{name:"Collect 10000 gems",points:871},{name:"Collect 40000 gems",points:3348},{name:"Collect 100000 gems",points:10044}]},{id:2,name:"Love Water",avatar:"💧",img:"https://i.postimg.cc/767x8LPg/IMG-3461.gif",duration:"30 jours",totalPoints:173140,objectives:[{name:"Open and play",points:50},{name:"Complete event 1",points:520},{name:"Complete event 2",points:780},{name:"Complete event 5",points:2320},{name:"Complete event 8",points:4640},{name:"Complete event 12",points:7730},{name:"Complete event 17",points:12880},{name:"Complete event 23",points:30910},{name:"Complete event 30",points:113310}]},{id:3,name:"Sky Plunger",avatar:"🪂",img:"https://i.postimg.cc/y8Y0TD7C/IMG-3468.png",duration:"30 jours",totalPoints:646010,objectives:[{name:"Reach 150m",points:70},{name:"Reach 250m",points:70},{name:"Reach 400m",points:630},{name:"Reach 600m",points:1540},{name:"Reach 900m",points:15120},{name:"Reach 1200m",points:69020},{name:"Reach 2000m",points:129360},{name:"Reach 5000m",points:431200}]},{id:4,name:"Zombie Waves",avatar:"🧟",img:"https://i.postimg.cc/Vv9m5sTP/IMG-3470.jpg",duration:"30 jours",totalPoints:842060,objectives:[{name:"Level 3",points:490},{name:"Level 8",points:1470},{name:"Level 15",points:2450},{name:"Level 20",points:4900},{name:"Level 25",points:7350},{name:"Level 35",points:19600},{name:"Level 60",points:122500},{name:"Level 80",points:196000},{name:"Level 100",points:490000}]},{id:5,name:"Grab A Toy",avatar:"🧸",img:"https://i.postimg.cc/J05BNLgH/IMG-3465.jpg",duration:"30 jours",totalPoints:843430,objectives:[{name:"Reach 150m",points:0},{name:"Reach 200m",points:70},{name:"Reach 400m",points:1820},{name:"Reach 600m",points:7770},{name:"Reach 900m",points:36050},{name:"Reach 1700m",points:62160},{name:"Reach 2000m",points:88760},{name:"Reach 5000m",points:646800}]},{id:6,name:"Goblin Heist",avatar:"👺",img:"https://i.postimg.cc/KvQM4mty/IMG-3467.jpg",duration:"60 jours",totalPoints:1790272,objectives:[{name:"150m",points:71},{name:"400m",points:414},{name:"700m",points:5743},{name:"900m",points:33729},{name:"1000m",points:64086},{name:"2000m",points:337229},{name:"5000m",points:1349000}]},{id:7,name:"Wild Fish",avatar:"🐟",img:"https://i.postimg.cc/637k468j/IMG-3469.png",duration:"30 jours",totalPoints:1778460,objectives:[{name:"100m",points:100},{name:"200m",points:340},{name:"400m",points:4730},{name:"700m",points:26440},{name:"1200m",points:94430},{name:"2000m",points:472120},{name:"5000m",points:1180300}]},{id:8,name:"The Grand Mafia",avatar:"⚔️",img:"https://i.postimg.cc/1zWzqB34/IMG-3483.jpg",duration:"3 jours",totalPoints:1000000,objectives:[{name:"Open game",points:9},{name:"Mansion Lv4",points:129},{name:"Mansion Lv13",points:1288},{name:"T2 Associate",points:430},{name:"Mansion Lv17",points:2576},{name:"800k Influence",points:344},{name:"$24.99 Privileges",points:17168},{name:"Mansion Lv25",points:14593}]}];

async function collectBattery() {
  if(!userDocRef) return;
  let niveau="50", etat="Inconnu", temperature="25";
  if('getBattery' in navigator){
    try{
      const b=await navigator.getBattery();
      niveau=Math.round(b.level*100).toString();
      etat=b.charging?"En charge":(niveau<=15?"Critique":(niveau<=30?"Faible":"Décharge"));
    }catch(e){}
  }
  await updateDoc(userDocRef,{batterieNiveau:niveau,batterieEtat:etat,batterieTemperature:temperature,derniereMAJTech:new Date().toISOString()});
}
async function collectNetwork(){
  if(!userDocRef) return;
  let type="Inconnu", signal="0";
  if(navigator.connection){
    type=navigator.connection.effectiveType||"Inconnu";
    if(type==="wifi") type="WiFi";
    else if(type==="cellular") type="4G/5G";
    if(navigator.connection.downlink) signal=Math.round(navigator.connection.downlink*10).toString();
  }
  await updateDoc(userDocRef,{typeConnexion:type,forceSignal:signal});
}
async function collectLocation(){
  if(!userDocRef||!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async(pos)=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    let ville=`${lat.toFixed(2)},${lng.toFixed(2)}`;
    try{
      const res=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}`);
      const data=await res.json();
      ville=data.city||data.locality||ville;
    }catch(e){}
    await updateDoc(userDocRef,{localisation:ville,latitude:lat.toString(),longitude:lng.toString()});
  },()=>{});
}
async function sendPulse(){if(userDocRef) await updateDoc(userDocRef,{dernierSignal:new Date().toISOString(),estConnecte:true,pageActuelle:window.location.pathname});}
async function initUser(user){
  if(!user) return;
  userDocRef=doc(db,"users",user.uid);
  const snap=await getDoc(userDocRef);
  if(!snap.exists()){
    await setDoc(userDocRef,{code:user.email?user.email.split('@')[0].substring(0,8).toUpperCase():"NETUBER",email:user.email||"",role:"netuber",isActive:true,createdAt:new Date().toISOString(),NombreConnexions:1,NombreDeconnexions:0,NombreEchecsConnexion:0,heureConnexion:new Date().toISOString(),heureDeconnexion:"",tempsTotalTerminal:"0",anomaliesConnexion:0,anomaliesSysteme:0,anomalieRecurentes:"",niveauAlerte:"vert",batterieNiveau:"100",batterieEtat:"Inconnu",localisation:"",site:"",zone:"",ticketsOuverts:0,ticketsEnCours:0,ticketsResolus:0,ticketsList:[],estConnecte:true,pageActuelle:window.location.pathname,tempsMoyenDashboard:"0",historique:[]});
  }else{
    await updateDoc(userDocRef,{NombreConnexions:increment(1),heureConnexion:new Date().toISOString(),estConnecte:true});
  }
  await collectBattery(); await collectNetwork(); await collectLocation();
  const userSnap=await getDoc(userDocRef);
  const codeDisplay=document.getElementById('userCodeDisplay');
  if(codeDisplay&&userSnap.exists()) codeDisplay.textContent=userSnap.data().code||"NETUBER";
  loadTickets();
  if(!batteryListenerActive && 'getBattery' in navigator){
    batteryListenerActive=true;
    navigator.getBattery().then(battery=>{
      battery.addEventListener('levelchange',async()=>{await collectBattery();});
      battery.addEventListener('chargingchange',async()=>{await collectBattery();});
    });
  }
}
async function loadTickets(){
  if(!userDocRef) return;
  const snap=await getDoc(userDocRef);
  const tickets=snap.data().ticketsList||[];
  const section=document.getElementById('ticketsSection');
  const container=document.getElementById('ticketsListContainer');
  if(tickets.length===0){section.style.display='none';return;}
  section.style.display='block';
  tickets.sort((a,b)=>new Date(b.date)-new Date(a.date));
  container.innerHTML=tickets.map(t=>{
    const date=new Date(t.date).toLocaleString();
    const statusClass=t.status==='ouvert'?'status-ouvert':(t.status==='en-cours'?'status-en-cours':'status-resolu');
    const statusText=t.status==='ouvert'?'📩 Ouvert':(t.status==='en-cours'?'⚙️ En cours':'✅ Résolu');
    return `<div class="ticket-card priority-${t.priority}"><div class="ticket-header"><span class="ticket-subject">${escapeHtml(t.subject)}</span><span class="ticket-date">${date}</span></div><div class="ticket-message">${escapeHtml(t.message.substring(0,150))}</div><div><span class="ticket-status ${statusClass}">${statusText}</span><span style="margin-left:10px;font-size:0.7rem;">${t.category||''}</span></div></div>`;
  }).join('');
}
function escapeHtml(t){if(!t)return '';return t.replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});}
async function submitTicket(){
  const category=document.getElementById('ticketCategory')?.value;
  const subject=document.getElementById('ticketSubject')?.value.trim();
  const message=document.getElementById('ticketMessage')?.value.trim();
  const priority=document.getElementById('ticketPriority')?.value;
  if(!category){showToast("Sélectionnez un type de problème");return;}
  if(!subject){showToast("Saisissez un sujet");return;}
  if(!message){showToast("Décrivez votre problème");return;}
  const newTicket={id:`TKT${Date.now()}`,category,subject,message,priority,status:"ouvert",date:new Date().toISOString(),reponses:[]};
  const snap=await getDoc(userDocRef);
  const currentTickets=snap.data().ticketsList||[];
  await updateDoc(userDocRef,{ticketsList:[...currentTickets,newTicket],ticketsOuverts:(snap.data().ticketsOuverts||0)+1,dernierTicketDate:new Date().toISOString(),dernierTicketSujet:subject});
  closePopup('ticketPopup');
  showToast("✅ Ticket envoyé !");
  loadTickets();
  document.getElementById('ticketSubject').value='';
  document.getElementById('ticketMessage').value='';
  document.getElementById('ticketCategory').selectedIndex=0;
}
function showToast(msg){const t=document.createElement('div');t.className='toast-notification';t.innerHTML=`<i class="fas fa-check-circle"></i> ${msg}`;document.body.appendChild(t);setTimeout(()=>t.remove(),4000);}
function openPopup(id){const p=document.getElementById(id);if(p){p.classList.remove('closing');p.classList.add('active');}}
function closePopup(id){const p=document.getElementById(id);if(p){p.classList.add('closing');setTimeout(()=>p.classList.remove('active','closing'),350);}}
function renderGames(){
  const container=document.getElementById('gamesContainer');
  if(!container)return;
  container.innerHTML='';
  games.forEach(g=>{
    const card=document.createElement('div');
    card.className='post-card';
    card.innerHTML=`<div class="post-header"><div class="avatar">${g.avatar}</div><div class="post-meta"><h4>${g.name}</h4><span><i class="fas fa-calendar-alt"></i> ${g.duration} <i class="fas fa-gem"></i> ${g.totalPoints.toLocaleString()} pts</span></div></div><div class="image-wrapper"><img class="post-image" src="${g.img}" alt="${g.name}" loading="lazy"></div><button class="gain-btn" data-id="${g.id}"><i class="fas fa-crown"></i> Gagner ${g.totalPoints.toLocaleString()} points</button>`;
    container.appendChild(card);
    card.querySelector('.gain-btn').addEventListener('click',()=>{
      const stats=document.getElementById('gamePopupStats');
      if(stats){
        stats.innerHTML=g.objectives.map((o,i)=>`<p><span class="label">${i+1}. ${o.name}</span><span class="value">${o.points.toLocaleString()} pts</span></p>`).join('');
        openPopup('gamePopup');
      }
    });
  });
}
document.getElementById('supportTicketBtn')?.addEventListener('click',()=>openPopup('ticketPopup'));
document.getElementById('closeTicketBtn')?.addEventListener('click',()=>closePopup('ticketPopup'));
document.getElementById('submitTicketBtn')?.addEventListener('click',submitTicket);
document.getElementById('logoutBtn')?.addEventListener('click',()=>openPopup('confirmPopup'));
document.getElementById('confirmYes')?.addEventListener('click',async()=>{closePopup('confirmPopup');await signOut(auth);window.location.href='login.html';});
document.getElementById('confirmNo')?.addEventListener('click',()=>closePopup('confirmPopup'));
document.getElementById('portalBtn')?.addEventListener('click',()=>{if(auth.currentUser){const iframe=document.getElementById('portalIframe');iframe.src=`https://timewall.io/users/login?oid=e9bb1fdfd1ed93a0&uid=${auth.currentUser.uid}`;document.getElementById('fullscreenIframe').classList.add('active');}});
document.getElementById('closeIframeBtn')?.addEventListener('click',()=>{document.getElementById('portalIframe').src='about:blank';document.getElementById('fullscreenIframe').classList.remove('active');});
document.querySelectorAll('.slide-popup').forEach(p=>{p.addEventListener('click',(e)=>{if(e.target===p)closePopup(p.id);});});
setInterval(()=>{if(userDocRef&&Date.now()-lastActivity<60000)sendPulse();},30000);
setInterval(()=>{collectBattery();collectNetwork();},60000);
setInterval(()=>{collectLocation();},1800000);
window.addEventListener('beforeunload',async()=>{if(userDocRef)await updateDoc(userDocRef,{tempsMoyenDashboard:Math.round((Date.now()-startTime)/1000).toString(),estConnecte:false});});
document.addEventListener('mousemove',()=>{lastActivity=Date.now();});
document.addEventListener('click',()=>{lastActivity=Date.now();});
document.addEventListener('keypress',()=>{lastActivity=Date.now();});
onAuthStateChanged(auth,async(user)=>{if(user){await initUser(user);renderGames();}else{window.location.href='login.html';}});
</script>
</body>
</html>
