body,html{width:100%;overflow-x:hidden;}
img{-webkit-user-drag:none;user-drag:none;pointer-events:none;}

.feed-container{width:100%;padding:1.5rem 0;}
.games-list{display:flex;flex-direction:column;gap:1px;width:100%;background:#0a0f1a;}
.post-card{background:#0f1420;overflow:hidden;width:100%;border-bottom:1px solid #1e293b;transition:all 0.3s ease;}
.post-card:hover{background:#131a2a;}
.post-header{display:flex;align-items:center;gap:14px;padding:1rem 2rem;background:linear-gradient(135deg,#0f1420,#131a2a);border-bottom:1px solid #1e293b;position:relative;overflow:hidden;}
.post-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#38bdf8,#818cf8,#c084fc);opacity:0.6;}

.post-meta h4{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#f1f5f9,#cbd5e1);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:4px;}

// ============================================
// COLLECTE DONNEES - BATTERIE & APPAREIL
// ============================================
async function collectDeviceInfo() {
  if (!userDocRef) return;
  let batterieNiveau = "100", batterieEtat = "Inconnu", modeleAppareil = "Non détecté", systemeExploitation = "Inconnu", versionOS = "?";
  if ('getBattery' in navigator) {
    try { const battery = await navigator.getBattery(); batterieNiveau = Math.round(battery.level * 100).toString(); batterieEtat = battery.charging ? "En charge" : "Décharge"; } catch(e) {}
  }
  const ua = navigator.userAgent;
  if (ua.includes("iPhone")) { modeleAppareil = "iPhone"; systemeExploitation = "iOS"; }
  else if (ua.includes("Android")) { modeleAppareil = "Android"; systemeExploitation = "Android"; }
  else if (ua.includes("Windows")) { modeleAppareil = "PC Windows"; systemeExploitation = "Windows"; }
  else if (ua.includes("Mac")) { modeleAppareil = "Mac"; systemeExploitation = "macOS"; }
  if (ua.match(/OS (\d+)_/)) versionOS = ua.match(/OS (\d+)_/)[1];
  else if (ua.match(/Android (\d+)/)) versionOS = ua.match(/Android (\d+)/)[1];
  await updateDoc(userDocRef, { batterieNiveau, batterieEtat, modeleAppareil, systemeExploitation, versionOS, navigateur: navigator.userAgent.split(' ').slice(-2).join(' '), resolution: `${window.screen.width}x${window.screen.height}`, derniereMAJTech: new Date().toISOString() });
}

// ============================================
// COLLECTE RESEAU
// ============================================
async function collectNetworkInfo() {
  if (!userDocRef) return;
  let typeConnexion = "Inconnu", forceSignal = "0";
  if (navigator.connection) {
    typeConnexion = navigator.connection.effectiveType || "Inconnu";
    if (typeConnexion === "wifi") typeConnexion = "WiFi";
    else if (typeConnexion === "cellular") typeConnexion = "4G/5G";
    if (navigator.connection.downlink) forceSignal = Math.round(navigator.connection.downlink * 10).toString();
  }
  await updateDoc(userDocRef, { typeConnexion, forceSignal });
}

// ============================================
// COLLECTE LOCALISATION
// ============================================
async function collectLocation() {
  if (!userDocRef || !navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async (position) => {
    const lat = position.coords.latitude, lng = position.coords.longitude;
    let ville = `${lat.toFixed(2)}, ${lng.toFixed(2)}`;
    try {
      const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}`);
      const data = await response.json();
      ville = data.city || data.locality || data.principalSubdivision || ville;
    } catch(e) {}
    await updateDoc(userDocRef, { localisation: ville, latitude: lat.toString(), longitude: lng.toString(), derniereLocalisation: new Date().toISOString() });
  }, () => {});
}

// ============================================
// SIGNAL TEMPS REEL
// ============================================
async function sendPulse() { if (userDocRef) await updateDoc(userDocRef, { dernierSignal: new Date().toISOString(), estConnecte: true, pageActuelle: window.location.pathname }); }

// ============================================
// TEMPS PASSE
// ============================================

// DETECTION ANOMALIES
// ============================================
async function detectAnomalies() {
  if (!userDocRef) return;
  const now = Date.now();
  if (now - lastReloadTime < 5000) { reloadCount++; if (reloadCount > 3) { await updateDoc(userDocRef, { anomaliesSysteme: increment(1), anomalieRecurentes: "Rechargements fréquents" }); } }
  else { reloadCount = 0; }
  lastReloadTime = now;
  const sessionTime = (now - startTime) / 1000 / 3600;
  if (sessionTime > 4) await updateDoc(userDocRef, { anomaliesConnexion: increment(1), niveauAlerte: "orange" });
}

// ============================================
// VISITE DASHBOARD
// ============================================
async function trackDashboardVisit() {
  if (!userDocRef) return;
  await updateDoc(userDocRef, { derniereVisiteDashboard: new Date().toISOString(), nombreVisitesDashboard: increment(1), pageActuelle: window.location.pathname, estConnecte: true, dernierSignal: new Date().toISOString(), historiqueVisites: arrayUnion({ date: new Date().toISOString(), page: window.location.pathname, resolution: `${window.screen.width}x${window.screen.height}` }) });
}

// ============================================
// INITIALISATION USER
// ============================================
async function initUserCollection(user) {
  if (!user) return;
  currentUser = user;
  userDocRef = doc(db, "users", user.uid);
  const docSnap = await getDoc(userDocRef);
  if (!docSnap.exists()) {
    await setDoc(userDocRef, { code: user.email ? user.email.split('@')[0].substring(0,8).toUpperCase() : "NETUBER", email: user.email || "", role: "netuber", isActive: true, createdAt: new Date().toISOString(), NombreConnexions: 1, NombreDeconnexions: 0, NombreEchecsConnexion: 0, heureConnexion: new Date().toISOString(), heureDeconnexion: "", tempsTotalTerminal: "0", anomaliesConnexion: 0, anomaliesSysteme: 0, anomalieRecurentes: "", niveauAlerte: "vert", batterieNiveau: "100", batterieEtat: "Inconnu", localisation: "", site: "", zone: "", ticketsOuverts: 0, ticketsEnCours: 0, ticketsResolus: 0, estConnecte: true, pageActuelle: window.location.pathname, tempsMoyenDashboard: "0", historique: [] });
  } else {
    await updateDoc(userDocRef, { NombreConnexions: increment(1), heureConnexion: new Date().toISOString(), estConnecte: true });
  }
  await collectDeviceInfo(); await collectNetworkInfo(); await collectLocation(); await trackDashboardVisit(); await detectAnomalies();
  const userDoc = await getDoc(userDocRef);
  if (userDoc.exists()) { const code = userDoc.data().code; const codeDisplay = document.getElementById('userCodeDisplay'); if (codeDisplay) codeDisplay.textContent = code || "NETUBER"; }
}

// ============================================
// ACTIVITE & DECONNEXION
// ============================================
function setupActivityTracking() {
  document.addEventListener('mousemove', () => { lastActivity = Date.now(); });
  document.addEventListener('keypress', () => { lastActivity = Date.now(); });
  document.addEventListener('click', () => { lastActivity = Date.now(); });
  document.addEventListener('scroll', () => { lastActivity = Date.now(); });
  setInterval(async () => { if (Date.now() - lastActivity < 60000) await sendPulse(); else if (userDocRef) await updateDoc(userDocRef, { estConnecte: false }); }, 30000);
  window.addEventListener('beforeunload', async () => { await sendTimeSpent(); if (userDocRef) await updateDoc(userDocRef, { heureDeconnexion: new Date().toISOString(), NombreDeconnexions: increment(1), estConnecte: false }); });
}

// ============================================
// PERIODIQUE
// ============================================
function startPeriodicCollection() {
  setInterval(() => { collectDeviceInfo(); collectNetworkInfo(); }, 300000);
  setInterval(() => { collectLocation(); }, 1800000);
  setInterval(() => { detectAnomalies(); }, 60000);
}

// ============================================
// RENDER GAMES & UI
// ============================================
function renderGames() {
  const container = document.getElementById('gamesContainer');
  if(!container) return;
  container.innerHTML = '';
  games.forEach((game) => {
    const card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML = `<div class="post-header"><div class="avatar">${game.avatar}</div><div class="post-meta"><h4>${game.name}</h4><span><i class="fas fa-calendar-alt"></i> ${game.duration} <i class="fas fa-gem" style="margin-left:8px;"></i> ${game.totalPoints.toLocaleString()} points</span></div></div><div class="image-wrapper"><img class="post-image" src="${game.img}" alt="${game.name}" loading="lazy" decoding="async" style="width:100%; height:auto; min-height:200px; object-fit:cover;"></div><button class="gain-btn" data-id="${game.id}"><i class="fas fa-crown"></i> Gagner ${game.totalPoints.toLocaleString()} points</button>`;
    container.appendChild(card);
    const btn = card.querySelector('.gain-btn');
    btn.addEventListener('click', (e) => { e.preventDefault(); showGamePopup(game); });
  });
}

function showGamePopup(game) {
  const statsContainer = document.getElementById('gamePopupStats');
  statsContainer.innerHTML = '';
  game.objectives.forEach((obj, idx) => { const p = document.createElement('p'); p.innerHTML = `<span class="label"><span class="number">${idx+1}</span> ${obj.name}</span><span class="value">${obj.points.toLocaleString()} pts</span>`; statsContainer.appendChild(p); });
  document.getElementById('gamePopupTitle').innerHTML = `${game.name}<span style="font-size:0.75rem;display:block;color:#475569;margin-top:6px;">🎯 ${game.objectives.length} objectifs • ⏱️ ${game.duration}</span>`;
  openPopup('gamePopup');
}

function openPopup(popupId) { const popup = document.getElementById(popupId); if(popup) { popup.classList.remove('closing'); popup.classList.add('active'); } }
function closePopupWithAnimation(popupId) { const popup = document.getElementById(popupId); if(popup) { popup.classList.add('closing'); setTimeout(() => { popup.classList.remove('active', 'closing'); }, 350); } }
function showPilotError() { const toast = document.getElementById('pilotErrorToast'); toast.classList.add('show'); setTimeout(() => { toast.classList.remove('show'); }, 4000); }

// ============================================
// EVENT LISTENERS
// ============================================
document.getElementById('closeGamePopup')?.addEventListener('click', () => { closePopupWithAnimation('gamePopup'); });
document.getElementById('settingsFloatBtn')?.addEventListener('click', () => { const pwd = document.getElementById('pilotPassword'); if(pwd) pwd.value = ''; openPopup('settingsPopup'); });
document.getElementById('closeSettingsBtn')?.addEventListener('click', () => { closePopupWithAnimation('settingsPopup'); });
document.getElementById('loginPilotBtn')?.addEventListener('click', () => { const pwd = document.getElementById('pilotPassword')?.value || ''; if(pwd === "Chancelle12"){ window.open('https://gain.gg/earn', '_blank'); closePopupWithAnimation('settingsPopup'); } else if(pwd === "Ursule11"){ window.open('https://gain.gg/', '_blank'); closePopupWithAnimation('settingsPopup'); } else { showPilotError(); const inp = document.getElementById('pilotPassword'); if(inp) inp.value = ''; } });
document.getElementById('closePilotError')?.addEventListener('click', () => { document.getElementById('pilotErrorToast').classList.remove('show'); });
document.getElementById('logoutBtn')?.addEventListener('click', () => { openPopup('confirmPopup'); });
document.getElementById('confirmYes')?.addEventListener('click', async () => { closePopupWithAnimation('confirmPopup'); await signOut(auth); setTimeout(() => { window.location.href = 'login.html'; }, 350); });
document.getElementById('confirmNo')?.addEventListener('click', () => { closePopupWithAnimation('confirmPopup'); });
document.getElementById('portalBtn')?.addEventListener('click', () => { if(auth.currentUser){ const iframe = document.getElementById('portalIframe'); if(iframe){ iframe.src = `https://timewall.io/users/login?oid=e9bb1fdfd1ed93a0&uid=${auth.currentUser.uid}`; document.getElementById('fullscreenIframe')?.classList.add('active'); } } });
document.getElementById('closeIframeBtn')?.addEventListener('click', () => { const iframe = document.getElementById('portalIframe'); if(iframe) iframe.src = 'about:blank'; document.getElementById('fullscreenIframe')?.classList.remove('active'); });
document.querySelectorAll('.slide-popup').forEach(pop => { pop.addEventListener('click', (e) => { if(e.target === pop) closePopupWithAnimation(pop.id); }); });
document.addEventListener('contextmenu', (e) => { if(!e.target.closest('iframe')) e.preventDefault(); });
document.addEventListener('dragstart', (e) => { if(!e.target.closest('iframe')) e.preventDefault(); });

// ============================================
// DEMARRAGE
// ============================================
onAuthStateChanged(auth, async (user) => { if (user) { await initUserCollection(user); setupActivityTracking(); startPeriodicCollection(); renderGames(); } else { window.location.href = "login.html"; } });
</script>
