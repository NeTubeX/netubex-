<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard NeTubeX</title>
</head>

<body>

<h2>Dashboard</h2>

<p>Code utilisateur : <span id="userCodeDisplay">Chargement...</span></p>

<button id="portalBtn">Ouvrir Timewall</button>
<button id="logoutBtn">Déconnexion</button>

<br><br>

<iframe id="portalIframe" style="width:100%;height:500px;border:none;"></iframe>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔹 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
  authDomain: "netubexmoney.firebaseapp.com",
  projectId: "netubexmoney",
  storageBucket: "netubexmoney.firebasestorage.app",
  messagingSenderId: "856592608176",
  appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};

// 🔹 INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUserId = null;
let userCode = null;

// 🔥 CHECK USER CONNECTÉ
onAuthStateChanged(auth, async (user) => {

  if (user) {
    currentUserId = user.uid;

    // 🔹 récupérer code Firestore
    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      userCode = docSnap.data().code || "NETUBER";
    } else {
      userCode = "NETUBER";
    }

    // 🔹 afficher code
    document.getElementById("userCodeDisplay").textContent = userCode;

  } else {
    // ❌ pas connecté
    window.location.href = "login.html";
  }

});

// 🔥 BOUTON TIMEWALL
document.getElementById("portalBtn").addEventListener("click", () => {

  if (!currentUserId) {
    alert("Utilisateur non connecté");
    return;
  }

  const iframe = document.getElementById("portalIframe");

  iframe.src = `https://timewall.io/users/login?oid=e9bb1fdfd1ed93a0&uid=${currentUserId}`;

});

// 🔥 LOGOUT
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "login.html";
});

</script>

</body>
</html>
