<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
body{background:#0a0f1a;font-family:'Inter',system-ui,sans-serif;color:#e2e8f0;min-height:100vh;overflow-x:hidden;}
.rainbow-line{height:3px;width:100%;background:linear-gradient(90deg,#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);background-size:200% 100%;animation:rainbowMove 3s linear infinite;}
@keyframes rainbowMove{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}
.header{background:#0f1420;border-bottom:1px solid #1e293b;padding:0.5rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;cursor:default;}
.logo img{height:32px;width:auto;}
.logo h1{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#f59e0b);-webkit-background-clip:text;background-clip:text;color:transparent;}
.logo h1 span{color:#f59e0b;}
.header-right{display:flex;gap:12px;align-items:center;}
.balance-btn{background:linear-gradient(135deg,#10b981,#059669);padding:8px 20px;border-radius:40px;font-size:0.85rem;color:#fff;display:flex;align-items:center;gap:10px;font-weight:700;cursor:pointer;transition:0.2s;border:none;}
.balance-btn:hover{transform:scale(1.02);background:linear-gradient(135deg,#059669,#047857);}
.notification-btn{background:linear-gradient(135deg,#3b82f6,#2563eb);padding:8px 20px;border-radius:40px;font-size:0.85rem;color:#fff;display:flex;align-items:center;gap:10px;font-weight:700;cursor:pointer;transition:0.2s;border:none;}
.notification-btn:hover{transform:scale(1.02);background:linear-gradient(135deg,#2563eb,#1d4ed8);}
.logout-btn{background:#dc2626;padding:8px 20px;border-radius:40px;font-size:0.85rem;color:#fff;display:flex;align-items:center;gap:10px;font-weight:700;cursor:pointer;transition:0.2s;border:none;}
.logout-btn:hover{transform:scale(1.02);background:#ef4444;}

/* ===== 5 CARTES HORIZONTALES SCROLLABLES ===== */
.promo-scroll{
    width:100%;
    overflow-x:auto;
    overflow-y:hidden;
    white-space:nowrap;
    padding:1rem 2rem;
    scrollbar-width:thin;
    scrollbar-color:#f59e0b #1e293b;
}
.promo-scroll::-webkit-scrollbar{height:6px;}
.promo-scroll::-webkit-scrollbar-track{background:#1e293b;border-radius:10px;}
.promo-scroll::-webkit-scrollbar-thumb{background:#f59e0b;border-radius:10px;}
.promo-cards-wrapper{
    display:inline-flex;
    gap:16px;
    white-space:nowrap;
}
.promo-card{
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:180px;
    height:150px;
    background:linear-gradient(145deg,#0f1420,#131a2a);
    border-radius:20px;
    border:1px solid #1e293b;
    cursor:pointer;
    transition:all 0.2s ease;
    text-align:center;
    gap:8px;
    position:relative;
}
.promo-card:hover{
    transform:translateY(-5px);
    border-color:#f59e0b;
    background:#1a2332;
}
.promo-card img{
    width:60px;
    height:60px;
    object-fit:contain;
    border-radius:12px;
}
.promo-card .card-title{
    font-size:0.75rem;
    font-weight:600;
    color:#e2e8f0;
}
.promo-card .card-subtitle{
    font-size:0.65rem;
    color:#94a3b8;
}
.promo-card .timer{
    font-size:0.7rem;
    font-weight:700;
    color:#f59e0b;
    background:rgba(245,158,11,0.15);
    padding:4px 8px;
    border-radius:20px;
    margin-top:4px;
}
.promo-card.disabled{
    opacity:0.5;
    cursor:not-allowed;
    pointer-events:none;
}
.promo-card.disabled::after{
    content:'🔒';
    position:absolute;
    top:8px;
    right:8px;
    font-size:14px;
    opacity:0.8;
}
@media (max-width:640px){
    .promo-scroll{padding:1rem;}
    .promo-card{width:150px;height:130px;}
    .promo-card img{width:50px;height:50px;}
}

/* Notifications flottantes */
.notification-toast{
    position:fixed;
    top:20px;
    right:-350px;
    background:#1a2332;
    border-left:4px solid #f59e0b;
    border-radius:12px;
    padding:12px 20px;
    min-width:280px;
    max-width:350px;
    z-index:2000;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    transition:right 0.4s cubic-bezier(0.2,0.9,0.4,1.1);
    display:flex;
    align-items:center;
    gap:12px;
}
.notification-toast.show{
    right:20px;
}
.notification-toast i{
    font-size:1.5rem;
    color:#10b981;
}
.notification-toast .content{
    flex:1;
}
.notification-toast .title{
    font-size:0.8rem;
    font-weight:700;
    color:#e2e8f0;
}
.notification-toast .message{
    font-size:0.7rem;
    color:#94a3b8;
}

/* Popups professionnels */
.modal-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    backdrop-filter:blur(8px);
    z-index:3000;
    display:flex;
    align-items:center;
    justify-content:center;
    visibility:hidden;
    opacity:0;
    transition:all 0.3s ease;
}
.modal-overlay.active{
    visibility:visible;
    opacity:1;
}
.modal-container{
    background:#0f1420;
    border-radius:24px;
    max-width:450px;
    width:90%;
    border:1px solid #1e293b;
    overflow:hidden;
    transform:scale(0.9);
    transition:transform 0.3s ease;
}
.modal-overlay.active .modal-container{
    transform:scale(1);
}
.modal-header{
    padding:18px 22px;
    border-bottom:1px solid #1e293b;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.modal-header h3{
    font-size:1.1rem;
    color:#f59e0b;
    display:flex;
    align-items:center;
    gap:8px;
}
.modal-close{
    background:#1e293b;
    border:none;
    width:30px;
    height:30px;
    border-radius:50%;
    color:#fff;
    cursor:pointer;
    transition:0.2s;
}
.modal-close:hover{background:#ef4444;}
.modal-body{padding:22px;}
.modal-footer{padding:15px 22px;border-top:1px solid #1e293b;display:flex;justify-content:flex-end;gap:12px;}
.modal-footer button{padding:10px 22px;border-radius:40px;border:none;cursor:pointer;font-weight:600;transition:0.2s;}
.modal-footer .btn-confirm{background:#10b981;color:#fff;}
.modal-footer .btn-confirm:hover{background:#059669;}
.modal-footer .btn-cancel{background:#1e293b;color:#fff;}
.modal-footer .btn-cancel:hover{background:#334155;}

/* Balance animation */
.balance-amount{
    font-size:1.5rem;
    font-weight:800;
    color:#f59e0b;
}
.coin-animation{
    animation:coinGlow 0.5s ease-out;
}
@keyframes coinGlow{
    0%{text-shadow:0 0 0 #f59e0b; transform:scale(1);}
    50%{text-shadow:0 0 20px #f59e0b; transform:scale(1.1);}
    100%{text-shadow:0 0 0 #f59e0b; transform:scale(1);}
}

/* TimeWall iframe */
.fullscreen-iframe{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0a0f1a;
    z-index:4000;
    display:flex;
    flex-direction:column;
    visibility:hidden;
    opacity:0;
    transition:opacity 0.25s;
}
.fullscreen-iframe.active{
    visibility:visible;
    opacity:1;
}
.iframe-close{
    position:absolute;
    top:20px;
    right:20px;
    width:44px;
    height:44px;
    background:#ef4444;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:4001;
    border:none;
    color:#fff;
    font-size:1.2rem;
}
.fullscreen-iframe iframe{
    width:100%;
    height:100%;
    border:none;
    background:#fff;
}

/* Jeux */
.feed-container{width:100%;padding:1.5rem 0;}
.games-list{display:flex;flex-direction:column;gap:1px;width:100%;background:#0a0f1a;}
.post-card{background:#0f1420;overflow:hidden;width:100%;border-bottom:1px solid #1e293b;}

.post-image{width:100%;height:auto;min-height:200px;object-fit:cover;display:block;}

/* Bouton flottant */
.floating-group{position:fixed;bottom:30px;right:25px;display:flex;flex-direction:column;gap:12px;z-index:200;}

.footer{background:#0f1420;border-top:1px solid #1e293b;padding:1rem;text-align:center;margin-top:1rem;}
.footer p{color:#64748b;font-size:0.7rem;}

function getDefaultLockedCards() {
    return {
        card0: { locked: false, lockedUntil: null },
        card1: { locked: false, lockedUntil: null },
        card2: { locked: false, lockedUntil: null },
        card3: { locked: false, lockedUntil: null },
        card4: { locked: false, lockedUntil: null }
    };
}

async function getLockedCards() {
    if(!userDocRef) return getDefaultLockedCards();
    const snap = await getDoc(userDocRef);
    if(snap.exists() && snap.data().lockedCards) return snap.data().lockedCards;
    return getDefaultLockedCards();
}

async function saveLockedCards(lockedCards) {
    if(!userDocRef) return;
    await updateDoc(userDocRef, { lockedCards: lockedCards });
}

async function updateExpiredLocks(lockedCards) {
    const now = Date.now();
    let updated = false;
    for(let i = 0; i < 5; i++) {
        const cardKey = `card${i}`;
        if(lockedCards[cardKey]?.locked && lockedCards[cardKey]?.lockedUntil && now >= lockedCards[cardKey].lockedUntil) {
            lockedCards[cardKey] = { locked: false, lockedUntil: null };
            updated = true;
        }
    }
    if(updated) await saveLockedCards(lockedCards);
    return lockedCards;
}

function getRemainingMs(lockedUntil) {
    if(!lockedUntil) return 0;
    const remaining = lockedUntil - Date.now();
    return remaining > 0 ? remaining : 0;
}

function formatTime(ms) {
    if(ms <= 0) return "0h 0min";
    const hours = Math.floor(ms / (60 * 60 * 1000));
    const minutes = Math.floor((ms % (60 * 60 * 1000)) / (60 * 1000));
    return `${hours}h ${minutes}min`;
}

function showNotificationToast(message, isSuccess = true) {
    const existing = document.querySelector('.notification-toast');
    if(existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'notification-toast';
    toast.innerHTML = `
        <i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i>
        <div class="content">
            <div class="title">${isSuccess ? 'Succès' : 'Information'}</div>
            <div class="message">${message}</div>
        </div>
    `;
    document.body.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
    }, 3000);
}

function showModal(id) {
    const modal = document.getElementById(id);
    if(modal) modal.classList.add('active');
}

function closeModal(id) {
    const modal = document.getElementById(id);
    if(modal) modal.classList.remove('active');
}

async function animateBalance(targetValue) {
    const balanceSpan = document.getElementById('balanceDisplay');
    if(!balanceSpan) return;
    const start = parseFloat(balanceSpan.innerText) || 0;
    const end = targetValue;
    const duration = 800;
    const startTime = performance.now();
    const animate = (now) => {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const current = start + (end - start) * progress;
        balanceSpan.innerText = current.toFixed(4);
        if(progress < 1) requestAnimationFrame(animate);
        else balanceSpan.innerText = end.toFixed(4);
    };
    requestAnimationFrame(animate);
    const balanceAmount = document.querySelector('.balance-amount');
    if(balanceAmount) balanceAmount.classList.add('coin-animation');
    setTimeout(() => {
        if(balanceAmount) balanceAmount.classList.remove('coin-animation');
    }, 500);
}

async function updateBalanceDisplay() {
    if(!userDocRef) return;
    const snap = await getDoc(userDocRef);
    const balance = snap.exists() ? (snap.data().balance || 0) : 0;
    await animateBalance(balance);
    return balance;
}

    if(!userDocRef) return false;
    try {
        const gain = 0.0001;
        await updateDoc(userDocRef, { balance: increment(gain) });
        await updateBalanceDisplay();
        showNotificationToast(`✨ +${gain.toFixed(4)} $ ajoutés à votre balance !`);
        
        const lockedCards = await getLockedCards();
        const cardKey = `card${cardId}`;
        lockedCards[cardKey] = { locked: true, lockedUntil: Date.now() + LOCK_DURATION };
        await saveLockedCards(lockedCards);
        await renderPromoCards();
        return true;
    } catch(error) {
        console.error("Erreur:", error);
        showNotificationToast("Une erreur est survenue", false);
        return false;
    }
}

function checkReturnFromAd() {
    const urlParams = new URLSearchParams(window.location.search);
    const fromAd = urlParams.get('fromAd');
    const cardId = urlParams.get('cardId');
    if(fromAd === 'true' && cardId !== null) {
        window.history.replaceState({}, document.title, window.location.pathname);
        addGain(parseInt(cardId));
    }
}

async function renderPromoCards() {
    const container = document.getElementById('promoCardsWrapper');
    if(!container) return;
    let lockedCards = await getLockedCards();
    lockedCards = await updateExpiredLocks(lockedCards);
    container.innerHTML = '';
    for(let i = 0; i < 5; i++) {
        const cardKey = `card${i}`;
        const isLocked = lockedCards[cardKey]?.locked || false;
        const lockedUntil = lockedCards[cardKey]?.lockedUntil;
        const remainingMs = getRemainingMs(lockedUntil);
        const card = document.createElement('div');
        card.className = `promo-card${isLocked ? ' disabled' : ''}`;
        card.innerHTML = `
            <img src="${CARD_IMAGES[i]}" alt="Carte ${i+1}">
            <div class="card-title">1 seconde</div>
            <div class="card-subtitle">💰 +0.0001 $</div>
            <div class="timer">${isLocked ? `⏱️ ${formatTime(remainingMs)}` : '✅ Disponible'}</div>
        `;
        if(!isLocked) {
            card.addEventListener('click', () => {
                const dashboardWithParams = `${DASHBOARD_URL}?fromAd=true&cardId=${i}`;
                window.open(dashboardWithParams, '_blank');
                window.location.href = AD_URLS[i];
            });
        }
        container.appendChild(card);
    }
}

function startTimersUpdate() {
    if(timersInterval) clearInterval(timersInterval);
    timersInterval = setInterval(async () => {
        if(userDocRef) {
            const lockedCards = await getLockedCards();
            let anyChange = false;
            for(let i = 0; i < 5; i++) {
                const cardKey = `card${i}`;
                const card = lockedCards[cardKey];
                if(card?.locked && card?.lockedUntil) {
                    const remaining = card.lockedUntil - Date.now();
                    if(remaining <= 0) {
                        anyChange = true;
                    }
                }
            }
            if(anyChange) {
                await renderPromoCards();
            } else {
                const cards = document.querySelectorAll('.promo-card .timer');
                for(let i = 0; i < 5 && i < cards.length; i++) {
                    const cardKey = `card${i}`;
                    const card = lockedCards[cardKey];
                    if(card?.locked && card?.lockedUntil) {
                        const remainingMs = getRemainingMs(card.lockedUntil);
                        cards[i].innerText = `⏱️ ${formatTime(remainingMs)}`;
                    }
                }
            }
        }
    }, 1000);
}

function renderGames() {
    const container = document.getElementById('gamesContainer');
    if(!container) return;
    container.innerHTML = '';
    games.forEach(g => {
        const card = document.createElement('div');
        card.className = 'post-card';
        card.innerHTML = `
            <div class="post-header">
                <div class="avatar">${g.avatar}</div>
                <div class="post-meta">
                    <h4>${g.name}</h4>
                    <span><i class="fas fa-calendar-alt"></i> ${g.duration}</span>
                </div>
            </div>
            <div class="image-wrapper"><img class="post-image" src="${g.img}" alt="${g.name}" loading="lazy"></div>
            <button class="gain-btn"><i class="fas fa-star"></i> Jouer</button>
        `;
        container.appendChild(card);
    });
}

async function getBalanceValue() {
    if(!userDocRef) return 0;
    const snap = await getDoc(userDocRef);
    return snap.exists() ? (snap.data().balance || 0) : 0;
}

async function showBalancePopup() {
    const balance = await getBalanceValue();
    showNotificationToast(`💰 Votre solde est de ${balance.toFixed(4)} $`, true);
}

async function hasPendingWithdrawal() {
    if(!currentUser) return false;
    const q = query(collection(db, "withdraw"), where("userId", "==", currentUser.uid), where("status", "==", "pending"));
    const querySnapshot = await getDocs(q);
    return !querySnapshot.empty;
}

async function submitWithdraw() {
    const amount = parseFloat(document.getElementById('withdrawAmount').value);
    const walletAddress = document.getElementById('walletAddress').value.trim();
    if(!selectedMethod) { showNotificationToast("Veuillez sélectionner une méthode", false); return; }
    if(isNaN(amount) || amount < WITHDRAWAL_MIN) { showNotificationToast(`Montant minimum ${WITHDRAWAL_MIN}$`, false); return; }
    if(!walletAddress) { showNotificationToast("Veuillez entrer vos coordonnées", false); return; }
    const currentBalance = await getBalanceValue();
    if(amount > currentBalance) { showNotificationToast(`Solde insuffisant`, false); return; }
    const hasPending = await hasPendingWithdrawal();
    if(hasPending) { showNotificationToast("Demande déjà en attente", false); return; }
    try {
        await addDoc(collection(db, "withdraw"), {
            userId: currentUser.uid, userEmail: currentUser.email, amount: amount,
            method: selectedMethod, walletAddress: walletAddress, status: "pending", requestedAt: new Date().toISOString()
        });
        showNotificationToast("✅ Demande envoyée ! Traitement sous 24h", true);
        closeModal('withdrawOverlay');
        document.getElementById('withdrawAmount').value = '';
        document.getElementById('walletAddress').value = '';
    } catch(error) { showNotificationToast("Erreur, réessayez", false); }
}

async function loadNotifications() {
    if(!currentUser) return;
    const q = query(collection(db, "withdraw"), where("userId", "==", currentUser.uid));
    const snapshot = await getDocs(q);
    const withdrawals = [];
    snapshot.forEach(doc => withdrawals.push({ id: doc.id, ...doc.data() }));
    const container = document.getElementById('notificationsList');
    if(withdrawals.length === 0) { container.innerHTML = '<p style="color:#64748b;text-align:center;">Aucune notification</p>'; return; }
    container.innerHTML = withdrawals.map(w => `
        <div style="background:#1a2332;border-radius:12px;padding:12px;margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;"><strong>💰 ${w.amount} $</strong><span class="badge ${w.status === 'pending' ? 'badge-warning' : (w.status === 'approved' ? 'badge-success' : 'badge-danger')}">${w.status === 'pending' ? 'En attente' : (w.status === 'approved' ? 'Approuvé' : 'Rejeté')}</span></div>
            <div style="font-size:0.7rem;color:#94a3b8;">${w.method === 'airtel_money' ? 'Airtel Money' : (w.method === 'orange_money' ? 'Orange Money' : 'PayPal')} • ${new Date(w.requestedAt).toLocaleString()}</div>
        </div>
    `).join('');
}

async function initUser(user) {
    if(!user) return;
    currentUser = user;
    userDocRef = doc(db, "users", user.uid);
    const snap = await getDoc(userDocRef);
    if(!snap.exists()){
        await setDoc(userDocRef, {
            email: user.email || "", balance: 0, lockedCards: getDefaultLockedCards(),
            createdAt: new Date().toISOString(), lastLogin: new Date().toISOString()
        });
    } else {
        await updateDoc(userDocRef, { lastLogin: new Date().toISOString() });
    }
    await updateBalanceDisplay();
    await renderPromoCards();
    renderGames();
    startTimersUpdate();
    checkReturnFromAd();
}

// Événements
document.getElementById('balanceBtn')?.addEventListener('click', () => showBalancePopup());
document.getElementById('notificationBtn')?.addEventListener('click', async () => { await loadNotifications(); showModal('notificationsModal'); });
document.getElementById('logoutBtn')?.addEventListener('click', () => showModal('confirmLogoutModal'));
document.getElementById('portalBtn')?.addEventListener('click', () => showModal('guideModal'));
document.getElementById('confirmGuideBtn')?.addEventListener('click', () => {
    closeModal('guideModal');
    const user = auth.currentUser;
    if(!user) { showNotificationToast("Erreur de connexion", false); return; }
    const iframe = document.getElementById('portalIframe');
    if(iframe) { iframe.src = `https://timewall.io/users/login?oid=e9bb1fdfd1ed93a0&uid=${user.uid}`; document.getElementById('fullscreenIframe').classList.add('active'); }
});
document.getElementById('cancelGuideBtn')?.addEventListener('click', () => closeModal('guideModal'));
document.getElementById('closeIframeBtn')?.addEventListener('click', () => {
    document.getElementById('portalIframe').src = 'about:blank';
    document.getElementById('fullscreenIframe').classList.remove('active');
});
document.getElementById('closeWithdrawBtn')?.addEventListener('click', () => closeModal('withdrawOverlay'));
document.getElementById('cancelWithdrawBtn')?.addEventListener('click', () => closeModal('withdrawOverlay'));
document.getElementById('submitWithdrawBtn')?.addEventListener('click', submitWithdraw);
document.getElementById('closeNotificationsBtn')?.addEventListener('click', () => closeModal('notificationsModal'));
document.getElementById('closeNotificationsFooterBtn')?.addEventListener('click', () => closeModal('notificationsModal'));
document.getElementById('closeLogoutModalBtn')?.addEventListener('click', () => closeModal('confirmLogoutModal'));
document.getElementById('confirmLogoutBtn')?.addEventListener('click', async () => {
    closeModal('confirmLogoutModal');
    await signOut(auth);
    window.location.href = "login.html";
});
document.getElementById('cancelLogoutBtn')?.addEventListener('click', () => closeModal('confirmLogoutModal'));
document.querySelectorAll('.method-option').forEach(opt => {
    opt.addEventListener('click', () => {
        document.querySelectorAll('.method-option').forEach(o => o.style.border = 'none');
        opt.style.border = '2px solid #f59e0b';
        selectedMethod = opt.dataset.method;
        const walletLabel = document.getElementById('walletLabel');
        const walletInput = document.getElementById('walletAddress');
        if(selectedMethod === 'paypal') { walletLabel.innerHTML = 'Email PayPal'; walletInput.placeholder = 'exemple@email.com'; }
        else { walletLabel.innerHTML = 'Numéro de téléphone'; walletInput.placeholder = 'Ex: +243 XX XXX XXXX'; }
    });
});

onAuthStateChanged(auth, async (user) => {
    if(user) await initUser(user);
    else window.location.href = "login.html";
});
</script>
