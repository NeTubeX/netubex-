<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeTubeX · Cartes</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0f1a;font-family:Arial,sans-serif;padding:2rem;}
  .scroll-wrapper{width:100%;overflow-x:auto;white-space:nowrap;}
  .cards{display:inline-flex;gap:16px;}
  .card{display:inline-block;width:150px;padding:20px 10px;background:#1e293b;text-align:center;font-size:1rem;font-weight:600;color:white;border-radius:12px;cursor:pointer;transition:0.2s;}
  .card:hover{background:#f59e0b;color:#0a0f1a;}
</style>
</head>
<body>

<div class="scroll-wrapper">
  <div class="cards" id="cardsContainer"></div>
</div>

<script>
  // URL du Dashboard (s'ouvre dans un NOUVEL ONGLET)
  const DASHBOARD_URL = "https://netubex.github.io/netubex-/userdashboard.html";

  // Les 5 URLs publicitaires
  const AD_URLS = [
    "https://eagerdazzle.com/dizin681kf?key=45bffb13315a43cb3bbbd7ba4e90e7f7",
    "https://eagerdazzle.com/w9dz6cg5a2?key=550cc6298393fca3027e36eb5e108642",
    "https://eagerdazzle.com/q2ec2www4s?key=7f824c5c005e0d12913991cd2375d1d2",
    "https://eagerdazzle.com/h19vmvwg?key=a243df0e204eb52a003bd14860a3319e",
    "https://eagerdazzle.com/i3nx2tqf?key=d5e467ed2408a1b118e27eaea4cbb154"
  ];

  const container = document.getElementById('cardsContainer');

  AD_URLS.forEach((adUrl, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.textContent = `Carte ${index + 1}`;
    card.addEventListener('click', () => {
      // 1. Ouvrir le Dashboard dans un nouvel onglet
      window.open(DASHBOARD_URL, '_blank');
      
      // 2. Rediriger la page actuelle vers la publicité
      window.location.href = adUrl;
    });
    container.appendChild(card);
  });
</script>

</body>
</html>
