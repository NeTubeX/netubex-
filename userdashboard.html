<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>NeTubeX · Dashboard Netuber</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
body{background:#0a0f1a;font-family:'Inter',system-ui,sans-serif;color:#e2e8f0;min-height:100vh;overflow-x:hidden;}
.rainbow-line{height:3px;width:100%;background:linear-gradient(90deg,#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);background-size:200% 100%;animation:rainbowMove 3s linear infinite;}
@keyframes rainbowMove{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}
.header{background:#0f1420;border-bottom:1px solid #1e293b;padding:0.5rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;cursor:default;}
.logo img{height:32px;width:auto;}
.logo h1{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#f59e0b);-webkit-background-clip:text;background-clip:text;color:transparent;}
.logo h1 span{color:#f59e0b;}
.header-right{position:relative;}
.profile-btn{background:linear-gradient(135deg,#3b82f6,#2563eb);padding:8px 20px;border-radius:40px;font-size:0.85rem;color:#fff;display:flex;align-items:center;gap:10px;font-weight:700;cursor:pointer;transition:0.2s;border:none;}
.profile-btn:hover{transform:scale(1.02);background:linear-gradient(135deg,#2563eb,#1d4ed8);}

/* Dropdown menu */
.profile-dropdown{position:absolute;top:55px;right:0;background:#0f1420;border-radius:16px;border:1px solid #1e293b;width:200px;z-index:200;display:none;box-shadow:0 10px 25px rgba(0,0,0,0.5);}
.profile-dropdown.show{display:block;}
.dropdown-item{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:0.2s;border-bottom:1px solid #1e293b;color:#e2e8f0;}
.dropdown-item:last-child{border-bottom:none;}
.dropdown-item:hover{background:#1a2332;}
.dropdown-item i{width:24px;color:#f59e0b;}

/* Popup Balance */
.slide-popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:flex-end;justify-content:center;visibility:hidden;transition:visibility 0s linear 0.25s;}
.slide-popup.active{visibility:visible;transition:visibility 0s linear 0s;}
.popup-left{background:#f1f5f9;max-width:500px;width:90%;border-radius:28px 28px 0 0;padding:2rem;text-align:center;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.2,0.9,0.4,1.1);}
.slide-popup.active .popup-left{transform:translateY(0);}
.popup-left h3{color:#0f172a;margin-bottom:1rem;}
.balance-amount{font-size:3rem;font-weight:800;color:#f59e0b;margin:1rem 0;}
.close-popup-btn{background:#e2e8f0;border:1px solid #cbd5e1;padding:10px 24px;border-radius:50px;color:#1e293b;cursor:pointer;font-weight:600;}

/* Interface Retrait - overlay plein écran */
.withdraw-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0f1a;z-index:2000;display:none;flex-direction:column;overflow-y:auto;}
.withdraw-overlay.show{display:flex;}
.withdraw-header{background:#0f1420;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e293b;}
.withdraw-header h2{font-size:1.2rem;}
.back-btn{background:#1e293b;border:none;padding:8px 16px;border-radius:40px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:8px;}
.withdraw-container{max-width:500px;width:90%;margin:2rem auto;background:#0f1420;border-radius:28px;padding:2rem;border:1px solid #1e293b;}
.withdraw-container h3{text-align:center;margin-bottom:1.5rem;}
.input-group{margin-bottom:1.5rem;}
.input-group label{display:block;color:#94a3b8;font-size:0.75rem;margin-bottom:0.5rem;}
.input-group input,.input-group select{width:100%;padding:14px;background:#1a2332;border:1px solid #1e293b;border-radius:16px;color:#e2e8f0;font-size:1rem;outline:none;}
.input-group input:focus{border-color:#f59e0b;}
.method-options{display:flex;flex-direction:column;gap:12px;margin-bottom:1.5rem;}
.method-option{display:flex;align-items:center;gap:12px;padding:12px;background:#1a2332;border-radius:16px;cursor:pointer;border:2px solid transparent;transition:0.2s;}
.method-option.selected{border-color:#f59e0b;background:#1e293b;}
.method-option i{font-size:1.5rem;width:40px;}
.method-option .method-name{flex:1;font-weight:500;}
.withdraw-btn{width:100%;padding:14px;background:linear-gradient(145deg,#f59e0b,#d97706);border:none;border-radius:16px;color:#fff;font-weight:700;font-size:1rem;cursor:pointer;margin-top:1rem;}
.withdraw-btn:disabled{opacity:0.5;cursor:not-allowed;}
.message-box{background:#1a2332;border-radius:12px;padding:12px;margin-bottom:1rem;text-align:center;display:none;}
.message-box.success{background:#10b98120;color:#10b981;border-left:3px solid #10b981;display:block;}
.message-box.error{background:#ef444420;color:#ef4444;border-left:3px solid #ef4444;display:block;}
.message-box.warning{background:#f59e0b20;color:#f59e0b;border-left:3px solid #f59e0b;display:block;}

/* Dashboard content */
.dashboard-content{transition:0.3s;}
.dashboard-content.hide{display:none;}
.feed-container{width:100%;padding:1.5rem 0;}
.games-list{display:flex;flex-direction:column;gap:1px;width:100%;background:#0a0f1a;}
.post-card{background:#0f1420;overflow:hidden;width:100%;border-bottom:1px solid #1e293b;}
.post-card:hover{background:#131a2a;}
.post-header{display:flex;align-items:center;gap:14px;padding:1rem 2rem;background:linear-gradient(135deg,#0f1420,#131a2a);border-bottom:1px solid #1e293b;}
.avatar{width:52px;height:52px;background:linear-gradient(135deg,#1e293b,#0f1420);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;}
.post-meta h4{font-size:1.1rem;font-weight:800;margin-bottom:4px;}
.post-meta span{font-size:0.7rem;color:#64748b;}
.post-image{width:100%;height:auto;min-height:200px;object-fit:cover;display:block;}
.gain-btn{background:linear-gradient(145deg,#2563eb,#1a4db8);border:none;padding:14px;font-weight:700;color:#fff;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;}
.floating-group{position:fixed;bottom:30px;right:25px;display:flex;flex-direction:column;gap:12px;z-index:200;}
.float-item{background:#0f1420;width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;color:#94a3b8;border:1px solid #1e293b;}
.float-item:hover{background:#1a2332;color:#38bdf8;}
.float-item.gold{background:linear-gradient(145deg,#f59e0b,#d97706);border:none;color:#fff;}
.float-item.logout{background:#dc2626;border:none;color:#fff;}
.float-item.menu-btn{background:linear-gradient(145deg,#3b82f6,#2563eb);border:none;color:#fff;}
.menu-floating{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;background:#0f1420;border-radius:24px;border:1px solid #1e293b;z-index:1001;display:none;}
.menu-floating.active{display:block;}
.menu-header{padding:15px;border-bottom:1px solid #1e293b;background:#1a2332;border-radius:24px 24px 0 0;}
.menu-item{padding:12px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid #1e293b;}
.menu-item:hover{background:#1a2332;}
.menu-item i{width:24px;color:#f59e0b;}
.menu-item.danger{color:#ef4444;}
.toast-notification{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:40px;font-size:0.8rem;z-index:10000;animation:slideUp 0.3s;}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.footer{background:#0f1420;border-top:1px solid #1e293b;padding:1rem;text-align:center;margin-top:1rem;}
.footer p{color:#64748b;font-size:0.7rem;}
</style>
</head>
<body>

<div class="input-group">

<div class="method-option" data-method="paypal">

<span class="method-name">PayPal</span>

</div>
</div>
</div>
<div class="input-group" id="walletInputGroup">
<label id="walletLabel"><i class="fas fa-phone-alt"></i> Numéro de téléphone</label>
<input type="text" id="walletAddress" placeholder="Ex: +243 XX XXX XXXX">
</div>
<button class="withdraw-btn" id="submitWithdrawBtn">Valider le retrait</button>
</div>
</div>

<script type="module">

const firebaseConfig = {

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let userDocRef = null;
let selectedMethod = null;
let pendingWithdrawalCheck = null;

const games = [
    {id:1, name:"Dragon Down", avatar:"🐉", img:"https://i.postimg.cc/T2JyHT7x/IMG-3466.jpg", duration:"7j", totalPoints:14048, objectives:[{name:"Jouer",points:9},{name:"150 gems",points:17},{name:"1000 gems",points:123},{name:"4000 gems",points:436},{name:"10000 gems",points:871},{name:"40000 gems",points:3348},{name:"100000 gems",points:10044}]},
    {id:2, name:"Love Water", avatar:"💧", img:"https://i.postimg.cc/767x8LPg/IMG-3461.gif", duration:"30j", totalPoints:173140, objectives:[{name:"Jouer",points:50},{name:"Event 1",points:520},{name:"Event 2",points:780},{name:"Event 5",points:2320},{name:"Event 8",points:4640},{name:"Event 12",points:7730},{name:"Event 17",points:12880},{name:"Event 23",points:30910},{name:"Event 30",points:113310}]},
    {id:3, name:"Sky Plunger", avatar:"🪂", img:"https://i.postimg.cc/y8Y0TD7C/IMG-3468.png", duration:"30j", totalPoints:646010, objectives:[{name:"150m",points:70},{name:"250m",points:70},{name:"400m",points:630},{name:"600m",points:1540},{name:"900m",points:15120},{name:"1200m",points:69020},{name:"2000m",points:129360},{name:"5000m",points:431200}]},
    {id:4, name:"Zombie Waves", avatar:"🧟", img:"https://i.postimg.cc/Vv9m5sTP/IMG-3470.jpg", duration:"30j", totalPoints:842060, objectives:[{name:"Niveau 3",points:490},{name:"Niveau 8",points:1470},{name:"Niveau 15",points:2450},{name:"Niveau 20",points:4900},{name:"Niveau 25",points:7350},{name:"Niveau 35",points:19600},{name:"Niveau 60",points:122500},{name:"Niveau 80",points:196000},{name:"Niveau 100",points:490000}]},
    {id:5, name:"Grab A Toy", avatar:"🧸", img:"https://i.postimg.cc/J05BNLgH/IMG-3465.jpg", duration:"30j", totalPoints:843430, objectives:[{name:"150m",points:0},{name:"200m",points:70},{name:"400m",points:1820},{name:"600m",points:7770},{name:"900m",points:36050},{name:"1700m",points:62160},{name:"2000m",points:88760},{name:"5000m",points:646800}]},
    {id:6, name:"Goblin Heist", avatar:"👺", img:"https://i.postimg.cc/KvQM4mty/IMG-3467.jpg", duration:"60j", totalPoints:1790272, objectives:[{name:"150m",points:71},{name:"400m",points:414},{name:"700m",points:5743},{name:"900m",points:33729},{name:"1000m",points:64086},{name:"2000m",points:337229},{name:"5000m",points:1349000}]},
    {id:7, name:"Wild Fish", avatar:"🐟", img:"https://i.postimg.cc/637k468j/IMG-3469.png", duration:"30j", totalPoints:1778460, objectives:[{name:"100m",points:100},{name:"200m",points:340},{name:"400m",points:4730},{name:"700m",points:26440},{name:"1200m",points:94430},{name:"2000m",points:472120},{name:"5000m",points:1180300}]},
    {id:8, name:"The Grand Mafia", avatar:"⚔️", img:"https://i.postimg.cc/1zWzqB34/IMG-3483.jpg", duration:"3j", totalPoints:1000000, objectives:[{name:"Jouer",points:9},{name:"Mansion Lv4",points:129},{name:"Mansion Lv13",points:1288},{name:"T2 Associate",points:430},{name:"Mansion Lv17",points:2576},{name:"800k Influence",points:344},{name:"Privileges",points:17168},{name:"Mansion Lv25",points:14593}]}
];

function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function closePopup(id) {
    const popup = document.getElementById(id);
    if(popup) popup.classList.remove('active');
}

function openPopup(id) {
    const popup = document.getElementById(id);
    if(popup) popup.classList.add('active');
}

// Récupérer la balance
async function getBalance() {
    if(!userDocRef) return 0;
    const snap = await getDoc(userDocRef);
    return snap.exists() ? (snap.data().balance || 0) : 0;
}

// Afficher la balance dans la popup
async function showBalancePopup() {
    const balance = await getBalance();
    document.getElementById('balanceAmount').innerHTML = `${balance.toFixed(2)} $`;
    openPopup('balancePopup');
}

// Vérifier si une demande de retrait est en attente
async function hasPendingWithdrawal() {
    if(!currentUser) return false;
    const q = query(collection(db, "withdraw"), where("userId", "==", currentUser.uid), where("status", "==", "pending"));
    const querySnapshot = await getDocs(q);
    return !querySnapshot.empty;
}

// Afficher l'interface de retrait
async function showWithdrawInterface() {
    // Vérifier si une demande est déjà en attente
    const hasPending = await hasPendingWithdrawal();
    if(hasPending) {
        showToast("⏳ Vous avez déjà une demande de retrait en cours. Veuillez patienter.");
        return;
    }
    
    // Réinitialiser le formulaire
    document.getElementById('withdrawAmount').value = '';
    document.getElementById('walletAddress').value = '';
    document.getElementById('withdrawMessage').className = 'message-box';
    document.getElementById('withdrawMessage').style.display = 'none';
    selectedMethod = null;
    
    // Réinitialiser la sélection des méthodes
    document.querySelectorAll('.method-option').forEach(opt => {
        opt.classList.remove('selected');
        opt.querySelector('.fa-check-circle').style.display = 'none';
    });
    
    // Cacher le dashboard et afficher l'overlay
    document.getElementById('dashboardContent').classList.add('hide');
    document.getElementById('withdrawOverlay').classList.add('show');
}

// Mettre à jour le champ wallet selon la méthode choisie
function updateWalletInput(method) {
    const walletGroup = document.getElementById('walletInputGroup');
    const walletLabel = document.getElementById('walletLabel');
    const walletInput = document.getElementById('walletAddress');
    
    if(method === 'paypal') {
        walletLabel.innerHTML = '<i class="fab fa-paypal"></i> Email PayPal';
        walletInput.placeholder = 'exemple@email.com';
    } else {
        walletLabel.innerHTML = '<i class="fas fa-phone-alt"></i> Numéro de téléphone';
        walletInput.placeholder = 'Ex: +243 XX XXX XXXX';
    }
}

// Soumettre la demande de retrait
async function submitWithdraw() {
    const amount = parseFloat(document.getElementById('withdrawAmount').value);
    const walletAddress = document.getElementById('walletAddress').value.trim();
    const messageBox = document.getElementById('withdrawMessage');
    
    // Validation
    if(!selectedMethod) {
        messageBox.className = 'message-box error';
        messageBox.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Veuillez sélectionner une méthode de retrait';
        messageBox.style.display = 'block';
        return;
    }
    
    if(isNaN(amount) || amount < 1) {
        messageBox.className = 'message-box error';
        messageBox.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Le montant minimum est de 1$';
        messageBox.style.display = 'block';
        return;
    }
    
    if(!walletAddress) {
        messageBox.className = 'message-box error';
        messageBox.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Veuillez entrer vos coordonnées';
        messageBox.style.display = 'block';
        return;
    }
    
    // Vérifier la balance
    const currentBalance = await getBalance();
    if(amount > currentBalance) {
        messageBox.className = 'message-box error';
        messageBox.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Solde insuffisant. Votre solde est de ${currentBalance.toFixed(2)}$`;
        messageBox.style.display = 'block';
        return;
    }
    
    // Vérifier à nouveau si une demande est en attente
    const hasPending = await hasPendingWithdrawal();
    if(hasPending) {
        messageBox.className = 'message-box error';
        messageBox.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Vous avez déjà une demande en attente';
        messageBox.style.display = 'block';
        return;
    }
    
    // Désactiver le bouton
    const submitBtn = document.getElementById('submitWithdrawBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Envoi en cours...';
    
    try {
        // Envoyer la demande à Firebase collection "withdraw"
        await addDoc(collection(db, "withdraw"), {
            userId: currentUser.uid,
            userEmail: currentUser.email,
            amount: amount,
            method: selectedMethod,
            walletAddress: walletAddress,
            status: "pending",
            requestedAt: new Date().toISOString()
        });
        
        // Afficher le message de succès
        messageBox.className = 'message-box success';
        messageBox.innerHTML = '<i class="fas fa-check-circle"></i> ✅ Demande envoyée ! Votre retrait sera traité sous 24h.';
        messageBox.style.display = 'block';
        
        // Réinitialiser le formulaire mais garder le message
        document.getElementById('withdrawAmount').value = '';
        document.getElementById('walletAddress').value = '';
        document.getElementById('submitWithdrawBtn').disabled = false;
        document.getElementById('submitWithdrawBtn').textContent = 'Valider le retrait';
        
        // Réinitialiser la sélection
        selectedMethod = null;
        document.querySelectorAll('.method-option').forEach(opt => {
            opt.classList.remove('selected');
            opt.querySelector('.fa-check-circle').style.display = 'none';
        });
        
    } catch(error) {
        console.error("Erreur retrait:", error);
        messageBox.className = 'message-box error';
        messageBox.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Une erreur est survenue. Veuillez réessayer.';
        messageBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Valider le retrait';
    }
}

// Fermer l'interface retrait et revenir au dashboard
function closeWithdrawInterface() {
    document.getElementById('dashboardContent').classList.remove('hide');
    document.getElementById('withdrawOverlay').classList.remove('show');
}

// Fermer le dropdown profil au clic ailleurs
document.addEventListener('click', function(e) {
    const dropdown = document.getElementById('profileDropdown');
    const profileBtn = document.getElementById('profileBtn');
    if(dropdown && profileBtn && !profileBtn.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove('show');
    }
});

// Toggle dropdown profil
document.getElementById('profileBtn')?.addEventListener('click', (e) => {
    e.stopPropagation();
    const dropdown = document.getElementById('profileDropdown');
    dropdown.classList.toggle('show');
});

// Options du dropdown
document.getElementById('balanceOption')?.addEventListener('click', () => {
    document.getElementById('profileDropdown').classList.remove('show');
    showBalancePopup();
});

document.getElementById('withdrawOption')?.addEventListener('click', () => {
    document.getElementById('profileDropdown').classList.remove('show');
    showWithdrawInterface();
});

// Fermeture popup balance
document.getElementById('closeBalancePopup')?.addEventListener('click', () => closePopup('balancePopup'));

// Sélection des méthodes de retrait
document.querySelectorAll('.method-option').forEach(opt => {
    opt.addEventListener('click', () => {
        document.querySelectorAll('.method-option').forEach(o => {
            o.classList.remove('selected');
            o.querySelector('.fa-check-circle').style.display = 'none';
        });
        opt.classList.add('selected');
        opt.querySelector('.fa-check-circle').style.display = 'inline-block';
        selectedMethod = opt.dataset.method;
        updateWalletInput(selectedMethod);
        
        // Cacher le message d'erreur quand l'utilisateur corrige
        document.getElementById('withdrawMessage').style.display = 'none';
    });
});

// Bouton retour
document.getElementById('backToDashboard')?.addEventListener('click', closeWithdrawInterface);

// Bouton soumettre retrait
document.getElementById('submitWithdrawBtn')?.addEventListener('click', submitWithdraw);

// Rendu des jeux
function renderGames() {
    const container = document.getElementById('gamesContainer');
    if(!container) return;
    container.innerHTML = '';
    games.forEach(g => {
        const card = document.createElement('div');
        card.className = 'post-card';
        card.innerHTML = `
            <div class="post-header">
                <div class="avatar">${g.avatar}</div>
                <div class="post-meta">
                    <h4>${g.name}</h4>
                    <span><i class="fas fa-calendar-alt"></i> ${g.duration} <i class="fas fa-star" style="margin-left:8px;color:#f59e0b;"></i> ${g.totalPoints.toLocaleString()} points</span>
                </div>
            </div>
            <div class="image-wrapper"><img class="post-image" src="${g.img}" alt="${g.name}" loading="lazy"></div>
            <button class="gain-btn"><i class="fas fa-star"></i> Gagner ${g.totalPoints.toLocaleString()} points</button>
        `;
        container.appendChild(card);
    });
}

// Initialisation utilisateur
async function initUser(user) {
    if(!user) return;
    currentUser = user;
    userDocRef = doc(db, "users", user.uid);
    const snap = await getDoc(userDocRef);
    
    if(!snap.exists()){
        await setDoc(userDocRef, {
            email: user.email || "",
            balance: 0,
            createdAt: new Date().toISOString(),
            lastLogin: new Date().toISOString()
        });
    } else {
        await updateDoc(userDocRef, { lastLogin: new Date().toISOString() });
    }
    
    renderGames();
}

// Menu et autres événements
document.getElementById('menuFloatBtn')?.addEventListener('click', () => {
    document.getElementById('menuFloating').classList.toggle('active');
});
document.addEventListener('click', (e) => {
    const menu = document.getElementById('menuFloating');
    const menuBtn = document.getElementById('menuFloatBtn');
    if(menu && menuBtn && !menuBtn.contains(e.target) && !menu.contains(e.target)) {
        menu.classList.remove('active');
    }
});
document.getElementById('logoutBtn')?.addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = "login.html";
});
document.getElementById('menuLogoutBtn')?.addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = "login.html";
});

// Auth
onAuthStateChanged(auth, async (user) => {
    if(user) {
        await initUser(user);
    } else {
        window.location.href = "login.html";
    }
});
</script>
