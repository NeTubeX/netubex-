<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Test · NeTubeX</title>
<style>
    body { font-family: 'Courier New', monospace; background: #0a1a2f; color: #f1f5f9; padding: 20px; }
    h2 { color: #facc15; text-align: center; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #2d5780; padding: 8px 12px; text-align: left; }
    th { background: #0f2d45; color: #facc15; }
    tr:nth-child(even) { background: #0a2538; }
    a { color: #e5b800; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .status { text-align: center; margin-top: 20px; color: #facc15; }
</style>
</head>
<body>

<h2>📊 Dashboard Test NeTubeX</h2>
<div class="status" id="status">Chargement des rapports...</div>

<table id="reportsTable" class="hidden">
    <thead>
        <tr>
            <th>Pilote</th>
            <th>Date</th>
            <th>Nom fichier</th>
            <th>PDF</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // Configuration Firebase (la même que pour ton formulaire)
    const firebaseConfig = {
        apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
        authDomain: "netubexmoney.firebaseapp.com",
        projectId: "netubexmoney",
        storageBucket: "netubexmoney.firebasestorage.app",
        messagingSenderId: "856592608176",
        appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
    };

    // Initialisation Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const statusDiv = document.getElementById('status');
    const table = document.getElementById('reportsTable');
    const tbody = table.querySelector('tbody');

    async function loadReports() {
        try {
            const snapshot = await db.collection("test_rapports").orderBy("date", "desc").get();
            if (snapshot.empty) {
                statusDiv.textContent = "Aucun rapport trouvé.";
                return;
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                const tr = document.createElement('tr');
                
                const date = data.date ? new Date(data.date.seconds * 1000).toLocaleString('fr-FR') : data.dateString || '---';
                
                tr.innerHTML = `
                    <td>${data.pilote}</td>
                    <td>${date}</td>
                    <td>${data.fileName}</td>
                    <td><a href="${data.pdfUrl}" target="_blank">Voir PDF</a></td>
                `;
                tbody.appendChild(tr);
            });

            statusDiv.style.display = 'none';
            table.classList.remove('hidden');

        } catch (error) {
            console.error("Erreur lors du chargement:", error);
            statusDiv.textContent = `❌ Erreur: ${error.message || error}`;
        }
    }

    loadReports();
</script>

</body>
</html>
