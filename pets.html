<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeTubeX · Test Firebase + Dashboard</title>
<style>
    body { font-family:'Courier New', monospace; background:#0a1a2f; color:#f1f5f9; padding:20px; }
    h2 { color:#facc15; text-align:center; margin-bottom:20px; }
    .card { background:#0f2d45; border-radius:20px; padding:20px; max-width:500px; margin:0 auto 30px; }
    input, button { width:100%; padding:12px; margin:8px 0; border-radius:50px; border:none; font-size:1rem; }
    button { background:#facc15; color:#0a1a2f; font-weight:bold; cursor:pointer; }
    button:active { transform:scale(0.97); }
    .status { text-align:center; margin-top:10px; }
    table { width:100%; border-collapse: collapse; margin-top:20px; }
    th, td { border:1px solid #2d5780; padding:6px 10px; }
    th { background:#0f2d45; color:#facc15; }
    tr:nth-child(even) { background:#0a2538; }
    a { color:#e5b800; text-decoration:none; }
    a:hover { text-decoration:underline; }
    .hidden { display:none; }
</style>
</head>
<body>

<h2>📡 NeTubeX · Test Firebase</h2>

<div class="card">
    <div>🔹 Quel est le nom du pilote aujourd'hui ?</div>
    <input type="text" id="piloteName" placeholder="Ex: Madame Ursule">
    <button id="sendBtn">📤 Envoyer à Firebase</button>
    <div id="status" class="status"></div>
</div>

<h2>📊 Dashboard des Rapports</h2>
<div id="dashboardStatus" class="status">Chargement des rapports...</div>
<table id="reportsTable" class="hidden">
    <thead>
        <tr>
            <th>Pilote</th>
            <th>Date</th>
            <th>Nom fichier</th>
            <th>PDF</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
    storageBucket: "netubexmoney.firebasestorage.app",
    messagingSenderId: "856592608176",
    appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};
firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();
const db = firebase.firestore();

const sendBtn = document.getElementById('sendBtn');
const piloteInput = document.getElementById('piloteName');
const statusDiv = document.getElementById('status');

const dashboardStatus = document.getElementById('dashboardStatus');
const reportsTable = document.getElementById('reportsTable');
const tbody = reportsTable.querySelector('tbody');

function showStatus(message, type='') {
    statusDiv.textContent = message;
    statusDiv.style.color = type==='error' ? '#c0392b' : (type==='success' ? '#27ae60' : '#facc15');
}

async function generatePDF(piloteName){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const now = new Date();
    doc.setFont('helvetica','bold');
    doc.setFontSize(18);
    doc.text("TEST RAPPORT NeTubeX", 20, 20);
    doc.setFontSize(12);
    doc.text(`Pilote : ${piloteName}`, 20, 32);
    doc.text(`Date : ${now.toLocaleDateString('fr-FR')} à ${now.toLocaleTimeString('fr-FR')}`, 20, 40);
    doc.text("Ceci est un rapport de test généré depuis le formulaire.", 20, 55);
    return doc.output('blob');
}

async function uploadToFirebase(piloteName){
    if(!piloteName.trim()){ showStatus("❌ Veuillez entrer un nom", "error"); return; }
    showStatus("⏳ Génération du PDF...");
    try{
        const pdfBlob = await generatePDF(piloteName);
        const fileName = `test_rapports/${piloteName.replace(/\s/g,'_')}_${Date.now()}.pdf`;
        const storageRef = storage.ref(fileName);
        await storageRef.put(pdfBlob);
        const pdfUrl = await storageRef.getDownloadURL();
        await db.collection("test_rapports").add({
            pilote: piloteName,
            date: firebase.firestore.FieldValue.serverTimestamp(),
            fileName,
            pdfUrl
        });
        showStatus("✅ Succès envoyé à Firebase", "success");
        piloteInput.value='';
        loadReports(); // Rafraîchir dashboard
    }catch(err){ 
        console.error(err); 
        showStatus("❌ Erreur: "+err.message,"error");
    }
}

sendBtn.onclick = () => uploadToFirebase(piloteInput.value);
piloteInput.addEventListener('keypress', e=>{ if(e.key==='Enter') sendBtn.click(); });

async function loadReports(){
    tbody.innerHTML='';
    reportsTable.classList.add('hidden');
    dashboardStatus.textContent='Chargement des rapports...';
    try{
        const snapshot = await db.collection("test_rapports").orderBy("date","desc").get();
        if(snapshot.empty){ dashboardStatus.textContent='Aucun rapport trouvé.'; return; }
        snapshot.forEach(doc=>{
            const data = doc.data();
            const date = data.date ? new Date(data.date.seconds*1000).toLocaleString('fr-FR') : '---';
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${data.pilote}</td>
                            <td>${date}</td>
                            <td>${data.fileName}</td>
                            <td><a href="${data.pdfUrl}" target="_blank">Voir PDF</a></td>`;
            tbody.appendChild(tr);
        });
        dashboardStatus.style.display='none';
        reportsTable.classList.remove('hidden');
    }catch(err){
        console.error(err);
        dashboardStatus.textContent="❌ Erreur: "+err.message;
    }
}

loadReports();
</script>
</body>
</html>
