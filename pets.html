<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Firebase · NeTubeX</title>
<style>
    body { font-family: 'Courier New', monospace; background:#0a1a2f; color:white; padding:20px; }
    .card { background:#0f2d45; padding:20px; border-radius:20px; max-width:500px; margin:auto; }
    input, button { width:100%; padding:12px; margin:6px 0; border-radius:30px; border:none; font-size:1rem; }
    input { background:white; color:black; }
    button { background: #facc15; color:#0a1a2f; font-weight:bold; cursor:pointer; }
    button:active { transform:scale(0.97); }
    .status { margin-top:12px; padding:10px; border-radius:12px; }
    .loading { background:#facc15; color:#0a1a2f; }
    .success { background:#27ae60; color:white; }
    .error { background:#c0392b; color:white; }
</style>
</head>
<body>
<div class="card">
    <h2>📡 NeTubeX · Test Firebase</h2>
    <label>🔹 Nom du pilote :</label>
    <input type="text" id="piloteName" placeholder="Ex: Madame Ursule">
    <button id="sendBtn">📤 Envoyer à Firebase</button>
    <div id="status" class="status"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
    storageBucket: "netubexmoney.appspot.com",
    messagingSenderId: "856592608176",
    appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();
const db = firebase.firestore();

const sendBtn = document.getElementById('sendBtn');
const piloteInput = document.getElementById('piloteName');
const statusDiv = document.getElementById('status');

function showStatus(msg, type) {
    statusDiv.textContent = msg;
    statusDiv.className = `status ${type}`;
}

async function generatePDF(pilote) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const now = new Date();
    doc.text(`Test rapport NeTubeX`, 10, 20);
    doc.text(`Pilote : ${pilote}`, 10, 30);
    doc.text(`Date : ${now.toLocaleString('fr-FR')}`, 10, 40);
    doc.text(`Ceci est un rapport de test.`, 10, 50);
    return doc.output('blob');
}

async function sendToFirebase() {
    const pilote = piloteInput.value.trim();
    if(!pilote){ showStatus("❌ Veuillez entrer un nom de pilote", "error"); return; }

    try {
        showStatus("⏳ Génération du PDF...", "loading");
        const pdfBlob = await generatePDF(pilote);

        showStatus("⏳ Envoi vers Firebase Storage...", "loading");
        const fileName = `test_rapports/${pilote.replace(/\s/g,'_')}_${Date.now()}.pdf`;
        const storageRef = storage.ref(fileName);
        await storageRef.put(pdfBlob);

        showStatus("⏳ Enregistrement dans Firestore...", "loading");
        const url = await storageRef.getDownloadURL();
        await db.collection("test_rapports").add({
            pilote: pilote,
            date: firebase.firestore.FieldValue.serverTimestamp(),
            pdfUrl: url,
            fileName: fileName,
        });

        showStatus("✅ Succès ! PDF envoyé à Firebase.", "success");
        piloteInput.value = '';
    } catch(err) {
        console.error(err);
        showStatus(`❌ Erreur : ${err.message || err}`, "error");
    }
}

sendBtn.onclick = sendToFirebase;
piloteInput.addEventListener('keypress', e => { if(e.key === 'Enter') sendToFirebase(); });
</script>
</body>
</html>
