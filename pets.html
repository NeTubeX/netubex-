<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulaire Test Firebase · NeTubeX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Courier New',monospace;padding:20px;background:#0a1a2f;color:#fff;}
.container{max-width:500px;margin:auto;background:#1b2a40;padding:20px;border-radius:20px;}
input, button{width:100%;padding:12px;margin:10px 0;border-radius:30px;font-size:1rem;}
button{background:#facc15;border:none;color:#000;font-weight:bold;cursor:pointer;}
.status{margin:10px 0;padding:10px;border-radius:10px;}
.status.loading{background:#facc15;color:#0a1a2f;}
.status.success{background:#27ae60;color:#fff;}
.status.error{background:#c0392b;color:#fff;}
#debug{margin-top:10px;font-size:0.8rem;color:#94a3b8;}
</style>
</head>
<body>

<div class="container">
  <h2>📡 NeTubeX · Formulaire Test</h2>
  <input type="text" id="piloteName" placeholder="Nom du pilote">
  <button id="sendBtn">📤 Générer PDF & Envoyer</button>
  <div id="status" class="status"></div>
  <div id="debug"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
  authDomain: "netubexmoney.firebaseapp.com",
  projectId: "netubexmoney",
  storageBucket: "netubexmoney.appspot.com",
  messagingSenderId: "856592608176",
  appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();
const db = firebase.firestore();

const sendBtn = document.getElementById('sendBtn');
const piloteInput = document.getElementById('piloteName');
const statusDiv = document.getElementById('status');
const debugDiv = document.getElementById('debug');

function showStatus(message, type){
  statusDiv.textContent = message;
  statusDiv.className = `status ${type}`;
}

function logDebug(message){
  debugDiv.textContent = message;
}

async function generatePDF(pilote){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const now = new Date();
  doc.text(`Rapport Test NeTubeX`,20,20);
  doc.text(`Pilote: ${pilote}`,20,30);
  doc.text(`Date: ${now.toLocaleString('fr-FR')}`,20,40);
  return doc.output('blob');
}

async function uploadPDF(pilote){
  if(!pilote.trim()){ showStatus("❌ Entrez un nom", "error"); return; }

  showStatus("⏳ Génération du PDF...", "loading");
  logDebug("Génération du PDF...");

  try {
    const pdfBlob = await generatePDF(pilote);
    showStatus("⏳ Envoi vers Firebase Storage...", "loading");
    logDebug("Uploading...");

    const fileName = `test_rapports/${pilote.replace(/\s/g,'_')}_${Date.now()}.pdf`;
    const storageRef = storage.ref(fileName);
    await storageRef.put(pdfBlob);

    const downloadURL = await storageRef.getDownloadURL();

    await db.collection("test_rapports").add({
      pilote: pilote,
      pdfUrl: downloadURL,
      date: firebase.firestore.FieldValue.serverTimestamp()
    });

    showStatus("✅ Succès ! PDF envoyé à Firebase.", "success");
    logDebug(`PDF URL: ${downloadURL}`);
    piloteInput.value = '';

  } catch(e){
    showStatus("❌ Erreur: "+e.message, "error");
    logDebug(e);
  }
}

sendBtn.onclick = () => uploadPDF(piloteInput.value);
piloteInput.addEventListener('keypress', e => { if(e.key==='Enter') sendBtn.click(); });
</script>
</body>
</html>
