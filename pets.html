<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeTubeX · Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0a0f1a;color:#e2e8f0;}
.dashboard{max-width:1400px;margin:0 auto;padding:20px;}
.header{background:#0f1420;border-bottom:2px solid #f59e0b;padding:15px 25px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;margin-bottom:25px;}
.logo h1{font-size:18px;color:#f59e0b;}
.logo h1 i{color:#f59e0b;}
.logout-btn{background:#ef4444;border:none;padding:8px 16px;border-radius:30px;color:#fff;cursor:pointer;}
.tabs{display:flex;gap:8px;margin-bottom:25px;flex-wrap:wrap;border-bottom:1px solid #1e293b;padding-bottom:10px;}
.tab{padding:8px 20px;background:transparent;border:none;border-radius:30px;color:#94a3b8;cursor:pointer;font-size:13px;font-weight:500;}
.tab:hover{background:#1e293b;color:#fff;}
.tab.active{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0a0f1a;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:25px;}
.stat-card{background:#0f1420;border-radius:16px;padding:15px;border:1px solid #1e293b;}
.stat-card .value{font-size:24px;font-weight:700;}
.stat-card .label{font-size:11px;color:#64748b;margin-top:5px;}
.table-wrapper{background:#0f1420;border-radius:16px;overflow-x:auto;border:1px solid #1e293b;}
table{width:100%;border-collapse:collapse;min-width:800px;}
th{text-align:left;padding:12px;font-size:11px;font-weight:600;color:#64748b;border-bottom:1px solid #1e293b;}
td{padding:10px 12px;border-bottom:1px solid #1e293b;font-size:12px;}
tr:hover{background:#1a2332;}
.badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:500;}
.badge-warning{background:rgba(245,158,11,0.2);color:#f59e0b;}
.badge-success{background:rgba(16,185,129,0.2);color:#10b981;}
.badge-danger{background:rgba(239,68,68,0.2);color:#ef4444;}
.action-btn{padding:5px 10px;border-radius:6px;font-size:10px;cursor:pointer;border:none;margin:0 2px;}
.action-btn.validate{background:#10b981;color:#fff;}
.action-btn.validate:hover{background:#059669;}
.action-btn.delete{background:#ef4444;color:#fff;}
.action-btn.delete:hover{background:#dc2626;}
.action-btn.view{background:#3b82f6;color:#fff;}
.action-btn.view:hover{background:#2563eb;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;justify-content:center;align-items:center;}
.modal.active{display:flex;}
.modal-content{background:#0f1420;border-radius:20px;max-width:500px;width:90%;border:1px solid #1e293b;}
.modal-header{padding:15px 20px;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between;}
.modal-body{padding:20px;}
.modal-footer{padding:12px 20px;border-top:1px solid #1e293b;display:flex;justify-content:flex-end;gap:10px;}
.input-group{margin-bottom:15px;}
.input-group label{display:block;font-size:11px;color:#64748b;margin-bottom:5px;}
.input-group input,.input-group textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #1e293b;background:#1a2332;color:#fff;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:40px;font-size:12px;z-index:10000;}
.toast-error{background:#ef4444;}
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.search-input{padding:8px 16px;border-radius:40px;border:1px solid #1e293b;background:#0f1420;color:#fff;min-width:200px;}
</style>
</head>
<body>
<div class="dashboard">
<div class="header">
<div class="logo"><h1><i class="fas fa-chart-line"></i> Administration NeTubeX</h1></div>
<button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('inscriptions')"><i class="fas fa-user-plus"></i> Inscriptions</button>
<button class="tab" onclick="switchTab('utilisateurs')"><i class="fas fa-users"></i> Utilisateurs</button>
</div>

<!-- Onglet Inscriptions (comptes en attente) -->
<div id="inscriptionsTab" class="tab-content active">
<div class="stats-grid">
<div class="stat-card"><div class="value" id="totalPending">0</div><div class="label">En attente d'activation</div></div>
<div class="stat-card"><div class="value" id="totalActive">0</div><div class="label">Comptes actifs</div></div>
</div>
<div class="filters">
<input type="text" id="searchPending" placeholder="🔍 Rechercher..." class="search-input" onkeyup="filterPendingUsers()">
</div>
<div class="table-wrapper">
<table id="pendingTable">
<thead><tr><th>Nom</th><th>Email</th><th>Moyen de contact</th><th>Contact</th><th>Date</th><th>Actions</th></tr></thead>
<tbody id="pendingTableBody"></tbody>
</table>
</div>
</div>

<!-- Onglet Utilisateurs actifs -->
<div id="utilisateursTab" class="tab-content">
<div class="stats-grid">
<div class="stat-card"><div class="value" id="totalUsers">0</div><div class="label">Utilisateurs actifs</div></div>
</div>
<div class="filters">
<input type="text" id="searchUsers" placeholder="🔍 Rechercher..." class="search-input" onkeyup="filterActiveUsers()">
</div>
<div class="table-wrapper">
<table id="usersTable">
<thead><tr><th>Nom</th><th>Email</th><th>Status</th><th>Dernière connexion</th><th>Actions</th></tr></thead>
<tbody id="usersTableBody"></tbody>
</table>
</div>
</div>

<!-- Modale pour répondre / activer -->
<div id="replyModal" class="modal">
<div class="modal-content">
<div class="modal-header"><h2><i class="fas fa-reply"></i> Contacter et activer</h2><button class="modal-close" onclick="closeModal('replyModal')"><i class="fas fa-times"></i></button></div>
<div class="modal-body">
<div class="input-group"><label>Utilisateur</label><input type="text" id="replyUserName" readonly></div>
<div class="input-group"><label>Moyen de contact</label><input type="text" id="replyContactMethod" readonly></div>
<div class="input-group"><label>Adresse de contact</label><input type="text" id="replyContactValue" readonly></div>
<div class="input-group"><label>Votre message (WhatsApp/Gmail)</label><textarea id="replyMessage" rows="4" placeholder="Bonjour, votre compte a été activé. Voici vos identifiants..."></textarea></div>
</div>
<div class="modal-footer"><button onclick="sendAndActivate()" style="background:#10b981;">✓ Confirmer et activer</button><button onclick="closeModal('replyModal')" style="background:#64748b;">Annuler</button></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = { 
    apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA", 
    authDomain: "netubexmoney.firebaseapp.com", 
    projectId: "netubexmoney", 
    storageBucket: "netubexmoney.firebasestorage.app", 
    messagingSenderId: "856592608176", 
    appId: "1:856592608176:web:69f9df9cfd4f8c28630475" 
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allUsers = [];
let pendingUsers = [];
let activeUsers = [];

function showToast(msg, isError = false) {
    const t = document.createElement('div');
    t.className = 'toast' + (isError ? ' toast-error' : '');
    t.innerHTML = isError ? '❌ ' + msg : '✅ ' + msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function openModal(id) { document.getElementById(id).classList.add('active'); }
window.closeModal = closeModal;

async function loadData() {
    try {
        const usersSnap = await getDocs(collection(db, "users"));
        allUsers = [];
        usersSnap.forEach(doc => {
            allUsers.push({ id: doc.id, ...doc.data() });
        });
        
        pendingUsers = allUsers.filter(u => u.isActive === false || u.isActive === undefined);
        activeUsers = allUsers.filter(u => u.isActive === true);
        
        updatePendingTable();
        updateActiveTable();
        
        document.getElementById('totalPending').innerText = pendingUsers.length;
        document.getElementById('totalActive').innerText = activeUsers.length;
        document.getElementById('totalUsers').innerText = activeUsers.length;
    } catch(e) {
        console.error(e);
        showToast("Erreur chargement: " + e.message, true);
    }
}

function updatePendingTable() {
    const tbody = document.getElementById('pendingTableBody');
    if(!tbody) return;
    const search = document.getElementById('searchPending')?.value.toLowerCase() || '';
    let filtered = pendingUsers.filter(u => {
        const fullName = (u.nom + ' ' + u.prenom).toLowerCase();
        return fullName.includes(search) || (u.email || '').toLowerCase().includes(search);
    });
    
    tbody.innerHTML = filtered.map(u => `
        <tr>
            <td><strong>${escapeHtml(u.nom || '')} ${escapeHtml(u.prenom || '')}</strong></td>
            <td>${escapeHtml(u.email || '-')}</td>
            <td>${u.moyenContact === 'whatsapp' ? '<i class="fab fa-whatsapp"></i> WhatsApp' : '<i class="fab fa-google"></i> Gmail'}</td>
            <td>${escapeHtml(u.contactValue || '-')}</td>
            <td><small>${new Date(u.dateInscription).toLocaleDateString()}</small></td>
            <td>
                <button class="action-btn view" onclick='openContactModal("${u.id}")'><i class="fas fa-reply"></i> Contacter</button>
                <button class="action-btn delete" onclick='deleteUser("${u.id}")'><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

function updateActiveTable() {
    const tbody = document.getElementById('usersTableBody');
    if(!tbody) return;
    const search = document.getElementById('searchUsers')?.value.toLowerCase() || '';
    let filtered = activeUsers.filter(u => {
        const fullName = (u.nom + ' ' + u.prenom).toLowerCase();
        return fullName.includes(search) || (u.email || '').toLowerCase().includes(search);
    });
    
    tbody.innerHTML = filtered.map(u => `
        <tr>
            <td><strong>${escapeHtml(u.nom || '')} ${escapeHtml(u.prenom || '')}</strong></td>
            <td>${escapeHtml(u.email || '-')}</td>
            <td><span class="badge badge-success">Actif</span></td>
            <td><small>${u.lastSeen ? new Date(u.lastSeen).toLocaleDateString() : '-'}</small></td>
            <td>
                <button class="action-btn delete" onclick='deleteUser("${u.id}")'><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

window.filterPendingUsers = () => updatePendingTable();
window.filterActiveUsers = () => updateActiveTable();

let selectedUserId = null;

window.openContactModal = async (userId) => {
    const user = allUsers.find(u => u.id === userId);
    if(!user) return;
    selectedUserId = userId;
    document.getElementById('replyUserName').value = `${user.nom || ''} ${user.prenom || ''}`;
    document.getElementById('replyContactMethod').value = user.moyenContact === 'whatsapp' ? 'WhatsApp' : 'Gmail';
    document.getElementById('replyContactValue').value = user.contactValue || '-';
    document.getElementById('replyMessage').value = `Bonjour ${user.prenom || ''},\n\nVotre compte NeTubeX a été activé !\n\nEmail: ${user.email}\nMot de passe: (celui que vous avez choisi)\n\nVous pouvez maintenant vous connecter sur notre plateforme.\n\nCordialement,\nL'équipe NeTubeX`;
    openModal('replyModal');
};

window.sendAndActivate = async () => {
    if(!selectedUserId) return;
    const message = document.getElementById('replyMessage').value;
    const user = allUsers.find(u => u.id === selectedUserId);
    if(!user) return;
    
    // Simuler l'envoi (dans la réalité, ça ouvre WhatsApp/Gmail)
    if(user.moyenContact === 'whatsapp') {
        const whatsappUrl = `https://wa.me/${user.contactValue.replace(/[^0-9]/g, '')}?text=${encodeURIComponent(message)}`;
        window.open(whatsappUrl, '_blank');
    } else {
        const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${user.contactValue}&su=Activation%20compte%20NeTubeX&body=${encodeURIComponent(message)}`;
        window.open(gmailUrl, '_blank');
    }
    
    // Activer le compte
    const userRef = doc(db, "users", selectedUserId);
    await updateDoc(userRef, { isActive: true });
    showToast(`Compte de ${user.nom} activé !`);
    closeModal('replyModal');
    await loadData();
};

window.deleteUser = async (userId) => {
    if(!confirm("Supprimer définitivement cet utilisateur ?")) return;
    const userRef = doc(db, "users", userId);
    await updateDoc(userRef, { isActive: false, isBlocked: true });
    showToast("Utilisateur désactivé");
    await loadData();
};

window.switchTab = (tab) => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(`${tab}Tab`).classList.add('active');
};

function escapeHtml(text) {
    if(!text) return '';
    return String(text).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
}

document.getElementById('logoutBtn')?.addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = "index.html";
});

loadData();
</script>
</body>
</html>
