<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Missions rémunérées internet | NeTubeX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}body{background:radial-gradient(circle at 10% 30%,#0e101a,#07090e);font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#f0f4fe;padding:32px 20px;line-height:1.5;min-height:100vh;display:flex;justify-content:center;align-items:center}.container{max-width:720px;width:100%;margin:0 auto;animation:slideGlow 0.5s ease}@keyframes slideGlow{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}h1{font-size:2.2rem;font-weight:800;background:linear-gradient(125deg,#3b82f6,#e879f9);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:1.4rem;letter-spacing:-0.3px;line-height:1.2}.card{background:rgba(24,28,44,0.7);backdrop-filter:blur(4px);border-radius:40px;padding:30px 34px;border:1px solid rgba(59,130,246,0.35);box-shadow:0 28px 48px -20px rgba(0,0,0,0.7);transition:all 0.28s ease}.card:hover{transform:translateY(-3px);border-color:rgba(96,165,250,0.6);background:rgba(32,38,58,0.85)}p{font-size:1.08rem;margin-bottom:28px;color:#ecf2ff;font-weight:430;line-height:1.55;padding-right:6px}ul{margin:8px 0 0 0;list-style:none}li{margin-bottom:16px;position:relative;padding-left:36px;font-size:1.02rem;color:#dfeaff;font-weight:450}li::before{content:"✨";position:absolute;left:0;color:#e879f9;font-size:1.1rem;top:-1px}.badge-mission{background:rgba(59,130,246,0.18);border-radius:40px;padding:4px 16px;font-size:0.7rem;display:inline-block;margin-bottom:20px;color:#b9d0ff;letter-spacing:0.3px}@media (max-width:550px){body{padding:18px 14px}h1{font-size:1.85rem}.card{padding:22px 24px}li{padding-left:32px;font-size:0.95rem}p{font-size:1rem;margin-bottom:22px}}
</style>
</head>
<body>
<div class="container">
<h1>Missions rémunérées internet</h1>
<div class="card">
<p>Les missions en ligne permettent de gagner de l'argent en effectuant des actions simples sur Internet.</p>
<ul>
<li>Visionnage de contenu</li>
<li>Tests d'applications</li>
<li>Validation de données</li>
</ul>
</div>
</div>
<script>
(function(){
    // Blocage clic droit (contextmenu)
    document.addEventListener('contextmenu',function(e){
        e.preventDefault();
        return false;
    });
    // Blocage complet des raccourcis dangereux (devtools, source, sauvegarde, etc.)
    document.addEventListener('keydown',function(e){
        // F12
        if(e.key==='F12'){e.preventDefault();return false;}
        // Ctrl+Shift+I / J / C (inspecteur / console)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='J'||e.key==='j')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='C'||e.key==='c')){e.preventDefault();return false;}
        // Ctrl+U (source)
        if(e.ctrlKey&&(e.key==='U'||e.key==='u')){e.preventDefault();return false;}
        // Ctrl+S (sauvegarde)
        if(e.ctrlKey&&(e.key==='S'||e.key==='s')){e.preventDefault();return false;}
        // Ctrl+P (impression)
        if(e.ctrlKey&&(e.key==='P'||e.key==='p')){e.preventDefault();return false;}
        // Ctrl+R / Ctrl+Shift+R (rechargement)
        if(e.ctrlKey&&(e.key==='R'||e.key==='r')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='R'||e.key==='r')){e.preventDefault();return false;}
        // Ctrl+F (recherche)
        if(e.ctrlKey&&(e.key==='F'||e.key==='f')){e.preventDefault();return false;}
        // Ctrl+H (historique)
        if(e.ctrlKey&&(e.key==='H'||e.key==='h')){e.preventDefault();return false;}
        // Ctrl+Shift+N (fenêtre privée)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='N'||e.key==='n')){e.preventDefault();return false;}
        // Ctrl+Shift+P (fenêtre privée Firefox)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='P'||e.key==='p')){e.preventDefault();return false;}
        // Ctrl+Shift+K (console Firefox)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='K'||e.key==='k')){e.preventDefault();return false;}
        // Ctrl+Shift+Delete (effacer données navigation)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='Delete'||e.key==='DEL')){e.preventDefault();return false;}
        // Touche Menu contextuel (clavier)
        if(e.key==='ContextMenu'||(e.shiftKey&&e.key==='F10')){e.preventDefault();return false;}
        // PrintScreen (impr écran)
        if(e.key==='PrintScreen'){e.preventDefault();return false;}
        // Ctrl+E (recherche barre)
        if(e.ctrlKey&&(e.key==='E'||e.key==='e')){e.preventDefault();return false;}
        // Ctrl+W / Ctrl+Shift+W (fermer onglet)
        if(e.ctrlKey&&(e.key==='W'||e.key==='w')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='W'||e.key==='w')){e.preventDefault();return false;}
        // Ctrl+O (ouvrir fichier)
        if(e.ctrlKey&&(e.key==='O'||e.key==='o')){e.preventDefault();return false;}
        // Protection Mac spécifique
        if(e.metaKey&&(e.key==='U'||e.key==='u')){e.preventDefault();return false;}
        if(e.metaKey&&(e.key==='S'||e.key==='s')){e.preventDefault();return false;}
        if(e.metaKey&&e.altKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        if(e.metaKey&&e.shiftKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        // Ctrl+Shift+E / L (divers raccourcis)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='E'||e.key==='e')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='L'||e.key==='l')){e.preventDefault();return false;}
    });
    // Désactiver glisser-déposer
    document.querySelectorAll('div, p, li, h1, ul').forEach(el=>{
        el.addEventListener('dragstart',(e)=>e.preventDefault());
    });
    // Désactiver sélection de texte (renfort JS)
    document.addEventListener('selectstart',(e)=>e.preventDefault());
    // Désactiver copier / couper
    document.addEventListener('copy',(e)=>{e.preventDefault();return false;});
    document.addEventListener('cut',(e)=>{e.preventDefault();return false;});
    // Anti-debugging discret (détection console ouverte)
    let antiDebug = setInterval(function(){
        const startPerf = performance.now();
        debugger;
        const durationDiff = performance.now()-startPerf;
        if(durationDiff>8){
            if(window.console && console.clear) console.clear();
        }
    }, 2800);
    // Protection post-chargement sur la card et body
    window.addEventListener('load',function(){
        let allElements = document.querySelectorAll('.card, h1, body');
        allElements.forEach(el=>{
            el.addEventListener('contextmenu',(e)=>e.preventDefault());
        });
        document.body.addEventListener('contextmenu',(e)=>e.preventDefault());
        // Désactiver également la sélection via double-clic
        document.body.addEventListener('dblclick',(e)=>e.preventDefault());
    });
})();
</script>
</body>
</html>
