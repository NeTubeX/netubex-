<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test Envoi PDF Firebase</title>
<script type="module">
  // Firebase SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-storage.js";

  // Config Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
    storageBucket: "netubexmoney.appspot.com",
    messagingSenderId: "856592608176",
    appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
  };

  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);

  window.sendPDF = async () => {
    const status = document.getElementById("status");
    status.innerText = "📤 Début envoi...";

    // Création d'un PDF test
    const blob = new Blob(["Ceci est un PDF test NetubeX"], { type: "application/pdf" });
    const fileName = "test_netubex.pdf";
    const storageRef = ref(storage, `pdf_reports/${fileName}`);

    try {
      // Upload
      await uploadBytes(storageRef, blob);

      // Récupérer URL
      const url = await getDownloadURL(storageRef);
      status.innerHTML = `✅ PDF envoyé avec succès ! <br> URL : <a href="${url}" target="_blank">${url}</a>`;
    } catch (error) {
      console.error(error);
      status.innerText = `❌ Erreur lors de l'envoi : ${error.message}`;
    }
  };
</script>
</head>
<body>
<h1>Test Envoi PDF Firebase</h1>
<button onclick="sendPDF()">Envoyer PDF</button>
<p id="status"></p>
</body>
</html>
