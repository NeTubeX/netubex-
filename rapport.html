<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NeTubeX - Envoi Rapport</title>

<!-- Firebase (VERSION COMPAT) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#0a1a2f;
  color:white;
  text-align:center;
  padding:40px;
}
input{
  padding:12px;
  border-radius:30px;
  border:none;
  width:250px;
  margin-top:20px;
}
button{
  margin-top:20px;
  padding:14px 25px;
  border:none;
  border-radius:30px;
  background:#facc15;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>📡 NeTubeX - Envoi Rapport</h2>

<input type="text" id="name" placeholder="Nom du pilote">
<br>

<button onclick="sendPDF()">📤 Générer & Envoyer</button>

<script>
// 🔥 CONFIG FIREBASE (CORRIGÉE)
const firebaseConfig = {
  apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
  authDomain: "netubexmoney.firebaseapp.com",
  projectId: "netubexmoney",
  storageBucket: "netubexmoney.appspot.com", // ✅ CORRIGÉ ICI
  messagingSenderId: "856592608176",
  appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};

// Initialisation
firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();
const db = firebase.firestore();

// 🚀 FONCTION PRINCIPALE
async function sendPDF(){
  alert("🚀 Début envoi...");

  try{
    console.log("Début");

    const name = document.getElementById("name").value || "Pilote Test";

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // 📄 CONTENU PDF
    doc.setFontSize(18);
    doc.text("RAPPORT NETUBEX", 20, 20);

    doc.setFontSize(12);
    doc.text("Pilote : " + name, 20, 40);
    doc.text("Date : " + new Date().toLocaleString(), 20, 50);

    console.log("PDF créé");

    // 🔥 CONVERSION BLOB
    const pdfBlob = doc.output("blob");

    const fileName = "rapport_" + Date.now() + ".pdf";

    // 🔥 UPLOAD
    const storageRef = storage.ref("rapports/" + fileName);
    await storageRef.put(pdfBlob);

    console.log("Upload OK");

    // 🔥 URL
    const url = await storageRef.getDownloadURL();

    console.log("URL:", url);

    // 🔥 FIRESTORE
    await db.collection("rapports").add({
      pilote: name,
      url: url,
      date: new Date()
    });

    alert("✅ Rapport envoyé avec succès !");

  }catch(e){
    console.error(e);
    alert("❌ Erreur : " + e.message);
  }
}
</script>

</body>
</html>
