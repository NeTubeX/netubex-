<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test PDF Firebase</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <h1>Test PDF Firebase</h1>
  <label for="name">Nom du pilote :</label>
  <input type="text" id="name" placeholder="Ex: Flori Ngenda"><br><br>
  <button onclick="sendPDF()">Début envoi</button>

  <script>
    // 🔹 Config Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
      authDomain: "netubexmoney.firebaseapp.com",
      projectId: "netubexmoney",
      storageBucket: "netubexmoney.appspot.com",
      messagingSenderId: "856592608176",
      appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
    };

    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();
    const db = firebase.firestore();

    // 🔹 Fonction pour envoyer le PDF
    async function sendPDF() {
      alert("🚀 Début envoi...");

      try {
        console.log("1. Fonction lancée");

        const name = document.getElementById("name").value || "Test";

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.text(`Rapport pilote : ${name}`, 20, 20);
        doc.text("Ceci est un test PDF", 20, 30);

        console.log("2. PDF créé");

        const pdfBlob = doc.output("blob");

        console.log("3. Blob OK");

        const storageRef = storage.ref(`rapports/${name}_test.pdf`);

        console.log("4. Avant upload");

        await storageRef.put(pdfBlob);

        console.log("5. Upload OK");

        const url = await storageRef.getDownloadURL();

        console.log("6. URL OK", url);

        await db.collection("rapports").add({
          pilote: name,
          url: url,
          date: new Date()
        });

        console.log("7. Firestore OK");

        alert("✅ Terminé. PDF disponible ici : " + url);

      } catch (e) {
        console.error("ERREUR:", e);
        alert("❌ Erreur: " + e.message);
      }
    }
  </script>
</body>
</html>
