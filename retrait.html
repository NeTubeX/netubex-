<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeTubeX · Administration Retraits</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0a0f1a;color:#e2e8f0;min-height:100vh;}

/* Login */
.login-container{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0f1a,#0f1724);}
.login-card{background:#111827;border-radius:24px;padding:40px;width:100%;max-width:400px;border:1px solid #1e293b;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);}
.login-card h2{font-size:24px;font-weight:700;color:#f59e0b;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.login-card p{color:#64748b;font-size:13px;margin-bottom:30px;}
.login-card input{width:100%;padding:14px 16px;background:#1e293b;border:1px solid #334155;border-radius:12px;color:#fff;font-size:14px;margin-bottom:16px;outline:none;transition:0.2s;}
.login-card input:focus{border-color:#f59e0b;}
.login-card button{width:100%;padding:14px;background:#f59e0b;border:none;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;transition:0.2s;color:#0a0f1a;}
.login-card button:hover{background:#d97706;}
.login-card button:disabled{opacity:0.6;cursor:not-allowed;}
.error-msg{background:rgba(239,68,68,0.15);border:1px solid #ef4444;padding:12px;border-radius:10px;font-size:12px;margin-bottom:16px;display:none;}

/* Dashboard Admin (caché par défaut) */
.admin-container{display:none;max-width:1400px;margin:0 auto;padding:20px;}
.header{display:flex;justify-content:space-between;align-items:center;padding:0 0 20px 0;margin-bottom:20px;border-bottom:2px solid #1e293b;}
.header h1{font-size:20px;font-weight:700;color:#f59e0b;display:flex;align-items:center;gap:10px;}
.header-right{display:flex;gap:12px;}
.btn-icon{background:#1e293b;border:none;padding:8px 16px;border-radius:40px;cursor:pointer;color:#e2e8f0;font-size:13px;display:flex;align-items:center;gap:8px;transition:0.2s;}
.btn-icon:hover{background:#334155;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px;}
.stat-card{background:#111827;border-radius:20px;padding:20px;border:1px solid #1e293b;}
.stat-card .value{font-size:28px;font-weight:800;color:#f59e0b;}
.stat-card .label{font-size:12px;color:#94a3b8;margin-top:8px;display:flex;align-items:center;gap:6px;}
.filters{display:flex;gap:15px;margin-bottom:25px;flex-wrap:wrap;}
.search-input{padding:10px 16px;border-radius:40px;border:1px solid #1e293b;background:#111827;color:#e2e8f0;min-width:260px;outline:none;font-size:13px;}
.search-input:focus{border-color:#f59e0b;}
.filter-select{padding:10px 16px;border-radius:40px;border:1px solid #1e293b;background:#111827;color:#e2e8f0;cursor:pointer;font-size:13px;}
.export-btn{background:#10b981;border:none;padding:10px 20px;border-radius:40px;cursor:pointer;color:#fff;font-weight:600;display:flex;align-items:center;gap:8px;font-size:13px;}
.export-btn:hover{background:#059669;}
.table-wrapper{background:#111827;border-radius:20px;overflow-x:auto;border:1px solid #1e293b;}
table{width:100%;border-collapse:collapse;min-width:900px;}
th{text-align:left;padding:14px 16px;font-size:12px;font-weight:700;color:#94a3b8;border-bottom:2px solid #f59e0b;background:#0f1420;}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid #1e293b;}
tr:hover td{background:#1a2332;}
.badge{padding:4px 12px;border-radius:20px;font-weight:600;font-size:11px;display:inline-block;}
.badge-pending{background:rgba(245,158,11,0.2);color:#f59e0b;}
.badge-approved{background:rgba(16,185,129,0.2);color:#10b981;}
.badge-rejected{background:rgba(239,68,68,0.2);color:#ef4444;}
.action-btn{padding:6px 14px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;border:none;margin:0 4px;}
.btn-approve{background:#10b981;color:#fff;}
.btn-approve:hover{background:#059669;}
.btn-reject{background:#f59e0b;color:#fff;}
.btn-reject:hover{background:#d97706;}
.btn-delete{background:#ef4444;color:#fff;}
.btn-delete:hover{background:#dc2626;}
.footer{text-align:center;padding:20px;color:#64748b;font-size:11px;margin-top:30px;border-top:1px solid #1e293b;}
.toast-container{position:fixed;top:80px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:12px;min-width:300px;}
.toast{background:#111827;border-radius:12px;padding:14px 18px;border-left:4px solid;display:flex;align-items:center;gap:12px;animation:slideIn 0.3s ease;}
.toast-success{border-left-color:#10b981;}
.toast-error{border-left-color:#ef4444;}
.toast-warning{border-left-color:#f59e0b;}
.toast-icon{font-size:20px;}
.toast-content{flex:1;}
.toast-title{font-weight:700;font-size:13px;margin-bottom:3px;}
.toast-message{font-size:11px;opacity:0.8;}
.toast-close{background:rgba(255,255,255,0.1);border:none;width:24px;height:24px;border-radius:12px;cursor:pointer;color:#fff;}
@keyframes slideIn{from{opacity:0;transform:translateX(50px);}to{opacity:1;transform:translateX(0);}}
</style>
</head>
<body>

<!-- Écran de login -->
<div id="loginPanel" class="login-container">
    <div class="login-card">
        <h2><i class="fas fa-shield-alt"></i> Accès admin</h2>
        <p>Authentification requise pour gérer les retraits</p>
        <div id="loginError" class="error-msg"></div>
        <input type="email" id="adminEmail" placeholder="Email administrateur">
        <input type="password" id="adminPassword" placeholder="Mot de passe">
        <button id="loginBtn">Se connecter</button>
    </div>
</div>

<!-- Panneau d'administration (caché après login) -->
<div id="adminPanel" class="admin-container">
    <div class="header">
        <h1><i class="fas fa-money-bill-wave"></i> Gestion des retraits</h1>
        <div class="header-right">
            <button class="btn-icon" id="refreshBtn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            <button class="btn-icon" id="logoutAdminBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="value" id="totalPending">0</div><div class="label"><i class="fas fa-clock"></i> En attente</div></div>
        <div class="stat-card"><div class="value" id="totalPendingAmount">0.00 $</div><div class="label"><i class="fas fa-coins"></i> Montant total en attente</div></div>
        <div class="stat-card"><div class="value" id="totalApproved">0</div><div class="label"><i class="fas fa-check-circle"></i> Approuvés</div></div>
        <div class="stat-card"><div class="value" id="totalRejected">0</div><div class="label"><i class="fas fa-times-circle"></i> Rejetés</div></div>
    </div>

    <div class="filters">
        <input type="text" id="searchInput" placeholder="🔍 Rechercher par code ou email..." class="search-input">
        <select id="statusFilter" class="filter-select">
            <option value="all">📋 Tous les statuts</option>
            <option value="pending">⏳ En attente</option>
            <option value="approved">✅ Approuvés</option>
            <option value="rejected">❌ Rejetés</option>
        </select>
        <button class="export-btn" id="exportBtn"><i class="fas fa-file-excel"></i> Exporter CSV</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr><th>Utilisateur</th><th>Montant</th><th>Méthode</th><th>Wallet</th><th>Date demande</th><th>Statut</th><th>Actions</th></tr></thead>
            <tbody id="withdrawalsBody"><tr><td colspan="7" style="text-align:center;padding:40px;">⏳ Connexion en cours...</td></tr></tbody>
        </table>
    </div>
    <div class="footer"><p><i class="fas fa-shield-alt"></i> NeTubeX - Rejet = remboursement automatique</p></div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
    storageBucket: "netubexmoney.firebasestorage.app",
    messagingSenderId: "856592608176",
    appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let withdrawalsData = [];
let currentFilter = "all";
let searchTerm = "";
let currentUser = null;

function showToast(message, type='success'){
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    const icon = type==='success'?'✅':type==='error'?'❌':'⚠️';
    const title = type==='success'?'Succès':type==='error'?'Erreur':'Attention';
    toast.innerHTML = `<div class="toast-icon">${icon}</div><div class="toast-content"><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div><button class="toast-close">✕</button>`;
    container.appendChild(toast);
    toast.querySelector('.toast-close').addEventListener('click',()=>toast.remove());
    setTimeout(()=>toast.remove(),5000);
}

function formatDate(ts){ return ts ? new Date(ts).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '-'; }
function escapeHtml(s){ return s ? String(s).replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }

async function loadWithdrawals(){
    withdrawalsData = [];
    const usersSnap = await getDocs(collection(db,"users"));
    for(const userDoc of usersSnap.docs){
        const userId = userDoc.id;
        const userEmail = userDoc.data().email;
        const userCode = userDoc.data().code || '';
        const txSnap = await getDocs(collection(db,"users",userId,"transactions"));
        txSnap.forEach(txDoc=>{
            const tx = txDoc.data();
            if(tx.type === "withdraw"){
                withdrawalsData.push({
                    id: txDoc.id, userId, userEmail, userCode,
                    amount: Math.abs(tx.amount),
                    method: tx.methodName || tx.method,
                    wallet: tx.wallet,
                    requestedAt: tx.time,
                    status: tx.status || "pending"
                });
            }
        });
    }
    withdrawalsData.sort((a,b)=>b.requestedAt - a.requestedAt);
    updateDisplay();
}

function updateDisplay(){
    let filtered = withdrawalsData.filter(w=>{
        const matchSearch = !searchTerm || (w.userCode||'').toLowerCase().includes(searchTerm) || (w.userEmail||'').toLowerCase().includes(searchTerm);
        const matchStatus = currentFilter==='all' || w.status===currentFilter;
        return matchSearch && matchStatus;
    });
    const pending = withdrawalsData.filter(w=>w.status==='pending');
    const approved = withdrawalsData.filter(w=>w.status==='approved');
    const rejected = withdrawalsData.filter(w=>w.status==='rejected');
    document.getElementById('totalPending').innerText = pending.length;
    document.getElementById('totalPendingAmount').innerText = pending.reduce((s,w)=>s+w.amount,0).toFixed(2)+' $';
    document.getElementById('totalApproved').innerText = approved.length;
    document.getElementById('totalRejected').innerText = rejected.length;
    const tbody = document.getElementById('withdrawalsBody');
    if(!filtered.length){ tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;">📭 Aucune demande</td></tr>'; return; }
    tbody.innerHTML = filtered.map(w=>{
        let badge = '', statusText = '';
        if(w.status==='pending'){ badge='badge-pending'; statusText='⏳ En attente'; }
        else if(w.status==='approved'){ badge='badge-approved'; statusText='✅ Approuvé'; }
        else{ badge='badge-rejected'; statusText='❌ Rejeté'; }
        let actions = w.status==='pending' ? 
            `<button class="action-btn btn-approve" onclick='window.approveWithdraw("${w.userId}","${w.id}")'>✅ Approuver</button>
             <button class="action-btn btn-reject" onclick='window.rejectWithdraw("${w.userId}","${w.id}",${w.amount})'>❌ Rejeter</button>` :
            `<button class="action-btn btn-delete" onclick='window.deleteRecord("${w.userId}","${w.id}")'>🗑️ Supprimer</button>`;
        return `<tr><td><strong>${escapeHtml(w.userCode||w.userEmail)}</strong></td><td style="color:#f59e0b;font-weight:700;">${w.amount.toFixed(2)} $</td><td>${escapeHtml(w.method)}</td><td><small>${escapeHtml(w.wallet)}</small></td><td>${formatDate(w.requestedAt)}</td><td><span class="badge ${badge}">${statusText}</span></td><td>${actions}</td></tr>`;
    }).join('');
}

window.approveWithdraw = async (userId, txId)=>{
    try{
        await updateDoc(doc(db,"users",userId,"transactions",txId),{status:"approved",processedAt:new Date().toISOString()});
        showToast("✅ Retrait approuvé","success");
        await loadWithdrawals();
    }catch(e){ showToast("Erreur approbation","error"); }
};

window.rejectWithdraw = async (userId, txId, amount)=>{
    if(!confirm(`⚠️ Rejeter et rembourser ${amount.toFixed(2)}$ ?`)) return;
    try{
        await updateDoc(doc(db,"users",userId,"transactions",txId),{status:"rejected",processedAt:new Date().toISOString()});
        await setDoc(doc(db,"users",userId,"transactions",`refund_${Date.now()}`),{
            amount: amount, revenue: 0, time: Date.now(), type: "refund", reason: "retrait_rejected", originalWithdrawId: txId
        });
        showToast(`⚠️ Rejeté et remboursé (${amount.toFixed(2)}$)`,`warning`);
        await loadWithdrawals();
    }catch(e){ showToast("Erreur rejet","error"); }
};

window.deleteRecord = async (userId, txId)=>{
    if(!confirm("🗑️ Supprimer définitivement ?")) return;
    try{
        await deleteDoc(doc(db,"users",userId,"transactions",txId));
        showToast("Demande supprimée","success");
        await loadWithdrawals();
    }catch(e){ showToast("Erreur suppression","error"); }
};

document.getElementById('refreshBtn')?.addEventListener('click',()=>loadWithdrawals());
document.getElementById('quickRefreshBtn')?.addEventListener('click',()=>loadWithdrawals());
document.getElementById('exportBtn')?.addEventListener('click',()=>{
    let csv = "Utilisateur,Montant,Méthode,Wallet,Statut,Date\n";
    withdrawalsData.forEach(w=>{ csv += `"${w.userCode||w.userEmail}",${w.amount},"${w.method}","${w.wallet}","${w.status}","${new Date(w.requestedAt).toLocaleString()}"\n`; });
    const blob = new Blob([csv],{type:'text/csv'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `retraits_${new Date().toISOString().slice(0,19)}.csv`;
    link.click();
    showToast("Export CSV lancé","success");
});
document.getElementById('searchInput')?.addEventListener('input',(e)=>{ searchTerm = e.target.value.toLowerCase(); updateDisplay(); });
document.getElementById('statusFilter')?.addEventListener('change',(e)=>{ currentFilter = e.target.value; updateDisplay(); });

// Gestion login
const loginBtn = document.getElementById('loginBtn');
const loginPanel = document.getElementById('loginPanel');
const adminPanel = document.getElementById('adminPanel');

async function handleLogin(){
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const errorDiv = document.getElementById('loginError');
    if(!email || !password){ errorDiv.style.display='block'; errorDiv.innerText='Email et mot de passe requis'; return; }
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
    try{
        const userCred = await signInWithEmailAndPassword(auth, email, password);
        currentUser = userCred.user;
        errorDiv.style.display='none';
        loginPanel.style.display='none';
        adminPanel.style.display='block';
        await loadWithdrawals();
        showToast(`Bonjour ${email.split('@')[0]}`,`success`);
    }catch(e){
        errorDiv.style.display='block';
        errorDiv.innerText = e.code==='auth/invalid-credential' ? 'Email ou mot de passe incorrect' : 'Erreur de connexion';
        showToast("Échec connexion","error");
    }finally{
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Se connecter';
    }
}

loginBtn?.addEventListener('click', handleLogin);
document.getElementById('adminPassword')?.addEventListener('keypress', (e)=>{ if(e.key==='Enter') handleLogin(); });

document.getElementById('logoutAdminBtn')?.addEventListener('click', async()=>{
    await signOut(auth);
    currentUser = null;
    loginPanel.style.display='flex';
    adminPanel.style.display='none';
    document.getElementById('adminEmail').value = '';
    document.getElementById('adminPassword').value = '';
    showToast("Déconnecté","info");
});

onAuthStateChanged(auth, async(user)=>{
    if(user){
        currentUser = user;
        loginPanel.style.display='none';
        adminPanel.style.display='block';
        await loadWithdrawals();
    }else{
        loginPanel.style.display='flex';
        adminPanel.style.display='none';
    }
});

document.getElementById('adminEmail')?.addEventListener('keypress', (e)=>{ if(e.key==='Enter') document.getElementById('adminPassword').focus(); });
document.getElementById('adminPassword')?.addEventListener('keypress', (e)=>{ if(e.key==='Enter') handleLogin(); });
</script>
</body>
</html>
