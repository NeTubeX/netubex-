<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeTubeX · Retraits Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0a0f1a;color:#e2e8f0;padding:16px;}
.card{background:#111827;border-radius:20px;padding:20px;margin-bottom:16px;border:1px solid #1e293b;}
.card h2{font-size:18px;color:#f59e0b;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card p{margin-bottom:8px;font-size:13px;color:#94a3b8;word-break:break-all;}
input,button{width:100%;padding:14px;border-radius:14px;border:none;font-size:14px;margin-bottom:12px;}
input{background:#1e293b;border:1px solid #334155;color:#fff;}
button{background:#f59e0b;color:#0a0f1a;font-weight:700;cursor:pointer;}
button:active{opacity:0.8;}
.btn-test{background:#3b82f6;color:#fff;}
.btn-logout{background:#ef4444;color:#fff;margin-top:20px;}
pre{background:#0a0f1a;padding:12px;border-radius:12px;font-size:11px;overflow-x:auto;margin-top:12px;border:1px solid #1e293b;color:#10b981;}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;display:inline-block;}
.badge-pending{background:rgba(245,158,11,0.2);color:#f59e0b;}
.badge-approved{background:rgba(16,185,129,0.2);color:#10b981;}
.badge-rejected{background:rgba(239,68,68,0.2);color:#ef4444;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{padding:10px 8px;text-align:left;border-bottom:1px solid #1e293b;}
.toast{position:fixed;bottom:20px;left:16px;right:16px;background:#111827;border-left:4px solid #10b981;padding:12px;border-radius:12px;font-size:12px;text-align:center;z-index:1000;}
</style>
</head>
<body>

<div id="loginSection" class="card">
    <h2><i class="fas fa-shield-alt"></i> Accès admin</h2>
    <input type="email" id="adminEmail" placeholder="Email admin" autocomplete="off">
    <input type="password" id="adminPassword" placeholder="Mot de passe">
    <button id="loginBtn">Se connecter</button>
</div>

<div id="adminSection" style="display:none;">
    <div class="card">
        <h2><i class="fas fa-money-bill-wave"></i> Gestion des retraits</h2>
        <p><strong>⚠️ Important :</strong> Clique sur <strong>"TEST FIREBASE"</strong> pour voir ce que la base retourne</p>
        <button class="btn-test" id="testBtn"><i class="fas fa-database"></i> TEST FIREBASE (affiche les données)</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
            <span>📊 En attente: <strong id="pendingCount">0</strong></span>
            <span>💰 Montant: <strong id="pendingAmount">0$</strong></span>
        </div>
        <input type="text" id="searchInput" placeholder="🔍 Rechercher...">
        <select id="statusFilter" style="width:100%; padding:12px; background:#1e293b; border-radius:12px; color:#fff; margin-bottom:12px;">
            <option value="all">Tous</option>
            <option value="pending">En attente</option>
            <option value="approved">Approuvés</option>
            <option value="rejected">Rejetés</option>
        </select>
        <div style="overflow-x:auto;">
            <table id="withdrawalsTable">
                <thead><tr><th>User</th><th>Montant</th><th>Méthode</th><th>Statut</th><th>Actions</th></tr></thead>
                <tbody id="withdrawalsBody"><tr><td colspan="5" style="text-align:center;">🔐 Connectez-vous d'abord</td></tr></tbody>
            </table>
        </div>
        <button id="refreshBtn" style="margin-top:16px;"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
        <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
    </div>
</div>

<div id="toast" style="display:none;" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
    storageBucket: "netubexmoney.firebasestorage.app",
    messagingSenderId: "856592608176",
    appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let withdrawalsData = [];
let currentFilter = "all";
let searchTerm = "";

function showToast(msg, isError=false){
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    toast.style.borderLeftColor = isError ? '#ef4444' : '#10b981';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    setTimeout(()=>{ toast.style.display = 'none'; }, 4000);
}

async function testFirebase(){
    showToast("🔍 Test en cours...");
    let result = "=== RÉSULTAT TEST ===\n\n";
    
    try {
        const usersSnap = await getDocs(collection(db, "users"));
        result += `📁 Collection users: ${usersSnap.size} utilisateurs\n\n`;
        
        let totalWithdraws = 0;
        
        for(const userDoc of usersSnap.docs){
            const userId = userDoc.id;
            const userEmail = userDoc.data().email;
            const userCode = userDoc.data().code || 'no-code';
            
            try {
                const txSnap = await getDocs(collection(db, "users", userId, "transactions"));
                let userWithdraws = 0;
                
                txSnap.forEach(txDoc => {
                    const tx = txDoc.data();
                    if(tx.type === "withdraw"){
                        userWithdraws++;
                        totalWithdraws++;
                    }
                });
                
                result += `👤 ${userCode} (${userEmail})\n`;
                result += `   └─ Transactions: ${txSnap.size} | Retraits: ${userWithdraws}\n`;
                
                if(userWithdraws > 0){
                    const firstTx = await getDocs(collection(db, "users", userId, "transactions"));
                    firstTx.forEach(txDoc => {
                        const tx = txDoc.data();
                        if(tx.type === "withdraw"){
                            result += `      💰 ${Math.abs(tx.amount)}$ - ${tx.methodName || tx.method} - ${tx.wallet}\n`;
                            result += `      📅 ${new Date(tx.time).toLocaleString()}\n`;
                            result += `      📌 status: ${tx.status || 'pending'}\n`;
                        }
                    });
                }
                result += "\n";
                
            } catch(e) {
                result += `❌ Erreur accès transactions pour ${userId}: ${e.message}\n\n`;
            }
        }
        
        result += `\n=== TOTAL RETRAITS TROUVÉS: ${totalWithdraws} ===\n`;
        
        if(totalWithdraws === 0){
            result += "\n⚠️ AUCUN RETRAIT TROUVÉ !\n";
            result += "Vérifie que:\n";
            result += "1. Les transactions ont type = 'withdraw'\n";
            result += "2. L'admin a les droits de lecture\n";
        }
        
        alert(result);
        
    } catch(e){
        alert("❌ ERREUR: " + e.message);
        console.error(e);
    }
}

async function loadWithdrawals(){
    withdrawalsData = [];
    const usersSnap = await getDocs(collection(db, "users"));
    
    for(const userDoc of usersSnap.docs){
        const userId = userDoc.id;
        const userEmail = userDoc.data().email;
        const userCode = userDoc.data().code || '';
        
        try {
            const txSnap = await getDocs(collection(db, "users", userId, "transactions"));
            txSnap.forEach(txDoc => {
                const tx = txDoc.data();
                if(tx.type === "withdraw"){
                    withdrawalsData.push({
                        id: txDoc.id,
                        userId: userId,
                        userEmail: userEmail,
                        userCode: userCode,
                        amount: Math.abs(tx.amount),
                        method: tx.methodName || tx.method,
                        wallet: tx.wallet,
                        requestedAt: tx.time,
                        status: tx.status || "pending"
                    });
                }
            });
        } catch(e) {
            console.error("Erreur accès:", e.message);
        }
    }
    
    withdrawalsData.sort((a,b)=>b.requestedAt - a.requestedAt);
    updateDisplay();
}

function updateDisplay(){
    let filtered = withdrawalsData.filter(w=>{
        const matchSearch = !searchTerm || (w.userCode||'').toLowerCase().includes(searchTerm) || (w.userEmail||'').toLowerCase().includes(searchTerm);
        const matchStatus = currentFilter==='all' || w.status===currentFilter;
        return matchSearch && matchStatus;
    });
    
    const pending = withdrawalsData.filter(w=>w.status==='pending');
    const pendingAmount = pending.reduce((s,w)=>s+w.amount,0);
    document.getElementById('pendingCount').innerText = pending.length;
    document.getElementById('pendingAmount').innerText = pendingAmount.toFixed(2) + '$';
    
    const tbody = document.getElementById('withdrawalsBody');
    if(filtered.length===0){
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">📭 Aucune demande</td></tr>';
        return;
    }
    
    tbody.innerHTML = filtered.map(w=>{
        let badgeClass = w.status==='pending' ? 'badge-pending' : (w.status==='approved' ? 'badge-approved' : 'badge-rejected');
        let badgeText = w.status==='pending' ? '⏳ En attente' : (w.status==='approved' ? '✅ Approuvé' : '❌ Rejeté');
        let actions = w.status==='pending' ? 
            `<button class="approve-btn" data-user="${w.userId}" data-tx="${w.id}" style="background:#10b981; color:#fff; border:none; padding:4px 10px; border-radius:8px; margin-right:6px;">✅</button>
             <button class="reject-btn" data-user="${w.userId}" data-tx="${w.id}" data-amount="${w.amount}" style="background:#f59e0b; color:#fff; border:none; padding:4px 10px; border-radius:8px;">❌</button>` :
            `<button class="delete-btn" data-user="${w.userId}" data-tx="${w.id}" style="background:#ef4444; color:#fff; border:none; padding:4px 10px; border-radius:8px;">🗑️</button>`;
        return `<tr><td><strong>${escapeHtml(w.userCode||w.userEmail)}</strong></td><td style="color:#f59e0b;">${w.amount.toFixed(2)}$</td><td>${escapeHtml(w.method)}</td><td><span class="badge ${badgeClass}">${badgeText}</span></td><td>${actions}</td></tr>`;
    }).join('');
    
    document.querySelectorAll('.approve-btn').forEach(btn=>{
        btn.addEventListener('click',()=>approveWithdraw(btn.dataset.user, btn.dataset.tx));
    });
    document.querySelectorAll('.reject-btn').forEach(btn=>{
        btn.addEventListener('click',()=>rejectWithdraw(btn.dataset.user, btn.dataset.tx, parseFloat(btn.dataset.amount)));
    });
    document.querySelectorAll('.delete-btn').forEach(btn=>{
        btn.addEventListener('click',()=>deleteRecord(btn.dataset.user, btn.dataset.tx));
    });
}

async function approveWithdraw(userId, txId){
    try{
        await updateDoc(doc(db, "users", userId, "transactions", txId), {status:"approved", processedAt:new Date().toISOString()});
        showToast("✅ Retrait approuvé");
        await loadWithdrawals();
    }catch(e){ showToast("❌ Erreur", true); }
}

async function rejectWithdraw(userId, txId, amount){
    if(!confirm(`Rejeter et rembourser ${amount.toFixed(2)}$ ?`)) return;
    try{
        await updateDoc(doc(db, "users", userId, "transactions", txId), {status:"rejected", processedAt:new Date().toISOString()});
        await setDoc(doc(db, "users", userId, "transactions", `refund_${Date.now()}`), {
            amount: amount, revenue: 0, time: Date.now(), type: "refund", reason: "retrait_rejected"
        });
        showToast(`⚠️ Rejeté + remboursé ${amount.toFixed(2)}$`);
        await loadWithdrawals();
    }catch(e){ showToast("❌ Erreur rejet", true); }
}

async function deleteRecord(userId, txId){
    if(!confirm("Supprimer définitivement ?")) return;
    try{
        await deleteDoc(doc(db, "users", userId, "transactions", txId));
        showToast("🗑️ Supprimé");
        await loadWithdrawals();
    }catch(e){ showToast("❌ Erreur", true); }
}

function escapeHtml(s){ return s ? String(s).replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }

// LOGIN
const loginSection = document.getElementById('loginSection');
const adminSection = document.getElementById('adminSection');

document.getElementById('loginBtn').addEventListener('click', async()=>{
    const email = document.getElementById('adminEmail').value.trim();
    const pwd = document.getElementById('adminPassword').value;
    if(!email || !pwd){ showToast("Email et mot de passe requis", true); return; }
    try{
        await signInWithEmailAndPassword(auth, email, pwd);
        loginSection.style.display = 'none';
        adminSection.style.display = 'block';
        await loadWithdrawals();
        showToast(`Connecté : ${email.split('@')[0]}`);
    }catch(e){ showToast("Identifiants incorrects", true); }
});

document.getElementById('logoutBtn').addEventListener('click', async()=>{
    await signOut(auth);
    loginSection.style.display = 'block';
    adminSection.style.display = 'none';
    document.getElementById('adminEmail').value = '';
    document.getElementById('adminPassword').value = '';
});

document.getElementById('refreshBtn').addEventListener('click', ()=>loadWithdrawals());
document.getElementById('testBtn').addEventListener('click', ()=>testFirebase());
document.getElementById('searchInput').addEventListener('input', (e)=>{ searchTerm = e.target.value.toLowerCase(); updateDisplay(); });
document.getElementById('statusFilter').addEventListener('change', (e)=>{ currentFilter = e.target.value; updateDisplay(); });

onAuthStateChanged(auth, async(user)=>{
    if(user){
        loginSection.style.display = 'none';
        adminSection.style.display = 'block';
        await loadWithdrawals();
    }else{
        loginSection.style.display = 'block';
        adminSection.style.display = 'none';
    }
});
</script>
</body>
</html>
