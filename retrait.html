function escapeHtml(str){ if(!str) return ''; return String(str).replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
function sortWithdrawals(){
if(sortDescending){
withdrawals.sort((a,b)=>new Date(b.date) - new Date(a.date));
}else{
withdrawals.sort((a,b)=>new Date(a.date) - new Date(b.date));
}

async function loadWithdrawals(){
withdrawals = [];
try{
const snapshot = await getDocs(collection(db, "withdraw"));
const tempWithdrawals = [];
const promises = [];
for(const docSnap of snapshot.docs){
const d = docSnap.data();
const w = {
id: docSnap.id,
userId: d.userId,
userEmail: null,
userCode: d.userCode,
amount: Math.abs(d.amount || 0),
method: d.methodName || d.method,
wallet: d.wallet,
date: d.date,
status: d.status || "pending"
};
tempWithdrawals.push(w);
promises.push(getUserEmail(d.userId).then(email => { w.userEmail = email; }));
}
await Promise.all(promises);
withdrawals = tempWithdrawals;
sortWithdrawals();
renderList();
updateStats();
showToast(`${withdrawals.length} retrait(s)`,"success");
}catch(e){ console.error(e); showToast("Erreur chargement","error"); }
}
function renderList(){
let filtered = withdrawals.filter(w=>{
const matchSearch = !searchTerm || (w.userCode||'').toLowerCase().includes(searchTerm) || (w.userEmail||'').toLowerCase().includes(searchTerm) || (w.userId||'').toLowerCase().includes(searchTerm);
const matchStatus = currentFilter==='all' || w.status===currentFilter;
return matchSearch && matchStatus;
});
const container = document.getElementById('withdrawList');
if(filtered.length===0){ container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><br>Aucune demande</div>`; return; }
container.innerHTML = filtered.map(w=>{
let badgeClass='', badgeText='';
if(w.status==='pending'){ badgeClass='badge-pending'; badgeText='⏳ En attente'; }
else if(w.status==='approved'){ badgeClass='badge-approved'; badgeText='✅ Approuvé'; }
else{ badgeClass='badge-rejected'; badgeText='❌ Rejeté'; }
let actions = '';
if(w.status==='pending'){
actions = `<button class="btn-action btn-approve" data-id="${w.id}"><i class="fas fa-check"></i> OK</button><button class="btn-action btn-reject" data-id="${w.id}" data-amount="${w.amount}"><i class="fas fa-times"></i> Rejeter</button>`;
}else{
actions = `<button class="btn-action btn-delete" data-id="${w.id}"><i class="fas fa-trash-alt"></i> Supprimer</button>`;
}
const country = getCountryInfo(w.wallet);
return `<div class="withdraw-card">
<div class="row"><span class="label"><i class="fas fa-user-circle"></i> CODE</span><span class="value user-code">${escapeHtml(w.userCode||'—')}</span></div>
<div class="row"><span class="label"><i class="fas fa-envelope"></i> EMAIL</span><span class="value" style="font-size:12px;">${escapeHtml(w.userEmail||'—')}</span></div>
<div class="row"><span class="label"><i class="fas fa-fingerprint"></i> USER ID</span><span class="value user-id">${escapeHtml(w.userId||'—')}</span></div>
<div class="row"><span class="label"><i class="fas fa-globe"></i> PAYS</span><span class="value">${country.flag} ${escapeHtml(country.name)}</span></div>
<div class="row"><span class="label"><i class="fas fa-coins"></i> MONTANT</span><span class="value amount">${w.amount.toFixed(2)} $</span></div>
<div class="row"><span class="label"><i class="fas fa-credit-card"></i> MÉTHODE</span><span class="value">${escapeHtml(w.method)}</span></div>
<div class="row"><span class="label"><i class="fas fa-wallet"></i> WALLET</span><span class="value" style="font-size:12px;">${escapeHtml(w.wallet||'—')}</span></div>
<div class="row"><span class="label"><i class="fas fa-calendar"></i> DATE</span><span class="value">${formatDate(w.date)}</span></div>
<div class="row"><span class="label"><i class="fas fa-chart-simple"></i> STATUT</span><span class="value"><span class="badge ${badgeClass}">${badgeText}</span></span></div>
<div class="actions">${actions}</div>
</div>`;
}).join('');
document.querySelectorAll('.btn-approve').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); approveWithdraw(btn.dataset.id); }); });
document.querySelectorAll('.btn-reject').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); rejectWithdraw(btn.dataset.id, parseFloat(btn.dataset.amount)); }); });
document.querySelectorAll('.btn-delete').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); deleteWithdraw(btn.dataset.id); }); });
}
function updateStats(){
const pending = withdrawals.filter(w=>w.status==='pending');
const approved = withdrawals.filter(w=>w.status==='approved');
const rejected = withdrawals.filter(w=>w.status==='rejected');
const pendingAmount = pending.reduce((s,w)=>s+w.amount,0);
document.getElementById('statPending').innerText = pending.length;
document.getElementById('statPendingAmount').innerText = pendingAmount.toFixed(2)+'$';
document.getElementById('statApproved').innerText = approved.length;
document.getElementById('statRejected').innerText = rejected.length;
}
async function approveWithdraw(id){
try{ await updateDoc(doc(db,"withdraw",id),{status:"approved",processedAt:new Date().toISOString()}); showToast("✅ Approuvé","success"); await loadWithdrawals(); }
catch(e){ showToast("Erreur","error"); }
}
async function rejectWithdraw(id,amount){
if(!confirm(`Rejeter ${amount.toFixed(2)}$ ?`)) return;
try{ await updateDoc(doc(db,"withdraw",id),{status:"rejected",processedAt:new Date().toISOString()}); showToast(`⚠️ Rejeté`,"warning"); await loadWithdrawals(); }
catch(e){ showToast("Erreur","error"); }
}
async function deleteWithdraw(id){
if(!confirm("Supprimer définitivement ?")) return;
try{ await deleteDoc(doc(db,"withdraw",id)); showToast("Supprimé","success"); await loadWithdrawals(); }
catch(e){ showToast("Erreur","error"); }
}
function exportCSV(){
let csv = "\uFEFFCode;Email;UserId;Pays;Montant;Méthode;Wallet;Date;Statut\n";
withdrawals.forEach(w=>{
const country = getCountryInfo(w.wallet);
csv += `"${w.userCode||''}";"${w.userEmail||''}";"${w.userId||''}";"${country.name}";${w.amount};"${w.method}";"${w.wallet||''}";"${formatDate(w.date)}";"${w.status}"\n`;
});
const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
const link = document.createElement('a');
link.href = URL.createObjectURL(blob);
link.download = `retraits_${new Date().toISOString().slice(0,19)}.csv`;
link.click();
showToast("Export CSV","success");
}
function toggleSort(){
sortDescending = !sortDescending;
const btn = document.getElementById('toggleSortBtn');
if(sortDescending){
btn.innerHTML = '<i class="fas fa-arrow-down-wide-short"></i> Tri: du plus récent au plus ancien';
}else{
btn.innerHTML = '<i class="fas fa-arrow-up-wide-short"></i> Tri: du plus ancien au plus récent';
}
sortWithdrawals();
renderList();
}
document.getElementById('loginBtn').addEventListener('click', async()=>{
const email = document.getElementById('adminEmail').value.trim();
const pwd = document.getElementById('adminPassword').value;
const errorDiv = document.getElementById('loginError');
if(!email || !pwd){ errorDiv.style.display='block'; errorDiv.innerText='Email et mot de passe requis'; return; }
try{ await signInWithEmailAndPassword(auth, email, pwd); errorDiv.style.display='none'; document.getElementById('loginPanel').style.display='none'; document.getElementById('adminPanel').style.display='block'; await loadWithdrawals(); }
catch(e){ errorDiv.style.display='block'; errorDiv.innerText='Identifiants incorrects'; }
});
document.getElementById('logoutBtn').addEventListener('click', async()=>{ await signOut(auth); document.getElementById('loginPanel').style.display='flex'; document.getElementById('adminPanel').style.display='none'; document.getElementById('adminEmail').value=''; document.getElementById('adminPassword').value=''; });
document.getElementById('refreshBtn').addEventListener('click',()=>loadWithdrawals());
document.getElementById('exportBtn').addEventListener('click',()=>exportCSV());
document.getElementById('sortBtn').addEventListener('click',()=>toggleSort());
document.getElementById('toggleSortBtn').addEventListener('click',()=>toggleSort());
document.getElementById('searchInput').addEventListener('input',(e)=>{ searchTerm = e.target.value.toLowerCase(); renderList(); });
document.getElementById('statusFilter').addEventListener('change',(e)=>{ currentFilter = e.target.value; renderList(); });
onAuthStateChanged(auth, async(user)=>{ if(user){ document.getElementById('loginPanel').style.display='none'; document.getElementById('adminPanel').style.display='block'; await loadWithdrawals(); }else{ document.getElementById('loginPanel').style.display='flex'; document.getElementById('adminPanel').style.display='none'; } });
document.addEventListener('contextmenu',function(e){ e.preventDefault(); return false; });
document.addEventListener('selectstart',function(e){ e.preventDefault(); return false; });
document.addEventListener('dragstart',function(e){ e.preventDefault(); return false; });
</script>
</body>
