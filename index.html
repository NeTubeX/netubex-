<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeTubeX - Chargement</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:#0a0f1a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Inter',system-ui,sans-serif;
}
.loader{
    text-align:center;
    color:#e2e8f0;
}
.loader i{
    font-size:3rem;
    color:#f59e0b;
    animation:spin 1s linear infinite;
}
.loader p{
    margin-top:20px;
    font-size:14px;
    color:#94a3b8;
}
@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>
<body>
<div class="loader">
    <i class="fas fa-spinner"></i>
    <p>Redirection vers NeTubeX...</p>
</div>
<script>
// URL de la publicité (s'ouvre dans la page ACTUELLE)
const AD_URL = "https://eagerdazzle.com/hcp1srfr45?key=726421125bb2a42285a497d1666e6285";

// URL de la vraie page d'accueil (s'ouvre dans un NOUVEL ONGLET - APRÈS la troisième)
const HOME_URL = "https://netubex.github.io/netubex-/acceuil.html";

// URL du troisième onglet (NOUVEL ONGLET - s'ouvre en premier)
const THIRD_URL = "https://motionless-bus.com/6YFdK2";

// Exécution unique
(function() {
    // 1. Ouvrir le troisième onglet (publicité) en premier
    window.open(THIRD_URL, "_blank");
    
    // 2. Ouvrir la vraie page d'accueil dans un nouvel onglet (APRÈS)
    window.open(HOME_URL, "_blank");
    
    // 3. Rediriger la page actuelle vers la publicité principale
    setTimeout(function() {
        window.location.href = AD_URL;
    }, 50);
})();
</script>
</body>
</html>
