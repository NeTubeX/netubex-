<script>
const RAISONS_ABSENCE = [
  "Obligations familiales",
  "Maladie",
  "Absence non justifiée",
  "Déplacement / voyage",
  "Abandon",
  "Problème de santé d'un proche",
  "Fatigue ou repos",
  "Rendez-vous personnel",
  "Deuil",
  "Engagement scolaire ou professionnel"
];

// 5 NETUBERS UNIQUEMENT
const NETUBERS = [
  {code:"MA-NX-S1-ZA-01", name:"MA-NX-S1-ZA-01"},
  {code:"MA-NX-S1-ZA-02", name:"MA-NX-S1-ZA-02"},
  {code:"MA-NX-S1-ZB-03", name:"MA-NX-S1-ZB-03"},
  {code:"MA-NX-S1-ZB-04", name:"MA-NX-S1-ZB-04"},
  {code:"MA-NX-S1-ZC-05", name:"MA-NX-S1-ZC-05"}
];

let currentStep=0, responses={}, questions=[], waitingYesNo=false, typewriterTimeout=null;
let formulaireComplete = false;
let counterInterval = null;

const questionText=document.getElementById('questionText');
const questionMeta=document.getElementById('questionMeta');
const inputRow=document.getElementById('inputRow');
const choiceRow=document.getElementById('choiceRow');
const answerSelect=document.getElementById('answerSelect');
const answerNumber=document.getElementById('answerNumber');
const submitBtn=document.getElementById('submitBtn');
const yesBtn=document.getElementById('yesBtn');
const noBtn=document.getElementById('noBtn');
const progressFill=document.getElementById('progressFill');
const stepCounterSpan=document.getElementById('stepCounter');
const prevBtn=document.getElementById('prevBtn');
const resetBtn=document.getElementById('resetBtn');
const saveStatus=document.getElementById('saveStatus');
const popupOverlay=document.getElementById('popupOverlay');
const popupTitle=document.getElementById('popupTitle');
const popupMessageDiv=document.getElementById('popupMessage');
const popupBtnLeft=document.getElementById('popupBtnLeft');
const popupBtnRight=document.getElementById('popupBtnRight');
const sendReportBtn=document.getElementById('sendReportBtn');
const questionCardDiv=document.getElementById('questionCard');

function generateRaisonOptions(){
  let opts='';
  for(let r of RAISONS_ABSENCE){
    opts+=`<option value="${r}">${r}</option>`;
  }
  return opts;
}
const RAISONS_OPTIONS = generateRaisonOptions();

function generateOptions015(){
  let opts='';
  for(let i=0;i<=15;i++) opts+=`<option value="${i}">${i}</option>`;
  return opts;
}

function generateOptions030(){
  let opts='';
  for(let i=0;i<=30;i++) opts+=`<option value="${i}">${i} Go</option>`;
  return opts;
}

const OPTIONS_015=generateOptions015();
const OPTIONS_030=generateOptions030();

// FONCTION MODIFIÉE - Charge les mémorandums et leurs réponses
async function loadMemorandumsFromFirebase(){
  try{
    const memosRef = collection(window.db, "memorandums");
    const q = query(memosRef, orderBy("sentDate", "desc"), limit(20));
    const snapshot = await getDocs(q);
    const memoDiv = document.getElementById('memorandumList');
    
    if(!snapshot.empty){
      let html = '<div style="margin-bottom:15px;"><span class="badge-deo">📨 DEO → RESPONSABLE</span> <span class="badge-deo" style="background:#38bdf8;">💬 RÉPONSES DEO</span></div>';
      
      snapshot.forEach(doc=>{
        const data = doc.data();
        const isReply = data.type === 'reply' || data.isReply === true;
        const isFromDEO = data.sentBy === 'DEO_Dashboard' || data.recipient === 'DEO - Direction' || data.sentBy === 'DEO';
        
        // Pour les mémorandums envoyés par la DEO (réponses)
        if(isFromDEO || isReply) {
          html += `
            <div class="memorandum-item" style="border-left-color: #38bdf8;">
              <div class="memorandum-title">
                📨 RÉPONSE DE LA DEO 
                <span class="badge-deo" style="background:#38bdf8;">DEO</span>
              </div>
              <div class="memorandum-subtitle">📋 ${escapeHtml(data.title || 'Mémorandum')}</div>
              <div class="memorandum-date">📅 ${new Date(data.sentDate || data.date).toLocaleString('fr-FR')}</div>
              <div class="memorandum-content">${(data.content || '').replace(/\n/g,'<br>')}</div>
              ${data.reportReference ? `<div style="font-size:0.65rem; color:#7dd3fc; margin-top:8px;">📎 Réf. rapport: ${escapeHtml(data.reportReference)}</div>` : ''}
            </div>
          `;
        } 
        // Pour les mémorandums envoyés par le responsable (vers DEO)
        else {
          html += `
            <div class="memorandum-item">
              <div class="memorandum-title">
                📋 ${escapeHtml(data.title || 'Mémorandum')}
                <span class="badge-deo">RESPONSABLE → DEO</span>
              </div>
              <div class="memorandum-date">📅 ${new Date(data.sentDate || data.date).toLocaleString('fr-FR')}</div>
              <div class="memorandum-content">${(data.content || '').replace(/\n/g,'<br>')}</div>
              ${data.reportReference ? `<div style="font-size:0.65rem; color:#7dd3fc; margin-top:8px;">📎 Réf. rapport: ${escapeHtml(data.reportReference)}</div>` : ''}
            </div>
          `;
        }
      });
      
      if (snapshot.size === 0) {
        html = '<div style="text-align:center;padding:40px;font-weight:600;">📭 Aucun mémorandum ni réponse pour le moment.</div>';
      }
      
      memoDiv.innerHTML = html;
    } else {
      memoDiv.innerHTML = '<div style="text-align:center;padding:40px;font-weight:600;">📭 Aucun mémorandum ni réponse pour le moment.</div>';
    }
  } catch(e){
    console.error(e);
    document.getElementById('memorandumList').innerHTML = '<div style="text-align:center;padding:40px;font-weight:600;">⚠️ Service indisponible</div>';
  }
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function saveLocal(){
  localStorage.setItem('pgco_rapport',JSON.stringify({responses,currentStep}));
  saveStatus.innerHTML='💾 OK';
  setTimeout(()=>saveStatus.innerHTML='💾 Auto',1200);
}
function autoSave(){ saveLocal(); }

function typewriterEffect(el, text, speed=25, callback){
  if(typewriterTimeout) clearTimeout(typewriterTimeout);
  el.innerHTML='';
  let i=0;
  function type(){
    if(i<text.length){
      el.innerHTML = text.substring(0, i+1);
      i++;
      typewriterTimeout = setTimeout(type, speed);
    } else {
      if(callback) callback();
    }
  }
  type();
}

function showPopup(title, msg, leftT, rightT, onConfirm, onCancel, rightClass='primary', rightDisabled=false){
  popupTitle.textContent=title;
  popupMessageDiv.innerHTML=msg;
  popupBtnLeft.textContent=leftT;
  popupBtnRight.textContent=rightT;
  popupBtnRight.className=`popup-btn ${rightClass}`;
  if(rightDisabled) popupBtnRight.disabled = true;
  else popupBtnRight.disabled = false;
  popupOverlay.classList.add('active');
  popupBtnRight.onclick=()=>{ 
    if(popupBtnRight.disabled) return;
    popupOverlay.classList.remove('active'); 
    if(onConfirm) onConfirm(); 
  };
  popupBtnLeft.onclick=()=>{ 
    if(counterInterval) clearInterval(counterInterval);
    popupOverlay.classList.remove('active'); 
    if(onCancel) onCancel(); 
  };
}

function showCounterPopup(onConfirmFinal){
  let counter = 0;
  const msg = `<div style="text-align:center;">
    <div style="margin-bottom:10px;">🔐 VÉRIFICATION FINALE</div>
    <div style="font-size:0.85rem; margin-bottom:15px;">Veuillez confirmer l'envoi du rapport à la DEO</div>
    <div class="counter-number" id="counterValue">0</div>
    <div style="font-size:0.7rem; color:#7dd3fc;">Attendez que le compteur atteigne 10 pour confirmer</div>
  </div>`;
  
  popupTitle.textContent = "🔐 CONFIRMATION REQUISE";
  popupMessageDiv.innerHTML = msg;
  popupBtnLeft.textContent = "Annuler";
  popupBtnRight.textContent = "CONFIRMER L'ENVOI";
  popupBtnRight.className = "popup-btn primary";
  popupBtnRight.disabled = true;
  popupOverlay.classList.add('active');
  
  if(counterInterval) clearInterval(counterInterval);
  counterInterval = setInterval(() => {
    counter++;
    const counterEl = document.getElementById('counterValue');
    if(counterEl) counterEl.textContent = counter;
    if(counter >= 10) {
      clearInterval(counterInterval);
      popupBtnRight.disabled = false;
      const counterElFinal = document.getElementById('counterValue');
      if(counterElFinal) counterElFinal.style.color = "#4ade80";
    }
  }, 1000);
  
  popupBtnRight.onclick = () => {
    if(popupBtnRight.disabled) return;
    clearInterval(counterInterval);
    popupOverlay.classList.remove('active');
    if(onConfirmFinal) onConfirmFinal();
  };
  
  popupBtnLeft.onclick = () => {
    clearInterval(counterInterval);
    popupOverlay.classList.remove('active');
  };
}

function resetAllSilently(){
  responses={};
  currentStep=0;
  formulaireComplete=false;
  sendReportBtn.classList.add('hidden');
  localStorage.removeItem('pgco_rapport');
  questions=buildQuestions();
  displayCurrent();
}

function getCurrentNetuberIndex(){
  if(currentStep >= questions.length) return -1;
  const q = questions[currentStep];
  if(!q || !q.field) return -1;
  for(let i=0; i<NETUBERS.length; i++){
    if(q.field.includes(NETUBERS[i].code)){
      return i;
    }
  }
  return -1;
}

function updateCardColor(){
  const netuberIndex = getCurrentNetuberIndex();
  questionCardDiv.classList.remove('netuber-0', 'netuber-1', 'netuber-2', 'netuber-3', 'netuber-4', 'default-card');
  if(netuberIndex >= 0 && netuberIndex < NETUBERS.length){
    questionCardDiv.classList.add(`netuber-${netuberIndex}`);
  } else {
    questionCardDiv.classList.add('default-card');
  }
}

function buildQuestions(){
  const qList=[];
  let num=0;
  qList.push({num:num++, type:"choice", field:"responsable", meta:"Identification", text:"Qui remplit le rapport aujourd'hui ?", options:["Madame Ursule","Madame Chancelle"]});
  
  for(let n of NETUBERS){
    qList.push({num:num++, type:"yesno", field:`${n.code}_present`, meta:n.code, text:`${n.code} : Était-il présent aujourd'hui ?`});
    qList.push({num:num++, type:"select", field:`${n.code}_raisonAbsence`, meta:n.code, text:`${n.code} : Raison de l'absence ?`, options:RAISONS_OPTIONS, dependsOnPresent:true});
    qList.push({num:num++, type:"select", field:`${n.code}_objMensuel`, meta:n.code, text:`${n.code} : Quel est son objectif mensuel ?`, options:OPTIONS_015});
    qList.push({num:num++, type:"select", field:`${n.code}_objAtteint`, meta:n.code, text:`${n.code} : Combien d'objectifs a-t-il atteints aujourd'hui ?`, options:OPTIONS_015});
    qList.push({num:num++, type:"number", field:`${n.code}_nbNiveaux`, meta:n.code, text:`${n.code} : Quel est le nombre de niveaux/événements ou mètres ?`, min:0});
    qList.push({num:num++, type:"number", field:`${n.code}_nbNiveauxAtteints`, meta:n.code, text:`${n.code} : Combien de niveaux/événements ou mètres a-t-il atteints ?`, min:0});
    qList.push({num:num++, type:"number", field:`${n.code}_pointsPrec`, meta:n.code, text:`${n.code} : Combien de points avait-il précédemment ?`, min:0});
    qList.push({num:num++, type:"number", field:`${n.code}_pointsJour`, meta:n.code, text:`${n.code} : Combien de points a-t-il aujourd'hui ?`, min:0});
    qList.push({num:num++, type:"number", field:`${n.code}_tempsPrec`, meta:n.code, text:`${n.code} : Quel temps avait-il précédemment (en minutes) ?`, min:0});
    qList.push({num:num++, type:"number", field:`${n.code}_tempsJour`, meta:n.code, text:`${n.code} : Quel temps a-t-il aujourd'hui (en minutes) ?`, min:0});
    qList.push({num:num++, type:"select", field:`${n.code}_forfaitGo`, meta:n.code, text:`${n.code} : Combien de Go de forfait internet reste-t-il ?`, options:OPTIONS_030});
  }
  qList.push({num:num++, type:"text", field:"referenceNumber", meta:"Rapport", text:"Numéro de rapport (3 derniers chiffres personnalisables)", placeholder:"Ex: 001, 002, 025..."});
  return qList;
}

function displayCurrent(){
  updateCardColor();
  if(currentStep>=questions.length){
    formulaireComplete = true;
    sendReportBtn.classList.remove('hidden');
    let recap = "RÉCAPITULATIF DU RAPPORT\n\n";
    for(let n of NETUBERS){
      if(responses[`${n.code}_present`]==='OUI'){
        const ptsP = parseFloat(responses[`${n.code}_pointsPrec`])||0;
        const ptsJ = parseFloat(responses[`${n.code}_pointsJour`])||0;
        const forfait = responses[`${n.code}_forfaitGo`] || '0';
        recap += `▪ ${n.code} : points précédents ${ptsP}, points du jour ${ptsJ}, forfait restant ${forfait} Go.\n`;
      } else {
        const raison = responses[`${n.code}_raisonAbsence`] || "Non spécifiée";
        recap += `▪ ${n.code} : ABSENT - Raison: ${raison}\n`;
      }
    }
    recap += "\nCliquez sur \"Envoyer\" pour transmettre ce rapport à la DEO.";
    typewriterEffect(questionText, recap, 25);
    inputRow.classList.add('hidden');
    choiceRow.classList.add('hidden');
    return;
  }
  formulaireComplete = false;
  sendReportBtn.classList.add('hidden');
  const q=questions[currentStep];
  waitingYesNo=false;
  inputRow.classList.add('hidden');
  choiceRow.classList.add('hidden');
  answerSelect.style.display='none';
  answerNumber.style.display='none';
  questionMeta.innerHTML=`<span class="question-num">#${q.num+1}</span> ${q.meta}`;
  
  if(q.type==="choice"){
    choiceRow.classList.remove('hidden');
    waitingYesNo=true;
    yesBtn.textContent=q.options[0];
    noBtn.textContent=q.options[1];
    typewriterEffect(questionText, q.text, 25);
  }else if(q.type==="yesno"){
    choiceRow.classList.remove('hidden');
    waitingYesNo=true;
    yesBtn.textContent="✔ Oui";
    noBtn.textContent="✘ Non";
    typewriterEffect(questionText, q.text, 25);
  }else if(q.type==="select"){
    inputRow.classList.remove('hidden');
    answerSelect.style.display='block';
    answerNumber.style.display='none';
    answerSelect.innerHTML=q.options;
    if(responses[q.field]) answerSelect.value=responses[q.field];
    else answerSelect.value=q.options.includes("Obligations familiales")?"Obligations familiales":"0";
    typewriterEffect(questionText, q.text, 25);
  }else if(q.type==="number"){
    inputRow.classList.remove('hidden');
    answerNumber.style.display='block';
    answerSelect.style.display='none';
    answerNumber.type='number';
    answerNumber.min=q.min||0;
    answerNumber.max=q.max||999;
    answerNumber.value=responses[q.field]||'';
    answerNumber.placeholder=q.placeholder||"Saisir un nombre";
    typewriterEffect(questionText, q.text, 25);
  }else if(q.type==="text"){
    inputRow.classList.remove('hidden');
    answerNumber.style.display='block';
    answerSelect.style.display='none';
    answerNumber.type='text';
    answerNumber.value=responses[q.field]||'';
    answerNumber.placeholder=q.placeholder||"Saisir...";
    typewriterEffect(questionText, q.text, 25);
  }
  progressFill.style.width=`${((currentStep+1)/questions.length)*100}%`;
  stepCounterSpan.innerText=`${currentStep+1} / ${questions.length}`;
  prevBtn.classList.toggle('hidden',currentStep===0);
}

function handleResponse(val){
  if(currentStep>=questions.length) return;
  const q=questions[currentStep];
  responses[q.field]=val;
  autoSave();
  
  if(q.field.includes('_present') && val==='NON'){
    let stepsToSkip = 0;
    for(let i=currentStep+1; i<questions.length; i++){
      const nextField = questions[i].field;
      if(nextField && nextField.includes(q.field.replace('_present','')) && !nextField.includes('raisonAbsence')){
        stepsToSkip++;
      } else if(nextField && nextField.includes(q.field.replace('_present','')) && nextField.includes('raisonAbsence')){
        continue;
      } else {
        break;
      }
    }
    for(let i=0; i<stepsToSkip; i++){
      if(currentStep < questions.length - 1){
        currentStep++;
        const skipQ = questions[currentStep];
        if(!skipQ.field.includes('raisonAbsence')){
          responses[skipQ.field] = "0";
        }
      }
    }
    if(currentStep < questions.length - 1){
      currentStep++;
    }
    displayCurrent();
    autoSave();
    return;
  }
  
  if(currentStep < questions.length - 1){
    currentStep++;
    displayCurrent();
  } else {
    currentStep++;
    displayCurrent();
  }
}

function prevQ(){
  if(currentStep>0){
    currentStep--;
    displayCurrent();
  }
}

function validateCurrent(){
  if(waitingYesNo || currentStep>=questions.length) return;
  const q=questions[currentStep];
  if(q.type==="select"){
    handleResponse(answerSelect.value);
  }else if(q.type==="number"){
    const val=answerNumber.value.trim();
    if(val===''){
      showPopup("⚠️ Champ requis","Veuillez saisir une réponse","Fermer","",()=>{},()=>{});
      return;
    }
    if(isNaN(parseFloat(val))){
      showPopup("⚠️ Erreur","Veuillez saisir un nombre valide","Fermer","",()=>{},()=>{});
      return;
    }
    handleResponse(val);
  }else if(q.type==="text"){
    const val=answerNumber.value.trim();
    if(val===''){
      showPopup("⚠️ Champ requis","Veuillez saisir le numéro de rapport","Fermer","",()=>{},()=>{});
      return;
    }
    handleResponse(val);
  }
}

function defaultYes(){
  if(waitingYesNo && currentStep<questions.length){
    const q=questions[currentStep];
    if(q.type==="choice"){
      handleResponse(yesBtn.textContent);
    }else{
      handleResponse("OUI");
    }
  }
}
function defaultNo(){
  if(waitingYesNo && currentStep<questions.length){
    const q=questions[currentStep];
    if(q.type==="choice"){
      handleResponse(noBtn.textContent);
    }else{
      handleResponse("NON");
    }
  }
}

function resetAll(){
  showPopup("Confirmation","⚠️ Tout recommencer ? Toutes les données seront perdues.","Annuler","Confirmer",()=>{
    resetAllSilently();
    showPopup("Succès","Nouveau rapport initialisé","OK","",()=>{},()=>{});
  },()=>{});
}

function getFullReference(){
  let num = responses.referenceNumber || "001";
  num = num.toString().padStart(3,'0').slice(0,3);
  return `RPT-BLTJRNL-2026-${num}`;
}

async function performSendToFirebase(){
  const btn=sendReportBtn;
  const orig=btn.textContent;
  btn.textContent="⏳ Envoi...";
  btn.disabled=true;
  try{
    let totalPtsP=0, totalPtsJ=0, totalTempsP=0, totalTempsJ=0;
    const netubersData=[];
    for(let n of NETUBERS){
      const present=responses[`${n.code}_present`]==='OUI'?'Présent':'Absent';
      const raisonAbsence = responses[`${n.code}_raisonAbsence`] || "";
      const objM=parseInt(responses[`${n.code}_objMensuel`])||0;
      const objA=parseInt(responses[`${n.code}_objAtteint`])||0;
      const nbN=parseFloat(responses[`${n.code}_nbNiveaux`])||0;
      const nbA=parseFloat(responses[`${n.code}_nbNiveauxAtteints`])||0;
      const ptsP=parseFloat(responses[`${n.code}_pointsPrec`])||0;
      const ptsJ=parseFloat(responses[`${n.code}_pointsJour`])||0;
      const tempsP=parseFloat(responses[`${n.code}_tempsPrec`])||0;
      const tempsJ=parseFloat(responses[`${n.code}_tempsJour`])||0;
      const forfaitGo=responses[`${n.code}_forfaitGo`]||'0';
      if(present==='Présent'){
        totalPtsP+=ptsP; totalPtsJ+=ptsJ; totalTempsP+=tempsP; totalTempsJ+=tempsJ;
      }
      netubersData.push({
        code:n.code,
        presence:present,
        raisonAbsence:raisonAbsence,
        objectifMensuel:objM,
        objectifAtteint:objA,
        nbNiveaux:nbN,
        nbNiveauxAtteints:nbA,
        pointsPrecedents:ptsP,
        pointsJour:ptsJ,
        tempsPrecedent:tempsP,
        tempsJour:tempsJ,
        forfaitInternet:forfaitGo
      });
    }
    const currentRef = getFullReference();
    const reportData={
      type:"pgco_report",
      responsable:responses.responsable||"Non spécifié",
      zone:"ORG-NX-S1",
      reference:currentRef,
      date:new Date().toLocaleDateString('fr-FR'),
      heure:new Date().toLocaleTimeString('fr-FR'),
      totalPointsPrecedents:totalPtsP,
      totalPointsJour:totalPtsJ,
      totalTempsPrecedent:totalTempsP,
      totalTempsJour:totalTempsJ,
      netubers:netubersData,
      status:"non_traite",
      createdAt:new Date().toISOString()
    };
    const reportsRef=collection(window.db,"reports");
    await addDoc(reportsRef, reportData);
    
    const now = new Date();
    const dateStr = now.toLocaleDateString('fr-FR');
    const timeStr = now.toLocaleTimeString('fr-FR');
    const expediteur = responses.responsable || "Non spécifié";
    
    const confirmationMsg = `Expéditeur: ${expediteur}\nRéférence: ${currentRef}\nDate: ${dateStr} à ${timeStr}\nDestinataire: DEO\n\n✅ Accusé: Rapport reçu avec succès`;
    
    showPopup("✅ RAPPORT TRANSMIS À LA DEO", confirmationMsg, "Fermer","",()=>{
      resetAllSilently();
    },()=>{},'primary');
  }catch(e){
    showPopup("❌ ERREUR D'ENVOI",`Le rapport n'a pas pu être transmis.\n\nCause: ${e.message}\n\nVeuillez réessayer ou contacter le support technique.`,"Fermer","",()=>{},()=>{},'primary');
  }finally{
    btn.textContent=orig;
    btn.disabled=false;
  }
}

function sendReportToFirebase(){
  if(!formulaireComplete){
    showPopup("⚠️ Formulaire incomplet","Veuillez répondre à toutes les questions avant d'envoyer.","Fermer","",()=>{},()=>{});
    return;
  }
  
  let missing=[];
  for(let n of NETUBERS){
    if(responses[`${n.code}_present`]==='OUI'){
      if(!responses[`${n.code}_objMensuel`]) missing.push(`${n.code} - Objectif mensuel`);
      if(!responses[`${n.code}_objAtteint`]) missing.push(`${n.code} - Objectif atteint`);
      if(!responses[`${n.code}_nbNiveaux`]) missing.push(`${n.code} - Nb niveaux/événements ou mètres`);
      if(!responses[`${n.code}_nbNiveauxAtteints`]) missing.push(`${n.code} - Nb niveaux/événements ou mètres atteints`);
      if(!responses[`${n.code}_pointsPrec`]) missing.push(`${n.code} - Points précédents`);
      if(!responses[`${n.code}_pointsJour`]) missing.push(`${n.code} - Points jour`);
      if(!responses[`${n.code}_tempsPrec`]) missing.push(`${n.code} - Temps précédent`);
      if(!responses[`${n.code}_tempsJour`]) missing.push(`${n.code} - Temps jour`);
      if(!responses[`${n.code}_forfaitGo`]) missing.push(`${n.code} - Forfait internet restant`);
    }
  }
  if(!responses.referenceNumber || responses.referenceNumber.trim()==='') missing.push("Numéro de rapport");
  if(missing.length>0){
    showPopup("⚠️ Champs manquants",missing.join("\n"),"Fermer","",()=>{},()=>{});
    return;
  }
  
  showCounterPopup(() => {
    performSendToFirebase();
  });
}

yesBtn.onclick=defaultYes;
noBtn.onclick=defaultNo;
submitBtn.onclick=validateCurrent;
prevBtn.onclick=prevQ;
resetBtn.onclick=resetAll;
sendReportBtn.onclick=sendReportToFirebase;

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab${btn.dataset.tab==='form'?'Form':'Memo'}`).classList.add('active');
    if(btn.dataset.tab==='memo') loadMemorandumsFromFirebase();
  };
});

questions=buildQuestions();
displayCurrent();
loadMemorandumsFromFirebase();

const saved=localStorage.getItem('pgco_rapport');
if(saved){
  try{
    const data=JSON.parse(saved);
    if(data.responses && Object.keys(data.responses).length>0){
      responses=data.responses;
      currentStep=data.currentStep||0;
      displayCurrent();
    }
  }catch(e){}
}

// Rafraîchir les mémorandums toutes les 30 secondes
setInterval(() => {
  if (document.querySelector('.tab-btn[data-tab="memo"]').classList.contains('active')) {
    loadMemorandumsFromFirebase();
  }
}, 30000);
</script>
