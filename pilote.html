.chat-input-area textarea{flex:1;background:#0a2538;border:1px solid #2d4e73;border-radius:28px;padding:14px 18px;color:#fff;font-family:'Inter',monospace;font-size:1rem;resize:none;max-height:50px;min-height:50px;}
.chat-input-area textarea:focus{outline:none;border-color:#facc15;}
.chat-input-area button{background:#facc15;padding:12px 18px;border-radius:40px;font-size:1.3rem;min-width:50px;}
.edit-popup textarea{width:100%;background:#0a2538;border:1px solid #facc15;border-radius:16px;padding:12px;color:#fff;margin-bottom:16px;}
.empty-chat{text-align:center;padding:40px;color:#7dd3fc;}
.chat-header{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:linear-gradient(135deg,#0a1a2f,#0e2a3a);z-index:1001;border-bottom:1px solid rgba(250,204,21,0.3);}
.chat-back-btn{background:rgba(250,204,21,0.9);color:#0a1a2f;border:none;border-radius:40px;padding:8px 16px;font-weight:700;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;gap:6px;}
.netubex-logo{font-size:1.6rem;font-weight:900;color:#facc15;letter-spacing:2px;}
.rainbow-line{height:3px;background:linear-gradient(90deg,#ff0000,#ff8000,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);position:fixed;top:60px;left:0;right:0;z-index:1001;}
body.chat-active .chat-header{display:flex;}

.chat-header{display:none;}

<body>

<div id="editPopupOverlay" class="popup-overlay"><div class="popup-card edit-popup"><div class="popup-title">✏️ Modifier</div><textarea id="editMessageContent" rows="4"></textarea><div class="popup-buttons"><button id="cancelEditBtn" class="popup-btn secondary">Annuler</button><button id="confirmEditBtn" class="popup-btn primary">OK</button></div></div></div>
<script>
const RAISONS_ABSENCE=["Obligations familiales","Maladie","Absence non justifiée","Déplacement/voyage","Abandon","Problème de santé","Fatigue","Rendez-vous","Deuil","Engagement scolaire"];
const NETUBERS=[{code:"MA-NX-S1-ZA-01"},{code:"MA-NX-S1-ZA-02"},{code:"MA-NX-S1-ZB-03"},{code:"MA-NX-S1-ZB-04"},{code:"MA-NX-S1-ZC-05"}];
let currentStep=0,responses={},questions=[],waitingYesNo=false,typewriterTimeout=null,formulaireComplete=false,counterInterval=null,currentEditingMessageId=null;
const questionText=document.getElementById('questionText'),questionMeta=document.getElementById('questionMeta'),inputRow=document.getElementById('inputRow'),choiceRow=document.getElementById('choiceRow'),answerSelect=document.getElementById('answerSelect'),answerNumber=document.getElementById('answerNumber'),submitBtn=document.getElementById('submitBtn'),yesBtn=document.getElementById('yesBtn'),noBtn=document.getElementById('noBtn'),progressFill=document.getElementById('progressFill'),stepCounterSpan=document.getElementById('stepCounter'),prevBtn=document.getElementById('prevBtn'),resetBtn=document.getElementById('resetBtn'),saveStatus=document.getElementById('saveStatus'),popupOverlay=document.getElementById('popupOverlay'),popupTitle=document.getElementById('popupTitle'),popupMessageDiv=document.getElementById('popupMessage'),popupBtnLeft=document.getElementById('popupBtnLeft'),popupBtnRight=document.getElementById('popupBtnRight'),sendReportBtn=document.getElementById('sendReportBtn'),questionCardDiv=document.getElementById('questionCard');
const chatMessagesDiv=document.getElementById('chatMessages'),chatMessageInput=document.getElementById('chatMessageInput'),sendChatBtn=document.getElementById('sendChatBtn'),editPopupOverlay=document.getElementById('editPopupOverlay'),editMessageContent=document.getElementById('editMessageContent'),cancelEditBtn=document.getElementById('cancelEditBtn'),confirmEditBtn=document.getElementById('confirmEditBtn'),chatBackBtn=document.getElementById('chatBackBtn'),tabChat=document.getElementById('tabChat');
function escapeHtml(t){if(!t)return '';return String(t).replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});}
function showPopup(t,m,l,r,onC,onCa,rc='primary',rd=false){popupTitle.textContent=t;popupMessageDiv.innerHTML=m;popupBtnLeft.textContent=l;popupBtnRight.textContent=r;popupBtnRight.className=`popup-btn ${rc}`;if(rd)popupBtnRight.disabled=true;else popupBtnRight.disabled=false;popupOverlay.classList.add('active');popupBtnRight.onclick=()=>{if(popupBtnRight.disabled)return;popupOverlay.classList.remove('active');if(onC)onC();};popupBtnLeft.onclick=()=>{if(counterInterval)clearInterval(counterInterval);popupOverlay.classList.remove('active');if(onCa)onCa();};}
async function loadChatMessages(){try{const q=query(collection(db,"chat_messages"),orderBy("sentDate","desc"),limit(100));const s=await getDocs(q);if(s.empty){chatMessagesDiv.innerHTML='<div class="empty-chat">💬 Aucun message</div>';return;}let msgs=[];s.forEach(d=>msgs.push({id:d.id,...d.data()}));msgs.reverse();let html='';for(let m of msgs){const env=m.senderRole==='responsable';const d=new Date(m.sentDate);const fd=d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});html+=`<div class="message-bubble ${env?'message-sent':'message-received'}"><div>${!env?`<span class="message-sender">📢 DEO</span>`:''}${escapeHtml(m.message)}</div><div class="message-info"><span>${fd}</span>${m.isEdited?'<span>(modifié)</span>':''}</div>${env?`<div class="message-actions"><button class="edit-msg-btn" data-id="${m.id}" data-msg="${escapeHtml(m.message)}">✏️</button></div>`:''}</div>`;}chatMessagesDiv.innerHTML=html;document.querySelectorAll('.edit-msg-btn').forEach(btn=>{btn.onclick=(e)=>{e.stopPropagation();openEditPopup(btn.dataset.id,btn.dataset.msg);};});chatMessagesDiv.scrollTop=chatMessagesDiv.scrollHeight;}catch(e){chatMessagesDiv.innerHTML='<div class="empty-chat">⚠️ Erreur</div>';}}
async function sendChatMessage(){const msg=chatMessageInput.value.trim();if(!msg){showPopup("⚠️","Message vide","Fermer","",()=>{},()=>{});return;}let responsable=responses.responsable||"Responsable";if(!responsable||responsable==="")responsable="Responsable";try{await addDoc(collection(db,"chat_messages"),{message:msg,sender:responsable,senderRole:"responsable",recipient:"DEO",sentDate:new Date().toISOString(),isEdited:false,status:"envoyé"});chatMessageInput.value="";await loadChatMessages();}catch(e){showPopup("❌","Erreur envoi","Fermer","",()=>{},()=>{});}}
async function editChatMessage(id,newMsg){if(!newMsg.trim()){showPopup("⚠️","Message vide","Fermer","",()=>{},()=>{});return false;}try{const ref=doc(db,"chat_messages",id);const d=await getDoc(ref);if(d.exists()){await updateDoc(ref,{message:newMsg,isEdited:true,editedDate:new Date().toISOString(),originalMessage:d.data().message});await loadChatMessages();return true;}}catch(e){showPopup("❌","Erreur","Fermer","",()=>{},()=>{});return false;}}
function openEditPopup(id,msg){currentEditingMessageId=id;editMessageContent.value=msg;editPopupOverlay.classList.add('active');}
function closeEditPopup(){editPopupOverlay.classList.remove('active');currentEditingMessageId=null;editMessageContent.value="";}
async function confirmEdit(){if(currentEditingMessageId){const nm=editMessageContent.value.trim();if(nm)await editChatMessage(currentEditingMessageId,nm);closeEditPopup();}}
function enableChatFullscreen(){document.body.classList.add('chat-active');tabChat.classList.add('chat-fullscreen');}
function disableChatFullscreen(){document.body.classList.remove('chat-active');tabChat.classList.remove('chat-fullscreen');document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.querySelector('.tab-btn[data-tab="form"]').classList.add('active');document.getElementById('tabForm').classList.add('active');}
async function loadMemorandums(){try{const q=query(collection(db,"memorandums"),orderBy("sentDate","desc"),limit(20));const s=await getDocs(q);const div=document.getElementById('memorandumList');const footer=document.getElementById('memorandumFooter');const today=new Date();const dateFooter=today.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});if(!s.empty){let h='';s.forEach(d=>{const data=d.data();h+=`<div class="memorandum-item"><div class="memorandum-title">📋 ${escapeHtml(data.title||'Mémorandum')}</div><div class="memorandum-date">📅 ${new Date(data.sentDate||data.date).toLocaleString('fr-FR')}</div><div class="memorandum-content">${(data.content||'').replace(/\n/g,'<br>')}</div></div>`;});div.innerHTML=h;}else div.innerHTML='<div style="text-align:center;padding:40px;">📭 Aucun mémorandum</div>';footer.innerHTML=`📅 ${dateFooter} · DEO · NeTubeX`;}catch(e){document.getElementById('memorandumList').innerHTML='<div style="text-align:center;padding:40px;">⚠️ Erreur</div>';}}
function saveLocal(){localStorage.setItem('pgco_rapport',JSON.stringify({responses,currentStep}));saveStatus.innerHTML='💾 OK';setTimeout(()=>saveStatus.innerHTML='💾 Auto',1200);}
function buildQuestions(){const q=[];let n=0;q.push({num:n++,type:"choice",field:"responsable",meta:"Identification",text:"Qui remplit le rapport aujourd'hui ?",options:["Madame Ursule","Madame Chancelle"]});for(let nu of NETUBERS){q.push({num:n++,type:"yesno",field:`${nu.code}_present`,meta:nu.code,text:`${nu.code} : Était-il présent aujourd'hui ?`});q.push({num:n++,type:"select",field:`${nu.code}_raisonAbsence`,meta:nu.code,text:`${nu.code} : Raison de l'absence ?`,options:RAISONS_ABSENCE.map(r=>`<option value="${r}">${r}</option>`).join('')});q.push({num:n++,type:"select",field:`${nu.code}_objMensuel`,meta:nu.code,text:`${nu.code} : Quel est son objectif mensuel ?`,options:[...Array(16).keys()].map(i=>`<option value="${i}">${i}</option>`).join('')});q.push({num:n++,type:"select",field:`${nu.code}_objAtteint`,meta:nu.code,text:`${nu.code} : Combien d'objectifs a-t-il atteints aujourd'hui ?`,options:[...Array(16).keys()].map(i=>`<option value="${i}">${i}</option>`).join('')});q.push({num:n++,type:"number",field:`${nu.code}_nbNiveaux`,meta:nu.code,text:`${nu.code} : Quel est le nombre de niveaux/événements ou mètres ?`,min:0});q.push({num:n++,type:"number",field:`${nu.code}_nbNiveauxAtteints`,meta:nu.code,text:`${nu.code} : Combien de niveaux/événements ou mètres a-t-il atteints ?`,min:0});q.push({num:n++,type:"number",field:`${nu.code}_pointsPrec`,meta:nu.code,text:`${nu.code} : Combien de points avait-il précédemment ?`,min:0});q.push({num:n++,type:"number",field:`${nu.code}_pointsJour`,meta:nu.code,text:`${nu.code} : Combien de points a-t-il aujourd'hui ?`,min:0});q.push({num:n++,type:"number",field:`${nu.code}_tempsPrec`,meta:nu.code,text:`${nu.code} : Quel temps avait-il précédemment (en minutes) ?`,min:0});q.push({num:n++,type:"number",field:`${nu.code}_tempsJour`,meta:nu.code,text:`${nu.code} : Quel temps a-t-il aujourd'hui (en minutes) ?`,min:0});q.push({num:n++,type:"select",field:`${nu.code}_forfaitGo`,meta:nu.code,text:`${nu.code} : Combien de Go de forfait internet reste-t-il ?`,options:[...Array(31).keys()].map(i=>`<option value="${i}">${i} Go</option>`).join('')});}q.push({num:n++,type:"text",field:"referenceNumber",meta:"Rapport",text:"Numéro de rapport (3 derniers chiffres personnalisables)",placeholder:"Ex: 001"});return q;}
function displayCurrent(){updateCardColor();if(currentStep>=questions.length){formulaireComplete=true;sendReportBtn.classList.remove('hidden');let recap="RÉCAPITULATIF DU RAPPORT\n\n";for(let n of NETUBERS){if(responses[`${n.code}_present`]==='OUI'){const ptsP=parseFloat(responses[`${n.code}_pointsPrec`])||0;const ptsJ=parseFloat(responses[`${n.code}_pointsJour`])||0;const forfait=responses[`${n.code}_forfaitGo`]||'0';recap+=`▪ ${n.code} : points précédents ${ptsP}, points du jour ${ptsJ}, forfait restant ${forfait} Go.\n`;}else{const raison=responses[`${n.code}_raisonAbsence`]||"Non spécifiée";recap+=`▪ ${n.code} : ABSENT - Raison: ${raison}\n`;}}recap+="\nCliquez sur \"Envoyer\" pour transmettre ce rapport à la DEO.";typewriterEffect(questionText,recap,25);inputRow.classList.add('hidden');choiceRow.classList.add('hidden');return;}formulaireComplete=false;sendReportBtn.classList.add('hidden');const q=questions[currentStep];waitingYesNo=false;inputRow.classList.add('hidden');choiceRow.classList.add('hidden');answerSelect.style.display='none';answerNumber.style.display='none';questionMeta.innerHTML=`<span class="question-num">#${q.num+1}</span> ${q.meta}`;if(q.type==="choice"){choiceRow.classList.remove('hidden');waitingYesNo=true;yesBtn.textContent=q.options[0];noBtn.textContent=q.options[1];typewriterEffect(questionText,q.text,25);}else if(q.type==="yesno"){choiceRow.classList.remove('hidden');waitingYesNo=true;yesBtn.textContent="✔ Oui";noBtn.textContent="✘ Non";typewriterEffect(questionText,q.text,25);}else if(q.type==="select"){inputRow.classList.remove('hidden');answerSelect.style.display='block';answerNumber.style.display='none';answerSelect.innerHTML=q.options;if(responses[q.field])answerSelect.value=responses[q.field];else answerSelect.value="0";typewriterEffect(questionText,q.text,25);}else if(q.type==="number"){inputRow.classList.remove('hidden');answerNumber.style.display='block';answerSelect.style.display='none';answerNumber.type='number';answerNumber.min=q.min||0;answerNumber.value=responses[q.field]||'';answerNumber.placeholder=q.placeholder||"Saisir un nombre";typewriterEffect(questionText,q.text,25);}else if(q.type==="text"){inputRow.classList.remove('hidden');answerNumber.style.display='block';answerSelect.style.display='none';answerNumber.type='text';answerNumber.value=responses[q.field]||'';answerNumber.placeholder=q.placeholder||"Saisir...";typewriterEffect(questionText,q.text,25);}progressFill.style.width=`${((currentStep+1)/questions.length)*100}%`;stepCounterSpan.innerText=`${currentStep+1}/${questions.length}`;prevBtn.classList.toggle('hidden',currentStep===0);}
function updateCardColor(){const idx=getCurrentNetuberIndex();questionCardDiv.classList.remove('netuber-0','netuber-1','netuber-2','netuber-3','netuber-4','default-card');if(idx>=0&&idx<NETUBERS.length)questionCardDiv.classList.add(`netuber-${idx}`);else questionCardDiv.classList.add('default-card');}
function getCurrentNetuberIndex(){if(currentStep>=questions.length)return-1;const q=questions[currentStep];if(!q||!q.field)return-1;for(let i=0;i<NETUBERS.length;i++)if(q.field.includes(NETUBERS[i].code))return i;return-1;}
function typewriterEffect(el,txt,speed=25,cb){if(typewriterTimeout)clearTimeout(typewriterTimeout);el.innerHTML='';let i=0;function type(){if(i<txt.length){el.innerHTML=txt.substring(0,i+1);i++;typewriterTimeout=setTimeout(type,speed);}else{if(cb)cb();}}type();}
function handleResponse(val){if(currentStep>=questions.length)return;const q=questions[currentStep];responses[q.field]=val;autoSave();if(q.field.includes('_present')&&val==='NON'){if(currentStep<questions.length-1)currentStep++;displayCurrent();autoSave();return;}if(q.field.includes('_present')&&val==='OUI'){if(currentStep<questions.length-1)currentStep++;displayCurrent();autoSave();return;}if(currentStep<questions.length-1){currentStep++;displayCurrent();}else{currentStep++;displayCurrent();}}
function prevQ(){if(currentStep>0){currentStep--;displayCurrent();}}
function validateCurrent(){if(waitingYesNo||currentStep>=questions.length)return;const q=questions[currentStep];if(q.type==="select"){handleResponse(answerSelect.value);}else if(q.type==="number"){const val=answerNumber.value.trim();if(val===''){showPopup("⚠️","Veuillez saisir une réponse","Fermer","",()=>{},()=>{});return;}if(isNaN(parseFloat(val))){showPopup("⚠️","Nombre valide requis","Fermer","",()=>{},()=>{});return;}handleResponse(val);}else if(q.type==="text"){const val=answerNumber.value.trim();if(val===''){showPopup("⚠️","Champ requis","Fermer","",()=>{},()=>{});return;}handleResponse(val);}}
function defaultYes(){if(waitingYesNo&&currentStep<questions.length){const q=questions[currentStep];if(q.type==="choice")handleResponse(yesBtn.textContent);else handleResponse("OUI");}}
function defaultNo(){if(waitingYesNo&&currentStep<questions.length){const q=questions[currentStep];if(q.type==="choice")handleResponse(noBtn.textContent);else handleResponse("NON");}}
function resetAllSilently(){responses={};currentStep=0;formulaireComplete=false;sendReportBtn.classList.add('hidden');localStorage.removeItem('pgco_rapport');questions=buildQuestions();displayCurrent();}
function resetAll(){showPopup("Confirmation","⚠️ Tout recommencer ?","Annuler","Confirmer",()=>{resetAllSilently();showPopup("Succès","Nouveau rapport initialisé","OK","",()=>{},()=>{});},()=>{});}
function getFullReference(){let num=responses.referenceNumber||"001";num=num.toString().padStart(3,'0').slice(0,3);return`RPT-BLTJRNL-2026-${num}`;}
async function performSendToFirebase(){const btn=sendReportBtn;const orig=btn.textContent;btn.textContent="⏳ Envoi...";btn.disabled=true;try{let totalPtsP=0,totalPtsJ=0,totalTempsP=0,totalTempsJ=0;const netubersData=[];for(let n of NETUBERS){const present=responses[`${n.code}_present`]==='OUI'?'Présent':'Absent';const raisonAbsence=responses[`${n.code}_raisonAbsence`]||"";const objM=parseInt(responses[`${n.code}_objMensuel`])||0;const objA=parseInt(responses[`${n.code}_objAtteint`])||0;const nbN=parseFloat(responses[`${n.code}_nbNiveaux`])||0;const nbA=parseFloat(responses[`${n.code}_nbNiveauxAtteints`])||0;const ptsP=parseFloat(responses[`${n.code}_pointsPrec`])||0;const ptsJ=parseFloat(responses[`${n.code}_pointsJour`])||0;const tempsP=parseFloat(responses[`${n.code}_tempsPrec`])||0;const tempsJ=parseFloat(responses[`${n.code}_tempsJour`])||0;const forfaitGo=responses[`${n.code}_forfaitGo`]||'0';if(present==='Présent'){totalPtsP+=ptsP;totalPtsJ+=ptsJ;totalTempsP+=tempsP;totalTempsJ+=tempsJ;}netubersData.push({code:n.code,presence:present,raisonAbsence:raisonAbsence,objectifMensuel:objM,objectifAtteint:objA,nbNiveaux:nbN,nbNiveauxAtteints:nbA,pointsPrecedents:ptsP,pointsJour:ptsJ,tempsPrecedent:tempsP,tempsJour:tempsJ,forfaitInternet:forfaitGo});}const currentRef=getFullReference();const reportData={type:"pgco_report",responsable:responses.responsable||"Non spécifié",zone:"ORG-NX-S1",reference:currentRef,date:new Date().toLocaleDateString('fr-FR'),heure:new Date().toLocaleTimeString('fr-FR'),totalPointsPrecedents:totalPtsP,totalPointsJour:totalPtsJ,totalTempsPrecedent:totalTempsP,totalTempsJour:totalTempsJ,netubers:netubersData,status:"non_traite",createdAt:new Date().toISOString()};const reportsRef=collection(db,"reports");await addDoc(reportsRef,reportData);const confirmationMsg=`Expéditeur: ${responses.responsable||"Non spécifié"}\nRéférence: ${currentRef}\n\n✅ Rapport reçu avec succès`;showPopup("✅ RAPPORT TRANSMIS",confirmationMsg,"Fermer","",()=>{resetAllSilently();},()=>{},'primary');}catch(e){showPopup("❌ ERREUR",`Erreur: ${e.message}`,"Fermer","",()=>{},()=>{},'primary');}finally{btn.textContent=orig;btn.disabled=false;}}
function sendReportToFirebase(){if(!formulaireComplete){showPopup("⚠️","Formulaire incomplet","Fermer","",()=>{},()=>{});return;}let missing=[];for(let n of NETUBERS){if(responses[`${n.code}_present`]==='OUI'){if(!responses[`${n.code}_objMensuel`])missing.push(`${n.code} - Objectif mensuel`);if(!responses[`${n.code}_objAtteint`])missing.push(`${n.code} - Objectif atteint`);if(!responses[`${n.code}_nbNiveaux`])missing.push(`${n.code} - Nb niveaux`);if(!responses[`${n.code}_nbNiveauxAtteints`])missing.push(`${n.code} - Nb niveaux atteints`);if(!responses[`${n.code}_pointsPrec`])missing.push(`${n.code} - Points précédents`);if(!responses[`${n.code}_pointsJour`])missing.push(`${n.code} - Points jour`);if(!responses[`${n.code}_tempsPrec`])missing.push(`${n.code} - Temps précédent`);if(!responses[`${n.code}_tempsJour`])missing.push(`${n.code} - Temps jour`);if(!responses[`${n.code}_forfaitGo`])missing.push(`${n.code} - Forfait internet`);}}if(!responses.referenceNumber||responses.referenceNumber.trim()==='')missing.push("Numéro de rapport");if(missing.length>0){showPopup("⚠️ Champs manquants",missing.join("\n"),"Fermer","",()=>{},()=>{});return;}performSendToFirebase();}
function autoSave(){saveLocal();}
yesBtn.onclick=defaultYes;noBtn.onclick=defaultNo;submitBtn.onclick=validateCurrent;prevBtn.onclick=prevQ;resetBtn.onclick=resetAll;sendReportBtn.onclick=sendReportToFirebase;sendChatBtn.onclick=sendChatMessage;cancelEditBtn.onclick=closeEditPopup;confirmEditBtn.onclick=confirmEdit;chatBackBtn.onclick=disableChatFullscreen;
document.querySelectorAll('.tab-btn').forEach(btn=>{btn.onclick=()=>{if(btn.dataset.tab!=='chat')disableChatFullscreen();document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));btn.classList.add('active');document.getElementById(`tab${btn.dataset.tab==='form'?'Form':btn.dataset.tab==='memo'?'Memo':'Chat'}`).classList.add('active');if(btn.dataset.tab==='memo')loadMemorandums();if(btn.dataset.tab==='chat'){loadChatMessages();enableChatFullscreen();}};});
questions=buildQuestions();displayCurrent();loadMemorandums();loadChatMessages();
const saved=localStorage.getItem('pgco_rapport');if(saved){try{const d=JSON.parse(saved);if(d.responses&&Object.keys(d.responses).length>0){responses=d.responses;currentStep=d.currentStep||0;displayCurrent();}}catch(e){}}
setInterval(()=>{if(document.querySelector('.tab-btn[data-tab="memo"]').classList.contains('active'))loadMemorandums();if(document.querySelector('.tab-btn[data-tab="chat"]').classList.contains('active'))loadChatMessages();},30000);
setInterval(async()=>{const seuil=new Date(Date.now()-24*60*60*1000);const q=query(collection(db,"chat_messages"),where("sentDate","<",seuil.toISOString()));const s=await getDocs(q);s.forEach(async(d)=>{await deleteDoc(doc(db,"chat_messages",d.id));});},3600000);
</script>
