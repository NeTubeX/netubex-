<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NeTubeX - Générateur de Rapports</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 10px;
            min-height: 100vh;
        }

        .main-container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .upload-section {
            background: #1e1a2f;
            border-radius: 24px;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid rgba(255, 105, 180, 0.3);
        }

        .upload-section h2 {
            color: #ffb7d2;
            font-size: 1.1rem;
            margin-bottom: 14px;
            padding-left: 10px;
            border-left: 3px solid #ff69b4;
        }

        .poles-upload {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .pole-upload-card {
            background: #15102a;
            border-radius: 18px;
            padding: 12px;
            border: 1px solid rgba(255, 105, 180, 0.25);
        }

        .pole-upload-card h3 {
            color: #ff99cc;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 105, 180, 0.3);
        }

        .image-input-group {
            margin-bottom: 10px;
        }

        .image-input-group label {
            display: block;
            font-size: 0.65rem;
            color: #ffb7d2;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .image-input-group input {
            width: 100%;
            padding: 8px 10px;
            background: #0f0b1a;
            border: 1px solid #3a2a55;
            border-radius: 10px;
            font-size: 0.75rem;
            color: #fff;
        }

        .preview-thumb {
            margin-top: 6px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .thumb {
            position: relative;
        }

        .thumb img {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #ff69b4;
        }

        .thumb button {

            top: -6px;
            right: -6px;

            color: white;
            border: none;
            border-radius: 50%;

            height: 18px;

        }

        .section-title {
            color: #ff99cc;
            font-size: 0.65rem;
            font-weight: 600;
            margin: 10px 0 6px 0;
            text-transform: uppercase;
        }

        .form-row {
            background: #0f0b1a;
            border-radius: 10px;
            padding: 6px 8px;
            margin-bottom: 6px;
            border: 1px solid #3a2a55;
        }

        .form-row label {
            display: block;
            font-size: 0.65rem;
            color: #ff99cc;
            margin-bottom: 4px;
        }

        .form-row input, .form-row select {
            width: 100%;
            padding: 6px 8px;
            background: #1e1830;
            border: 1px solid #4a3a6a;
            border-radius: 8px;
            font-size: 0.7rem;
            color: #fff;
            cursor: pointer;
        }

        .form-row select option {
            background: #1e1830;
            color: #fff;
        }

        .double-input {
            display: flex;
            gap: 6px;
        }

        .double-input .form-row {
            flex: 1;
            margin-bottom: 0;
        }
        
        .triple-input {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        
        .triple-input .form-row {
            flex: 1;
            margin-bottom: 0;
        }
        
        .triple-input .form-row:first-child {
            flex: 2;
        }
        
        .triple-input .form-row select {
            width: 100%;
        }

        .controls {
            background: #1e1a2f;
            border-radius: 40px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 105, 180, 0.3);
        }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            flex: 1;
            min-width: 80px;

        .btn-pets { background: linear-gradient(135deg, #f472b6, #ec489a); }
        .btn-psi { background: linear-gradient(135deg, #fb923c, #f97316); }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; }

        .status {
            text-align: center;
            padding: 6px;
            border-radius: 40px;
            font-size: 0.65rem;
            display: none;
        }
        .status.show { display: block; }
        .status.success { background: #1f3a2f; color: #b4f0c4; }
        .status.error { background: #3a1f2a; color: #ffb8cf; }
        .status.info { background: #1f2a3a; color: #b8d4ff; }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;

        .popup-container {

        .popup-container p { color: #e0c8ff; font-size: 0.75rem; margin-bottom: 16px; }
        .popup-container button {

            border: none;
            padding: 6px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        @media print { .upload-section, .controls { display: none; } }
    </style>
</head>

<script>
// Stockage des images
const store = { pgco: null, pets: null, psi: [null, null, null] };
const PILOTE = "CHANCELLE MUKOBE";

// Configuration uploads
function setupUpload(inputId, previewId, pole, idx = null) {
    const input = document.getElementById(inputId);
    if (!input) return;
    input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        const preview = document.getElementById(previewId);
        preview.innerHTML = '';
        if (!file) { if (idx !== null) store[pole][idx] = null; else store[pole] = null; return; }
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = ev.target.result;
            if (idx !== null) store[pole][idx] = data;
            else store[pole] = data;
            const div = document.createElement('div'); div.className = 'thumb';
            const img = document.createElement('img'); img.src = data;
            const btn = document.createElement('button'); btn.textContent = '×';
            btn.onclick = () => { input.value = ''; preview.innerHTML = ''; if (idx !== null) store[pole][idx] = null; else store[pole] = null; };
            div.appendChild(img); div.appendChild(btn); preview.appendChild(div);
        };
        reader.readAsDataURL(file);
    });
}

// Initialisation de toutes les listes déroulantes
function initAllSelects() {
    const dataSelects = ['pets-data1', 'pets-data2'];
    dataSelects.forEach(id => {
        const sel = document.getElementById(id);
        if (sel) {
            sel.innerHTML = '<option value="">Sélectionner Go restant</option>';
            for(let i = 0; i <= 20; i++) sel.innerHTML += `<option value="${i} Go">${i} Go</option>`;
        }
    });
    
    const hourSelects = ['call-dieu-h', 'call-blandine-h', 'call-ginola-h'];
    hourSelects.forEach(id => {
        const sel = document.getElementById(id);
        if (sel) {
            sel.innerHTML = '<option value="">Heure</option>';
            for(let i = 0; i <= 23; i++) sel.innerHTML += `<option value="${String(i).padStart(2,'0')}h">${String(i).padStart(2,'0')}h</option>`;
        }
    });
    
    const minSelects = ['call-dieu-m', 'call-blandine-m', 'call-ginola-m'];
    minSelects.forEach(id => {
        const sel = document.getElementById(id);
        if (sel) {
            sel.innerHTML = '<option value="">Minute</option>';
            for(let i = 0; i <= 59; i++) sel.innerHTML += `<option value="${String(i).padStart(2,'0')}min">${String(i).padStart(2,'0')}min</option>`;
        }
    });
    
    const gameSelects = ['game-objectifs-za1', 'game-atteints-za1', 'game-objectifs-za2', 'game-atteints-za2'];
    gameSelects.forEach(id => {
        const sel = document.getElementById(id);
        if (sel) {
            sel.innerHTML = '<option value="">Sélectionner</option>';
            for(let i = 0; i <= 24; i++) sel.innerHTML += `<option value="${i}">${i}</option>`;
        }
    });
}

function showPopup(msg) {
    const popup = document.createElement('div');
    popup.className = 'popup-overlay';
    popup.innerHTML = `<div class="popup-container"><h3>⚠️ Validation requise</h3><p>${msg}</p><button onclick="this.closest('.popup-overlay').remove()">✅ Compris</button></div>`;
    document.body.appendChild(popup);
}

function showStatus(msg, type) {
    const st = document.getElementById('status');
    st.textContent = msg;
    st.className = `status show ${type}`;
    setTimeout(() => st.className = 'status', 3000);
}

function getDateTime() {
    const d = new Date();
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} à ${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
}

function calculateDuration() {
    const getMinutes = (hSelect, mSelect) => {
        const hVal = document.getElementById(hSelect)?.value || '';
        const mVal = document.getElementById(mSelect)?.value || '';
        let hours = 0, mins = 0;
        if (hVal) hours = parseInt(hVal.replace('h', '')) || 0;
        if (mVal) mins = parseInt(mVal.replace('min', '')) || 0;
        return hours * 60 + mins;
    };
    const t1 = getMinutes('call-dieu-h', 'call-dieu-m');
    const t2 = getMinutes('call-blandine-h', 'call-blandine-m');
    const t3 = getMinutes('call-ginola-h', 'call-ginola-m');
    const totalMin = t1 + t2 + t3;
    const hours = Math.floor(totalMin / 60);
    const mins = totalMin % 60;
    return `${String(hours).padStart(2,'0')}h ${String(mins).padStart(2,'0')}min`;
}

function validatePGCO() {
    if (!store.pgco) { showPopup("Désolé Madame Chancelle, l'image du pôle PGCO est obligatoire."); return false; }
    const fields = ['pgco-prev1', 'pgco-today1', 'pgco-prev2', 'pgco-today2'];
    for (let f of fields) {
        const val = document.getElementById(f)?.value.trim();
        if (!val) { showPopup("Désolé Madame Chancelle, tous les champs du pôle PGCO doivent être renseignés."); return false; }
    }
    return true;
}

function validatePETS() {
    if (!store.pets) { showPopup("Désolé Madame Chancelle, l'image du pôle PETS est obligatoire."); return false; }
    const fields = ['pets-anom1', 'pets-anom2', 'pets-data1', 'pets-data2'];
    for (let f of fields) {
        const val = document.getElementById(f)?.value;
        if (!val) { showPopup("Désolé Madame Chancelle, tous les champs du pôle PETS doivent être renseignés."); return false; }
    }
    return true;
}

function validatePSI() {
    if (!store.psi[0] || !store.psi[1] || !store.psi[2]) { showPopup("Désolé Madame Chancelle, les trois images du pôle PSI sont obligatoires."); return false; }
    const fields = ['call-dieu-count','call-dieu-h','call-dieu-m','call-blandine-count','call-blandine-h','call-blandine-m','call-ginola-count','call-ginola-h','call-ginola-m','game-objectifs-za1','game-atteints-za1','game-objectifs-za2','game-atteints-za2'];
    for (let f of fields) {
        const val = document.getElementById(f)?.value;
        if (!val) { showPopup("Désolé Madame Chancelle, tous les champs du pôle PSI doivent être renseignés."); return false; }
    }
    return true;
}

async function generateMultiPagePDF(pages, filename) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const w = pdf.internal.pageSize.getWidth();
    
    for (let i = 0; i < pages.length; i++) {
        const container = document.createElement('div');
        container.style.width = '100%';
        container.style.maxWidth = '450px';
        container.style.backgroundColor = 'white';
        container.style.fontFamily = "'Segoe UI', 'Roboto', sans-serif";
        container.style.padding = '14px';
        container.innerHTML = pages[i];
        document.body.appendChild(container);
        
        const images = container.querySelectorAll('img');
        await Promise.all(Array.from(images).map(img => {
            if (img.complete) return Promise.resolve();
            return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
        }));
        
        const canvas = await html2canvas(container, { scale: 1.5, backgroundColor: '#fff', logging: false });
        document.body.removeChild(container);
        const imgData = canvas.toDataURL('image/png');
        const imgWidth = w;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        
        if (i > 0) pdf.addPage();
        pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight, undefined, 'FAST');
    }
    pdf.save(filename);

async function generatePDF(pole) {
    const btns = document.querySelectorAll('.btn');
    btns.forEach(b => b.disabled = true);
    try {
        if (pole === 'pgco') await generatePGCO();
        else if (pole === 'pets') await generatePETS();
        else if (pole === 'psi') await generatePSI();
    } catch (e) { console.error(e); showStatus('Erreur technique', 'error'); }
    finally { btns.forEach(b => b.disabled = false); }
}
