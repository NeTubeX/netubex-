<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Micro-jobs en ligne | NeTubeX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}body{background:linear-gradient(135deg,#0f1119,#090b10);font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#eef3ff;padding:32px 22px;line-height:1.5;min-height:100vh;display:flex;justify-content:center;align-items:center}.container{max-width:750px;width:100%;margin:0 auto;animation:floatIn 0.48s ease}@keyframes floatIn{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}h1{font-size:2.3rem;font-weight:800;background:linear-gradient(120deg,#2d88ff,#c084fc);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:1.2rem;letter-spacing:-0.3px;line-height:1.2;text-align:left}.box{background:rgba(28,32,48,0.75);backdrop-filter:blur(4px);border-radius:36px;padding:28px 32px;border:1px solid rgba(45,136,255,0.35);box-shadow:0 28px 44px -18px rgba(0,0,0,0.6);transition:all 0.25s ease}.box:hover{transform:translateY(-3px);border-color:rgba(96,165,250,0.65);background:rgba(34,40,60,0.85)}p{font-size:1.08rem;margin-bottom:20px;color:#f0f4fe;font-weight:430;line-height:1.55}ul{margin:16px 0 20px 0;list-style:none}li{margin-bottom:14px;position:relative;padding-left:34px;font-size:1.02rem;color:#e0ebff;font-weight:450}li::before{content:"⚡";position:absolute;left:0;color:#2d88ff;font-size:1.1rem;top:-1px}.badge-micro{background:rgba(45,136,255,0.18);border-radius:40px;padding:4px 16px;font-size:0.7rem;display:inline-block;margin-bottom:18px;color:#b1ceff;letter-spacing:0.4px}@media (max-width:560px){body{padding:20px 14px}h1{font-size:1.9rem}.box{padding:22px 22px}li{padding-left:30px;font-size:0.96rem}p{font-size:1rem}}
</style>
</head>
<body>
<div class="container">
<h1>Micro-jobs en ligne</h1>
<div class="box">
<p>Les micro-jobs sont des petites tâches simples rémunérées sur Internet.</p>
<ul>
<li>Cliquer sur des annonces</li>
<li>Tester des apps</li>
<li>Remplir des formulaires</li>
</ul>
<p>Idéal pour débuter sans expérience.</p>
</div>
</div>
<script>
(function(){
    // Blocage clic droit
    document.addEventListener('contextmenu',function(e){
        e.preventDefault();
        return false;
    });
    // Blocage complet des raccourcis dangereux
    document.addEventListener('keydown',function(e){
        // F12
        if(e.key==='F12'){e.preventDefault();return false;}
        // Ctrl+Shift+I (inspecteur)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        // Ctrl+Shift+J (console)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='J'||e.key==='j')){e.preventDefault();return false;}
        // Ctrl+Shift+C (inspecter élément)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='C'||e.key==='c')){e.preventDefault();return false;}
        // Ctrl+U (afficher source)
        if(e.ctrlKey&&(e.key==='U'||e.key==='u')){e.preventDefault();return false;}
        // Ctrl+S (sauvegarder)
        if(e.ctrlKey&&(e.key==='S'||e.key==='s')){e.preventDefault();return false;}
        // Ctrl+P (imprimer)
        if(e.ctrlKey&&(e.key==='P'||e.key==='p')){e.preventDefault();return false;}
        // Ctrl+R (rechargement)
        if(e.ctrlKey&&(e.key==='R'||e.key==='r')){e.preventDefault();return false;}
        // Ctrl+Shift+R (rechargement forcé)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='R'||e.key==='r')){e.preventDefault();return false;}
        // Ctrl+F (recherche)
        if(e.ctrlKey&&(e.key==='F'||e.key==='f')){e.preventDefault();return false;}
        // Ctrl+H (historique)
        if(e.ctrlKey&&(e.key==='H'||e.key==='h')){e.preventDefault();return false;}
        // Ctrl+Shift+N (fenêtre privée)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='N'||e.key==='n')){e.preventDefault();return false;}
        // Ctrl+Shift+P (fenêtre privée Firefox)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='P'||e.key==='p')){e.preventDefault();return false;}
        // Ctrl+Shift+K (console Firefox)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='K'||e.key==='k')){e.preventDefault();return false;}
        // Touche Menu contextuel
        if(e.key==='ContextMenu'||(e.shiftKey&&e.key==='F10')){e.preventDefault();return false;}
        // PrintScreen
        if(e.key==='PrintScreen'){e.preventDefault();return false;}
        // Ctrl+E (recherche)
        if(e.ctrlKey&&(e.key==='E'||e.key==='e')){e.preventDefault();return false;}
        // Ctrl+Shift+Delete (nettoyage)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='Delete'||e.key==='DEL')){e.preventDefault();return false;}
        // Ctrl+W / Ctrl+Shift+W (fermer onglet)
        if(e.ctrlKey&&(e.key==='W'||e.key==='w')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='W'||e.key==='w')){e.preventDefault();return false;}
        // Ctrl+O (ouvrir fichier)
        if(e.ctrlKey&&(e.key==='O'||e.key==='o')){e.preventDefault();return false;}
        // Protection Mac
        if(e.metaKey&&(e.key==='U'||e.key==='u')){e.preventDefault();return false;}
        if(e.metaKey&&(e.key==='S'||e.key==='s')){e.preventDefault();return false;}
        if(e.metaKey&&e.altKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        if(e.metaKey&&e.shiftKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        // Ctrl+Shift+E (sécurité)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='E'||e.key==='e')){e.preventDefault();return false;}
        // Ctrl+Shift+L (option)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='L'||e.key==='l')){e.preventDefault();return false;}
    });
    // Désactiver glisser-déposer
    document.querySelectorAll('div, p, li, h1').forEach(el=>{
        el.addEventListener('dragstart',(e)=>e.preventDefault());
    });
    // Désactiver sélection de texte
    document.addEventListener('selectstart',(e)=>e.preventDefault());
    // Désactiver copier/couper
    document.addEventListener('copy',(e)=>{e.preventDefault();return false;});
    document.addEventListener('cut',(e)=>{e.preventDefault();return false;});
    // Anti-debugging discret
    let debugInterval = setInterval(function(){
        const startPerf = performance.now();
        debugger;
        const durationDiff = performance.now()-startPerf;
        if(durationDiff>8){
            if(window.console && console.clear) console.clear();
        }
    }, 3000);
    // Protection contextuelle après chargement
    window.addEventListener('load',function(){
        let allDivs = document.querySelectorAll('.box, h1');
        allDivs.forEach(el=>{
            el.addEventListener('contextmenu',(e)=>e.preventDefault());
        });
        document.body.addEventListener('contextmenu',(e)=>e.preventDefault());
        // Protection renforcée clavier sur tout le document
    });
})();
</script>
</body>
</html>
