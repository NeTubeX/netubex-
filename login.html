<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion NeTubeX</title>
</head>
<body>
  <h2>Connexion NeTubeX</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required><br><br>
    <input type="password" id="password" placeholder="Mot de passe" required><br><br>
    <button type="submit">Connexion</button>
  </form>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
      authDomain: "netubexmoney.firebaseapp.com",
      projectId: "netubexmoney",
      storageBucket: "netubexmoney.firebasestorage.app",
      messagingSenderId: "856592608176",
      appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById("loginForm");
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const role = docSnap.data().role;

          if (role === "pets") window.location.href = "pets.html";
          else if (role === "pgc") window.location.href = "pgc.html";
          else if (role === "pilote") window.location.href = "pilote.html";
          else window.location.href = "login.html";
        } else {
          alert("Rôle non trouvé !");
        }

      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>
