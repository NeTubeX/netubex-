<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeTubeX Login - TimeWall</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#1a1f2e;color:#fff;}
.login-box{background:#202530;padding:30px;border-radius:12px;box-shadow:0 8px 16px rgba(0,0,0,0.4);width:300px;}
input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none;}
button{width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;}
</style>
</head>
<body>
<div class="login-box">
<h2>Connexion NeTubeX</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">
<button id="loginBtn">Se connecter</button>
<p id="error" style="color:red;font-size:0.9rem;"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔹 Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
  authDomain: "netubexmoney.firebaseapp.com",
  projectId: "netubexmoney",
  storageBucket: "netubexmoney.firebasestorage.app",
  messagingSenderId: "856592608176",
  appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔹 Persistance locale pour rester connecté
await setPersistence(auth, browserLocalPersistence);

const loginBtn = document.getElementById("loginBtn");
const emailInput = document.getElementById("email");
const passInput = document.getElementById("password");
const errorMsg = document.getElementById("error");

loginBtn.addEventListener("click", async () => {
  errorMsg.textContent = "";
  const email = emailInput.value.trim();
  const password = passInput.value;

  if(!email || !password) { errorMsg.textContent = "Tous les champs sont obligatoires"; return; }

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // 🔹 Injection du user ID dans TimeWall
    const oid = "e9bb1fdfd1ed93a0"; // Exemple fourni
    const uid = user.uid;
    const timewallUrl = `https://timewall.io/users/login?oid=${oid}&uid=${uid}`;

    // 🔹 Redirection automatique vers TimeWall
    window.location.href = timewallUrl;

  } catch(error) {
    switch(error.code) {
      case 'auth/invalid-email': errorMsg.textContent = "Email invalide"; break;
      case 'auth/user-not-found': errorMsg.textContent = "Utilisateur introuvable"; break;
      case 'auth/wrong-password': errorMsg.textContent = "Mot de passe incorrect"; break;
      default: errorMsg.textContent = "Erreur connexion"; break;
    }
  }
});
</script>
</body>
</html>
