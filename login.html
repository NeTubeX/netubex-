<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>NeTubeX · Authentification</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
body{background:linear-gradient(135deg,#fef9e6 0%,#fdf4d6 100%);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;}
.rainbow-line{height:3px;width:100%;background:linear-gradient(90deg,#ffd700,#ffb347,#ff8c00,#daa520,#b8860b,#d4af37,#ffd700);background-size:200% 100%;animation:rainbowMove 3s linear infinite;position:fixed;top:0;left:0;right:0;z-index:100;}
@keyframes rainbowMove{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}
.login-container{max-width:500px;width:100%;margin:0 auto;}
.login-card{background:#ffffff;border-radius:40px;padding:40px 36px;box-shadow:0 30px 50px -20px rgba(0,0,0,0.15),0 0 0 1px rgba(255,215,0,0.3);border:1px solid rgba(255,215,0,0.4);}
.logo{text-align:center;margin-bottom:28px;}
.logo h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#b8860b,#ffd700,#daa520);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-0.5px;}
.logo p{font-size:12px;color:#8B7355;margin-top:8px;font-weight:500;}
.error-message{background:#fef2f2;border:1px solid #fecaca;border-radius:16px;padding:12px 16px;margin-bottom:24px;color:#dc2626;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;}
.error-message.hidden{display:none;}
.input-group{margin-bottom:20px;}
.input-group label{display:block;font-size:12px;font-weight:600;color:#8B7355;margin-bottom:6px;letter-spacing:0.3px;}
.input-group input,.input-group select{width:100%;padding:14px 16px;background:#ffffff;border:1.5px solid #f0e0c0;border-radius:16px;color:#1e293b;font-size:14px;font-family:'Inter',sans-serif;transition:all 0.2s;outline:none;}
.input-group input:focus,.input-group select:focus{border-color:#ffd700;box-shadow:0 0 0 4px rgba(255,215,0,0.15);}
.input-group select{cursor:pointer;background:#fff;}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#daa520,#ffd700);border:none;border-radius:16px;color:#5c3d00;font-weight:800;font-size:15px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.login-btn:hover{background:linear-gradient(135deg,#ffd700,#daa520);transform:translateY(-1px);}
.login-btn:disabled{background:#d4c4a0;cursor:not-allowed;transform:none;}
.footer-links{text-align:center;margin-top:24px;padding-top:16px;border-top:1px solid #f0e0c0;}
.footer-links a{color:#8B7355;font-size:12px;text-decoration:none;margin:0 8px;cursor:pointer;transition:color 0.2s;}
.footer-links a:hover{color:#daa520;}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:12px;max-width:420px;width:90%;pointer-events:none;}
.toast{background:rgba(30,20,10,0.95);backdrop-filter:blur(12px);border-radius:20px;padding:16px 20px;color:#fff;font-size:13px;font-weight:500;display:flex;align-items:center;gap:14px;box-shadow:0 20px 35px -10px rgba(0,0,0,0.3),0 0 0 1px rgba(255,215,0,0.3);animation:toastSlideDown 0.4s cubic-bezier(0.16,1,0.3,1);pointer-events:auto;border-left:4px solid;}
.toast-success{border-left-color:#ffd700;}
.toast-success i{color:#ffd700;}
.toast-error{border-left-color:#ef4444;}
.toast-error i{color:#ef4444;}
.toast-info{border-left-color:#ffd700;}
.toast-info i{color:#ffd700;}
.toast i{font-size:20px;width:24px;text-align:center;}
.toast-content{flex:1;line-height:1.4;}
.toast-title{font-weight:700;margin-bottom:4px;font-size:14px;}
.toast-message{font-size:12.5px;opacity:0.9;}
.toast-close{background:rgba(255,255,255,0.1);border:none;width:28px;height:28px;border-radius:40px;cursor:pointer;color:#fff;font-size:12px;transition:all 0.2s;}
.toast-close:hover{background:rgba(255,255,255,0.2);}
@keyframes toastSlideDown{from{opacity:0;transform:translateX(-50%) translateY(-30px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;visibility:hidden;}
.modal-overlay.active{visibility:visible;}
.modal-content{background:#ffffff;border-radius:32px;max-width:550px;width:90%;max-height:85vh;overflow-y:auto;transform:scale(0.95);transition:transform 0.2s;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);}
.modal-overlay.active .modal-content{transform:scale(1);}
.modal-header{position:sticky;top:0;background:#ffffff;padding:20px 24px;border-bottom:1px solid #f0e0c0;display:flex;justify-content:space-between;align-items:center;}
.modal-header h2{font-size:20px;font-weight:700;background:linear-gradient(135deg,#b8860b,#daa520);-webkit-background-clip:text;background-clip:text;color:transparent;display:flex;align-items:center;gap:8px;}
.modal-close{background:#fef9e6;border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;color:#8B7355;transition:all 0.2s;}
.modal-close:hover{background:#f0e0c0;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid #f0e0c0;background:#fef9e6;border-radius:0 0 32px 32px;}
.gender-row{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.gender-option{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#ffffff;border-radius:16px;border:1.5px solid #f0e0c0;cursor:pointer;transition:all 0.2s;}
.gender-option.selected{background:rgba(218,165,32,0.08);border-color:#daa520;}
.gender-option input{width:18px;height:18px;accent-color:#daa520;margin:0;}
.gender-option label{cursor:pointer;font-size:14px;color:#1e293b;}
.gender-option i{color:#daa520;}
.checkbox-group{margin:20px 0;display:flex;align-items:flex-start;gap:12px;}
.checkbox-group input{width:20px;height:20px;margin-top:2px;accent-color:#daa520;}
.checkbox-group label{font-size:12px;color:#8B7355;line-height:1.4;}
.checkbox-group a{color:#daa520;text-decoration:none;}
.btn-submit{width:100%;padding:16px;background:linear-gradient(135deg,#daa520,#ffd700);border:none;border-radius:20px;color:#5c3d00;font-size:15px;font-weight:800;cursor:pointer;margin-top:10px;transition:all 0.2s;}
.btn-submit:hover{background:linear-gradient(135deg,#ffd700,#daa520);transform:translateY(-1px);}
.password-strength{height:4px;margin-top:8px;border-radius:4px;background:#f0e0c0;}
.password-strength.weak{width:25%;background:#ef4444;}
.password-strength.medium{width:50%;background:#f59e0b;}
.password-strength.strong{width:75%;background:#ffd700;}
.password-strength.very-strong{width:100%;background:#10b981;}
.strength-text{font-size:11px;margin-top:5px;color:#8B7355;}
.form-section-title{font-size:15px;font-weight:700;color:#b8860b;margin:20px 0 12px 0;padding-bottom:8px;border-bottom:2px solid #f0e0c0;display:flex;align-items:center;gap:8px;}
.country-select{width:100%;padding:14px 16px;border-radius:16px;border:1.5px solid #f0e0c0;background:#fff;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;}
.country-select:focus{outline:none;border-color:#daa520;}
</style>
</head>
