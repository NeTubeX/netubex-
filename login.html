<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeTubeX · Espace de rémunération Digitale</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#1a1f2e 0%,#0f1420 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:20px;}
.login-container{width:100%;max-width:440px;position:relative;animation:fadeInUp 0.5s ease-out;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.rainbow-border{position:absolute;top:-3px;left:-3px;right:-3px;bottom:-3px;background:linear-gradient(90deg,#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3,#ff0000);background-size:200%100%;border-radius:28px;animation:rainbowMove 4s linear infinite;z-index:-1;opacity:0.8;}
@keyframes rainbowMove{0%{background-position:0%50%;}100%{background-position:200%50%;}}
.login-card{background:rgba(20,25,40,0.95);backdrop-filter:blur(10px);border-radius:24px;padding:2rem;box-shadow:0 20px 40px -12px rgba(0,0,0,0.5),0 0 0 1px rgba(56,189,248,0.15);}
.card-header{text-align:center;margin-bottom:1.8rem;}
.logo-icon{width:65px;height:65px;background:linear-gradient(135deg,#1e293b,#0f1420);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;border:1px solid rgba(56,189,248,0.2);}
.logo-icon i{font-size:2.2rem;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;background-clip:text;color:transparent;}
.card-header h1{font-size:1.7rem;font-weight:800;background:linear-gradient(135deg,#f1f5f9,#94a3b8);-webkit-background-clip:text;background-clip:text;color:transparent;}
.card-header p{color:#94a3b8;font-size:0.8rem;}
.input-group{margin-bottom:1.3rem;position:relative;}
.input-group i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#64748b;z-index:1;}
.input-group input{width:100%;padding:12px 14px 12px 44px;background:#0f1420;border:1.5px solid #2a3548;border-radius:12px;font-size:0.9rem;color:#e2e8f0;outline:none;}
.input-group input:focus{border-color:#38bdf8;}
.password-wrapper{position:relative;display:flex;align-items:center;}
.password-wrapper input{flex:1;padding-right:44px;}
.toggle-password{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#64748b;cursor:pointer;background:transparent;border:none;}
.toggle-password:hover{color:#38bdf8;}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;border-radius:12px;font-size:0.95rem;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 0 #1e3a5f;transform:translateY(-2px);}
.login-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #1e3a5f;}
.login-btn:hover{background:linear-gradient(135deg,#3b82f6,#2563eb);}
.error-toast{position:fixed;top:20px;right:20px;background:#dc2626;color:#fff;padding:12px 18px;border-radius:12px;display:flex;align-items:center;gap:12px;z-index:1000;transform:translateX(400px);transition:transform 0.3s;max-width:340px;}
.error-toast.show{transform:translateX(0);}
.card-footer{text-align:center;margin-top:1.8rem;padding-top:1.2rem;border-top:1px solid #2a3548;}
.card-footer p{color:#64748b;font-size:0.7rem;}
.login-btn.loading{pointer-events:none;opacity:0.8;}
.login-btn.loading i{animation:spin 0.8s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="login-container">
<div class="rainbow-border"></div>
<div class="login-card">
<div class="card-header">
<div class="logo-icon"><i class="fas fa-chart-line"></i></div>
<h1>NeTubeX</h1>
<p>Espace de rémunération Digitale</p>
</div>
<form id="loginForm">
<div class="input-group">
<i class="fas fa-envelope"></i>
<input type="email" id="email" placeholder="Adresse email" required>
</div>
<div class="input-group">
<i class="fas fa-lock"></i>
<div class="password-wrapper">
<input type="password" id="password" placeholder="Mot de passe" required>
<button type="button" class="toggle-password" id="togglePassword"><i class="fas fa-eye"></i></button>
</div>
</div>
<button type="submit" class="login-btn" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i><span>Se connecter</span></button>
</form>
<div class="card-footer"><p><i class="fas fa-shield-alt"></i> Connexion sécurisée · Espace Digital certifié</p></div>
</div>
</div>
<div id="errorToast" class="error-toast"><i class="fas fa-exclamation-circle"></i><span id="errorText">Erreur</span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
  authDomain: "netubexmoney.firebaseapp.com",
  projectId: "netubexmoney",
  storageBucket: "netubexmoney.firebasestorage.app",
  messagingSenderId: "856592608176",
  appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
await setPersistence(auth, browserLocalPersistence);

const loginForm = document.getElementById("loginForm");
const loginBtn = document.getElementById("loginBtn");
const errorToast = document.getElementById("errorToast");
const errorText = document.getElementById("errorText");
const togglePassword = document.getElementById("togglePassword");
const passwordInput = document.getElementById("password");
let toastTimeout;

function showError(message) {
  errorText.textContent = message;
  errorToast.classList.add("show");
  if(toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => errorToast.classList.remove("show"), 5000);
}
function hideError() { errorToast.classList.remove("show"); }

togglePassword.addEventListener("click", function() {
  const type = passwordInput.type === "password" ? "text" : "password";
  passwordInput.type = type;
  this.innerHTML = type === "password" ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
});

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  hideError();
  const email = document.getElementById("email").value.trim();
  const password = passwordInput.value;
  if(!email || !password) { showError("Veuillez renseigner tous les champs"); return; }
  if(!email.includes('@')) { showError("Email invalide"); return; }
  
  loginBtn.classList.add("loading");
  loginBtn.innerHTML = '<i class="fas fa-spinner"></i><span>Connexion...</span>';
  
  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;
    const oid = "e9bb1fdfd1ed93a0";
    const uid = user.uid;
    sessionStorage.setItem('firebaseUserId', uid);
    window.location.href = `https://timewall.io/users/login?oid=${oid}&uid=${uid}`;
  } catch(error) {
    let msg = "Identifiants incorrects";
    switch(error.code) {
      case 'auth/invalid-email': msg = "Email invalide"; break;
      case 'auth/user-not-found': msg = "Aucun compte associé"; break;
      case 'auth/wrong-password': msg = "Mot de passe incorrect"; break;
      case 'auth/too-many-requests': msg = "Trop de tentatives"; break;
    }
    showError(msg);
    loginBtn.classList.remove("loading");
    loginBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i><span>Se connecter</span>';
  }
});
</script>
</body>
</html>
