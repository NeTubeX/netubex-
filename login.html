body{background:linear-gradient(135deg,#fef9e6 0%,#fdf4d6 100%);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;}

.login-container{max-width:500px;width:100%;margin:0 auto;}
.login-card{background:#ffffff;border-radius:40px;padding:40px 36px;box-shadow:0 30px 50px -20px rgba(0,0,0,0.15);border:1px solid rgba(218,165,32,0.3);}
.logo{text-align:center;margin-bottom:28px;}

.error-message{background:#fef2f2;border:1px solid #fecaca;border-radius:16px;padding:12px 16px;margin-bottom:24px;color:#dc2626;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;}
.error-message.hidden{display:none;}
.input-group{margin-bottom:20px;}
.input-group label{display:block;font-size:13px;font-weight:600;color:#5a4a2a;margin-bottom:6px;letter-spacing:0.3px;}
.input-group input,.input-group select{width:100%;padding:14px 16px;background:#ffffff;border:1.5px solid #e0d0b0;border-radius:16px;color:#1a1a1a;font-size:14px;font-family:'Inter',sans-serif;transition:all 0.2s;outline:none;}
.input-group input:focus,.input-group select:focus{border-color:#daa520;box-shadow:0 0 0 4px rgba(218,165,32,0.15);}
.input-group select{cursor:pointer;background:#fff;color:#1a1a1a;}
.input-group option{color:#1a1a1a;}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#daa520,#ffd700);border:none;border-radius:16px;color:#2a1a00;font-weight:800;font-size:15px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.login-btn:hover{background:linear-gradient(135deg,#ffd700,#daa520);transform:translateY(-1px);}
.login-btn:disabled{background:#d4c4a0;cursor:not-allowed;transform:none;}
.footer-links{text-align:center;margin-top:24px;padding-top:16px;border-top:1px solid #e0d0b0;}
.footer-links a{color:#5a4a2a;font-size:13px;text-decoration:none;margin:0 8px;cursor:pointer;transition:color 0.2s;}
.footer-links a:hover{color:#daa520;}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:12px;max-width:420px;width:90%;pointer-events:none;}
.toast{background:rgba(30,20,10,0.95);backdrop-filter:blur(12px);border-radius:20px;padding:16px 20px;color:#fff;font-size:13px;font-weight:500;display:flex;align-items:center;gap:14px;box-shadow:0 20px 35px -10px rgba(0,0,0,0.3);animation:toastSlideDown 0.4s cubic-bezier(0.16,1,0.3,1);pointer-events:auto;border-left:4px solid;}
.toast-success{border-left-color:#ffd700;}
.toast-success i{color:#ffd700;}
.toast-error{border-left-color:#ef4444;}
.toast-error i{color:#ef4444;}
.toast-info{border-left-color:#ffd700;}
.toast-info i{color:#ffd700;}
.toast i{font-size:20px;width:24px;text-align:center;}
.toast-content{flex:1;line-height:1.4;}
.toast-title{font-weight:700;margin-bottom:4px;font-size:14px;}
.toast-message{font-size:12.5px;opacity:0.9;}
.toast-close{background:rgba(255,255,255,0.1);border:none;width:28px;height:28px;border-radius:40px;cursor:pointer;color:#fff;font-size:12px;transition:all 0.2s;}
.toast-close:hover{background:rgba(255,255,255,0.2);}
@keyframes toastSlideDown{from{opacity:0;transform:translateX(-50%) translateY(-30px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;visibility:hidden;}
.modal-overlay.active{visibility:visible;}
.modal-content{background:#ffffff;border-radius:32px;max-width:600px;width:90%;max-height:85vh;overflow-y:auto;transform:scale(0.95);transition:transform 0.2s;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);}
.modal-overlay.active .modal-content{transform:scale(1);}
.modal-header{position:sticky;top:0;background:#ffffff;padding:20px 24px;border-bottom:1px solid #e0d0b0;display:flex;justify-content:space-between;align-items:center;}
.modal-header h2{font-size:20px;font-weight:700;color:#2a1a00;display:flex;align-items:center;gap:8px;}

.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid #e0d0b0;background:#fef9e6;border-radius:0 0 32px 32px;}

.gender-option{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#ffffff;border-radius:16px;border:1.5px solid #e0d0b0;cursor:pointer;transition:all 0.2s;}

.checkbox-group{margin:20px 0;display:flex;align-items:flex-start;gap:12px;}

.checkbox-group label{font-size:13px;color:#3a2a10;line-height:1.4;}

</form>

<div id="forgotPasswordModal" class="modal-overlay">
<div class="modal-content" style="max-width:450px;">
<div class="modal-header">
<h2><i class="fas fa-key"></i> Réinitialisation</h2>
<button class="modal-close" onclick="closeForgotModal()"><i class="fas fa-times"></i></button>
</div>
<div class="modal-body">
<div class="input-group">
<label>Email</label>
<input type="email" id="resetEmail" placeholder="exemple@email.com">
</div>
</div>
<div class="modal-footer">
<button class="btn-submit" id="sendResetLinkBtn" style="margin-top:0;">Envoyer</button>
</div>
</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, getDoc, setDoc, query, where, getDocs, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
authDomain: "netubexmoney.firebaseapp.com",
projectId: "netubexmoney",
storageBucket: "netubexmoney.firebasestorage.app",
messagingSenderId: "856592608176",
appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function showToast(message, type='success'){
const container = document.getElementById('toastContainer');
const toast = document.createElement('div');
toast.className = `toast toast-${type}`;
const icons = {success:'fa-check-circle', error:'fa-exclamation-circle', info:'fa-info-circle'};
const titles = {success:'Succès', error:'Erreur', info:'Information'};
toast.innerHTML = `
<i class="fas ${icons[type]}"></i>
<div class="toast-content">
<div class="toast-title">${titles[type]}</div>
<div class="toast-message">${message}</div>
</div>
<button class="toast-close"><i class="fas fa-times"></i></button>
`;
container.appendChild(toast);
const closeBtn = toast.querySelector('.toast-close');
closeBtn.addEventListener('click',()=>{toast.remove();});
setTimeout(()=>{if(toast.parentNode) toast.remove();}, 8000);
}

function showErrorMessage(message){
const errorDiv = document.getElementById('errorMessage');
const errorText = document.getElementById('errorText');
errorText.textContent = message;
errorDiv.classList.remove('hidden');
setTimeout(()=>errorDiv.classList.add('hidden'), 8000);
}

function hideErrorMessage(){
document.getElementById('errorMessage').classList.add('hidden');
}

function getRefCodeFromUrl(){
const urlParams = new URLSearchParams(window.location.search);
return urlParams.get('ref');
}

function generateRefCode(){
return "NX"+Math.random().toString(36).substring(2,10).toUpperCase();
}

let selectedGender = null;

function selectGender(gender){
selectedGender = gender;
document.getElementById('genderMale').classList.remove('selected');
document.getElementById('genderFemale').classList.remove('selected');
if(gender==='homme'){
document.getElementById('genderMale').classList.add('selected');
document.getElementById('maleRadio').checked=true;
}else{
document.getElementById('genderFemale').classList.add('selected');
document.getElementById('femaleRadio').checked=true;
}
document.getElementById('genderError').style.display='none';
}

window.selectGender = selectGender;

function checkPasswordStrength(pwd){
const strengthBar = document.getElementById('passwordStrength');
const strengthText = document.getElementById('strengthText');
strengthBar.className = 'password-strength';
if(pwd.length===0){ strengthText.textContent=''; return; }
let score=0;
if(pwd.length>=6) score++;
if(pwd.length>=8) score++;
if(/[A-Z]/.test(pwd)) score++;
if(/[0-9]/.test(pwd)) score++;
if(/[^A-Za-z0-9]/.test(pwd)) score++;
if(score<=2){ strengthBar.classList.add('weak'); strengthText.textContent='Faible'; }
else if(score<=3){ strengthBar.classList.add('medium'); strengthText.textContent='Moyen'; }
else if(score<=4){ strengthBar.classList.add('strong'); strengthText.textContent='Fort'; }
else{ strengthBar.classList.add('very-strong'); strengthText.textContent='Très fort'; }
}

document.getElementById('regPassword')?.addEventListener('input', function(){ checkPasswordStrength(this.value); checkPasswordMatch(); });

function checkPasswordMatch(){
const pwd = document.getElementById('regPassword').value;
const confirm = document.getElementById('regConfirmPassword').value;
const errorDiv = document.getElementById('pwdMatchError');
if(confirm && pwd !== confirm){ errorDiv.style.display='block'; errorDiv.innerHTML='<i class="fas fa-times"></i> Les mots de passe ne correspondent pas'; return false; }
else{ errorDiv.style.display='none'; return true; }
}

document.getElementById('regConfirmPassword')?.addEventListener('input', checkPasswordMatch);

document.getElementById('loginForm').addEventListener('submit', async (e)=>{
e.preventDefault();
hideErrorMessage();
const email = document.getElementById('email').value.trim();
const password = document.getElementById('password').value;
const loginBtn = document.getElementById('loginBtn');
if(!email || !password){ showErrorMessage('Veuillez renseigner email et mot de passe'); return; }
loginBtn.disabled = true;
loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
try{
const userCredential = await signInWithEmailAndPassword(auth, email, password);
const user = userCredential.user;
const userSnap = await getDoc(doc(db,"users",user.uid));
const role = userSnap.exists() ? userSnap.data().role : null;
showToast('Connexion réussie !', 'success');
setTimeout(()=>{
if(role === 'admin'){
window.location.href = "admin.html";
} else if(role === 'pilote'){
window.location.href = "pilote.html";
} else if(role === 'netuber'){
window.location.href = "dashboard.html";
} else {
window.location.href = "espace.html";
}
}, 1500);
}catch(error){
let userMessage = '';
if(error.code === 'auth/user-not-found') userMessage = 'Aucun compte associé à cet email';
else if(error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') userMessage = 'Email ou mot de passe incorrect';
else if(error.code === 'auth/too-many-requests') userMessage = 'Trop de tentatives. Réessayez plus tard';
else userMessage = 'Erreur technique. Veuillez réessayer';
showErrorMessage(userMessage);
loginBtn.disabled = false;
loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
}
});

document.getElementById('registerSubmitBtn')?.addEventListener('click', async () => {
const displayName = 'User';
const email = document.getElementById('regEmail').value.trim();
const password = document.getElementById('regPassword').value;
const confirmPassword = document.getElementById('regConfirmPassword').value;
const acceptCgu = document.getElementById('acceptCgu').checked;
const country = document.getElementById('countrySelect').value;

if(!email || !password){ showToast("Tous les champs sont requis", 'error'); return; }
if(!selectedGender){ document.getElementById('genderError').style.display='block'; document.getElementById('genderError').innerHTML = '<i class="fas fa-exclamation-circle"></i> Veuillez sélectionner votre sexe'; return; }
if(password.length<6){ showToast("Le mot de passe doit contenir au moins 6 caractères", 'error'); return; }
if(password !== confirmPassword){ showToast("Les mots de passe ne correspondent pas", 'error'); return; }
if(!acceptCgu){ showToast("Vous devez accepter les conditions générales", 'error'); return; }
if(!country){ showToast("Veuillez sélectionner votre pays", 'error'); return; }

const submitBtn = document.getElementById('registerSubmitBtn');
submitBtn.disabled = true;
submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Création...';

try{
const userCred = await createUserWithEmailAndPassword(auth, email, password);
await updateProfile(userCred.user, { displayName: displayName });
const refCode = generateRefCode();
const refParrain = getRefCodeFromUrl();
let parrainId = null;
if(refParrain){
const usersRef = collection(db,"users");
const q = query(usersRef, where("refCode","==",refParrain));
const snapshot = await getDocs(q);
if(!snapshot.empty) parrainId = snapshot.docs[0].id;
}
await setDoc(doc(db,"users",userCred.user.uid),{
username: displayName,
sexe: selectedGender,
email: email,
pays: country,
isActive: true,
isBlocked: false,
role: null,
refCode: refCode,
parrainId: parrainId || null,
invitedCount: 0,
parrainageGains: 0,
balance: 0,
totalEarned: 0,
dateInscription: new Date().toISOString(),
lastSeen: new Date().toISOString(),
ticketsList: [],
capDuJour: "📊 CAP DU JOUR\n\n• Jouer aux jeux\n• Inviter des amis (10% de leurs gains)\n• Bonne journée !"
});
showToast("✅ Compte créé avec succès !", "success");
setTimeout(async () => {
await signInWithEmailAndPassword(auth, email, password);
window.location.href = "espace.html";
}, 2000);
}catch(error){
let errorMsg = "Erreur lors de la création";
if(error.code === 'auth/email-already-in-use') errorMsg = "Cet email est déjà utilisé";
showToast(errorMsg, 'error');
submitBtn.disabled = false;
submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Créer mon compte';
}
});

document.getElementById('applyNowBtn')?.addEventListener('click', ()=>{document.getElementById('applyModal').classList.add('active');});
document.getElementById('forgotPasswordBtn')?.addEventListener('click', ()=>{document.getElementById('forgotPasswordModal').classList.add('active');});

function closeApplyModal(){document.getElementById('applyModal').classList.remove('active');}
function closeForgotModal(){document.getElementById('forgotPasswordModal').classList.remove('active');}

window.closeApplyModal = closeApplyModal;
window.closeForgotModal = closeForgotModal;

document.getElementById('sendResetLinkBtn')?.addEventListener('click', async () => {
const email = document.getElementById('resetEmail').value.trim();
const btn = document.getElementById('sendResetLinkBtn');
if(!email){ showToast("Veuillez entrer votre email", 'error'); return; }
btn.disabled = true;
btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';
try{
await sendPasswordResetEmail(auth, email);
showToast("Lien de réinitialisation envoyé", 'success');
closeForgotModal();
document.getElementById('resetEmail').value = '';
}catch(error){
if(error.code === 'auth/user-not-found') showToast("Aucun compte associé à cet email", 'error');
else showToast("Erreur technique", 'error');
}finally{
btn.disabled = false;
btn.innerHTML = 'Envoyer';
}
});

document.querySelectorAll('.modal-overlay').forEach(overlay => {
overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.remove('active'); });
});

document.addEventListener('contextmenu', e=>e.preventDefault());
document.addEventListener('keydown', function(e){
if(e.key==='F12'){ e.preventDefault(); return false; }
if(e.ctrlKey && e.shiftKey && (e.key==='I'||e.key==='J'||e.key==='C')){ e.preventDefault(); return false; }
if(e.ctrlKey && e.key==='u'){ e.preventDefault(); return false; }
});
</script>
</body>
</html>
