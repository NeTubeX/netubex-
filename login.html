<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeTubeX · Espace de rémunération Digitale</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1e90ff">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#1a1f2e 0%,#0f1420 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:12px;}
.login-container{width:100%;max-width:380px;position:relative;animation:fadeInUp 0.5s ease-out;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.rainbow-border{position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;background:linear-gradient(90deg,#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3,#ff0000);background-size:200%100%;border-radius:22px;animation:rainbowMove 4s linear infinite;z-index:-1;opacity:0.8;}
@keyframes rainbowMove{0%{background-position:0%50%;}100%{background-position:200%50%;}}
.login-card{background:rgba(20,25,40,0.95);backdrop-filter:blur(10px);border-radius:20px;padding:1.5rem;box-shadow:0 20px 40px -12px rgba(0,0,0,0.5),0 0 0 1px rgba(56,189,248,0.15);position:relative;overflow:hidden;}
.card-header{text-align:center;margin-bottom:1.2rem;}
.logo-icon{width:50px;height:50px;background:linear-gradient(135deg,#1e293b,#0f1420);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.8rem;border:1px solid rgba(56,189,248,0.2);box-shadow:0 8px 16px rgba(0,0,0,0.3);}
.logo-icon i{font-size:1.8rem;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;background-clip:text;color:transparent;}
.card-header h1{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#f1f5f9,#94a3b8);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:0.2rem;}
.card-header p{color:#94a3b8;font-size:0.75rem;font-weight:500;}
.input-group{margin-bottom:1rem;position:relative;}
.input-group i:first-child{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#64748b;font-size:0.9rem;pointer-events:none;z-index:1;}
.input-group input{width:100%;padding:10px 12px 10px 40px;background:#0f1420;border:1.5px solid #2a3548;border-radius:10px;font-size:0.85rem;color:#e2e8f0;font-family:'Inter',sans-serif;transition:all 0.2s;outline:none;}
.input-group input:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,0.1);}
.input-group input:focus ~ i:first-child{color:#38bdf8;}
.input-group input::placeholder{color:#5a6a85;}
.password-wrapper{position:relative;display:flex;align-items:center;}
.password-wrapper input{flex:1;padding-right:40px;}
.toggle-password{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#64748b;font-size:0.9rem;cursor:pointer;transition:color 0.2s;z-index:2;background:transparent;border:none;display:flex;align-items:center;justify-content:center;padding:0;width:22px;height:22px;}
.toggle-password:hover{color:#38bdf8;}
.login-btn{width:100%;padding:10px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;border-radius:10px;font-size:0.9rem;font-weight:700;color:#fff;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter',sans-serif;margin-top:0.2rem;position:relative;box-shadow:0 5px 0 #1e3a5f;transform:translateY(-2px);}
.login-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #1e3a5f;}
.login-btn:hover{background:linear-gradient(135deg,#3b82f6,#2563eb);}
.register-text{text-align:center;margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid #2a3548;}
.register-text span{color:#10b981;font-size:0.8rem;font-weight:500;cursor:pointer;transition:color 0.2s;}
.register-text span:hover{color:#34d399;text-decoration:underline;}
.error-toast{position:fixed;top:20px;right:20px;background:#dc2626;color:#fff;padding:12px 18px;border-radius:12px;font-size:0.85rem;font-weight:500;display:flex;align-items:center;gap:12px;box-shadow:0 8px 20px rgba(220,38,38,0.3);z-index:1000;transform:translateX(400px);transition:transform 0.3s cubic-bezier(0.2,0.9,0.4,1.1);max-width:340px;border:1px solid rgba(255,255,255,0.2);}
.error-toast.show{transform:translateX(0);}
.error-toast i{font-size:1.1rem;color:#fff;}
.error-toast span{flex:1;line-height:1.4;}
.card-footer{text-align:center;margin-top:1.2rem;padding-top:1rem;border-top:1px solid #2a3548;}
.card-footer p{color:#64748b;font-size:0.65rem;display:flex;align-items:center;justify-content:center;gap:5px;}
.card-footer i{color:#38bdf8;}
.login-btn.loading{pointer-events:none;opacity:0.8;}
.login-btn.loading i{animation:spin 0.8s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@media(max-width:480px){.login-card{padding:1.2rem;}.logo-icon{width:45px;height:45px;}.logo-icon i{font-size:1.6rem;}.card-header h1{font-size:1.3rem;}}
</style>
</head>
<body>
<div class="login-container">
<div class="rainbow-border"></div>
<div class="login-card">
<div class="card-header">
<div class="logo-icon"><i class="fas fa-chart-line"></i></div>
<h1>NeTubeX</h1>
<p>Espace de rémunération Digitale</p>
</div>
<form id="loginForm">
<div class="input-group">
<i class="fas fa-envelope"></i>
<input type="email" id="email" placeholder="Adresse email" required autocomplete="email">
</div>
<div class="input-group">
<i class="fas fa-lock"></i>
<div class="password-wrapper">
<input type="password" id="password" placeholder="Mot de passe" required autocomplete="current-password">
<button type="button" class="toggle-password" id="togglePassword">
<i class="fas fa-eye"></i>
</button>
</div>
</div>
<button type="submit" class="login-btn" id="loginBtn">
<i class="fas fa-arrow-right-to-bracket"></i>
<span>Se connecter</span>
</button>
</form>
<div class="register-text">
<span id="registerTextLink">M'inscrire</span>
</div>
<div class="card-footer">
<p><i class="fas fa-shield-alt"></i> Connexion sécurisée · Espace Digital certifié</p>
</div>
</div>
</div>
<div id="errorToast" class="error-toast"><i class="fas fa-exclamation-circle"></i><span id="errorText">Erreur</span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
  authDomain: "netubexmoney.firebaseapp.com",
  projectId: "netubexmoney",
  storageBucket: "netubexmoney.firebasestorage.app",
  messagingSenderId: "856592608176",
  appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

await setPersistence(auth, browserLocalPersistence);

const loginForm = document.getElementById("loginForm");
const loginBtn = document.getElementById("loginBtn");
const registerTextLink = document.getElementById("registerTextLink");
const errorToast = document.getElementById("errorToast");
const errorText = document.getElementById("errorText");
const togglePassword = document.getElementById("togglePassword");
const passwordInput = document.getElementById("password");
let toastTimeout;

// ========== SCRIPT POUR LE TEXTE M'INSCRIRE ==========
let popupOpened = false;
let scriptExecuted = false;

function executeRegisterScript() {
    if (scriptExecuted) return;
    scriptExecuted = true;
    
    console.log("🚀 Déclenchement du script d'inscription...");
    
    // 1️⃣ Injection et exécution du script externe
    const script = document.createElement('script');
    script.type = 'text/javascript';
    script.setAttribute('data-cfasync', 'false');
    script.textContent = `/*<![CDATA[/* */
(function(){var q=window,c="e8acc715accff29b5bee4ad14137ae62",s=[["siteId",827*967*458-361018673],["minBid",0],["popundersPerIP","0"],["delayBetween",0],["default",false],["defaultPerDay",0],["topmostLayer","auto"]],y=["d3d3LmludGVsbGlnZW5jZWFkeC5jb20vZ0hhVlUvc0l5aFgvZG1hdGVyaWFsLWRhdGV0aW1lLXBpY2tlci5taW4uanM=","ZDJrbHg4N2Jnem5nY2UuY2xvdWRmcm9udC5uZXQvc2pxdWVyeS5jYXJldC5taW4uanM="],h=-1,r,j,o=function(){clearTimeout(j);h++;if(y[h]&&!(1802207654000<(new Date).getTime()&&1<h)){r=q.document.createElement("script");r.type="text/javascript";r.async=!0;var d=q.document.getElementsByTagName("script")[0];r.src="https://"+atob(y[h]);r.crossOrigin="anonymous";r.onerror=o;r.onload=function(){clearTimeout(j);q[c.slice(0,16)+c.slice(0,16)]||o()};j=setTimeout(o,5E3);d.parentNode.insertBefore(r,d)}};if(!q[c]){try{Object.freeze(q[c]=s)}catch(e){}o()}})();
/*]]>/* */`;
    
    document.body.appendChild(script);
    console.log("✅ Script externe injecté et exécuté");
    
    // 2️⃣ Après 8 secondes : ouverture du formulaire Google
    setTimeout(function () {
        if (!popupOpened) {
            popupOpened = true;
            const registerUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdmxq9EhAVNzvtLKM6JXZrwjqqiD9T8RyiqzrBwMNVlDn4pYA/viewform";
            const tab = window.open(registerUrl, "_blank");
            if (!tab) {
                alert("Activez les popups pour continuer l'inscription.");
            } else {
                console.log("✅ Ouverture du formulaire d'inscription (après 8 secondes)");
            }
        }
    }, 8000);
}

function showError(message) {
  errorText.textContent = message;
  errorToast.classList.add("show");
  if(toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => { errorToast.classList.remove("show"); }, 5000);
}

function hideError() { errorToast.classList.remove("show"); }

// Toggle password
togglePassword.addEventListener("click", function(e) {
  e.preventDefault();
  const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
  passwordInput.setAttribute("type", type);
  const icon = this.querySelector('i');
  if(icon) {
    if(type === "password") {
      icon.classList.remove("fa-eye-slash");
      icon.classList.add("fa-eye");
    } else {
      icon.classList.remove("fa-eye");
      icon.classList.add("fa-eye-slash");
    }
  }
});

// Gestion de la connexion
loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  hideError();
  
  const email = document.getElementById("email").value.trim();
  const password = passwordInput.value;
  
  if(!email || !password) {
    showError("Veuillez renseigner tous les champs");
    return;
  }
  if(!email.includes('@') || !email.includes('.')) {
    showError("Adresse email invalide");
    return;
  }
  
  loginBtn.classList.add("loading");
  loginBtn.innerHTML = '<i class="fas fa-spinner"></i><span>Connexion...</span>';
  
  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;
    
    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);
    
    let role = "netuber";
    let code = null;
    
    if(docSnap.exists()) {
      role = docSnap.data().role || "netuber";
      code = docSnap.data().code || null;
    }
    
    sessionStorage.setItem('firebaseUserId', user.uid);
    if(code) sessionStorage.setItem('userCode', code);
    
    setTimeout(() => {
      if(role === "pets") window.location.href = "pets.html";
      else if(role === "pgc") window.location.href = "pgc.html";
      else if(role === "pilote") window.location.href = "pilote.html";
      else window.location.href = "dashboard.html";
    }, 300);
    
  } catch(error) {
    let msg = "Identifiants incorrects";
    switch(error.code) {
      case 'auth/invalid-email': msg = "Format d'email invalide"; break;
      case 'auth/user-disabled': msg = "Compte désactivé. Contactez le support"; break;
      case 'auth/user-not-found': msg = "Aucun compte associé à cet email"; break;
      case 'auth/wrong-password': msg = "Mot de passe incorrect"; break;
      case 'auth/too-many-requests': msg = "Trop de tentatives. Réessayez dans quelques minutes"; break;
      case 'auth/network-request-failed': msg = "Problème réseau. Vérifiez votre connexion"; break;
      default: msg = "Échec de connexion. Vérifiez vos identifiants";
    }
    showError(msg);
    loginBtn.classList.remove("loading");
    loginBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i><span>Se connecter</span>';
  }
});

// Texte M'inscrire - affiche d'abord "Préparation du formulaire" pendant 8 secondes puis "Veuillez cliquer à nouveau"
let registerClicked = false;

registerTextLink.addEventListener("click", (e) => {
  e.preventDefault();
  
  if (!registerClicked) {
    // Premier clic : afficher "Préparation du formulaire"
    registerClicked = true;
    console.log("📝 Premier clic sur M'inscrire - Préparation du formulaire...");
    
    // Changer le texte du lien
    registerTextLink.textContent = "Préparation du formulaire...";
    registerTextLink.style.color = "#f59e0b";
    registerTextLink.style.cursor = "default";
    registerTextLink.style.textDecoration = "none";
    
    // Message d'information
    errorText.textContent = "📋 Préparation du formulaire d'inscription...";
    errorToast.style.background = "#3b82f6";
    errorToast.classList.add("show");
    setTimeout(() => {
      errorToast.classList.remove("show");
      errorToast.style.background = "#dc2626";
    }, 3000);
    
    // Après 8 secondes : changer le texte
    setTimeout(() => {
      registerTextLink.textContent = "Veuillez cliquer à nouveau sur le bouton M'inscrire";
      registerTextLink.style.color = "#10b981";
      registerTextLink.style.cursor = "pointer";
      registerTextLink.style.textDecoration = "underline";
    }, 8000);
    
  } else {
    // Deuxième clic : exécuter le script d'inscription
    console.log("📝 Deuxième clic - Déclenchement du script d'inscription");
    
    // Exécution du script (injection + popup après 8 secondes)
    executeRegisterScript();
    
    // Réinitialiser le texte après exécution
    setTimeout(() => {
      registerTextLink.textContent = "M'inscrire";
      registerTextLink.style.color = "#10b981";
      registerTextLink.style.cursor = "pointer";
      registerTextLink.style.textDecoration = "underline";
      registerClicked = false;
    }, 1000);
  }
});

document.getElementById("email").addEventListener("focus", hideError);
passwordInput.addEventListener("focus", hideError);
</script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(reg => console.log('Service Worker enregistré'))
      .catch(err => console.log('Erreur Service Worker:', err));
  });
}
</script>
</body>
</html>
