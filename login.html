<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>NeTubeX · Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
body{background:linear-gradient(135deg,#0a0f1a 0%,#0f1724 100%);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-container{max-width:420px;width:100%;margin:0 auto;}
.login-card{background:#111827;border-radius:32px;padding:40px 32px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);border:1px solid #1e293b;backdrop-filter:blur(10px);transition:all 0.3s;}
.login-card:hover{border-color:#f59e0b;box-shadow:0 0 30px rgba(245,158,11,0.1);}
.logo{text-align:center;margin-bottom:32px;}
.logo i{font-size:48px;color:#f59e0b;margin-bottom:12px;}
.logo h1{font-size:28px;font-weight:800;color:#e2e8f0;}
.logo h1 span{color:#f59e0b;}
.logo p{font-size:12px;color:#64748b;margin-top:8px;}
.input-group{margin-bottom:20px;}
.input-group label{display:block;font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:6px;}
.input-group input{width:100%;padding:14px 16px;background:#1e293b;border:1.5px solid #334155;border-radius:16px;color:#f1f5f9;font-size:14px;font-family:'Inter',sans-serif;transition:all 0.2s;outline:none;}
.input-group input:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,0.2);}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:16px;color:#0a0f1a;font-weight:700;font-size:16px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px -5px rgba(245,158,11,0.3);}
.login-btn:active{transform:translateY(0);}
.footer-links{text-align:center;margin-top:24px;}
.footer-links a{color:#64748b;font-size:12px;text-decoration:none;transition:color 0.2s;}
.footer-links a:hover{color:#f59e0b;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:40px;font-size:13px;z-index:10000;animation:slideUp 0.3s ease;}
.toast-success{background:#10b981;color:#fff;}
.toast-error{background:#ef4444;color:#fff;}
.toast-info{background:#3b82f6;color:#fff;}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.security-badge{position:fixed;bottom:15px;right:15px;font-size:10px;color:#475569;background:rgba(0,0,0,0.3);padding:6px 12px;border-radius:20px;}
.rainbow-line{height:3px;width:100%;background:linear-gradient(90deg,#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);background-size:200% 100%;animation:rainbowMove 3s linear infinite;position:fixed;top:0;left:0;right:0;z-index:100;}
@keyframes rainbowMove{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}
</style>
</head>
<body>
<div class="rainbow-line"></div>
<div class="login-container">
<div class="login-card">
<div class="logo">
<i class="fas fa-chart-line"></i>
<h1>Ne<span>TubeX</span></h1>
<p>Espace de rémunération digitale</p>
</div>
<form id="loginForm">
<div class="input-group">
<label><i class="fas fa-envelope"></i> Email</label>
<input type="email" id="email" placeholder="exemple@email.com" required autocomplete="email">
</div>
<div class="input-group">
<label><i class="fas fa-lock"></i> Mot de passe</label>
<input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
</div>
<button type="submit" class="login-btn" id="loginBtn">
<i class="fas fa-sign-in-alt"></i> Se connecter
</button>
</form>
<div class="footer-links">
<a href="#">Mot de passe oublié ?</a> • <a href="#">Support</a>
</div>
</div>
<div class="security-badge">
<i class="fas fa-shield-alt"></i> Connexion sécurisée
</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const firebaseConfig = {
apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
authDomain: "netubexmoney.firebaseapp.com",
projectId: "netubexmoney",
storageBucket: "netubexmoney.firebasestorage.app",
messagingSenderId: "856592608176",
appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let sessionStartTime = Date.now();
let loginAttempts = 0;
let lastAttemptTime = null;
let deviceId = null;
function getDeviceUniqueId() {
let storedId = localStorage.getItem('device_permanent_id');
if(!storedId){
const screenInfo = `${screen.width}x${screen.height}x${screen.colorDepth}`;
const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
const language = navigator.language;
const platform = navigator.platform;
const fingerprint = `${screenInfo}|${timezone}|${language}|${platform}`;
let hash = 0;
for(let i=0;i<fingerprint.length;i++){
hash = ((hash << 5) - hash) + fingerprint.charCodeAt(i);
hash |= 0;
}
storedId = `DEVICE_${Math.abs(hash)}`;
localStorage.setItem('device_permanent_id', storedId);
}
return storedId;
}
async function sendSecurityAlert(type, email, details={}){
try{
const alertData = {
type: type,
level: details.level || 'info',
email: email || null,
netuberCode: details.netuberCode || null,
netuberId: details.netuberId || null,
message: details.message || '',
details: {
timeSpentSeconds: Math.floor((Date.now() - sessionStartTime)/1000),
attemptsCount: loginAttempts,
timeSinceLastAttempt: lastAttemptTime ? Math.floor((Date.now()-lastAttemptTime)/1000) : null,
deviceId: deviceId,
userAgent: navigator.userAgent,
language: navigator.language,
platform: navigator.platform,
...details
},
timestamp: new Date().toISOString(),
read: false
};
await addDoc(collection(db,"security_alerts"), alertData);
return true;
}catch(error){ console.error("Erreur envoi alerte:",error); return false; }
}
function showToast(message, type='error'){
const toast = document.createElement('div');
toast.className = `toast toast-${type}`;
toast.innerHTML = (type==='success'?'✅ ':(type==='error'?'❌ ':'ℹ️ '))+message;
document.body.appendChild(toast);
setTimeout(()=>toast.remove(),4000);
}
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
e.preventDefault();
const email = document.getElementById('email').value.trim();
const password = document.getElementById('password').value;
const loginBtn = document.getElementById('loginBtn');
if(!email || !password){
showToast('Veuillez remplir tous les champs','error');
return;
}
deviceId = getDeviceUniqueId();
loginAttempts++;
const currentAttemptTime = Date.now();
const timeSpentSeconds = Math.floor((currentAttemptTime - sessionStartTime)/1000);
lastAttemptTime = currentAttemptTime;
loginBtn.disabled = true;
loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
try{
const userCredential = await signInWithEmailAndPassword(auth, email, password);
const user = userCredential.user;
const userSnap = await getDoc(doc(db,"users",user.uid));
const userData = userSnap.exists() ? userSnap.data() : null;
const netuberCode = userData?.code || null;
await sendSecurityAlert('login_success', email, {
level: 'info',
netuberCode: netuberCode,
netuberId: user.uid,
message: `✅ Connexion réussie pour ${netuberCode || email} après ${timeSpentSeconds} secondes (${loginAttempts} tentative${loginAttempts>1?'s':''})`,
timeToSuccess: timeSpentSeconds
});
if(!userData?.deviceId){
await sendSecurityAlert('new_device_linked', email, {
level: 'info',
netuberCode: netuberCode,
netuberId: user.uid,
message: `🟢 Nouvel appareil enregistré pour ${netuberCode || email} : ${deviceId}`,
registeredDeviceId: deviceId
});
}
showToast(`Connexion réussie ! Bienvenue ${netuberCode || email}`,'success');
setTimeout(()=>{ window.location.href="index.html"; },1000);
}catch(error){
let alertType = 'login_failed';
let alertMessage = '';
let level = 'high';
if(error.code === 'auth/user-not-found'){
alertType = 'account_not_found';
level = 'medium';
alertMessage = `🟡 Tentative sur compte inexistant : ${email}`;
showToast('Email ou mot de passe incorrect','error');
}else if(error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential'){
alertType = 'login_failed';
level = 'high';
alertMessage = `🟠 Échec connexion pour ${email} - ${loginAttempts} tentative(s)`;
showToast('Email ou mot de passe incorrect','error');
}else if(error.code === 'auth/too-many-requests'){
alertType = 'login_failed';
level = 'critical';
alertMessage = `🔴 Trop de tentatives pour ${email} - Compte temporairement limité`;
showToast('Trop de tentatives. Réessayez plus tard','error');
}else{
alertMessage = `⚠️ Erreur inconnue: ${error.message}`;
showToast('Erreur de connexion','error');
}
await sendSecurityAlert(alertType, email, {
level: level,
message: alertMessage,
errorCode: error.code,
timeSpentAtAttempt: timeSpentSeconds
});
loginBtn.disabled = false;
loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
}
});
document.addEventListener('contextmenu', e=>e.preventDefault());
document.addEventListener('keydown', function(e){
if(e.key==='F12'){ e.preventDefault(); return false; }
if(e.ctrlKey && e.shiftKey && (e.key==='I'||e.key==='J'||e.key==='C')){ e.preventDefault(); return false; }
if(e.ctrlKey && e.key==='u'){ e.preventDefault(); return false; }
if(e.ctrlKey && e.key==='s'){ e.preventDefault(); return false; }
});
</script>
</body>
</html>
