<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeTubeX - Candidature Netuber</title>
</head>
<body>

<h2>Formulaire de candidature - NeTubeX</h2>

<form>

  <!-- 1 -->
  <label>Nom complet</label><br>
  <input type="text" name="nom_complet" required><br><br>

  <!-- 2 -->
  <label>Adresse à domicile</label><br>
  <input type="text" name="adresse" required><br><br>

  <!-- 3 -->
  <label>Email</label><br>
  <input type="email" name="email" required><br><br>

  <!-- 4 -->
  <label>Numéro de téléphone</label><br>
  <input type="tel" name="telephone" required><br><br>

  <!-- 5 -->
  <label>Date de naissance</label><br>
  <input type="date" name="date_naissance" required><br><br>

  <!-- 6 -->
  <label>Localisation</label><br>
  <input type="text" name="localisation" value="Lubumbashi" readonly><br><br>

  <!-- 7 -->
  <label>Poste</label><br>
  <input type="text" name="poste" value="Netuber membre actif" readonly><br><br>

  <!-- 8 -->
  <label>Expérience professionnelle</label><br>
  <input type="text" name="experience" required><br><br>

  <!-- 9 -->
  <label>Motivation</label><br>
  <textarea name="motivation" rows="4" required></textarea><br><br>

  <!-- 10 -->
  <label>Lien du CV (Google Drive ou PDF)</label><br>
  <input type="url" name="cv" required><br><br>

  <button type="submit">Envoyer la candidature</button>

</form>

</body>
</html>
