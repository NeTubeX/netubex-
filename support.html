<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=yes">
<title>Support NeTubeX · Espace de rémunération digitale</title>
<meta name="description" content="Discutez avec les membres du support NeTubeX. Elcane et Marc sont là pour vous aider.">
<meta name="robots" content="index,follow">
<link rel="icon" href="favicon.png.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:#f0f2f5;color:#1a2c3e;height:100vh;overflow:hidden;}
.chat-container{max-width:800px;margin:0 auto;height:100%;display:flex;flex-direction:column;background:#ffffff;border-left:1px solid #e2e8f0;border-right:1px solid #e2e8f0;box-shadow:0 0 20px rgba(0,0,0,0.05);}
.chat-header{background:#ffffff;padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e2e8f0;}
.chat-header-avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid #2c7a4d;}
.chat-header-info{flex:1;}
.chat-header-info h1{font-size:1.1rem;font-weight:700;color:#1a2c3e;}
.chat-header-info p{font-size:0.7rem;color:#6b7c93;}
.online-badge{background:#2c7a4d10;border:1px solid #2c7a4d30;padding:6px 12px;border-radius:30px;font-size:0.65rem;color:#2c7a4d;font-weight:500;}
.online-badge i{color:#2c7a4d;}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;background:#f8f9fc;}
.message{display:flex;gap:10px;max-width:85%;animation:fadeIn 0.2s ease;}
.message-user{flex-direction:row-reverse;margin-left:auto;}
.message-user .message-content{background:#2c7a4d;color:#ffffff;border-radius:20px 20px 8px 20px;}
.message-bot .message-content{background:#ffffff;color:#1a2c3e;border-radius:20px 20px 20px 8px;box-shadow:0 1px 2px rgba(0,0,0,0.05);border:1px solid #e2e8f0;}
.message-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.message-content{padding:10px 14px;font-size:0.85rem;line-height:1.45;}
.message-name{font-size:0.65rem;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.message-time{font-size:0.6rem;opacity:0.6;margin-top:5px;text-align:right;}
.chat-input-area{background:#ffffff;padding:14px 20px;border-top:1px solid #e2e8f0;display:flex;gap:12px;align-items:center;}
.chat-input-area input{flex:1;background:#f8f9fc;border:1px solid #e2e8f0;padding:12px 16px;border-radius:30px;color:#1a2c3e;font-size:0.85rem;outline:none;transition:all 0.2s;}
.chat-input-area input:focus{border-color:#2c7a4d;background:#ffffff;}
.chat-input-area input::placeholder{color:#9aaebf;}
.chat-input-area button{background:#2c7a4d;border:none;padding:10px 20px;border-radius:30px;color:#ffffff;font-weight:600;cursor:pointer;transition:all 0.2s;}
.chat-input-area button:hover{background:#1e5a38;transform:translateY(-1px);}
.typing-indicator{display:flex;align-items:center;gap:6px;padding:10px 16px;background:#ffffff;border-radius:20px;width:fit-content;border:1px solid #e2e8f0;}
.typing-indicator span{width:8px;height:8px;border-radius:50%;background:#2c7a4d;animation:typing 1.4s infinite;}
.typing-indicator span:nth-child(2){animation-delay:0.2s;}
.typing-indicator span:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-6px);opacity:1;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.form-container{display:none;background:#ffffff;border-radius:24px;padding:24px;margin:16px;border:1px solid #e2e8f0;box-shadow:0 8px 20px rgba(0,0,0,0.08);}
.form-container.active{display:block;animation:fadeIn 0.3s ease;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:0.7rem;font-weight:600;color:#4a5a6a;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;background:#f8f9fc;border:1px solid #e2e8f0;border-radius:12px;color:#1a2c3e;font-size:0.85rem;outline:none;transition:all 0.2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#2c7a4d;background:#ffffff;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.btn-submit{background:#2c7a4d;border:none;padding:14px;border-radius:40px;color:#ffffff;font-weight:700;cursor:pointer;width:100%;margin-top:8px;font-size:0.9rem;transition:all 0.2s;}
.btn-submit:hover{background:#1e5a38;transform:translateY(-1px);}
.btn-back{background:#e2e8f0;border:none;padding:12px;border-radius:40px;color:#4a5a6a;font-weight:600;cursor:pointer;width:100%;margin-top:10px;transition:all 0.2s;}
.btn-back:hover{background:#cbd5e1;}
.success-message{background:#2c7a4d15;border:1px solid #2c7a4d;border-radius:12px;padding:16px;text-align:center;margin:16px;}
.float-cta{position:fixed;bottom:20px;right:20px;background:#2c7a4d;border:none;border-radius:50px;padding:12px 24px;color:#ffffff;font-weight:600;cursor:pointer;z-index:1000;font-size:0.85rem;display:flex;align-items:center;gap:10px;box-shadow:0 4px 12px rgba(44,122,77,0.3);transition:all 0.2s;}
.float-cta:hover{background:#1e5a38;transform:translateY(-2px);}
</style>
</head>
<body>
<div class="chat-container">
<div class="chat-header">
<img src="https://images.pexels.com/photos/774909/pexels-photo-774909.jpeg?w=80&h=80&fit=crop" class="chat-header-avatar" alt="Elcane">
<div class="chat-header-info"><h1>Support NeTubeX</h1><p>Discutez avec les membres du support NeTubeX</p></div>
<div class="online-badge"><i class="fas fa-circle" style="font-size:0.5rem;margin-right:6px;"></i> En ligne</div>
</div>
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input-area" id="chatInputArea">
<input type="text" id="userInput" placeholder="Écrivez votre message...">
<button id="sendBtn"><i class="fas fa-paper-plane"></i> Envoyer</button>
</div>
<div class="form-container" id="formContainer">
<h3 style="margin-bottom:18px;color:#1a2c3e;"><i class="fas fa-ticket-alt"></i> Formulaire de support</h3>
<div class="form-row"><div class="form-group"><label>Nom complet</label><input type="text" id="fullName" placeholder="Votre nom"></div><div class="form-group"><label>Email</label><input type="email" id="email" placeholder="votre@email.com"></div></div>
<div class="form-row"><div class="form-group"><label>Type de ticket</label><select id="ticketType"><option value="🔧 Problème technique">🔧 Problème technique</option><option value="💰 Problème de paiement">💰 Problème de paiement</option><option value="🔐 Compte / Connexion">🔐 Compte / Connexion</option><option value="📝 Demande d'information">📝 Demande d'information</option><option value="💡 Suggestion">💡 Suggestion</option><option value="⚠️ Réclamation">⚠️ Réclamation</option><option value="❓ Autre">❓ Autre</option></select></div><div class="form-group"><label>Priorité</label><select id="priority"><option value="basse">🟢 Basse</option><option value="normale" selected>🟡 Normale</option><option value="haute">🟠 Haute</option><option value="urgente">🔴 Urgente</option></select></div></div>
<div class="form-group"><label>Sujet</label><input type="text" id="subject" placeholder="Résumé du problème"></div>
<div class="form-group"><label>Message</label><textarea id="ticketMessage" rows="4" placeholder="Décrivez votre problème..."></textarea></div>
<button class="btn-submit" id="submitTicketBtn"><i class="fas fa-paper-plane"></i> Envoyer le ticket</button>
<button class="btn-back" id="backToChatBtn"><i class="fas fa-arrow-left"></i> Retour au chat</button>
</div>
</div>
<button class="float-cta" id="ctaFloatBtn"><i class="fas fa-arrow-right"></i> Accéder au programme</button>
<script>
const firebaseConfig={apiKey:"AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",authDomain:"netubexmoney.firebaseapp.com",projectId:"netubexmoney",storageBucket:"netubexmoney.firebasestorage.app",messagingSenderId:"856592608176",appId:"1:856592608176:web:69f9df9cfd4f8c28630475"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
let needForm=false;
const elcaneImg="https://images.pexels.com/photos/774909/pexels-photo-774909.jpeg?w=80&h=80&fit=crop";
const marcImg="https://images.pexels.com/photos/2379005/pexels-photo-2379005.jpeg?w=80&h=80&fit=crop";
const userImg="https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
const messagesDiv=document.getElementById('chatMessages');
const userInput=document.getElementById('userInput');
const sendBtn=document.getElementById('sendBtn');
const formContainer=document.getElementById('formContainer');
const chatInputArea=document.getElementById('chatInputArea');

function escapeHtml(t){if(!t)return'';return String(t).replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');}

function addMessage(text,sender,name,avatar,isUser=false){
const msgDiv=document.createElement('div');
msgDiv.className=`message ${isUser?'message-user':'message-bot'}`;
const now=new Date();
const timeStr=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
msgDiv.innerHTML=`<img src="${avatar}" class="message-avatar" alt="${name}"><div class="message-content"><div class="message-name">${escapeHtml(name)}</div>${escapeHtml(text)}<div class="message-time">${timeStr}</div></div>`;
messagesDiv.appendChild(msgDiv);
messagesDiv.scrollTop=messagesDiv.scrollHeight;
}

function showTyping(callback){
const typingDiv=document.createElement('div');
typingDiv.className='typing-indicator';
typingDiv.innerHTML='<span></span><span></span><span></span>';
messagesDiv.appendChild(typingDiv);
messagesDiv.scrollTop=messagesDiv.scrollHeight;
setTimeout(()=>{typingDiv.remove();if(callback)callback();},1500);
}

function showForm(){
formContainer.classList.add('active');
chatInputArea.style.display='none';
}

function hideForm(){
formContainer.classList.remove('active');
chatInputArea.style.display='flex';
}

function knowledgeBaseResponse(msg){
const m=msg.toLowerCase();
if(m.includes('qu\'est-ce que')||m.includes('c\'est quoi')||m.includes('netubex c\'est')||m.includes('netubex quoi')||m.includes('présentation')||m.includes('programme institutionnel')){
return{agent:'elcane',text:"NeTubeX est un espace de rémunération digitale. Il transforme le temps passé en ligne en revenu concret, grâce au programme institutionnel qui a déjà été mis en place au sein de son espace. Marc, tu veux ajouter quelque chose ?"};
}
if(m.includes('retrait')||m.includes('argent')||m.includes('gain')||m.includes('payer')||m.includes('1$')||m.includes('mobile money')||m.includes('paypal')){
return{agent:'marc',text:"Les retraits sont disponibles à partir de 1$ via Mobile Money (Airtel Money, Orange Money) ou PayPal. Les délais sont de 24 à 48h. Elcane, tu veux compléter ?"};
}
if(m.includes('inscription')||m.includes('créer compte')||m.includes('nouveau compte')){
return{agent:'elcane',text:"Pour vous inscrire, rendez-vous sur notre page d'inscription. Remplissez le formulaire et validez votre email. Marc, des précisions techniques ?"};
}
if(m.includes('mot de passe')||m.includes('connexion')||m.includes('login')||m.includes('identifier')){
return{agent:'marc',text:"Si vous avez oublié votre mot de passe, utilisez la fonction 'Mot de passe oublié' sur la page de connexion. Elcane, tu as d'autres conseils ?"};
}
return null;
}

function botResponse(userMessage){
const kb=knowledgeBaseResponse(userMessage);
if(kb){
if(kb.agent==='elcane'){
addMessage(kb.text,'Elcane','Elcane · Support',elcaneImg);
setTimeout(()=>{
addMessage("Je confirme. Souhaitez-vous que je crée un ticket pour vous accompagner ?",'Marc','Marc · Technique',marcImg);
needForm=true;
},2000);
} else {
addMessage(kb.text,'Marc','Marc · Technique',marcImg);
setTimeout(()=>{
addMessage("C'est bien résumé. Souhaitez-vous que je vous guide pour créer un ticket ?",'Elcane','Elcane · Support',elcaneImg);
needForm=true;
},2000);
}
return;
}
if(userMessage.toLowerCase().includes('ticket')||userMessage.toLowerCase().includes('aide')||userMessage.toLowerCase().includes('contacter')||userMessage.toLowerCase().includes('problème')||needForm){
addMessage("Je comprends que vous avez besoin d'aide. Je vais vous rediriger vers notre formulaire de support. Veuillez remplir vos informations.",'Elcane','Elcane · Support',elcaneImg);
setTimeout(()=>{showForm();},1500);
needForm=false;
return;
}
addMessage("Merci pour votre message. Je vous invite à créer un ticket pour que nous puissions vous aider plus précisément. Souhaitez-vous remplir le formulaire ?",'Elcane','Elcane · Support',elcaneImg);
setTimeout(()=>{showForm();},2000);
}

function sendUserMessage(){
const msg=userInput.value.trim();
if(!msg)return;
addMessage(msg,'Moi','Moi',userImg,true);
userInput.value='';
showTyping(()=>{botResponse(msg);});
}

async function sendTicket(){
const nom=document.getElementById('fullName').value.trim();
const email=document.getElementById('email').value.trim();
const ticketType=document.getElementById('ticketType').value;
const priority=document.getElementById('priority').value;
const subject=document.getElementById('subject').value.trim();
const message=document.getElementById('ticketMessage').value.trim();
if(!nom||!email||!subject||!message){
alert("Veuillez remplir tous les champs");
return;
}
try{
await db.collection('public_tickets').add({
nom:nom,email:email,ticketType:ticketType,priority:priority,
subject:subject,message:message,status:'ouvert',
date:new Date().toISOString(),read:false
});
document.getElementById('fullName').value='';
document.getElementById('email').value='';
document.getElementById('subject').value='';
document.getElementById('ticketMessage').value='';
alert("✅ Votre ticket a été envoyé avec succès ! Notre équipe vous répondra sous 24h.");
hideForm();
addMessage("Votre ticket a bien été envoyé. Nous vous répondrons dans les plus brefs délais. Merci !",'Elcane','Elcane · Support',elcaneImg);
} catch(e){
alert("Erreur lors de l'envoi du ticket");
}
}

sendBtn.addEventListener('click',sendUserMessage);
userInput.addEventListener('keypress',(e)=>{if(e.key==='Enter')sendUserMessage();});
document.getElementById('submitTicketBtn').addEventListener('click',sendTicket);
document.getElementById('backToChatBtn').addEventListener('click',()=>{hideForm();addMessage("Pas de problème, revenez vers nous quand vous voulez.",'Elcane','Elcane · Support',elcaneImg);});

const OFFER_URL="https://viiukuhe.com/dc/?blockID=397846";
const TARGET_URL="https://www.netubex.com/index";
function redirectSmart(offerUrl,targetUrl){window.location.href=offerUrl;var popup=window.open(targetUrl,'_blank');if(!popup||popup.closed||typeof popup.closed==='undefined'){setTimeout(function(){window.location.href=targetUrl;},100);}}
document.getElementById('ctaFloatBtn').addEventListener('click',function(e){e.preventDefault();redirectSmart(OFFER_URL,TARGET_URL);});

document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
document.addEventListener('keydown',function(e){if(e.key==='F12'){e.preventDefault();return false;}if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C')){e.preventDefault();return false;}if(e.ctrlKey&&e.key==='u'){e.preventDefault();return false;}if(e.ctrlKey&&e.key==='s'){e.preventDefault();return false;}});

setTimeout(()=>{
addMessage("Bonjour ! Je suis Elcane, membre du support NeTubeX. Comment puis-je vous aider ?",'Elcane','Elcane · Support',elcaneImg);
setTimeout(()=>{
addMessage("Bonjour à tous ! Je suis Marc, agent technique. Je suis là pour répondre à vos questions techniques.",'Marc','Marc · Technique',marcImg);
},1500);
},500);
</script>
</body>
</html>
