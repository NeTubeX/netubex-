*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Inter',sans-serif;background:#0a0f1a;color:#e2e8f0;min-height:100vh;transition:background 0.3s, color 0.3s;overflow-y:auto;}

body.dark-soft{background:#0f1724;color:#e2e8f0;}

body.dark-soft th{background:#0f1420;color:#64748b;border-bottom-color:#f59e0b;}
body.dark-soft td{border-bottom-color:#1e293b;}
body.dark-soft tr:hover td{background:#1a2332;}
body.dark-soft tr:nth-child(even) td{background:rgba(245,158,11,0.05);}
body.dark-soft .icon-btn{background:#1e293b;color:#fff;}
body.dark-soft .icon-btn:hover{background:#334155;}
body.dark-soft .tabs-arrow{background:#1e293b;color:#f59e0b;}
body.dark-soft .tabs-arrow:hover{background:#f59e0b;color:#0a0f1a;}
body.dark-soft .admin-btn{background:linear-gradient(135deg,#1e293b,#0f1420);border-color:#334155;color:#e2e8f0;}
