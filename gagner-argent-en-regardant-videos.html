<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gagner de l'argent en regardant des vidéos | NeTubeX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}body{background:linear-gradient(145deg,#0c0f18,#080b12);font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#f2f6ff;padding:34px 22px;line-height:1.5;min-height:100vh;display:flex;justify-content:center;align-items:center}.container{max-width:740px;width:100%;margin:0 auto;animation:popFade 0.5s cubic-bezier(0.2,0.9,0.4,1.1)}@keyframes popFade{0%{opacity:0;transform:scale(0.98) translateY(8px)}100%{opacity:1;transform:scale(1) translateY(0)}}h1{font-size:2.15rem;font-weight:800;background:linear-gradient(120deg,#3b82f6,#f97316);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:1.4rem;letter-spacing:-0.3px;line-height:1.25}.glass-card{background:rgba(22,26,42,0.72);backdrop-filter:blur(5px);border-radius:44px;padding:32px 36px;border:1px solid rgba(59,130,246,0.4);box-shadow:0 30px 45px -22px rgba(0,0,0,0.7);transition:all 0.28s ease}.glass-card:hover{transform:translateY(-3px);border-color:rgba(249,115,22,0.5);background:rgba(30,36,56,0.85)}p{font-size:1.08rem;margin-bottom:28px;color:#edf2ff;font-weight:430;line-height:1.58}ul{margin:10px 0 4px 0;list-style:none}li{margin-bottom:16px;position:relative;padding-left:38px;font-size:1.02rem;color:#e5edff;font-weight:450}li::before{content:"▶️";position:absolute;left:0;color:#f97316;font-size:1rem;top:-1px}.badge-video{background:rgba(59,130,246,0.18);border-radius:40px;padding:4px 16px;font-size:0.7rem;display:inline-block;margin-bottom:20px;color:#fdba74;letter-spacing:0.4px}@media (max-width:560px){body{padding:18px 14px}h1{font-size:1.8rem}.glass-card{padding:24px 24px}li{padding-left:34px;font-size:0.96px;font-size:0.95rem}p{font-size:1rem;margin-bottom:22px}}
</style>
</head>
<body>
<div class="container">
<h1>Gagner de l'argent en regardant des vidéos</h1>
<div class="glass-card">
<p>Certaines plateformes paient les utilisateurs pour regarder des vidéos sponsorisées.</p>
<ul>
<li>Publicités</li>
<li>Contenus promotionnels</li>
<li>Vidéo marketing</li>
</ul>
</div>
</div>
<script>
(function(){
    // Blocage clic droit (contextmenu)
    document.addEventListener('contextmenu',function(e){
        e.preventDefault();
        return false;
    });
    // Blocage complet des raccourcis dangereux (devtools, source, sauvegarde, etc.)
    document.addEventListener('keydown',function(e){
        // F12
        if(e.key==='F12'){e.preventDefault();return false;}
        // Ctrl+Shift+I / J / C (inspecteur/console)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='J'||e.key==='j')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='C'||e.key==='c')){e.preventDefault();return false;}
        // Ctrl+U (afficher source)
        if(e.ctrlKey&&(e.key==='U'||e.key==='u')){e.preventDefault();return false;}
        // Ctrl+S (sauvegarder)
        if(e.ctrlKey&&(e.key==='S'||e.key==='s')){e.preventDefault();return false;}
        // Ctrl+P (imprimer)
        if(e.ctrlKey&&(e.key==='P'||e.key==='p')){e.preventDefault();return false;}
        // Ctrl+R / Ctrl+Shift+R (rechargement)
        if(e.ctrlKey&&(e.key==='R'||e.key==='r')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='R'||e.key==='r')){e.preventDefault();return false;}
        // Ctrl+F (recherche)
        if(e.ctrlKey&&(e.key==='F'||e.key==='f')){e.preventDefault();return false;}
        // Ctrl+H (historique)
        if(e.ctrlKey&&(e.key==='H'||e.key==='h')){e.preventDefault();return false;}
        // Ctrl+Shift+N (fenêtre privée)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='N'||e.key==='n')){e.preventDefault();return false;}
        // Ctrl+Shift+P (fenêtre privée Firefox)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='P'||e.key==='p')){e.preventDefault();return false;}
        // Ctrl+Shift+K (console Firefox)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='K'||e.key==='k')){e.preventDefault();return false;}
        // Ctrl+Shift+Delete (effacer données navigation)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='Delete'||e.key==='DEL')){e.preventDefault();return false;}
        // Touche Menu contextuel (clavier)
        if(e.key==='ContextMenu'||(e.shiftKey&&e.key==='F10')){e.preventDefault();return false;}
        // PrintScreen
        if(e.key==='PrintScreen'){e.preventDefault();return false;}
        // Ctrl+E (recherche)
        if(e.ctrlKey&&(e.key==='E'||e.key==='e')){e.preventDefault();return false;}
        // Ctrl+W / Ctrl+Shift+W (fermer onglet)
        if(e.ctrlKey&&(e.key==='W'||e.key==='w')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='W'||e.key==='w')){e.preventDefault();return false;}
        // Ctrl+O (ouvrir fichier)
        if(e.ctrlKey&&(e.key==='O'||e.key==='o')){e.preventDefault();return false;}
        // Protection Mac
        if(e.metaKey&&(e.key==='U'||e.key==='u')){e.preventDefault();return false;}
        if(e.metaKey&&(e.key==='S'||e.key==='s')){e.preventDefault();return false;}
        if(e.metaKey&&e.altKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        if(e.metaKey&&e.shiftKey&&(e.key==='I'||e.key==='i')){e.preventDefault();return false;}
        // Ctrl+Shift+E / L (sécurité)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='E'||e.key==='e')){e.preventDefault();return false;}
        if(e.ctrlKey&&e.shiftKey&&(e.key==='L'||e.key==='l')){e.preventDefault();return false;}
        // Désactiver Ctrl+Shift+U (optionnel)
        if(e.ctrlKey&&e.shiftKey&&(e.key==='U'||e.key==='u')){e.preventDefault();return false;}
    });
    // Désactiver glisser-déposer
    document.querySelectorAll('div, p, li, h1, ul').forEach(el=>{
        el.addEventListener('dragstart',(e)=>e.preventDefault());
    });
    // Désactiver sélection de texte (JS)
    document.addEventListener('selectstart',(e)=>e.preventDefault());
    // Désactiver copier / couper
    document.addEventListener('copy',(e)=>{e.preventDefault();return false;});
    document.addEventListener('cut',(e)=>{e.preventDefault();return false;});
    // Anti-debugging discret (détection console ouverte)
    let antiDebugInterval = setInterval(function(){
        const startPerf = performance.now();
        debugger;
        const durationDiff = performance.now()-startPerf;
        if(durationDiff>8){
            if(window.console && console.clear) console.clear();
        }
    }, 3000);
    // Protection après chargement sur la card et le body
    window.addEventListener('load',function(){
        let cards = document.querySelectorAll('.glass-card, h1');
        cards.forEach(el=>{
            el.addEventListener('contextmenu',(e)=>e.preventDefault());
        });
        document.body.addEventListener('contextmenu',(e)=>e.preventDefault());
        // Désactiver le double-clic pour éviter sélection accidentelle
        document.body.addEventListener('dblclick',(e)=>e.preventDefault());
        // Blocage du clic droit sur tous les éléments internes
    });
    // Bloquer aussi la copie via raccourci Ctrl+C (déjà fait mais renfort)
    document.addEventListener('keydown',function(e){
        if(e.ctrlKey&&(e.key==='C'||e.key==='c')){
            e.preventDefault();
            return false;
        }
        if(e.ctrlKey&&(e.key==='X'||e.key==='x')){
            e.preventDefault();
            return false;
        }
    });
})();
</script>
</body>
</html>
