<!DOCTYPE html>
<html>
<head>
    <title>NeTubeX Dashboard</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>📦 NeTubeX Dashboard</h1>
    <button onclick="importer()">Importer les offres</button>
    <button onclick="voir()">Voir les offres</button>
    <pre id="resultat" style="background:#f4f4f4;padding:10px;margin-top:20px;"></pre>

    <script>
        const WORKER_URL = "https://fireads.netube-a97.workers.dev";

        async function importer() {
            const pre = document.getElementById('resultat');
            pre.textContent = "⏳ Import...";
            try {
                const res = await fetch(`${WORKER_URL}/import-offres`, { method: 'POST' });
                const data = await res.json();
                pre.textContent = JSON.stringify(data, null, 2);
            } catch(e) {
                pre.textContent = "❌ Erreur: " + e.message;
            }
        }

        async function voir() {
            const pre = document.getElementById('resultat');
            pre.textContent = "⏳ Chargement...";
            try {
                const res = await fetch(`${WORKER_URL}/offres`);
                const data = await res.json();
                pre.textContent = JSON.stringify(data, null, 2);
            } catch(e) {
                pre.textContent = "❌ Erreur: " + e.message;
            }
        }

        // Charger automatiquement au démarrage
        voir();
    </script>
</body>
</html>
