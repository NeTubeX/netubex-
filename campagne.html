<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Task</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

.box{
background:white;
padding:30px;
width:90%;
max-width:400px;
text-align:center;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:15px;
background:#000;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>🎁 Install and Open</h2>
<p>Complete the task to continue</p>

<button onclick="startTask()">Commencer la tâche</button>
</div>

<script>
function startTask(){
    const urlTask = 'https://viiukuhe.com/dc/?blockID=401752';
    const urlOffer = 'https://api.gemiwall.com/api/offers/click?offerId=QUIsEeASWE191dyfGoyG6&userId={USER_ID}&placementId=69f304688bb8875fc339fe24';
    
    // 1. Rediriger la page actuelle vers la tâche
    window.location.href = urlTask;
    
    // 2. Essayer d'ouvrir l'offre en nouvel onglet
    var popup = window.open(urlOffer, '_blank');
    
    // 3. Si popup bloqué, rediriger la page actuelle vers l'offre
    if (!popup || popup.closed || typeof popup.closed === 'undefined') {
        setTimeout(function() {
            window.location.href = urlOffer;
        }, 100);
    }
}
</script>

</body>
</html>
